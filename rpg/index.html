<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kingdom Saga Prototype</title>
    <style>
        :root { --gold: #d4af37; --bg: #050508; }
        body { margin: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: 'Georgia', serif; overflow: hidden; height: 100vh; }
        
        /* Professional Game Frame */
        #game-container { position: relative; border: 4px solid #2a2a2a; box-shadow: 0 0 40px rgba(0,0,0,0.8); border-radius: 8px; overflow: hidden; }
        canvas { image-rendering: pixelated; touch-action: none; width: 95vw; max-width: 600px; display: block; }

        /* Medieval UI Styling */
        .hud { position: absolute; top: 10px; left: 10px; pointer-events: none; width: 100%; }
        .stats-group { background: rgba(0,0,0,0.6); padding: 8px; border: 1px solid #444; border-radius: 4px; display: inline-block; }
        .label { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .bar-bg { width: 140px; height: 12px; background: #111; border: 1px solid #555; margin-bottom: 8px; position: relative; }
        .bar-fill { height: 100%; transition: width 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        
        /* Custom Controls */
        .controls { display: flex; width: 100%; max-width: 600px; justify-content: space-between; padding: 20px; align-items: center; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 65px); gap: 8px; }
        .btn { background: linear-gradient(145deg, #222, #111); border: 1px solid #444; color: #888; border-radius: 12px; height: 65px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 0 #000; transition: 0.1s; }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; color: var(--gold); }
        
        .attack-btn { width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #800, #400); border: 3px solid var(--gold); color: white; font-weight: bold; font-size: 14px; box-shadow: 0 6px 0 #200; display: flex; align-items: center; justify-content: center; }
        .attack-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #200; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="hud">
            <div class="stats-group">
                <div class="label">Knight Level 12</div>
                <div class="bar-bg"><div id="pBar" class="bar-fill" style="background: linear-gradient(to right, #0a0, #0f0); width: 100%;"></div></div>
                <div class="label">Titan Golem</div>
                <div class="bar-bg"><div id="bBar" class="bar-fill" style="background: linear-gradient(to right, #a00, #f00); width: 100%;"></div></div>
            </div>
        </div>
        <canvas id="gameCanvas" width="600" height="450"></canvas>
    </div>

    <div class="controls">
        <div class="d-pad">
            <div></div><div class="btn" id="up">▲</div><div></div>
            <div class="btn" id="left">◀</div><div class="btn" id="down">▼</div><div class="btn" id="right">▶</div>
        </div>
        <div class="attack-btn" id="attack">STRIKE</div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME STATE ---
let player = { x: 5, y: 5, hp: 100, isAttacking: false, facing: 1, anim: 0 };
let boss = { x: 9, y: 9, hp: 300, state: 'IDLE', timer: 0, shake: 0 };
let particles = [];
let keys = {};

// --- ISOMETRIC ENGINE ---
const toIso = (x, y) => ({ 
    x: (x - y) * 32 + (canvas.width / 2), 
    y: (x + y) * 16 + 100 
});

// --- RENDER PIXEL TEXTURES ---
const tileTexture = document.createElement('canvas');
tileTexture.width = 64; tileTexture.height = 32;
const tCtx = tileTexture.getContext('2d');
// Draw Stone Tile
tCtx.fillStyle = "#2a2a2e"; tCtx.beginPath();
tCtx.moveTo(32,0); tCtx.lineTo(64,16); tCtx.lineTo(32,32); tCtx.lineTo(0,16); tCtx.fill();
tCtx.strokeStyle = "#1a1a1c"; tCtx.lineWidth = 1; tCtx.stroke();
// Random Cracks
tCtx.strokeStyle = "#35353a";
for(let i=0; i<3; i++) { tCtx.beginPath(); tCtx.moveTo(Math.random()*64, Math.random()*32); tCtx.lineTo(Math.random()*64, Math.random()*32); tCtx.stroke(); }

// --- INPUTS ---
const setupInput = (id, key) => {
    const el = document.getElementById(id);
    const start = (e) => { e.preventDefault(); keys[key] = true; };
    const end = (e) => { e.preventDefault(); keys[key] = false; };
    el.addEventListener('touchstart', start, {passive: false});
    el.addEventListener('touchend', end, {passive: false});
    el.addEventListener('mousedown', start); el.addEventListener('mouseup', end);
};
['up','down','left','right'].forEach(d => setupInput(d, 'Arrow' + d.charAt(0).toUpperCase() + d.slice(1)));
setupInput('attack', 'Space');

function spawnEffect(x, y, color, count=8) {
    for(let i=0; i<count; i++) {
        particles.push({x, y, vx: (Math.random()-0.5)*6, vy: (Math.random()-2)*4, life: 1, color});
    }
}

// --- DRAWING ENTITIES ---
function drawKnight(pos) {
    ctx.save();
    ctx.translate(pos.x, pos.y);
    ctx.scale(player.facing, 1);
    
    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.beginPath(); ctx.ellipse(0, 0, 15, 8, 0, 0, Math.PI*2); ctx.fill();

    // Body
    ctx.fillStyle = "#c0c0c0"; // Silver Armor
    ctx.fillRect(-10, -45 + Math.sin(player.anim)*2, 20, 35);
    ctx.fillStyle = "#800"; // Cape
    ctx.fillRect(-14, -40 + Math.sin(player.anim)*2, 8, 30);
    // Helmet Plume
    ctx.fillStyle = "#f00"; ctx.fillRect(-4, -55, 12, 10);
    
    if (player.isAttacking) {
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(10, -30); ctx.lineTo(40, -50); ctx.stroke();
        ctx.filter = "blur(4px)"; ctx.stroke(); // Glow effect
    }
    ctx.restore();
}

function drawBoss(pos) {
    ctx.save();
    ctx.translate(pos.x + boss.shake, pos.y);
    // Large Shadow
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.beginPath(); ctx.ellipse(0, 0, 40, 20, 0, 0, Math.PI*2); ctx.fill();
    
    // Golem Body
    ctx.fillStyle = boss.state === 'ATTACK' ? "#fff" : (boss.state === 'PREP' ? "#e60" : "#433");
    ctx.fillRect(-40, -110, 80, 110);
    // Glowing Eyes
    ctx.fillStyle = "#f00"; ctx.shadowBlur = 10; ctx.shadowColor = "red";
    ctx.fillRect(-20, -90, 12, 12); ctx.fillRect(8, -90, 12, 12);
    ctx.restore();
}

// --- UPDATE & DRAW ---
function update() {
    let moving = false;
    if (keys['ArrowUp']) { player.y -= 0.08; moving = true; }
    if (keys['ArrowDown']) { player.y += 0.08; moving = true; }
    if (keys['ArrowLeft']) { player.x -= 0.08; moving = true; player.facing = -1; }
    if (keys['ArrowRight']) { player.x += 0.08; moving = true; player.facing = 1; }
    
    if (moving) player.anim += 0.2;
    player.isAttacking = keys['Space'];

    let dist = Math.sqrt(Math.pow(player.x-boss.x, 2) + Math.pow(player.y-boss.y, 2));
    boss.timer++;

    if (boss.state === 'IDLE' && dist < 3) { boss.state = 'PREP'; boss.timer = 0; }
    else if (boss.state === 'PREP') {
        boss.shake = Math.sin(boss.timer) * 3;
        if (boss.timer > 40) { boss.state = 'ATTACK'; boss.timer = 0; }
    }
    else if (boss.state === 'ATTACK') {
        boss.shake = 15;
        if (dist < 2.2) { player.hp -= 1.2; spawnEffect(toIso(player.x, player.y).x, toIso(player.x, player.y).y - 20, "#f00"); }
        if (boss.timer > 12) boss.state = 'IDLE';
    }

    if (player.isAttacking && dist < 2) {
        boss.hp -= 1;
        if (boss.timer % 4 === 0) spawnEffect(toIso(boss.x, boss.y).x, toIso(boss.x, boss.y).y - 60, "#fb0");
    }

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life -= 0.03;
        if(p.life <= 0) particles.splice(i, 1);
    });

    document.getElementById('pBar').style.width = Math.max(0, player.hp) + "%";
    document.getElementById('bBar').style.width = Math.max(0, (boss.hp/3)) + "%";
}

function draw() {
    ctx.fillStyle = "#0c0c12"; ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 1. Draw World Tiles
    for(let x=0; x<16; x++) {
        for(let y=0; y<16; y++) {
            let pos = toIso(x, y);
            ctx.drawImage(tileTexture, pos.x - 32, pos.y);
        }
    }

    // 2. Depth Sort
    let ents = [{t:'p', z:player.x+player.y}, {t:'b', z:boss.x+boss.y}].sort((a,b)=>a.z-b.z);
    ents.forEach(e => {
        if(e.t==='p') drawKnight(toIso(player.x, player.y));
        else drawBoss(toIso(boss.x, boss.y));
    });

    // 3. Particles
    particles.forEach(p => {
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
        ctx.fillRect(p.x, p.y, 4, 4);
    });
    ctx.globalAlpha = 1;
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
