<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel RPG - Combat Prototype</title>
    <style>
        body { margin: 0; background: #0a0a0c; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }
        canvas { border: 2px solid #333; background: #151518; image-rendering: pixelated; touch-action: none; width: 95vw; max-width: 600px; border-radius: 4px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ui { position: absolute; top: 15px; left: 15px; pointer-events: none; text-shadow: 2px 2px black; z-index: 10; }
        .bar-container { width: 120px; height: 10px; background: #333; border: 1px solid #555; margin-bottom: 5px; }
        .bar { height: 100%; transition: width 0.2s; }
        .controls { display: flex; width: 100%; max-width: 600px; justify-content: space-between; padding: 20px; box-sizing: border-box; align-items: center; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 55px); gap: 10px; }
        .btn { background: #222; color: white; border: 1px solid #444; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; user-select: none; height: 55px; box-shadow: 0 4px #000; }
        .btn:active { background: #333; transform: translateY(2px); box-shadow: 0 2px #000; }
        .act-btn { width: 90px; height: 90px; border-radius: 50%; background: #700; border: 3px solid #f33; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px #300; }
        .act-btn:active { transform: translateY(4px); box-shadow: 0 2px #300; background: #a00; }
    </style>
</head>
<body>

    <div class="ui">
        <div>PLAYER</div>
        <div class="bar-container"><div id="pBar" class="bar" style="background: #0f9; width: 100%;"></div></div>
        <div>BOSS</div>
        <div class="bar-container"><div id="bBar" class="bar" style="background: #f33; width: 100%;"></div></div>
        <div id="status" style="font-size: 12px; color: #aaa; margin-top: 5px;">STATUS: IDLE</div>
    </div>

    <canvas id="gameCanvas" width="600" height="400"></canvas>

    <div class="controls">
        <div class="d-pad">
            <div></div><div class="btn" id="up">▲</div><div></div>
            <div class="btn" id="left">◀</div><div class="btn" id="down">▼</div><div class="btn" id="right">▶</div>
        </div>
        <div class="act-btn" id="attack">ATTACK</div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME STATE ---
let player = { x: 4, y: 4, hp: 100, isAttacking: false, facing: 1, frame: 0 };
let boss = { x: 8, y: 8, hp: 200, state: 'IDLE', timer: 0, shake: 0 };
let particles = [];
let keys = {};

// --- HELPERS ---
const toIso = (x, y) => ({ screenX: (x - y) * 30 + (canvas.width / 2), screenY: (x + y) * 15 + 80 });

const setupInput = (id, key) => {
    const el = document.getElementById(id);
    const start = (e) => { e.preventDefault(); keys[key] = true; };
    const end = (e) => { e.preventDefault(); keys[key] = false; };
    el.addEventListener('touchstart', start, {passive: false});
    el.addEventListener('touchend', end, {passive: false});
    el.addEventListener('mousedown', start); el.addEventListener('mouseup', end);
};
['up','down','left','right'].forEach(dir => setupInput(dir, 'Arrow' + dir.charAt(0).toUpperCase() + dir.slice(1)));
setupInput('attack', 'Space');

function spawnHitEffect(x, y, color) {
    for(let i=0; i<8; i++) {
        particles.push({
            x, y, 
            vx: (Math.random() - 0.5) * 4, 
            vy: (Math.random() - 2) * 3, 
            life: 1, color
        });
    }
}

// --- SPRITE DRAWING ---
function drawKnight(x, y, isAttacking, facing) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(facing, 1);
    
    // Cape
    ctx.fillStyle = "#a22";
    ctx.fillRect(-12, -25, 10, 20);
    // Body
    ctx.fillStyle = "#556";
    ctx.fillRect(-8, -30, 16, 25);
    // Helmet
    ctx.fillStyle = "#99a";
    ctx.fillRect(-7, -40, 14, 12);
    ctx.fillStyle = "#222"; // Visor
    ctx.fillRect(facing > 0 ? 0 : -6, -36, 6, 3);
    // Sword
    if (isAttacking) {
        ctx.fillStyle = "#fff";
        ctx.rotate(facing > 0 ? 0.5 : -0.5);
        ctx.fillRect(10, -25, 25, 5);
    }
    ctx.restore();
}

function drawBoss(x, y, state) {
    ctx.save();
    ctx.translate(x + (Math.random()*boss.shake), y);
    // Giant Golem Body
    ctx.fillStyle = state === 'ATTACK' ? "#fff" : (state === 'PREP' ? "#f82" : "#543");
    ctx.fillRect(-30, -80, 60, 80);
    // Shoulder Gears
    ctx.fillStyle = "#765";
    ctx.fillRect(-40, -75, 20, 20);
    ctx.fillRect(20, -75, 20, 20);
    // Eyes
    ctx.fillStyle = "#f00";
    ctx.fillRect(-15, -65, 8, 8); ctx.fillRect(7, -65, 8, 8);
    ctx.restore();
}

// --- CORE LOOP ---
function update() {
    if (keys['ArrowUp']) player.y -= 0.08;
    if (keys['ArrowDown']) player.y += 0.08;
    if (keys['ArrowLeft']) { player.x -= 0.08; player.facing = -1; }
    if (keys['ArrowRight']) { player.x += 0.08; player.facing = 1; }
    
    player.isAttacking = keys['Space'];

    let dx = player.x - boss.x, dy = player.y - boss.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    
    boss.timer++;
    if (boss.state === 'IDLE') {
        boss.shake = 0;
        if (dist < 3) { boss.state = 'PREP'; boss.timer = 0; }
    } else if (boss.state === 'PREP') {
        boss.shake = Math.sin(boss.timer) * 2;
        if (boss.timer > 40) { boss.state = 'ATTACK'; boss.timer = 0; }
    } else if (boss.state === 'ATTACK') {
        boss.shake = 10;
        if (dist < 2) { player.hp -= 1.5; spawnHitEffect(toIso(player.x, player.y).screenX, toIso(player.x, player.y).screenY - 20, "#f00"); }
        if (boss.timer > 10) boss.state = 'IDLE';
    }

    if (player.isAttacking && dist < 1.8) {
        boss.hp -= 0.8;
        if(boss.timer % 5 === 0) spawnHitEffect(toIso(boss.x, boss.y).screenX, toIso(boss.x, boss.y).screenY - 40, "#fa0");
    }

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.02;
        if(p.life <= 0) particles.splice(i, 1);
    });

    document.getElementById('pBar').style.width = player.hp + "%";
    document.getElementById('bBar').style.width = (boss.hp/2) + "%";
    document.getElementById('status').innerText = `STATUS: ${boss.state}`;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Floor
    for(let x=0; x<12; x++) {
        for(let y=0; y<12; y++) {
            let pos = toIso(x, y);
            ctx.fillStyle = (x+y)%2===0 ? "#1a1a1e" : "#1f1f23";
            ctx.beginPath();
            ctx.moveTo(pos.screenX, pos.screenY);
            ctx.lineTo(pos.screenX + 30, pos.screenY + 15);
            ctx.lineTo(pos.screenX, pos.screenY + 30);
            ctx.lineTo(pos.screenX - 30, pos.screenY + 15);
            ctx.fill();
        }
    }

    // Depth Sort
    let ents = [{t:'p', y:player.x+player.y}, {t:'b', y:boss.x+boss.y}].sort((a,b)=>a.y-b.y);
    ents.forEach(e => {
        let pos = toIso(e.t==='p'?player.x:boss.x, e.t==='p'?player.y:boss.y);
        if(e.t==='p') drawKnight(pos.screenX, pos.screenY + 15, player.isAttacking, player.facing);
        else drawBoss(pos.screenX, pos.screenY + 15, boss.state);
    });

    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fillRect(p.x, p.y, 3, 3);
    });
    ctx.globalAlpha = 1;
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
