<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruQuest: Sky Fall</title>
    <style>
        * { box-sizing: border-box; }
        :root { --primary: #60A5FA; --accent: #FCD34D; --danger: #EF4444; }
        
        body { 
            font-family: 'Comic Sans MS', sans-serif; 
            background: #E0F2FE; 
            margin: 0; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            touch-action: manipulation;
        }

        #game-wrapper {
            width: 100vw;
            max-width: 420px;
            height: 100vh;
            background: linear-gradient(to bottom, #7DD3FC, #BAE6FD);
            position: relative;
        }

        /* UI Header */
        .header {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .home-btn {
            background: white;
            border: none;
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .stat-group { display: flex; gap: 8px; }

        .stat-box {
            background: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: 900;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            color: #0369A1;
        }

        #sky { width: 100%; height: 65%; position: relative; }

        .falling-word {
            position: absolute;
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            white-space: nowrap;
            display: flex;
            gap: 2px;
        }

        .char { color: #334155; }
        .char.typed { color: #4ADE80; transform: scale(1.2); display: inline-block; }

        #input-area {
            height: 35%;
            background: white;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .key {
            background: #F1F5F9;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 900;
            color: #475569;
            box-shadow: 0 4px 0 #CBD5E1;
            padding: 10px 0;
        }
        .key:active { transform: translateY(2px); box-shadow: 0 2px 0 #CBD5E1; background: var(--accent); }

        #game-over {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="header">
        <a href="../index.html" class="home-btn">🏠</a>
        <div class="stat-group">
            <div class="stat-box">⭐ <span id="score">0</span></div>
            <div class="stat-box">❤️ <span id="lives">3</span></div>
        </div>
    </div>

    <div id="sky"></div>
    <div id="input-area"></div>

    <div id="game-over">
        <h1>Cloud Full! ☁️</h1>
        <p style="font-size: 1.5rem; margin: 10px 0;">Score: <span id="final-score">0</span></p>
        <div style="display: flex; gap: 10px;">
            <button onclick="location.reload()" style="padding: 15px 25px; font-weight: 900; border-radius: 15px; border: none; background: var(--accent); cursor:pointer;">Play Again</button>
            <a href="../index.html" style="padding: 15px 25px; font-weight: 900; border-radius: 15px; border: none; background: white; text-decoration: none; color: black;">Home</a>
        </div>
    </div>
</div>

<script>
    const WORDS = ['CAT', 'DOG', 'SUN', 'MOON', 'FISH', 'BIRD', 'STAR', 'APPLE', 'BLUE', 'RED', 'CAKE', 'TREE'];
    const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    
    let score = 0;
    let lives = 3;
    let activeWords = [];
    let gameActive = true;
    let spawnRate = 3000;

    // Web Audio Context for Built-in Sounds
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playNote(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const sounds = {
        type: () => playNote(440, 'sine', 0.1),
        pop: () => { playNote(600, 'sine', 0.1); setTimeout(() => playNote(900, 'sine', 0.1), 50); },
        fail: () => playNote(150, 'sawtooth', 0.3)
    };

    const sky = document.getElementById('sky');
    const inputArea = document.getElementById('input-area');

    ALPHABET.forEach(letter => {
        const btn = document.createElement('button');
        btn.className = 'key';
        btn.innerText = letter;
        btn.onclick = () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            handleInput(letter);
        };
        inputArea.appendChild(btn);
    });

    function spawnWord() {
        if (!gameActive) return;
        const wordText = WORDS[Math.floor(Math.random() * WORDS.length)];
        const wordEl = document.createElement('div');
        wordEl.className = 'falling-word';
        wordEl.style.left = Math.random() * (sky.clientWidth - 100) + 'px';
        wordEl.style.top = '-50px';
        wordEl.innerHTML = wordText.split('').map(char => `<span class="char">${char}</span>`).join('');
        sky.appendChild(wordEl);
        
        activeWords.push({ el: wordEl, text: wordText, y: -50, progress: 0 });
        setTimeout(spawnWord, spawnRate);
        spawnRate = Math.max(800, spawnRate - 40);
    }

    function handleInput(letter) {
        for (let word of activeWords) {
            if (word.text[word.progress] === letter) {
                word.progress++;
                sounds.type();
                const chars = word.el.querySelectorAll('.char');
                chars[word.progress - 1].classList.add('typed');
                
                if (word.progress === word.text.length) {
                    score += 10;
                    document.getElementById('score').innerText = score;
                    sounds.pop();
                    word.el.style.transform = 'scale(1.3)';
                    word.el.style.opacity = '0';
                    setTimeout(() => {
                        word.el.remove();
                        activeWords = activeWords.filter(w => w !== word);
                    }, 150);
                }
                return;
            }
        }
    }

    function update() {
        if (!gameActive) return;
        activeWords.forEach((word, index) => {
            word.y += 1.2 + (score / 200); 
            word.el.style.top = word.y + 'px';

            if (word.y > sky.clientHeight) {
                sounds.fail();
                lives--;
                document.getElementById('lives').innerText = lives;
                word.el.remove();
                activeWords.splice(index, 1);
                if (lives <= 0) {
                    gameActive = false;
                    document.getElementById('game-over').style.display = 'flex';
                    document.getElementById('final-score').innerText = score;
                }
            }
        });
        requestAnimationFrame(update);
    }

    spawnWord();
    update();
</script>
</body>
</html>
