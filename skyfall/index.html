<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruQuest: Sky Fall ULTRA</title>
    <style>
        * { 
            box-sizing: border-box; 
            /* Prevents the grey highlight box on tap */
            -webkit-tap-highlight-color: transparent; 
            /* Disables double-tap to zoom on elements */
            touch-action: manipulation; 
        }
        
        :root { --primary: #60A5FA; --accent: #FCD34D; --gold: #FFD700; }
        
        body { 
            font-family: 'Comic Sans MS', sans-serif; 
            margin: 0; overflow: hidden;
            display: flex; justify-content: center;
            background: #000;
            /* Extra layer of protection against accidental scrolling/zoom */
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #game-wrapper {
            width: 100vw; max-width: 420px; height: 100vh;
            position: relative; transition: background 2s ease;
            background: linear-gradient(to bottom, #7DD3FC, #BAE6FD);
            overflow: hidden;
        }

        /* Power Bar */
        #power-container {
            position: absolute; top: 55px; left: 15px; right: 15px;
            height: 10px; background: rgba(0,0,0,0.2); border-radius: 5px; overflow: hidden;
        }
        #power-bar {
            width: 0%; height: 100%; background: #4ADE80;
            transition: width 0.3s ease; box-shadow: 0 0 10px #4ADE80;
        }

        .header {
            position: absolute; top: 10px; left: 0; width: 100%;
            padding: 0 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        .home-btn {
            background: white; border-radius: 12px; padding: 8px 12px;
            font-size: 1.2rem; text-decoration: none; box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            color: #333;
        }

        .stat-box {
            background: white; padding: 5px 12px; border-radius: 15px;
            font-weight: 900; box-shadow: 0 4px 0 rgba(0,0,0,0.1); color: #0369A1;
        }

        #sky { width: 100%; height: 65%; position: relative; }

        .falling-word {
            position: absolute; background: white; padding: 8px 15px;
            border-radius: 20px; font-weight: 900; font-size: 1.2rem;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1); white-space: nowrap;
            display: flex; gap: 2px; z-index: 10;
            user-select: none; /* Prevents text selection while typing */
        }
        
        .falling-word.golden {
            background: var(--gold); border: 3px solid #FFF;
            animation: glow 1s infinite alternate;
        }
        @keyframes glow { from { box-shadow: 0 0 5px #fff; } to { box-shadow: 0 0 20px var(--gold); } }

        .char.typed { color: #4ADE80; transform: scale(1.2); display: inline-block; }

        #input-area {
            height: 35%; background: white; border-top-left-radius: 30px;
            border-top-right-radius: 30px; padding: 15px;
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
            /* Prevents long-press context menus */
            -webkit-user-select: none;
        }

        .key {
            background: #F1F5F9; border: none; border-radius: 10px;
            font-size: 1.1rem; font-weight: 900; color: #475569;
            box-shadow: 0 4px 0 #CBD5E1;
            outline: none;
        }
        .key:active { transform: translateY(2px); background: var(--accent); box-shadow: 0 2px 0 #CBD5E1; }

        .particle {
            position: absolute; width: 6px; height: 6px; border-radius: 2px;
            pointer-events: none; z-index: 5;
        }

        #game-over {
            display: none; position: absolute; inset: 0;
            background: rgba(0,0,0,0.9); z-index: 200;
            flex-direction: column; align-items: center; justify-content: center;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="header">
        <a href="../index.html" class="home-btn">🏠</a>
        <div style="display:flex; gap:8px;">
            <div class="stat-box">⭐ <span id="score">0</span></div>
            <div class="stat-box">❤️ <span id="lives">3</span></div>
        </div>
    </div>

    <div id="power-container"><div id="power-bar"></div></div>
    <div id="sky"></div>
    <div id="input-area"></div>

    <div id="game-over">
        <h1>MARU POWER! 🚀</h1>
        <p style="font-size: 1.5rem; margin: 10px 0;">Final Score: <span id="final-score">0</span></p>
        <button onclick="location.reload()" style="padding: 15px 25px; border-radius: 10px; background: var(--accent); border:none; font-weight:900; cursor:pointer;">Play Again</button>
    </div>
</div>

<script>
    const WORDS = ['CAT', 'DOG', 'SUN', 'MOON', 'FISH', 'BIRD', 'STAR', 'APPLE', 'BLUE', 'RED', 'GREEN', 'HAPPY', 'CAKE', 'RAIN'];
    const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    
    let score = 0, lives = 3, power = 0;
    let activeWords = [], gameActive = true, spawnRate = 3000;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(f, t, d, v=0.1) {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    const sky = document.getElementById('sky');
    const wrapper = document.getElementById('game-wrapper');

    ALPHABET.forEach(l => {
        const b = document.createElement('button');
        b.className = 'key'; b.innerText = l;
        // preventDefault on touchstart is another way to kill the zoom/delay
        b.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            handleInput(l);
        });
        // Also keep onclick for desktop mouse testing
        b.onclick = (e) => {
            if(e.pointerType !== 'touch') handleInput(l);
        };
        document.getElementById('input-area').appendChild(b);
    });

    function createParticles(x, y, color) {
        for(let i=0; i<8; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.backgroundColor = color;
            p.style.left = x + 'px'; p.style.top = y + 'px';
            sky.appendChild(p);
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 4 + 2;
            let px = x, py = y;
            const move = () => {
                px += Math.cos(angle) * speed; py += Math.sin(angle) * speed;
                p.style.left = px + 'px'; p.style.top = py + 'px';
                p.style.opacity = parseFloat(p.style.opacity || 1) - 0.05;
                if(p.style.opacity > 0) requestAnimationFrame(move); else p.remove();
            };
            move();
        }
    }

    function updateBackground() {
        if(score > 300) wrapper.style.background = 'linear-gradient(to bottom, #1E1B4B, #312E81)'; 
        else if(score > 100) wrapper.style.background = 'linear-gradient(to bottom, #FB923C, #F43F5E)';
    }

    function spawnWord() {
        if(!gameActive) return;
        const isGolden = Math.random() < 0.1;
        const text = WORDS[Math.floor(Math.random() * WORDS.length)];
        const el = document.createElement('div');
        el.className = 'falling-word' + (isGolden ? ' golden' : '');
        el.style.left = Math.random() * (sky.clientWidth - 100) + 'px';
        el.style.top = '-50px';
        el.innerHTML = text.split('').map(c => `<span class="char">${c}</span>`).join('');
        sky.appendChild(el);
        activeWords.push({ el, text, y: -50, progress: 0, isGolden });
        setTimeout(spawnWord, spawnRate);
        spawnRate = Math.max(800, spawnRate - 40);
    }

    function handleInput(l) {
        if(!gameActive) return;
        for(let w of activeWords) {
            if(w.text[w.progress] === l) {
                w.progress++;
                playSfx(440 + (w.progress * 50), 'sine', 0.1);
                w.el.querySelectorAll('.char')[w.progress-1].classList.add('typed');
                if(w.progress === w.text.length) popWord(w);
                return;
            }
        }
    }

    function popWord(w) {
        const rect = w.el.getBoundingClientRect();
        createParticles(rect.left + rect.width/2, rect.top, w.isGolden ? '#FFD700' : '#4ADE80');
        
        if(w.isGolden) { lives = Math.min(5, lives + 1); score += 50; playSfx(880, 'triangle', 0.4); }
        else { score += 10; playSfx(600, 'sine', 0.1); }
        
        power = Math.min(100, power + 15);
        document.getElementById('power-bar').style.width = power + '%';
        if(power >= 100) triggerMegaClear();

        document.getElementById('score').innerText = score;
        document.getElementById('lives').innerText = lives;
        updateBackground();
        w.el.remove();
        activeWords = activeWords.filter(item => item !== w);
    }

    function triggerMegaClear() {
        playSfx(200, 'sine', 0.5, 0.3);
        activeWords.forEach(w => {
            const r = w.el.getBoundingClientRect();
            createParticles(r.left, r.top, '#4ADE80');
            w.el.remove();
        });
        activeWords = [];
        power = 0;
        document.getElementById('power-bar').style.width = '0%';
        score += 100;
        document.getElementById('score').innerText = score;
    }

    function update() {
        if(!gameActive) return;
        activeWords.forEach((w, i) => {
            w.y += 1.2 + (score / 450);
            w.el.style.top = w.y + 'px';
            if(w.y > sky.clientHeight) {
                playSfx(100, 'sawtooth', 0.2);
                lives--;
                document.getElementById('lives').innerText = lives;
                w.el.remove(); activeWords.splice(i, 1);
                if(lives <= 0) {
                    gameActive = false;
                    document.getElementById('game-over').style.display = 'flex';
                    document.getElementById('final-score').innerText = score;
                }
            }
        });
        requestAnimationFrame(update);
    }

    spawnWord(); 
    update();
</script>
</body>
</html>
