<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruQuest: Sky Fall</title>
    <style>
        * { box-sizing: border-box; }
        :root { --primary: #60A5FA; --accent: #FCD34D; --danger: #EF4444; }
        
        body { 
            font-family: 'Comic Sans MS', sans-serif; 
            background: #E0F2FE; 
            margin: 0; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            touch-action: manipulation;
        }

        #game-wrapper {
            width: 100vw;
            max-width: 420px;
            height: 100vh;
            background: linear-gradient(to bottom, #7DD3FC, #BAE6FD);
            position: relative;
            border-left: 4px solid #bae6fd;
            border-right: 4px solid #bae6fd;
        }

        /* UI Header */
        .header {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }
        .stat-box {
            background: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: 900;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            color: #0369A1;
        }

        /* Falling Words Area */
        #sky {
            width: 100%;
            height: 65%;
            position: relative;
        }

        .falling-word {
            position: absolute;
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            white-space: nowrap;
            display: flex;
            gap: 2px;
            transition: transform 0.1s;
        }
        .char { color: #334155; }
        .char.typed { color: #4ADE80; transform: scale(1.2); display: inline-block; }

        /* Keyboard Area */
        #input-area {
            height: 35%;
            background: white;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.05);
        }

        .key {
            background: #F1F5F9;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 900;
            color: #475569;
            cursor: pointer;
            box-shadow: 0 4px 0 #CBD5E1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            font-family: inherit;
        }
        .key:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #CBD5E1;
            background: var(--accent);
        }

        #game-over {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="header">
        <div class="stat-box">⭐ <span id="score">0</span></div>
        <div class="stat-box">❤️ <span id="lives">3</span></div>
    </div>

    <div id="sky"></div>

    <div id="input-area">
        </div>

    <div id="game-over">
        <h1>Cloud Full! ☁️</h1>
        <p>Score: <span id="final-score">0</span></p>
        <button onclick="location.reload()" style="padding: 10px 20px; font-weight: 900; border-radius: 10px; border: none; background: var(--accent);">Try Again!</button>
    </div>
</div>

<script>
    const WORDS = ['CAT', 'DOG', 'SUN', 'MOON', 'FISH', 'BIRD', 'STAR', 'APPLE', 'BLUE', 'RED'];
    const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    
    let score = 0;
    let lives = 3;
    let activeWords = [];
    let currentInput = "";
    let gameActive = true;
    let spawnRate = 3000;

    const sky = document.getElementById('sky');
    const inputArea = document.getElementById('input-area');

    // Create Keyboard
    ALPHABET.forEach(letter => {
        const btn = document.createElement('button');
        btn.className = 'key';
        btn.innerText = letter;
        btn.onclick = () => handleInput(letter);
        inputArea.appendChild(btn);
    });

    function spawnWord() {
        if (!gameActive) return;
        
        const wordText = WORDS[Math.floor(Math.random() * WORDS.length)];
        const wordEl = document.createElement('div');
        wordEl.className = 'falling-word';
        wordEl.style.left = Math.random() * (sky.clientWidth - 100) + 'px';
        wordEl.style.top = '-50px';
        
        // Wrap each letter in a span
        wordEl.innerHTML = wordText.split('').map(char => `<span class="char">${char}</span>`).join('');
        
        sky.appendChild(wordEl);
        
        const wordObj = {
            el: wordEl,
            text: wordText,
            y: -50,
            progress: 0
        };
        
        activeWords.push(wordObj);
        setTimeout(spawnWord, spawnRate);
        spawnRate = Math.max(1000, spawnRate - 50); // Get faster!
    }

    function handleInput(letter) {
        // Find if any word starts with this letter or continues with it
        // For simplicity: check the oldest word first
        for (let word of activeWords) {
            if (word.text[word.progress] === letter) {
                word.progress++;
                const chars = word.el.querySelectorAll('.char');
                chars[word.progress - 1].classList.add('typed');
                
                if (word.progress === word.text.length) {
                    popWord(word);
                }
                break; // Only type one letter at a time
            }
        }
    }

    function popWord(word) {
        score += 10;
        document.getElementById('score').innerText = score;
        word.el.style.transform = 'scale(1.5)';
        word.el.style.opacity = '0';
        setTimeout(() => {
            word.el.remove();
            activeWords = activeWords.filter(w => w !== word);
        }, 200);
    }

    function update() {
        if (!gameActive) return;

        activeWords.forEach((word, index) => {
            word.y += 1.5; // Fall speed
            word.el.style.top = word.y + 'px';

            if (word.y > sky.clientHeight) {
                lives--;
                document.getElementById('lives').innerText = lives;
                word.el.remove();
                activeWords.splice(index, 1);
                
                if (lives <= 0) {
                    gameActive = false;
                    document.getElementById('game-over').style.display = 'flex';
                    document.getElementById('final-score').innerText = score;
                }
            }
        });

        requestAnimationFrame(update);
    }

    spawnWord();
    update();
</script>
</body>
</html>
