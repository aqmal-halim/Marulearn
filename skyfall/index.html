<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruQuest: Sky Fall ULTRA</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        :root { --primary: #60A5FA; --accent: #FCD34D; --gold: #FFD700; }
        
        body { 
            font-family: 'Comic Sans MS', "Hiragino Sans", "Meiryo", sans-serif; 
            margin: 0; overflow: hidden; display: flex; justify-content: center;
            background: #000; position: fixed; width: 100%; height: 100%;
        }

        #game-wrapper {
            width: 100vw; max-width: 420px; height: 100vh; position: relative;
            background: linear-gradient(to bottom, #7DD3FC, #BAE6FD);
            display: flex; flex-direction: column; overflow: hidden;
            transition: background 2s ease;
        }

        #power-container {
            position: absolute; top: 65px; left: 15px; right: 15px;
            height: 10px; background: rgba(0,0,0,0.2); border-radius: 5px; overflow: hidden; z-index: 50;
        }
        #power-bar { width: 0%; height: 100%; background: #4ADE80; transition: width 0.3s ease; box-shadow: 0 0 10px #4ADE80; }

        .header {
            position: absolute; top: 10px; left: 0; width: 100%;
            padding: 0 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        .home-btn { background: white; border-radius: 12px; padding: 8px 12px; font-size: 1.2rem; text-decoration: none; box-shadow: 0 4px 0 rgba(0,0,0,0.1); color: #333; }
        .stat-box { background: white; padding: 5px 12px; border-radius: 15px; font-weight: 900; box-shadow: 0 4px 0 rgba(0,0,0,0.1); color: #0369A1; }

        #sky { flex: 1; position: relative; width: 100%; }

        .falling-word {
            position: absolute; background: white; padding: 8px 15px; border-radius: 20px;
            font-weight: 900; font-size: 1.3rem; box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            display: flex; gap: 2px; z-index: 10; user-select: none;
        }
        .falling-word.golden { background: var(--gold); border: 3px solid #FFF; animation: glow 1s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px #fff; } to { box-shadow: 0 0 20px var(--gold); } }

        .char.typed { color: #4ADE80; transform: scale(1.2); display: inline-block; }

        #input-area {
            background: white; border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 15px 10px 40px 10px; display: flex; flex-direction: column; gap: 8px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 100;
        }
        .keyboard-row { display: flex; justify-content: center; gap: 5px; width: 100%; }
        
        .key {
            background: #F1F5F9; border: none; border-radius: 8px; flex: 1;
            height: 50px; max-width: 42px; font-size: 1.1rem; font-weight: 900; color: #475569;
            box-shadow: 0 4px 0 #CBD5E1; outline: none; display: flex; align-items: center; justify-content: center;
        }
        .key:active { background: var(--accent); transform: translateY(2px); box-shadow: 0 2px 0 #CBD5E1; }

        .particle { position: absolute; width: 6px; height: 6px; border-radius: 2px; pointer-events: none; z-index: 5; }

        #game-over {
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 400; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="header">
        <a href="../index.html" class="home-btn">🏠</a>
        <div style="display:flex; gap:8px;">
            <div class="stat-box">⭐ <span id="score">0</span></div>
            <div class="stat-box">❤️ <span id="lives">3</span></div>
        </div>
    </div>

    <div id="power-container"><div id="power-bar"></div></div>
    <div id="sky"></div>

    <div id="input-area">
        <div class="keyboard-row">
            <button class="key" onclick="handleInput('Q')">Q</button>
            <button class="key" onclick="handleInput('W')">W</button>
            <button class="key" onclick="handleInput('E')">E</button>
            <button class="key" onclick="handleInput('R')">R</button>
            <button class="key" onclick="handleInput('T')">T</button>
            <button class="key" onclick="handleInput('Y')">Y</button>
            <button class="key" onclick="handleInput('U')">U</button>
            <button class="key" onclick="handleInput('I')">I</button>
            <button class="key" onclick="handleInput('O')">O</button>
            <button class="key" onclick="handleInput('P')">P</button>
        </div>
        <div class="keyboard-row">
            <button class="key" onclick="handleInput('A')">A</button>
            <button class="key" onclick="handleInput('S')">S</button>
            <button class="key" onclick="handleInput('D')">D</button>
            <button class="key" onclick="handleInput('F')">F</button>
            <button class="key" onclick="handleInput('G')">G</button>
            <button class="key" onclick="handleInput('H')">H</button>
            <button class="key" onclick="handleInput('J')">J</button>
            <button class="key" onclick="handleInput('K')">K</button>
            <button class="key" onclick="handleInput('L')">L</button>
        </div>
        <div class="keyboard-row">
            <button class="key" onclick="handleInput('Z')">Z</button>
            <button class="key" onclick="handleInput('X')">X</button>
            <button class="key" onclick="handleInput('C')">C</button>
            <button class="key" onclick="handleInput('V')">V</button>
            <button class="key" onclick="handleInput('B')">B</button>
            <button class="key" onclick="handleInput('N')">N</button>
            <button class="key" onclick="handleInput('M')">M</button>
            <button class="key" onclick="handleInput('-')">ー</button>
        </div>
    </div>

    <div id="game-over">
        <h1>MARU POWER! 🚀</h1>
        <p style="font-size: 1.5rem;">Score: <span id="final-score">0</span></p>
        <button onclick="location.reload()" style="padding: 15px 30px; border-radius: 15px; background: var(--accent); border:none; font-weight:900;">Play Again</button>
    </div>
</div>

<script>
    const KANA_TO_ROMAJI = {
        'ネ':['N','E'],'コ':['K','O'],'イ':['I'],'ヌ':['N','U'],'ウ':['U'],'ミ':['M','I'],
        'ト':['T','O'],'リ':['R','I'],'ホ':['H','O'],'シ':['S','I'],'ア':['A'],'メ':['M','E'],
        'ハ':['H','A'],'ナ':['N','A'],'ユ':['Y','U'],'キ':['K','I'],'ツ':['T','S','U'],
        'モ':['M','O'],'ケ':['K','E'],'ー':['-'],'パ':['P','A'],'ン':['N']
    };
    const WORDS = ['ネコ', 'イヌ', 'ウミ', 'トリ', 'ホシ', 'アメ', 'ハナ', 'ユキ', 'ツキ', 'モリ', 'ケーキ', 'パン'];

    let score = 0, lives = 3, power = 0, activeWords = [], gameActive = true, spawnRate = 3000;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSfx(f, t, d) {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    function spawnWord() {
        if(!gameActive) return;
        const text = WORDS[Math.floor(Math.random() * WORDS.length)];
        const isGolden = Math.random() < 0.1;
        const el = document.createElement('div');
        el.className = 'falling-word' + (isGolden ? ' golden' : '');
        el.style.left = Math.random() * (window.innerWidth - 120) + 'px';
        el.style.top = '-50px';
        el.innerHTML = text.split('').map(c => `<span class="char">${c}</span>`).join('');
        document.getElementById('sky').appendChild(el);

        let sequence = [];
        text.split('').forEach((char, idx) => {
            const keys = KANA_TO_ROMAJI[char] || [char];
            keys.forEach(k => sequence.push({ key: k.toUpperCase(), charIdx: idx }));
        });

        activeWords.push({ el, text, sequence, y: -50, progress: 0, isGolden });
        setTimeout(spawnWord, spawnRate);
        spawnRate = Math.max(1000, spawnRate - 50);
    }

    function handleInput(l) {
        if(!gameActive) return;
        if(audioCtx.state === 'suspended') audioCtx.resume();

        // FOCUS LOGIC: Sort to find the word closest to the bottom
        let targets = [...activeWords].sort((a, b) => b.y - a.y);
        
        for(let w of targets) {
            let nextRequired = w.sequence[w.progress];
            
            // Special TSU handling (Allow T-U or T-S-U)
            if(nextRequired && nextRequired.key === 'T' && l === 'T') {
                const nextKey = w.sequence[w.progress + 1];
                if(nextKey && nextKey.key === 'S') { 
                    // If user types T, and next is S, we check if they skip S
                }
            }

            if(nextRequired && nextRequired.key === l.toUpperCase()) {
                w.progress++;
                playSfx(440 + (w.progress * 50), 'sine', 0.1);
                
                const isCharFinished = !w.sequence[w.progress] || w.sequence[w.progress].charIdx !== nextRequired.charIdx;
                if (isCharFinished) {
                    const chars = w.el.querySelectorAll('.char');
                    if(chars[nextRequired.charIdx]) chars[nextRequired.charIdx].classList.add('typed');
                }

                if(w.progress === w.sequence.length) popWord(w);
                return; // Stop here so we only hit ONE word at a time
            }
        }
    }

    function popWord(w) {
        if(w.isGolden) { lives = Math.min(5, lives + 1); score += 50; }
        else { score += 10; }
        
        power = Math.min(100, power + 15);
        document.getElementById('power-bar').style.width = power + '%';
        document.getElementById('score').innerText = score;
        document.getElementById('lives').innerText = lives;
        
        w.el.remove();
        activeWords = activeWords.filter(item => item !== w);
        playSfx(800, 'sine', 0.2);
    }

    function update() {
        if(!gameActive) return;
        const skyHeight = document.getElementById('sky').clientHeight;
        for (let i = activeWords.length - 1; i >= 0; i--) {
            let w = activeWords[i];
            w.y += 1.0 + (score / 500);
            w.el.style.top = w.y + 'px';
            if(w.y > skyHeight) {
                lives--;
                document.getElementById('lives').innerText = lives;
                w.el.remove(); 
                activeWords.splice(i, 1);
                if(lives <= 0) {
                    gameActive = false;
                    document.getElementById('game-over').style.display = 'flex';
                    document.getElementById('final-score').innerText = score;
                }
            }
        }
        requestAnimationFrame(update);
    }

    spawnWord();
    update();
</script>
</body>
</html>
