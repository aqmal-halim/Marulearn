<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruQuest: Sky Fall</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        :root { --primary: #60A5FA; --accent: #FCD34D; --gold: #FFD700; }
        
        body { 
            font-family: 'Comic Sans MS', "Hiragino Sans", "Meiryo", sans-serif; 
            margin: 0; overflow: hidden; display: flex; justify-content: center;
            background: #000; position: fixed; width: 100%; height: 100%;
        }

        #game-wrapper {
            width: 100vw; max-width: 420px; height: 100vh; position: relative;
            background: linear-gradient(to bottom, #7DD3FC, #BAE6FD);
            display: flex; flex-direction: column; overflow: hidden;
        }

        #menu-screen {
            position: absolute; inset: 0; background: #7DD3FC; z-index: 300;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .mode-btn {
            width: 85%; padding: 18px; margin: 8px; border: none; border-radius: 20px;
            font-size: 1.3rem; font-weight: 900; cursor: pointer; color: white;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
        }

        .header {
            position: absolute; top: 10px; left: 0; width: 100%;
            padding: 0 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .stat-box { background: white; padding: 5px 12px; border-radius: 15px; font-weight: 900; color: #0369A1; }

        #sky { flex: 1; position: relative; width: 100%; }

        .falling-word {
            position: absolute; background: white; padding: 8px 15px; border-radius: 20px;
            font-weight: 900; font-size: 1.4rem; box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            display: flex; gap: 2px; z-index: 10;
        }
        .char.typed { color: #4ADE80; }

        /* TABBED KEYBOARD UI */
        #input-area {
            background: white; border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 10px 5px 30px 5px; display: flex; flex-direction: column; gap: 8px;
        }

        #tab-bar {
            display: flex; gap: 4px; overflow-x: auto; padding: 5px;
            scrollbar-width: none; /* Hide scrollbar for cleaner look */
        }
        #tab-bar::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: #E2E8F0; border: none; padding: 8px 12px; border-radius: 10px;
            font-weight: 900; font-size: 0.9rem; color: #475569; white-space: nowrap;
        }
        .tab-btn.active { background: var(--primary); color: white; }

        #key-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 0 5px;
        }

        .key {
            background: #F1F5F9; border: none; border-radius: 10px;
            height: 55px; font-size: 1.2rem; font-weight: 900; color: #475569;
            box-shadow: 0 4px 0 #CBD5E1; display: flex; align-items: center; justify-content: center;
        }
        .key:active { background: var(--accent); transform: translateY(2px); box-shadow: none; }

        #game-over {
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 400; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="menu-screen">
        <h1 style="color:white; text-shadow:2px 2px #0369A1;">SKY FALL</h1>
        <button class="mode-btn" style="background:#4ADE80" onclick="startGame('abc')">ABC 🔤</button>
        <button class="mode-btn" style="background:#FBBF24" onclick="startGame('123')">123 🔢</button>
        <button class="mode-btn" style="background:#F87171" onclick="startGame('hira')">あいう 🇯🇵</button>
        <button class="mode-btn" style="background:#60A5FA" onclick="startGame('kata')">アイウ 🇯🇵</button>
        <a href="../index.html" style="margin-top:20px; color:white; font-weight:900;">🏠 Back to Hub</a>
    </div>

    <div class="header">
        <a href="#" onclick="location.reload()" style="text-decoration:none;">🏠</a>
        <div style="display:flex; gap:8px;">
            <div class="stat-box">⭐ <span id="score">0</span></div>
            <div class="stat-box">❤️ <span id="lives">3</span></div>
        </div>
    </div>

    <div id="sky"></div>

    <div id="input-area">
        <div id="tab-bar"></div>
        <div id="key-grid"></div>
    </div>

    <div id="game-over">
        <h1>GAME OVER!</h1>
        <p>Score: <span id="final-score">0</span></p>
        <button onclick="location.reload()" style="padding:15px 30px; border-radius:15px; background:var(--accent); border:none; font-weight:900;">Menu</button>
    </div>
</div>

<script>
    const DATA = {
        abc: {
            words: ['CAT', 'DOG', 'SUN', 'MOON', 'FISH', 'STAR', 'BLUE', 'RED', 'APPLE', 'RAIN'],
            groups: [{ name: "QWERTY", keys: "QWERTYUIOPASDFGHJKLZXCVBNM".split("") }]
        },
        '123': {
            words: ['10', '25', '7', '100', '42', '9', '5', '88', '12', '3'],
            groups: [{ name: "Numbers", keys: "1234567890".split("") }]
        },
        hira: {
            words: ['ねこ', 'いぬ', 'うみ', 'とり', 'ほし', 'あめ', 'はな', 'ゆき', 'つき', 'もり'],
            groups: [
                { name: "あ-な", keys: "あいうえおかきくけこさしすせそたちつてとなにぬねの".split("") },
                { name: "は-ん", keys: "はひふへほまみむめもやゆよらりるれろわをん".split("") }
            ]
        },
        kata: {
            words: ['ネコ', 'イヌ', 'ウミ', 'トリ', 'ホシ', 'アメ', 'ハナ', 'ユキ', 'ツキ', 'モリ'],
            groups: [
                { name: "ア-ナ", keys: "アイウエオカキクケコサシスセソタチツテトナニヌネノ".split("") },
                { name: "ハ-ン", keys: "ハヒフヘホマミムメモヤユヨラリルレロワヲン".split("") }
            ]
        }
    };

    let score = 0, lives = 3, gameActive = false, activeWords = [], spawnRate = 3000, currentMode = '';
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function startGame(mode) {
        currentMode = mode;
        gameActive = true;
        document.getElementById('menu-screen').style.display = 'none';
        setupTabs(DATA[mode].groups);
        spawnWord();
        update();
    }

    function setupTabs(groups) {
        const tabBar = document.getElementById('tab-bar');
        tabBar.innerHTML = '';
        
        // Hide tab bar if only one group
        tabBar.style.display = groups.length > 1 ? 'flex' : 'none';

        groups.forEach((group, i) => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
            btn.innerText = group.name;
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderKeys(group.keys);
            };
            tabBar.appendChild(btn);
        });
        renderKeys(groups[0].keys);
    }

    function renderKeys(keys) {
        const grid = document.getElementById('key-grid');
        grid.innerHTML = '';
        // Change grid columns for ABC/Numbers
        grid.style.gridTemplateColumns = currentMode === 'abc' ? 'repeat(10, 1fr)' : (currentMode === '123' ? 'repeat(5, 1fr)' : 'repeat(5, 1fr)');
        
        keys.forEach(l => {
            const b = document.createElement('button');
            b.className = 'key'; b.innerText = l;
            b.style.fontSize = currentMode === 'abc' ? '0.9rem' : '1.2rem';
            b.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(l); });
            b.onclick = (e) => { if(e.pointerType !== 'touch') handleInput(l); };
            grid.appendChild(b);
        });
    }

    function spawnWord() {
        if(!gameActive) return;
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const text = DATA[currentMode].words[Math.floor(Math.random() * DATA[currentMode].words.length)];
        const el = document.createElement('div');
        el.className = 'falling-word';
        el.style.left = Math.random() * (window.innerWidth - 120) + 'px';
        el.style.top = '-50px';
        el.innerHTML = text.split('').map(c => `<span class="char">${c}</span>`).join('');
        document.getElementById('sky').appendChild(el);
        activeWords.push({ el, text, y: -50, progress: 0 });
        setTimeout(spawnWord, spawnRate);
        spawnRate = Math.max(1000, spawnRate - 50);
    }

    function handleInput(l) {
        for(let w of activeWords) {
            if(w.text[w.progress] === l) {
                w.progress++;
                w.el.querySelectorAll('.char')[w.progress-1].classList.add('typed');
                if(w.progress === w.text.length) {
                    score += 10; document.getElementById('score').innerText = score;
                    w.el.remove(); activeWords = activeWords.filter(item => item !== w);
                }
                return;
            }
        }
    }

    function update() {
        if(!gameActive) return;
        activeWords.forEach((w, i) => {
            w.y += 1.2 + (score / 600);
            w.el.style.top = w.y + 'px';
            if(w.y > window.innerHeight * 0.5) {
                lives--; document.getElementById('lives').innerText = lives;
                w.el.remove(); activeWords.splice(i, 1);
                if(lives <= 0) { gameActive = false; document.getElementById('game-over').style.display = 'flex'; document.getElementById('final-score').innerText = score; }
            }
        });
        requestAnimationFrame(update);
    }
</script>
</body>
</html>
