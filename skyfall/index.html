<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruQuest: Sky Fall</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        :root { --primary: #60A5FA; --accent: #FCD34D; --gold: #FFD700; }
        
        body { 
            font-family: 'Comic Sans MS', "Hiragino Sans", "Meiryo", sans-serif; 
            margin: 0; overflow: hidden; display: flex; justify-content: center;
            background: #000; position: fixed; width: 100%; height: 100%;
        }

        #game-wrapper {
            width: 100vw; max-width: 420px; height: 100vh; position: relative;
            background: linear-gradient(to bottom, #7DD3FC, #BAE6FD);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .header-layer {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
            border-bottom: 2px solid rgba(255,255,255,0.3);
        }

        .stats-row { display: flex; justify-content: space-between; align-items: center; }

        #menu-screen {
            position: absolute; inset: 0; background: #7DD3FC; z-index: 300;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .menu-title { font-size: 2.5rem; color: white; text-shadow: 2px 2px 0px #0369A1; margin-bottom: 20px; }
        .mode-btn {
            width: 85%; padding: 18px; margin: 8px; border: none; border-radius: 20px;
            font-size: 1.3rem; font-weight: 900; cursor: pointer; color: white;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1); transition: transform 0.1s;
        }
        .mode-btn:active { transform: translateY(4px); box-shadow: none; }
        .hub-btn { margin-top: 25px; background: white !important; color: #333 !important; width: 60%; padding: 12px; font-size: 1rem; }

        .home-btn { background: white; border-radius: 12px; padding: 8px 12px; font-size: 1.2rem; text-decoration: none; box-shadow: 0 4px 0 rgba(0,0,0,0.1); color: #333; }
        .stat-box { background: white; padding: 5px 12px; border-radius: 15px; font-weight: 900; box-shadow: 0 4px 0 rgba(0,0,0,0.1); color: #0369A1; }

        #power-container { height: 8px; background: rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden; width: 100%; }
        #power-bar { width: 0%; height: 100%; background: #4ADE80; transition: width 0.3s ease; }

        #sky { flex: 1; position: relative; width: 100%; overflow: hidden; }

        .falling-word {
            position: absolute; background: white; padding: 8px 15px; border-radius: 20px;
            font-weight: 900; font-size: 1.4rem; box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            display: flex; gap: 2px; z-index: 10; user-select: none;
        }
        .char.typed { color: #4ADE80; transform: scale(1.1); display: inline-block; }

        #input-area {
            background: white; border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 15px 5px 40px 5px; display: flex; flex-direction: column; gap: 6px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 100;
        }
        .keyboard-row { display: flex; justify-content: center; gap: 4px; width: 100%; }
        .key {
            background: #F1F5F9; border: none; border-radius: 6px; flex: 1;
            height: 48px; max-width: 40px; font-size: 1.1rem; font-weight: 900; color: #475569;
            box-shadow: 0 4px 0 #CBD5E1; outline: none; display: flex; align-items: center; justify-content: center;
        }
        .key:active { background: var(--accent); transform: translateY(2px); box-shadow: 0 2px 0 #CBD5E1; }

        #game-over {
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 400; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="menu-screen">
        <h1 class="menu-title">SKY FALL</h1>
        <button class="mode-btn" style="background:#4ADE80" onclick="startGame('abc')">ABC 🔤</button>
        <button class="mode-btn" style="background:#FBBF24" onclick="startGame('123')">123 🔢</button>
        <button class="mode-btn" style="background:#F87171" onclick="startGame('hira')">あいう (ROM) 🇯🇵</button>
        <button class="mode-btn" style="background:#60A5FA" onclick="startGame('kata')">アイウ (ROM) 🇯🇵</button>
        <a href="../index.html" class="mode-btn hub-btn">🏠 Marulearn Hub</a>
    </div>

    <div class="header-layer">
        <div class="stats-row">
            <a href="#" onclick="location.reload()" class="home-btn">🏠</a>
            <div style="display:flex; gap:8px;">
                <div class="stat-box">⭐ <span id="score">0</span></div>
                <div class="stat-box">❤️ <span id="lives">3</span></div>
            </div>
        </div>
        <div id="power-container"><div id="power-bar"></div></div>
    </div>

    <div id="sky"></div>
    <div id="input-area"></div>

    <div id="game-over">
        <h1>GAME OVER!</h1>
        <p style="font-size: 1.5rem;">Score: <span id="final-score">0</span></p>
        <button onclick="location.reload()" style="padding: 15px 30px; border-radius: 15px; background: var(--accent); border:none; font-weight:900;">Menu</button>
    </div>
</div>

<script>
    const KANA_TO_ROMAJI = {
        'あ':['A'],'い':['I'],'う':['U'],'え':['E'],'お':['O'],
        'か':['K','A'],'き':['K','I'],'く':['K','U'],'け':['K','E'],'こ':['K','O'],
        'さ':['S','A'],'し':['S','I'],'す':['S','U'],'せ':['S','E'],'そ':['S','O'],
        'た':['T','A'],'ち':['T','I'],'つ':['T','U'],'て':['T','E'],'と':['T','O'],
        'な':['N','A'],'に':['N','I'],'ぬ':['N','U'],'ね':['N','E'],'の':['N','O'],
        'は':['H','A'],'ひ':['H','I'],'ふ':['F','U'],'へ':['H','E'],'ほ':['H','O'],
        'ま':['M','A'],'み':['M','I'],'む':['M','U'],'め':['M','E'],'も':['M','O'],
        'や':['Y','A'],'ゆ':['Y','U'],'よ':['Y','O'],
        'ら':['R','A'],'り':['R','I'],'る':['R','U'],'れ':['R','E'],'ろ':['R','O'],
        'わ':['W','A'],'を':['W','O'],'ん':['N'],
        'ア':['A'],'イ':['I'],'ウ':['U'],'エ':['E'],'オ':['O'],
        'カ':['K','A'],'キ':['K','I'],'ク':['K','U'],'ケ':['K','E'],'コ':['K','O'],
        'サ':['S','A'],'シ':['S','I'],'ス':['S','U'],'セ':['S','E'],'ソ':['S','O'],
        'タ':['T','A'],'チ':['T','I'],'ツ':['T','U'],'テ':['T','E'],'ト':['T','O'],
        'ナ':['N','A'],'ニ':['N','I'],'ヌ':['N','U'],'ネ':['N','E'],'ノ':['N','O'],
        'ハ':['H','A'],'ヒ':['H','I'],'フ':['F','U'],'ヘ':['H','E'],'ホ':['H','O'],
        'マ':['M','A'],'ミ':['M','I'],'ム':['M','U'],'メ':['M','E'],'モ':['M','O'],
        'ヤ':['Y','A'],'ゆ':['Y','U'],'よ':['Y','O'],
        'ラ':['R','A'],'り':['R','I'],'る':['R','U'],'れ':['R','E'],'ろ':['R','O'],
        'ワ':['W','A'],'ヲ':['W','O'],'ン':['N'],
        'ー':['-'], 'ケ':['K','E'], 'キ':['K','I'], 'パ':['P','A']
    };

    const DATA = {
        abc: { words: ['CAT', 'DOG', 'SUN', 'MOON', 'FISH', 'STAR', 'BLUE', 'RED', 'APPLE', 'RAIN'] },
        '123': { words: ['10', '25', '7', '100', '42', '9', '55', '88', '12', '3'] },
        hira: { words: ['ねこ', 'いぬ', 'うみ', 'とり', 'ほし', 'あめ', 'はな', 'ゆき', 'つき', 'もり', 'さくら', 'くも'] },
        kata: { words: ['ネコ', 'イヌ', 'ウミ', 'トリ', 'ホシ', 'アメ', 'ハナ', 'ユキ', 'ツキ', 'モリ', 'ケーキ', 'パン'] }
    };

    const QWERTY = [["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["Z","X","C","V","B","N","M"],["-"]];
    const NUMPAD = [["1","2","3"],["4","5","6"],["7","8","9"],["0"]];

    let score = 0, lives = 3, power = 0, gameActive = false, activeWords = [], spawnRate = 3000, currentMode = '';
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSfx(f, t, d) {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    function startGame(mode) {
        currentMode = mode;
        gameActive = true;
        document.getElementById('menu-screen').style.display = 'none';
        buildKeyboard(mode === '123' ? NUMPAD : QWERTY);
        spawnWord();
        update();
    }

    function buildKeyboard(layout) {
        const area = document.getElementById('input-area');
        area.innerHTML = '';
        layout.forEach(row => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'keyboard-row';
            row.forEach(l => {
                const b = document.createElement('button');
                b.className = 'key'; b.innerText = l;
                b.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(l); });
                b.onclick = (e) => { if(e.pointerType !== 'touch') handleInput(l); };
                rowDiv.appendChild(b);
            });
            area.appendChild(rowDiv);
        });
    }

    function spawnWord() {
        if(!gameActive) return;
        if(audioCtx.state === 'suspended') audioCtx.resume();
        
        const text = DATA[currentMode].words[Math.floor(Math.random() * DATA[currentMode].words.length)];
        const el = document.createElement('div');
        el.className = 'falling-word';
        el.style.left = Math.random() * (window.innerWidth - 120) + 'px';
        el.style.top = '-50px';
        el.innerHTML = text.split('').map(c => `<span class="char">${c}</span>`).join('');
        document.getElementById('sky').appendChild(el);

        let sequence = [];
        text.split('').forEach((char, idx) => {
            // Check for katakana long vowel or mapping
            const keys = KANA_TO_ROMAJI[char] || [char];
            keys.forEach(k => sequence.push({ key: k.toUpperCase(), charIdx: idx }));
        });

        activeWords.push({ el, text, sequence, y: -50, progress: 0 });
        setTimeout(spawnWord, spawnRate);
        spawnRate = Math.max(1000, spawnRate - 50);
    }

    function handleInput(l) {
        // Iterate through words from bottom to top for better targeting
        for(let j = activeWords.length - 1; j >= 0; j--) {
            let w = activeWords[j];
            let nextRequired = w.sequence[w.progress];
            
            if(nextRequired && nextRequired.key === l.toUpperCase()) {
                w.progress++;
                playSfx(440 + (w.progress * 60), 'sine', 0.1);
                
                const isCharFinished = !w.sequence[w.progress] || w.sequence[w.progress].charIdx !== nextRequired.charIdx;
                if (isCharFinished) {
                    const chars = w.el.querySelectorAll('.char');
                    if(chars[nextRequired.charIdx]) chars[nextRequired.charIdx].classList.add('typed');
                }

                if(w.progress === w.sequence.length) {
                    score += 10;
                    power = Math.min(100, power + 10);
                    document.getElementById('score').innerText = score;
                    document.getElementById('power-bar').style.width = power + '%';
                    playSfx(800, 'sine', 0.2);
                    w.el.remove();
                    activeWords.splice(j, 1);
                }
                return; // Input consumed
            }
        }
    }

    function update() {
        if(!gameActive) return;
        const skyHeight = document.getElementById('sky').clientHeight;
        for (let i = activeWords.length - 1; i >= 0; i--) {
            let w = activeWords[i];
            w.y += 1.2 + (score / 600);
            w.el.style.top = w.y + 'px';
            if(w.y > skyHeight) {
                lives--;
                document.getElementById('lives').innerText = lives;
                playSfx(150, 'sawtooth', 0.2);
                w.el.remove(); 
                activeWords.splice(i, 1);
                if(lives <= 0) {
                    gameActive = false;
                    document.getElementById('game-over').style.display = 'flex';
                    document.getElementById('final-score').innerText = score;
                }
            }
        }
        requestAnimationFrame(update);
    }
</script>
</body>
</html>
