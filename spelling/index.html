<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐝 Spelling Bee!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    background: linear-gradient(135deg, #fddb92 0%, #f6ba5f 50%, #f4a261 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: white;
    border-radius: 30px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    max-width: 500px;
    width: 100%;
    text-align: center;
  }
  h1 {
    color: #d97706;
    font-size: 2.2em;
    margin-bottom: 10px;
    text-shadow: 3px 3px 0 #fef3c7;
  }
  .screen { display: none; }
  .screen.active { display: block; }
  .level-btn {
    display: block;
    width: 100%;
    padding: 18px 20px;
    margin: 10px 0;
    border: none;
    border-radius: 20px;
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    color: white;
    text-align: left;
    -webkit-tap-highlight-color: rgba(0,0,0,0.1);
    -webkit-appearance: none;
    appearance: none;
  }
  .level-btn * { pointer-events: none; }
  .level-btn small { display: block; font-size: 0.75em; opacity: 0.9; font-weight: normal; margin-top: 3px; }
  .easy { background: #fbbf24; }
  .medium { background: #f59e0b; }
  .hard { background: #d97706; }
  .expert { background: #92400e; }
  .stats {
    display: flex;
    justify-content: space-around;
    margin-bottom: 20px;
    font-size: 1.05em;
  }
  .stat {
    background: #fef3c7;
    padding: 10px 18px;
    border-radius: 15px;
    font-weight: bold;
  }
  .score { color: #d97706; }
  .streak { color: #dc2626; }
  .bee-emoji {
    font-size: 5em;
    margin: 15px 0 10px;
    animation: float 2s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .word-clue {
    font-size: 4em;
    margin: 10px 0;
  }
  .word-category {
    color: #92400e;
    font-size: 1em;
    font-weight: bold;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .speak-btn {
    background: #d97706;
    color: white;
    padding: 15px 30px;
    border: none;
    border-radius: 50px;
    font-family: inherit;
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    margin: 15px 0;
    -webkit-appearance: none;
    appearance: none;
    box-shadow: 0 5px 15px rgba(217, 119, 6, 0.4);
  }
  .speak-btn:active { transform: scale(0.95); }
  .answer-input {
    font-size: 2em;
    padding: 15px 20px;
    width: 100%;
    max-width: 350px;
    text-align: center;
    border: 4px solid #fbbf24;
    border-radius: 15px;
    font-family: inherit;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 3px;
  }
  .answer-input:focus { border-color: #d97706; }
  .answer-input.shake {
    animation: shake 0.4s;
    border-color: #dc2626;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }
  .submit-btn {
    display: block;
    margin: 20px auto 0;
    padding: 15px 40px;
    background: #d97706;
    color: white;
    border: none;
    border-radius: 20px;
    font-size: 1.3em;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
  }
  .hint-btn {
    background: #fbbf24;
    color: #92400e;
    padding: 10px 20px;
    border: none;
    border-radius: 15px;
    font-family: inherit;
    font-size: 0.95em;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
    -webkit-appearance: none;
    appearance: none;
  }
  .feedback {
    font-size: 1.3em;
    margin-top: 15px;
    min-height: 40px;
    font-weight: bold;
  }
  .correct-text { color: #059669; }
  .wrong-text { color: #dc2626; }
  .hint-text { color: #d97706; font-size: 1.05em; }
  .trophy { font-size: 5em; margin: 20px 0; }
  .final-score {
    font-size: 2em;
    color: #d97706;
    margin: 20px 0;
    font-weight: bold;
  }
  .message {
    font-size: 1.2em;
    color: #2d3436;
    margin: 15px 0;
  }
  .progress-bar {
    background: #fef3c7;
    border-radius: 10px;
    height: 15px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-fill {
    background: linear-gradient(90deg, #fbbf24, #92400e);
    height: 100%;
    transition: width 0.3s;
    width: 0%;
  }
  .home-link {
    display: block;
    margin-top: 20px;
    color: #747d8c;
    text-decoration: none;
    font-size: 0.9em;
  }
  .hint-letters {
    font-size: 2em;
    margin: 10px 0;
    color: #d97706;
    font-weight: bold;
    letter-spacing: 8px;
    font-family: Georgia, serif;
  }
</style>
</head>
<body>
<div class="container">

  <div id="start-screen" class="screen active">
    <h1>🐝 Spelling Bee!</h1>
    <p style="color:#92400e; margin-bottom:20px;">Listen, then spell the word! 🔊</p>
    <button type="button" class="level-btn easy" data-mode="easy">
      🌱 Beginner
      <small>Simple 3-letter words (CAT, DOG, SUN)</small>
    </button>
    <button type="button" class="level-btn medium" data-mode="medium">
      🌟 Easy
      <small>4-letter words (TREE, FISH, BOOK)</small>
    </button>
    <button type="button" class="level-btn hard" data-mode="hard">
      🔥 Medium
      <small>5-6 letter words (APPLE, HAPPY)</small>
    </button>
    <button type="button" class="level-btn expert" data-mode="expert">
      🏆 Champion
      <small>Tricky words (BEAUTIFUL, ELEPHANT)</small>
    </button>
    <a href="../" class="home-link">← Back to Marulearn</a>
  </div>

  <div id="game-screen" class="screen">
    <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
    <div class="stats">
      <div class="stat score">⭐ <span id="score">0</span></div>
      <div class="stat">❓ <span id="q-num">1</span>/10</div>
      <div class="stat streak">🔥 <span id="streak">0</span></div>
    </div>

    <div class="bee-emoji">🐝</div>
    <div class="word-category" id="category">ANIMAL</div>
    <div class="word-clue" id="clue">🐱</div>
    <button type="button" class="speak-btn" id="speak-btn">🔊 Hear the Word</button>
    <div class="hint-letters" id="hint-letters"></div>
    <input type="text" id="answer" class="answer-input" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" placeholder="Type here...">
    <button type="button" class="submit-btn" id="submit-btn">Check! ✓</button>
    <div class="feedback" id="feedback"></div>
    <button type="button" class="hint-btn" id="hint-btn" style="display:none;">💡 Need a hint?</button>
  </div>

  <div id="end-screen" class="screen">
    <div class="trophy" id="trophy">🏆</div>
    <h1 id="end-title">Amazing!</h1>
    <div class="final-score">You scored <span id="final-score">0</span>/10!</div>
    <div class="message" id="end-message"></div>
    <button type="button" class="level-btn easy" id="play-again-btn" style="text-align:center;">🏠 Play Again</button>
    <a href="../" class="home-link">← Back to Marulearn</a>
  </div>

</div>

<script>
  const wordLists = {
    easy: [
      { word: 'CAT', category: 'Animal', emoji: '🐱' },
      { word: 'DOG', category: 'Animal', emoji: '🐶' },
      { word: 'SUN', category: 'Nature', emoji: '☀️' },
      { word: 'CAR', category: 'Vehicle', emoji: '🚗' },
      { word: 'BUS', category: 'Vehicle', emoji: '🚌' },
      { word: 'HAT', category: 'Clothing', emoji: '🎩' },
      { word: 'CUP', category: 'Object', emoji: '☕' },
      { word: 'BED', category: 'Object', emoji: '🛏️' },
      { word: 'PIG', category: 'Animal', emoji: '🐷' },
      { word: 'COW', category: 'Animal', emoji: '🐄' },
      { word: 'BEE', category: 'Animal', emoji: '🐝' },
      { word: 'OWL', category: 'Animal', emoji: '🦉' },
      { word: 'FOX', category: 'Animal', emoji: '🦊' },
      { word: 'EGG', category: 'Food', emoji: '🥚' },
      { word: 'HEN', category: 'Animal', emoji: '🐔' },
      { word: 'BAT', category: 'Animal', emoji: '🦇' }
    ],
    medium: [
      { word: 'TREE', category: 'Nature', emoji: '🌳' },
      { word: 'FISH', category: 'Animal', emoji: '🐟' },
      { word: 'BOOK', category: 'Object', emoji: '📖' },
      { word: 'STAR', category: 'Nature', emoji: '⭐' },
      { word: 'MOON', category: 'Nature', emoji: '🌙' },
      { word: 'BALL', category: 'Toy', emoji: '⚽' },
      { word: 'FROG', category: 'Animal', emoji: '🐸' },
      { word: 'BIRD', category: 'Animal', emoji: '🐦' },
      { word: 'DUCK', category: 'Animal', emoji: '🦆' },
      { word: 'CAKE', category: 'Food', emoji: '🍰' },
      { word: 'SHIP', category: 'Vehicle', emoji: '🚢' },
      { word: 'LION', category: 'Animal', emoji: '🦁' },
      { word: 'BEAR', category: 'Animal', emoji: '🐻' },
      { word: 'RAIN', category: 'Weather', emoji: '🌧️' },
      { word: 'FIRE', category: 'Nature', emoji: '🔥' },
      { word: 'MILK', category: 'Food', emoji: '🥛' }
    ],
    hard: [
      { word: 'APPLE', category: 'Food', emoji: '🍎' },
      { word: 'HAPPY', category: 'Feeling', emoji: '😊' },
      { word: 'HOUSE', category: 'Place', emoji: '🏠' },
      { word: 'MUSIC', category: 'Art', emoji: '🎵' },
      { word: 'HEART', category: 'Feeling', emoji: '❤️' },
      { word: 'TIGER', category: 'Animal', emoji: '🐯' },
      { word: 'HORSE', category: 'Animal', emoji: '🐴' },
      { word: 'PIZZA', category: 'Food', emoji: '🍕' },
      { word: 'CLOUD', category: 'Nature', emoji: '☁️' },
      { word: 'GRAPE', category: 'Food', emoji: '🍇' },
      { word: 'PANDA', category: 'Animal', emoji: '🐼' },
      { word: 'FLOWER', category: 'Nature', emoji: '🌸' },
      { word: 'ORANGE', category: 'Food', emoji: '🍊' },
      { word: 'RABBIT', category: 'Animal', emoji: '🐰' },
      { word: 'MONKEY', category: 'Animal', emoji: '🐵' },
      { word: 'PLANET', category: 'Space', emoji: '🪐' }
    ],
    expert: [
      { word: 'BEAUTIFUL', category: 'Describing', emoji: '✨' },
      { word: 'ELEPHANT', category: 'Animal', emoji: '🐘' },
      { word: 'GIRAFFE', category: 'Animal', emoji: '🦒' },
      { word: 'UMBRELLA', category: 'Object', emoji: '☂️' },
      { word: 'CHOCOLATE', category: 'Food', emoji: '🍫' },
      { word: 'RAINBOW', category: 'Nature', emoji: '🌈' },
      { word: 'DINOSAUR', category: 'Animal', emoji: '🦕' },
      { word: 'BUTTERFLY', category: 'Animal', emoji: '🦋' },
      { word: 'ADVENTURE', category: 'Action', emoji: '🗺️' },
      { word: 'HAMBURGER', category: 'Food', emoji: '🍔' },
      { word: 'XYLOPHONE', category: 'Music', emoji: '🎹' },
      { word: 'BIRTHDAY', category: 'Event', emoji: '🎂' },
      { word: 'FRIENDSHIP', category: 'Feeling', emoji: '🤝' },
      { word: 'TREASURE', category: 'Object', emoji: '💎' },
      { word: 'KANGAROO', category: 'Animal', emoji: '🦘' },
      { word: 'PINEAPPLE', category: 'Food', emoji: '🍍' }
    ]
  };

  let score = 0;
  let streak = 0;
  let questionNum = 0;
  let attempts = 0;
  let level = 'easy';
  let currentWord = null;
  let usedWords = [];
  const totalQuestions = 10;
  const encouragement = ['Awesome! 🎉', 'Great job! ⭐', 'You rock! 🚀', 'Brilliant! 💫', 'Super speller! 🌟'];
  const tryAgain = ['Not quite! Listen again! 👂', 'Oops! Try once more! 🎯', 'Keep going! ✨'];

  function speak(text) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.75;
      utterance.pitch = 1.1;
      utterance.lang = 'en-US';
      window.speechSynthesis.speak(utterance);
    }
  }

  function startGame(lvl) {
    level = lvl;
    score = 0;
    streak = 0;
    questionNum = 0;
    usedWords = [];
    showScreen('game-screen');
    nextQuestion();
  }

  function nextQuestion() {
    questionNum++;
    attempts = 0;
    if (questionNum > totalQuestions) {
      endGame();
      return;
    }

    const pool = wordLists[level];
    // Pick a word that hasn't been used yet this round
    let available = pool.filter(w => !usedWords.includes(w.word));
    if (available.length === 0) {
      usedWords = [];
      available = pool;
    }
    currentWord = available[Math.floor(Math.random() * available.length)];
    usedWords.push(currentWord.word);

    document.getElementById('category').textContent = currentWord.category;
    document.getElementById('clue').textContent = currentWord.emoji;
    document.getElementById('q-num').textContent = questionNum;
    document.getElementById('answer').value = '';
    document.getElementById('feedback').textContent = '';
    document.getElementById('hint-letters').textContent = '';
    document.getElementById('hint-btn').style.display = 'none';
    document.getElementById('progress').style.width = ((questionNum - 1) / totalQuestions * 100) + '%';

    // Speak the word automatically after a short delay
    setTimeout(() => speak(currentWord.word), 400);
    document.getElementById('answer').focus();
  }

  function checkAnswer() {
    const input = document.getElementById('answer');
    const feedback = document.getElementById('feedback');
    const userAnswer = input.value.trim().toUpperCase();

    if (!userAnswer) {
      feedback.textContent = 'Type the word! ✏️';
      feedback.className = 'feedback wrong-text';
      return;
    }

    attempts++;

    if (userAnswer === currentWord.word) {
      if (attempts === 1) {
        score++;
        streak++;
        const msg = encouragement[Math.floor(Math.random() * encouragement.length)];
        feedback.textContent = streak >= 3 ? msg + ' 🔥 ' + streak + ' in a row!' : msg;
      } else {
        streak = 0;
        feedback.textContent = 'Yes! ' + currentWord.word + ' is correct! 🌟';
      }
      feedback.className = 'feedback correct-text';
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak;
      setTimeout(nextQuestion, 1500);
    } else {
      streak = 0;
      document.getElementById('streak').textContent = streak;
      const msg = tryAgain[Math.floor(Math.random() * tryAgain.length)];
      feedback.textContent = msg;
      feedback.className = 'feedback wrong-text';
      input.classList.add('shake');
      setTimeout(() => input.classList.remove('shake'), 400);
      input.value = '';
      input.focus();
      // Auto-speak the word again after wrong attempt
      setTimeout(() => speak(currentWord.word), 500);
      if (attempts >= 2) {
        document.getElementById('hint-btn').style.display = 'inline-block';
      }
    }
  }

  function showHint() {
    const word = currentWord.word;
    // Show first letter and blanks for the rest
    let hint = word[0];
    for (let i = 1; i < word.length; i++) {
      hint += word[i] === ' ' || word[i] === '-' ? ' ' + word[i] + ' ' : ' _';
    }
    document.getElementById('hint-letters').textContent = hint;
    const feedback = document.getElementById('feedback');
    feedback.innerHTML = '💡 The word has <strong>' + word.length + '</strong> letters and starts with <strong>' + word[0] + '</strong>!';
    feedback.className = 'feedback hint-text';
  }

  function endGame() {
    showScreen('end-screen');
    document.getElementById('final-score').textContent = score;
    const trophy = document.getElementById('trophy');
    const title = document.getElementById('end-title');
    const msg = document.getElementById('end-message');
    if (score === 10) {
      trophy.textContent = '🏆';
      title.textContent = 'PERFECT! 🎊';
      msg.textContent = 'You are a Spelling Bee CHAMPION!';
    } else if (score >= 7) {
      trophy.textContent = '🥇';
      title.textContent = 'Awesome Work!';
      msg.textContent = 'Your spelling is amazing!';
    } else if (score >= 4) {
      trophy.textContent = '🥈';
      title.textContent = 'Nice Try!';
      msg.textContent = 'Keep practicing — you\'re getting there!';
    } else {
      trophy.textContent = '🌱';
      title.textContent = 'Keep Practicing!';
      msg.textContent = 'Spelling takes practice. Try again!';
    }
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function goHome() {
    showScreen('start-screen');
  }

  document.addEventListener('DOMContentLoaded', function() {
    // Level buttons
    document.querySelectorAll('#start-screen .level-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        startGame(this.dataset.mode);
      });
    });
    // Game controls
    document.getElementById('speak-btn').addEventListener('click', function() {
      if (currentWord) speak(currentWord.word);
    });
    document.getElementById('submit-btn').addEventListener('click', checkAnswer);
    document.getElementById('hint-btn').addEventListener('click', showHint);
    document.getElementById('play-again-btn').addEventListener('click', goHome);
    document.getElementById('answer').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkAnswer();
    });
  });
</script>
</body>
</html>
