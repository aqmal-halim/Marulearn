<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruQuest: Math Duel</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            background-color: #F8FAFC; 
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #game-container { 
            width: 90%; max-width: 400px; background: white; 
            border: 8px solid #FF784E; border-radius: 40px; 
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
        }

        /* ── TOP NAV ── */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .home-btn {
            background: #eee; border: none; padding: 8px 12px; border-radius: 12px;
            font-weight: 900; color: #555; cursor: pointer; text-decoration: none; font-size: 0.8rem;
        }
        .home-btn:hover { background: #ddd; }

        .stats { font-weight: 900; color: #555; font-size: 0.9rem; }

        /* ── BATTLE ZONE ── */
        #stage { 
            height: 220px; position: relative; 
            background: #ffffff; border-radius: 25px; 
            border: 2px solid #F1F5F9; margin-bottom: 15px;
        }
        
        #hero { position: absolute; bottom: 20px; left: 20px; font-size: 60px; transition: 0.3s; z-index: 2; }
        #enemy { position: absolute; top: 40px; right: 20px; font-size: 80px; transition: 0.3s; z-index: 2; }
        
        .goal-bubble {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: white; border: 3px solid #FF784E; border-radius: 50px;
            padding: 5px 20px; font-weight: 900; font-size: 1.2rem; box-shadow: 0 4px 0 #FF784E22;
        }

        /* Enemy HP Bar */
        .enemy-hp-container {
            position: absolute; top: 120px; right: 20px; width: 80px;
            height: 10px; background: #eee; border-radius: 5px; border: 2px solid #333;
        }
        #enemy-hp-fill { background: #FF5E5E; width: 100%; height: 100%; transition: 0.3s; }

        /* ── INTERFACE ── */
        #equation-box {
            background: #FF784E; color: white; border-radius: 25px;
            padding: 18px; font-size: 2rem; font-weight: 900; text-align: center;
            margin-bottom: 20px; box-shadow: 0 6px 0 #E66A45;
        }

        .hand { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        
        .card {
            width: 65px; height: 65px; background: #5BBAFF; color: white;
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 900; cursor: pointer;
            border: 4px solid white; box-shadow: 0 5px 0 #3a8cc7; transition: 0.1s;
        }
        .card:active { transform: translateY(4px); box-shadow: 0 1px 0 #3a8cc7; }

        /* ── EFFECTS ── */
        .pop-fx { position: absolute; font-weight: 900; font-size: 2rem; animation: pop-up 0.7s forwards; }
        @keyframes pop-up { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-60px); opacity: 0; } }
        .shake { animation: shake-screen 0.3s; }
        @keyframes shake-screen { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    </style>
</head>
<body>

<div id="game-container">
    <div class="nav-bar">
        <a href="https://aqmal-halim.github.io" class="home-btn">🏠 Home</a>
        <div class="stats">❤️ <span id="p-hp">3</span> | 🏰 Floor: <span id="floor">1</span></div>
    </div>

    <div id="stage">
        <div class="goal-bubble">🎯 Goal: <span id="goal-val">10</span></div>
        <div class="enemy-hp-container"><div id="enemy-hp-fill"></div></div>
        <div id="enemy">👾</div>
        <div id="hero">🧙‍♂️</div>
    </div>

    <div id="equation-box">? + 5</div>

    <div class="hand" id="card-hand"></div>
</div>

<script>
    let floor = 1;
    let playerHP = 3;
    let enemyHP = 3;
    let maxEnemyHP = 3;
    let currentConstant = 0;
    let currentGoal = 0;
    let correctCardValue = 0;
    let isBusy = false;

    function init() {
        isBusy = false;
        maxEnemyHP = (floor % 5 === 0) ? 5 : 3;
        enemyHP = maxEnemyHP;
        document.getElementById('enemy').innerText = (floor % 5 === 0) ? "👹" : "👾";
        document.getElementById('floor').innerText = floor;
        document.getElementById('p-hp').innerText = playerHP;
        
        newRound();
        updateHPBar();
    }

    function newRound() {
        // 1. Generate Math
        currentConstant = Math.floor(Math.random() * 5) + 1; // 1-5
        correctCardValue = Math.floor(Math.random() * 9) + 1; // 1-9
        currentGoal = currentConstant + correctCardValue;
        
        document.getElementById('goal-val').innerText = currentGoal;
        document.getElementById('equation-box').innerText = `? + ${currentConstant}`;
        
        // 2. Refresh Hand with guaranteed correct card
        const hand = document.getElementById('card-hand');
        hand.innerHTML = '';
        let cards = [correctCardValue];
        
        while(cards.length < 5) {
            let r = Math.floor(Math.random() * 12) + 1;
            if(!cards.includes(r)) cards.push(r);
        }
        
        cards.sort(() => Math.random() - 0.5).forEach(n => {
            let c = document.createElement('div');
            c.className = 'card';
            c.innerText = n;
            c.onclick = () => play(n, c);
            hand.appendChild(c);
        });
    }

    function play(n, el) {
        if(isBusy) return;
        isBusy = true;
        el.style.visibility = 'hidden';

        if ((n + currentConstant) === currentGoal) {
            fx("EXCELLENT!", "#FFD700");
            enemyHP--;
            updateHPBar();
            if(enemyHP <= 0) {
                setTimeout(() => { alert("Level Clear!"); floor++; init(); }, 600);
            } else {
                setTimeout(() => { newRound(); isBusy = false; }, 800);
            }
        } else {
            fx("MISS!", "#FF5E5E");
            monsterHit();
        }
    }

    function monsterHit() {
        setTimeout(() => {
            const e = document.getElementById('enemy');
            e.style.transform = "translate(-180px, 80px) scale(1.4)";
            setTimeout(() => {
                playerHP--;
                document.getElementById('p-hp').innerText = playerHP;
                document.getElementById('game-container').classList.add('shake');
                setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 300);
                e.style.transform = "translate(0,0) scale(1)";
                
                if(playerHP <= 0) {
                    alert("Game Over!"); location.reload();
                } else {
                    isBusy = false;
                }
            }, 200);
        }, 400);
    }

    function fx(t, c) {
        let f = document.createElement('div');
        f.className = 'pop-fx';
        f.innerText = t; f.style.color = c;
        f.style.left = "30%"; f.style.top = "100px";
        document.getElementById('stage').appendChild(f);
        setTimeout(() => f.remove(), 700);
    }

    function updateHPBar() {
        let pct = (enemyHP / maxEnemyHP) * 100;
        document.getElementById('enemy-hp-fill').style.width = pct + "%";
    }

    init();
</script>
</body>
</html>
