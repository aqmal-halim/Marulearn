<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaruQuest: Math Tower</title>
    <style>
        /* ── KID-FRIENDLY THEME ── */
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            background-color: #D9EDFF; /* Soft Blue */
            color: #444; 
            text-align: center; 
            padding: 10px;
        }

        #game-container { 
            max-width: 450px; 
            margin: 10px auto; 
            background: white; 
            border: 8px solid #FF784E; 
            border-radius: 40px; 
            padding: 20px;
            box-shadow: 0 15px 0 rgba(0,0,0,0.1);
        }

        /* ── TOP BAR ── */
        .stats { 
            display: flex; 
            justify-content: space-between; 
            font-size: 1.1rem; 
            font-weight: 900;
            background: #f0f8ff;
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        /* ── BATTLE AREA ── */
        #enemy-sprite { 
            font-size: 100px; 
            margin: 20px; 
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .enemy-hp-bar {
            background: #eee;
            border-radius: 10px;
            height: 15px;
            width: 80%;
            margin: 10px auto;
            overflow: hidden;
            border: 2px solid #444;
        }

        #enemy-hp-fill {
            background: #FF5E5E;
            height: 100%;
            width: 100%;
            transition: width 0.3s ease;
        }

        /* ── THE SPELLBOARD ── */
        #equation { 
            font-size: 1.8rem; 
            background: #FF784E; 
            color: white;
            padding: 20px; 
            border-radius: 25px; 
            margin: 20px 0;
            font-weight: 900;
            box-shadow: inset 0 -5px 0 rgba(0,0,0,0.2);
        }

        /* ── THE MAGIC STONES ── */
        .hand { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            flex-wrap: wrap;
        }

        .number-card { 
            width: 65px; 
            height: 65px; 
            background: #5BBAFF; 
            color: white; 
            font-size: 1.8rem; 
            font-weight: 900; 
            line-height: 65px; 
            cursor: pointer; 
            border-radius: 50%; /* Round Orbs */
            border: 4px solid #fff;
            box-shadow: 0 6px 0 #3a8cc7;
            transition: all 0.1s;
        }

        .number-card:hover { transform: scale(1.1) translateY(-5px); }
        .number-card:active { transform: translateY(4px); box-shadow: 0 2px 0 #3a8cc7; }

        /* ── MESSAGES ── */
        .win-overlay { color: #2ED573; font-weight: 900; font-size: 1.5rem; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats">
        <span>❤️ HP: <span id="hp">3</span></span>
        <span>🏰 Floor: <span id="floor">1</span></span>
    </div>
    
    <div id="enemy-area">
        <h2 id="enemy-name" style="color: #FF784E;">Wild Slime</h2>
        <div id="enemy-sprite">👾</div>
        <div class="enemy-hp-bar">
            <div id="enemy-hp-fill"></div>
        </div>
        <div style="font-weight: 900; font-size: 0.8rem; color: #aaa;">ENEMY HP</div>
    </div>

    <div id="equation"> ? + 5 = ⚔️ </div>

    <div class="hand" id="hand">
        </div>
</div>

<script>
    let hp = 3;
    let floor = 1;
    let enemyHP = 20;
    let maxEnemyHP = 20;
    let constant = 5;

    function startBattle() {
        if (floor % 5 === 0) {
            document.getElementById('enemy-name').innerText = "🔥 TOWER BOSS 🔥";
            document.getElementById('enemy-sprite').innerText = "👹";
            maxEnemyHP = 50 + (floor * 2);
        } else {
            document.getElementById('enemy-name').innerText = "Wild Slime";
            document.getElementById('enemy-sprite').innerText = "👾";
            maxEnemyHP = 20 + floor;
        }
        enemyHP = maxEnemyHP;
        generateHand();
        updateUI();
    }

    function generateHand() {
        const handDiv = document.getElementById('hand');
        handDiv.innerHTML = '';
        for (let i = 0; i < 5; i++) {
            let num = Math.floor(Math.random() * 10) + 1;
            let card = document.createElement('div');
            card.className = 'number-card';
            card.innerText = num;
            card.onclick = () => playTurn(num, card);
            handDiv.appendChild(card);
        }
    }

    function playTurn(num, cardElement) {
        let damage = num + constant;
        enemyHP -= damage;
        
        // Visual feedback
        cardElement.style.visibility = 'hidden';
        document.getElementById('enemy-sprite').style.animation = 'none';
        setTimeout(() => { document.getElementById('enemy-sprite').style.animation = 'bounce 2s infinite ease-in-out'; }, 10);

        if (enemyHP <= 0) {
            floor++;
            alert("Victory! You are getting stronger! ✨");
            startBattle();
        } else {
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('hp').innerText = hp;
        document.getElementById('floor').innerText = floor;
        let hpPercent = (enemyHP / maxEnemyHP) * 100;
        document.getElementById('enemy-hp-fill').style.width = hpPercent + "%";
    }

    startBattle();
</script>
</body>
</html>
