<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruQuest: Master Speed</title>
    <style>
        :root { --primary: #FF784E; --secondary: #60A5FA; --boss: #EF4444; }
        
        /* Strict Mobile Lock */
        html, body { 
            height: 100%; 
            overflow: hidden; 
            background-color: #334155; 
            margin: 0; 
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Comic Sans MS', sans-serif;
            touch-action: none; /* Prevents accidental zooming/scrolling */
        }

        #game-container { 
            width: 100vw; 
            max-width: 420px; 
            height: 100vh;
            max-height: 850px;
            background: white; 
            border: 6px solid var(--primary); 
            border-radius: 30px; 
            padding: 15px; 
            box-sizing: border-box;
            position: relative; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .home-btn { background: white; border: 2px solid #CBD5E1; padding: 5px 10px; border-radius: 12px; font-weight: 900; color: #475569; font-size: 0.8rem; box-shadow: 0 2px 0 #CBD5E1; cursor: pointer; }
        .stats-col { text-align: right; font-weight: 900; color: #475569; font-size: 0.8rem; }

        #timer-container { width: 100%; height: 8px; background: #E2E8F0; border-radius: 10px; margin-bottom: 5px; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: #4ADE80; transition: width 0.1s linear; }

        #combo-strip { text-align: center; height: 18px; font-size: 0.8rem; font-weight: 900; color: #F59E0B; }

        /* Fixed Aspect Stage to prevent stretching */
        #stage { 
            position: relative; 
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 20px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: center;
            border: 4px solid rgba(0,0,0,0.05); 
            overflow: hidden; 
            background: #F1F5F9; 
        }
        
        #monster-label { position: absolute; top: 8px; background: rgba(255,255,255,0.9); padding: 2px 12px; border-radius: 15px; font-weight: 900; color: #94A3B8; font-size: 0.7rem; z-index: 5; border: 1px solid #E2E8F0; }
        #hp-bar-container { position: absolute; top: 35px; width: 100px; height: 10px; background: #E2E8F0; border-radius: 10px; display: none; border: 2px solid white; }
        #hp-fill { height: 100%; width: 100%; background: var(--boss); border-radius: 10px; transition: 0.3s; }

        #hero-wrap { position: absolute; bottom: 15px; left: 15%; width: 80px; transition: 0.3s; }
        #enemy { position: absolute; bottom: 20px; right: 15%; font-size: 70px; transition: 0.3s; }

        .hero-attack { transform: translateX(100px) rotate(10deg); }
        .enemy-hit   { opacity: 0; transform: scale(0.5); }

        #equation-box { background: var(--primary); color: white; border-radius: 20px; padding: 15px; font-size: 1.8rem; font-weight: 900; text-align: center; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .slot { background: rgba(255,255,255,0.25); border: 3px dashed white; width: 55px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }

        .hand { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-bottom: 10px; }
        .card { height: 65px; background: var(--secondary); color: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 900; cursor: pointer; border: 4px solid white; box-shadow: 0 5px 0 #2563EB; -webkit-appearance: none; }
        .card:active { transform: translateY(4px); box-shadow: 0 1px 0 #2563EB; }

        /* Overlays */
        #go-overlay, #interstitial { 
            display: none; 
            position: absolute; inset: 0; 
            background: rgba(0,0,0,0.8); 
            z-index: 1000; 
            justify-content: center; align-items: center; 
            flex-direction: column;
            border-radius: 24px;
        }

        .int-title { font-size: 2em; font-weight: 900; color: white; }
        .inter-bar { width: 200px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .inter-progress { height: 100%; background: white; width: 0%; transition: width 1.2s linear; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="nav-bar">
        <button class="home-btn" onclick="location.reload()">🏠 Home</button>
        <div class="stats-col">
            <div>❤️ <span id="p-hp">3</span> | 🏰 F: <span id="floor">1</span></div>
            <div style="font-size:0.6rem">🏆 Best: <span id="best-f">1</span></div>
        </div>
    </div>

    <div id="timer-container"><div id="timer-fill"></div></div>
    <div id="combo-strip"></div>

    <div id="stage">
        <div id="monster-label">Zappy</div>
        <div id="hp-bar-container"><div id="hp-fill"></div></div>
        <div id="enemy">👾</div>
        <div id="hero-wrap">
            <svg viewBox="0 0 160 160" style="width:100%;">
                <circle cx="80" cy="85" r="45" fill="#FFB15E"/>
                <circle cx="68" cy="80" r="5" fill="black"/>
                <circle cx="92" cy="80" r="5" fill="black"/>
                <path d="M65 105 q15 10 30 0" stroke="black" stroke-width="3" fill="none"/>
            </svg>
        </div>
    </div>

    <div id="equation-box">
        <div class="slot" id="slot">?</div>
        <span>+</span>
        <span id="const-val">0</span>
        <span>=</span>
        <span id="goal-val">0</span>
    </div>

    <div class="hand" id="card-hand"></div>

    <div id="interstitial">
        <div id="int-icon" style="font-size:4rem"></div>
        <div class="int-title" id="int-title"></div>
        <div class="inter-bar"><div class="inter-progress" id="inter-p"></div></div>
    </div>

    <div id="go-overlay">
        <h1 style="color:white">GAME OVER</h1>
        <button onclick="location.reload()" style="padding:15px 30px; border-radius:15px; border:none; font-weight:900; background:var(--primary); color:white;">Try Again</button>
    </div>
</div>

<script>
    let floor=1, hp=3, enemyHp=1, combo=0, isBusy=false, timer;
    const MONSTERS = ['👾', '🐝', '🐙', '🦖'];

    function init() {
        isBusy = false;
        document.getElementById('floor').innerText = floor;
        document.getElementById('p-hp').innerText = hp;
        
        const isBoss = floor % 5 === 0;
        enemyHp = isBoss ? 3 : 1;
        document.getElementById('enemy').innerText = isBoss ? '👹' : pick(MONSTERS);
        document.getElementById('enemy').className = '';
        document.getElementById('hp-bar-container').style.display = isBoss ? 'block' : 'none';
        document.getElementById('hp-fill').style.width = '100%';

        if (isBoss) triggerBanner("BOSS FIGHT!", "⚠️");
        newRound();
    }

    function triggerBanner(text, icon) {
        const ui = document.getElementById('interstitial');
        const bar = document.getElementById('inter-p');
        document.getElementById('int-title').innerText = text;
        document.getElementById('int-icon').innerText = icon;
        ui.style.display = 'flex';
        bar.style.width = '0%';
        setTimeout(() => { bar.style.width = '100%'; }, 50);
        setTimeout(() => { ui.style.display = 'none'; }, 1300);
    }

    function newRound() {
        let ans = Math.floor(Math.random() * 10) + 1;
        let cVal = Math.floor(Math.random() * 10) + 1;
        document.getElementById('const-val').innerText = cVal;
        document.getElementById('goal-val').innerText = ans + cVal;
        document.getElementById('slot').innerText = '?';

        const hand = document.getElementById('card-hand');
        hand.innerHTML = '';
        let cards = [ans];
        while(cards.length < 6) {
            let r = Math.floor(Math.random() * 20) + 1;
            if(!cards.includes(r)) cards.push(r);
        }
        cards.sort(() => Math.random() - 0.5).forEach(n => {
            const b = document.createElement('button');
            b.className = 'card';
            b.innerText = n;
            b.onclick = () => play(n, ans);
            hand.appendChild(b);
        });
        
        let timeLeft = 100;
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft -= (0.8 + (floor * 0.1));
            document.getElementById('timer-fill').style.width = timeLeft + '%';
            if(timeLeft <= 0) { clearInterval(timer); play(-1, ans); }
        }, 100);
    }

    function play(n, ans) {
        if(isBusy) return;
        isBusy = true;
        clearInterval(timer);

        if(n === ans) {
            combo++;
            document.getElementById('combo-strip').innerText = combo + "x COMBO!";
            document.getElementById('hero-wrap').classList.add('hero-attack');
            document.getElementById('slot').innerText = ans;
            
            setTimeout(() => {
                document.getElementById('hero-wrap').classList.remove('hero-attack');
                enemyHp--;
                if(enemyHp <= 0) {
                    document.getElementById('enemy').classList.add('enemy-hit');
                    setTimeout(() => { floor++; init(); }, 400);
                } else {
                    document.getElementById('hp-fill').style.width = (enemyHp/3*100)+'%';
                    isBusy = false; newRound();
                }
            }, 300);
        } else {
            combo = 0;
            document.getElementById('combo-strip').innerText = "";
            hp--;
            document.getElementById('p-hp').innerText = hp;
            if(hp <= 0) document.getElementById('go-overlay').style.display = 'flex';
            else { isBusy = false; setTimeout(newRound, 500); }
        }
    }

    function pick(a) { return a[Math.floor(Math.random()*a.length)]; }

    window.onload = init;
</script>
</body>
</html>
