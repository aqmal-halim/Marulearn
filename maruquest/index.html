<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruQuest: Math Tower</title>
    <style>
        /* ── VISUAL THEME ── */
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            background: linear-gradient(#D9EDFF, #A1C4FD); 
            height: 100vh; margin: 0; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #game-container { 
            width: 92%; max-width: 400px; background: white; 
            border: 6px solid #FF784E; border-radius: 40px; 
            padding: 15px; position: relative; 
            box-shadow: 0 15px 0 rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        /* ── STATS BAR ── */
        .top-bar { 
            display: flex; justify-content: space-between; 
            font-weight: 900; color: #777; font-size: 1rem;
            padding: 5px 10px;
        }
        .turns-tag { color: #FF784E; font-size: 0.9rem; margin-top: 5px; }

        /* ── BATTLE STAGE ── */
        #stage { 
            height: 200px; position: relative; margin-top: 10px;
            background: #F9FBFF; border-radius: 25px; border: 2px dashed #D0E9FF;
        }
        
        #hero { position: absolute; bottom: 20px; left: 25px; font-size: 60px; z-index: 2; transition: 0.3s; }
        #enemy { position: absolute; top: 30px; right: 25px; font-size: 85px; transition: 0.3s; z-index: 2; }
        
        .hp-bar-container {
            position: absolute; top: 15px; right: 25px; width: 100px;
            height: 10px; background: #eee; border-radius: 5px; border: 2px solid #444;
        }
        #hp-fill { background: #FF5E5E; width: 100%; height: 100%; transition: 0.3s; }

        /* ── ANIMATIONS ── */
        .spell { position: absolute; font-size: 40px; z-index: 5; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .dmg-text { 
            position: absolute; color: #FF5E5E; font-weight: 900; font-size: 2.5rem;
            animation: float-up 0.8s forwards; z-index: 6; text-shadow: 2px 2px 0 white;
        }
        @keyframes float-up { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-60px); opacity: 0; } }

        .shake { animation: shake 0.2s; }
        @keyframes shake {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(-5px, 5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, -5px); }
        }

        /* ── MATH BOX ── */
        #equation-box {
            background: #FF784E; color: white; border-radius: 25px;
            padding: 18px; font-size: 1.8rem; font-weight: 900; margin: 15px 0;
            box-shadow: 0 6px 0 #E66A45; text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* ── INPUT CARDS ── */
        .hand { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        
        .card {
            width: 62px; height: 62px; background: #5BBAFF; color: white;
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; font-weight: 900; cursor: pointer;
            border: 4px solid white; box-shadow: 0 5px 0 #4A9EE0;
            transition: 0.1s;
        }
        .card:active { transform: translateY(4px); box-shadow: 0 1px 0 #4A9EE0; }
        .card.used { visibility: hidden; pointer-events: none; }

        .disabled { pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="top-bar">
        <span>❤️ HP: <span id="p-hp">3</span></span>
        <span>🏰 Floor: <span id="floor-num">1</span></span>
    </div>
    <center><div class="turns-tag">TURNS LEFT: <span id="turns-left">3</span></div></center>

    <div id="stage">
        <div class="hp-bar-container"><div id="hp-fill"></div></div>
        <div id="enemy">👾</div>
        <div id="hero">🧙‍♂️</div>
    </div>

    <div id="equation-box">? + 5 = 💥</div>

    <div class="hand" id="card-hand"></div>
</div>

<script>
    let floor = 1;
    let playerHP = 3;
    let enemyHP = 20;
    let maxEnemyHP = 20;
    let turnsUsed = 0;
    let currentEq = { type: '+', val: 5 };
    let isBusy = false;

    function initBattle() {
        isBusy = false;
        turnsUsed = 0;
        maxEnemyHP = (floor % 5 === 0) ? 80 + (floor * 5) : 15 + (floor * 4);
        enemyHP = maxEnemyHP;
        
        document.getElementById('enemy').innerText = (floor % 5 === 0) ? "👹" : "👾";
        document.getElementById('floor-num').innerText = floor;
        document.getElementById('p-hp').innerText = playerHP;
        document.getElementById('turns-left').innerText = 3;
        document.getElementById('card-hand').classList.remove('disabled');

        generateNewEquation();
        updateUI();
        drawHand();
    }

    function generateNewEquation() {
        // Floor progression: Floor 1-2 (Addition only), Floor 3+ (Mixed)
        const pool = (floor > 2) ? ['+', '-'] : ['+'];
        currentEq.type = pool[Math.floor(Math.random() * pool.length)];
        currentEq.val = Math.floor(Math.random() * 8) + 2;
        
        document.getElementById('equation-box').innerText = `? ${currentEq.type} ${currentEq.val} = 💥`;
    }

    function drawHand() {
        const handEl = document.getElementById('card-hand');
        handEl.innerHTML = '';
        for(let i=0; i<5; i++) {
            let n = Math.floor(Math.random() * 9) + 1;
            let c = document.createElement('div');
            c.className = 'card';
            c.innerText = n;
            c.onclick = () => playerAttack(n, c);
            handEl.appendChild(c);
        }
    }

    function playerAttack(num, element) {
        if(isBusy) return;
        isBusy = true;
        element.classList.add('used');
        turnsUsed++;
        document.getElementById('turns-left').innerText = 3 - turnsUsed;

        // Create Projectile
        const spell = document.createElement('div');
        spell.className = 'spell';
        spell.innerText = currentEq.type === '+' ? "☄️" : "✨";
        spell.style.left = "40px"; spell.style.bottom = "40px";
        document.getElementById('stage').appendChild(spell);

        // Move Projectile
        setTimeout(() => {
            spell.style.left = "280px"; spell.style.bottom = "120px";
            setTimeout(() => {
                spell.remove();
                let dmg = (currentEq.type === '+') ? (num + currentEq.val) : (num + 10); // Custom math logic
                applyDamage(dmg);
            }, 400);
        }, 50);
    }

    function applyDamage(dmg) {
        enemyHP -= dmg;
        triggerEffect('enemy', 'shake');
        
        // Damage Popup
        const dmgTxt = document.createElement('div');
        dmgTxt.className = 'dmg-text';
        dmgTxt.innerText = "-" + dmg;
        dmgTxt.style.right = "50px"; dmgTxt.style.top = "40px";
        document.getElementById('stage').appendChild(dmgTxt);

        setTimeout(() => {
            if (enemyHP <= 0) {
                alert("VICTORY! Floor Defeated!");
                floor++;
                initBattle();
            } else if (turnsUsed >= 3) {
                enemyTurn();
            } else {
                generateNewEquation();
                updateUI();
                isBusy = false;
            }
        }, 400);
    }

    function enemyTurn() {
        document.getElementById('card-hand').classList.add('disabled');
        setTimeout(() => {
            const enemy = document.getElementById('enemy');
            enemy.style.transform = "translate(-180px, 80px) scale(1.3)"; // Lunge at Hero
            
            setTimeout(() => {
                playerHP--;
                document.getElementById('p-hp').innerText = playerHP;
                triggerEffect('game-container', 'shake');
                enemy.style.transform = "translate(0,0) scale(1)";
                
                setTimeout(() => {
                    if (playerHP <= 0) {
                        alert("GAME OVER! Back to the ground floor.");
                        location.reload();
                    } else {
                        turnsUsed = 0;
                        document.getElementById('turns-left').innerText = 3;
                        document.getElementById('card-hand').classList.remove('disabled');
                        generateNewEquation();
                        drawHand();
                        isBusy = false;
                    }
                }, 500);
            }, 300);
        }, 600);
    }

    function triggerEffect(id, className) {
        const el = document.getElementById(id);
        el.classList.add(className);
        setTimeout(() => el.classList.remove(className), 300);
    }

    function updateUI() {
        let percent = (enemyHP / maxEnemyHP) * 100;
        document.getElementById('hp-fill').style.width = Math.max(0, percent) + "%";
    }

    initBattle();
</script>
</body>
</html>
