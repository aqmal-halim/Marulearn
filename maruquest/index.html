<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruQuest: Math Legend</title>
    <style>
        :root {
            --primary: #FF784E;
            --accent: #FFD700;
            --sky: #4facfe;
            --grass: #00f2fe;
        }

        body { 
            font-family: 'Segoe UI', 'Comic Sans MS', cursive; 
            background: #1a1a2e; margin: 0; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #game-window {
            width: 95%; max-width: 420px; height: 92vh;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            border: 4px solid #fff; border-radius: 40px;
            position: relative; overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* ── DYNAMIC BACKGROUND ── */
        .sky-bg {
            position: absolute; top: 0; width: 100%; height: 50%;
            background: linear-gradient(to bottom, #00c6ff, #0072ff);
        }
        
        .clouds {
            position: absolute; top: 20%; width: 200%; height: 100px;
            background: url('https://www.transparenttextures.com/patterns/clouds.png');
            opacity: 0.3; animation: drift 60s linear infinite;
        }

        .ground {
            position: absolute; bottom: 0; width: 100%; height: 55%;
            background: linear-gradient(to bottom, #134e5e, #71b280);
            border-top: 4px solid #fff; z-index: 1;
        }

        @keyframes drift { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* ── BATTLE ZONE ── */
        #stage { position: relative; height: 300px; z-index: 2; padding: 20px; }
        
        #hero { position: absolute; bottom: 40px; left: 30px; font-size: 80px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.4)); transition: 0.3s; }
        #enemy { position: absolute; top: 60px; right: 30px; font-size: 100px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.4)); transition: 0.3s; }

        .target-orb {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px);
            padding: 10px 25px; border-radius: 50px; border: 2px solid #fff;
            color: white; font-weight: 900; font-size: 1.4rem; box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        /* ── PRETTY UI PANEL ── */
        #ui-panel {
            position: absolute; bottom: 20px; left: 5%; width: 90%;
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 30px;
            z-index: 10; padding: 15px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #equation-display {
            color: #fff; font-size: 2.2rem; font-weight: 900; margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .orb-grid { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; padding: 0 10px; }
        
        .magic-button {
            width: 65px; height: 65px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 900; cursor: pointer; border: 2px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.2s;
        }
        .magic-button:active { transform: scale(0.85); box-shadow: none; }

        /* ── COMBAT FX ── */
        .fx-text { 
            position: absolute; font-weight: 900; font-size: 3rem; z-index: 100;
            animation: impact 0.8s ease-out forwards; text-shadow: 0 0 10px #fff;
        }
        @keyframes impact { 0% { scale: 0; opacity: 1; transform: translateY(0); } 50% { scale: 1.5; } 100% { scale: 1; opacity: 0; transform: translateY(-100px); } }

        .shake { animation: screen-shake 0.4s ease-in-out; }
        @keyframes screen-shake { 0%, 100% { transform: translate(0,0); } 20% { transform: translate(-10px, 5px); } 40% { transform: translate(10px, -5px); } 60% { transform: translate(-10px, -5px); } 80% { transform: translate(10px, 5px); } }
    </style>
</head>
<body>

<div id="game-window">
    <div class="sky-bg"><div class="clouds"></div></div>
    <div class="ground"></div>
    
    <div style="position: absolute; top: 15px; left: 25px; z-index: 5; color: white; font-weight: 900; font-size: 1.1rem; text-shadow: 0 2px 4px #000;">
        ❤️ <span id="p-hp">3</span> | 🏰 Floor <span id="floor-num">1</span>
    </div>

    <div id="stage">
        <div class="target-orb">🎯 GOAL: <span id="target-num">10</span></div>
        <div id="enemy">👾</div>
        <div id="hero">🧙‍♂️</div>
    </div>

    <div id="ui-panel">
        <center>
            <div id="equation-display">? + 4</div>
            <div class="orb-grid" id="orb-container"></div>
            <p style="color: rgba(255,255,255,0.7); font-size: 0.75rem; margin-top: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">Hit the goal exactly!</p>
        </center>
    </div>
</div>

<script>
    let floor = 1, playerHP = 3, enemyHP = 3, target = 0, constant = 0, isBusy = false;

    function init() {
        isBusy = false;
        enemyHP = (floor % 5 === 0) ? 5 : 3;
        document.getElementById('enemy').innerText = (floor % 5 === 0) ? "👹" : "👾";
        document.getElementById('floor-num').innerText = floor;
        document.getElementById('p-hp').innerText = playerHP;
        generateLevel();
        renderOrbs();
    }

    function generateLevel() {
        constant = Math.floor(Math.random() * 6) + 1;
        let winCard = Math.floor(Math.random() * 9) + 1;
        target = constant + winCard;
        document.getElementById('target-num').innerText = target;
        document.getElementById('equation-display').innerText = `? + ${constant}`;
        window.correctValue = winCard;
    }

    function renderOrbs() {
        const container = document.getElementById('orb-container');
        container.innerHTML = '';
        let nums = [window.correctValue];
        while(nums.length < 5) {
            let r = Math.floor(Math.random() * 10) + 1;
            if(!nums.includes(r)) nums.push(r);
        }
        nums.sort(() => Math.random() - 0.5).forEach(n => {
            let btn = document.createElement('div');
            btn.className = 'magic-button';
            btn.innerText = n;
            btn.onclick = () => playTurn(n, btn);
            container.appendChild(btn);
        });
    }

    function playTurn(n, btn) {
        if(isBusy) return;
        isBusy = true;
        btn.style.visibility = 'hidden';
        let sum = n + constant;

        if(sum === target) {
            spawnFX("PERFECT!", "#FFD700", true);
            enemyHP--;
            if(enemyHP <= 0) {
                setTimeout(() => { alert("Floor Cleared! ✨"); floor++; init(); }, 600);
            } else {
                setTimeout(() => { generateLevel(); isBusy = false; }, 800);
            }
        } else {
            spawnFX(sum > target ? "TOO HIGH!" : "TOO WEAK!", "#FF5E5E", false);
            monsterStrike();
        }
    }

    function monsterStrike() {
        setTimeout(() => {
            const enemy = document.getElementById('enemy');
            enemy.style.transform = "translate(-180px, 100px) scale(1.5)";
            setTimeout(() => {
                playerHP--;
                document.getElementById('p-hp').innerText = playerHP;
                document.getElementById('game-window').classList.add('shake');
                setTimeout(() => document.getElementById('game-window').classList.remove('shake'), 400);
                enemy.style.transform = "translate(0,0) scale(1)";
                if(playerHP <= 0) { alert("Game Over! Try again!"); location.reload(); }
                else { isBusy = false; }
            }, 200);
        }, 500);
    }

    function spawnFX(txt, color, isHit) {
        let fx = document.createElement('div');
        fx.className = 'fx-text';
        fx.innerText = txt;
        fx.style.color = color;
        fx.style.left = "25%"; fx.style.top = "150px";
        document.getElementById('stage').appendChild(fx);
        setTimeout(() => fx.remove(), 800);
        if(isHit) {
            document.getElementById('enemy').style.filter = "brightness(3) saturate(0)";
            setTimeout(() => document.getElementById('enemy').style.filter = "none", 150);
        }
    }

    init();
</script>
</body>
</html>
