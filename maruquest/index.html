<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruQuest: Clean Math</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            background-color: #F0F4F8; 
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #game-container { 
            width: 90%; max-width: 400px; background: white; 
            border: 8px solid #FF784E; border-radius: 40px; 
            padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            position: relative; overflow: hidden;
        }

        /* ── TOP STATS ── */
        .stats-bar { 
            display: flex; justify-content: space-between; 
            font-weight: 900; color: #555; font-size: 1rem;
            margin-bottom: 10px;
        }

        /* ── BATTLE ZONE ── */
        #stage { 
            height: 220px; position: relative; 
            background: #fdfdfd; border-radius: 20px; 
            border: 2px solid #eee; margin-bottom: 15px;
        }
        
        #hero { position: absolute; bottom: 20px; left: 20px; font-size: 60px; transition: 0.3s; z-index: 2; }
        #enemy { position: absolute; top: 40px; right: 20px; font-size: 80px; transition: 0.3s; z-index: 2; }
        
        .target-tag {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: white; border: 3px solid #FF784E; border-radius: 50px;
            padding: 5px 15px; font-weight: 900; font-size: 1.1rem; color: #333;
            box-shadow: 0 4px 0 #FF784E22;
        }

        /* ── EQUATION & INPUT ── */
        #equation-box {
            background: #FF784E; color: white; border-radius: 25px;
            padding: 18px; font-size: 1.8rem; font-weight: 900; text-align: center;
            margin-bottom: 20px; box-shadow: 0 6px 0 #E66A45;
        }

        .hand { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        
        .card {
            width: 65px; height: 65px; background: #5BBAFF; color: white;
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; font-weight: 900; cursor: pointer;
            border: 3px solid white; box-shadow: 0 5px 0 #3a8cc7; transition: 0.1s;
        }
        .card:active { transform: translateY(4px); box-shadow: 0 1px 0 #3a8cc7; }
        .card.hidden { visibility: hidden; }

        /* ── FX ── */
        .pop-text { 
            position: absolute; font-weight: 900; font-size: 2.2rem; z-index: 10;
            animation: float-fade 0.7s forwards;
        }
        @keyframes float-fade { 
            0% { transform: translateY(0); opacity: 1; scale: 1; }
            100% { transform: translateY(-60px); opacity: 0; scale: 1.2; }
        }

        .shake { animation: shake-ani 0.3s; }
        @keyframes shake-ani {
            0%, 100% { transform: translate(0,0); }
            20%, 60% { transform: translate(-5px, 0); }
            40%, 80% { transform: translate(5px, 0); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats-bar">
        <span>❤️ HP: <span id="hp-val">3</span></span>
        <span>🏰 Floor: <span id="floor-val">1</span></span>
    </div>

    <div id="stage">
        <div class="target-tag">🎯 Goal: <span id="target-val">10</span></div>
        <div id="enemy">👾</div>
        <div id="hero">🧙‍♂️</div>
    </div>

    <div id="equation-box">? + 5</div>

    <div class="hand" id="card-hand"></div>
</div>

<script>
    let floor = 1;
    let playerHP = 3;
    let monsterHP = 3;
    let currentConstant = 5;
    let currentGoal = 10;
    let isBusy = false;

    function initGame() {
        isBusy = false;
        monsterHP = (floor % 5 === 0) ? 5 : 3;
        document.getElementById('enemy').innerText = (floor % 5 === 0) ? "👹" : "👾";
        document.getElementById('floor-val').innerText = floor;
        document.getElementById('hp-val').innerText = playerHP;
        
        setupMath();
        renderCards();
    }

    function setupMath() {
        // Randomize the math problem
        currentConstant = Math.floor(Math.random() * 6) + 1; // 1-6
        let winningCard = Math.floor(Math.random() * 9) + 1; // 1-9
        currentGoal = currentConstant + winningCard;
        
        document.getElementById('target-val').innerText = currentGoal;
        document.getElementById('equation-box').innerText = `? + ${currentConstant}`;
        window.correctChoice = winningCard;
    }

    function renderCards() {
        const hand = document.getElementById('card-hand');
        hand.innerHTML = '';
        let pool = [window.correctChoice];
        while(pool.length < 5) {
            let r = Math.floor(Math.random() * 9) + 1;
            if(!pool.includes(r)) pool.push(r);
        }
        pool.sort(() => Math.random() - 0.5).forEach(n => {
            let card = document.createElement('div');
            card.className = 'card';
            card.innerText = n;
            card.onclick = () => playTurn(n, card);
            hand.appendChild(card);
        });
    }

    function playTurn(num, element) {
        if(isBusy) return;
        isBusy = true;
        element.classList.add('hidden');
        
        let total = num + currentConstant;

        if (total === currentGoal) {
            showFX("PERFECT!", "#FFD700", true);
            monsterHP--;
            if (monsterHP <= 0) {
                setTimeout(() => { 
                    alert("Victory! Moving to Floor " + (floor + 1)); 
                    floor++; 
                    initGame(); 
                }, 600);
            } else {
                setTimeout(() => { setupMath(); isBusy = false; }, 800);
            }
        } else {
            let errorMsg = total > currentGoal ? "TOO HIGH!" : "TOO WEAK...";
            showFX(errorMsg, "#FF5E5E", false);
            monsterStrike();
        }
    }

    function monsterStrike() {
        setTimeout(() => {
            const enemy = document.getElementById('enemy');
            enemy.style.transform = "translate(-180px, 80px) scale(1.4)";
            
            setTimeout(() => {
                playerHP--;
                document.getElementById('hp-val').innerText = playerHP;
                document.getElementById('game-container').classList.add('shake');
                setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 300);
                enemy.style.transform = "translate(0,0) scale(1)";
                
                if (playerHP <= 0) {
                    alert("Game Over! Let's start again.");
                    location.reload();
                } else {
                    isBusy = false;
                }
            }, 200);
        }, 500);
    }

    function showFX(txt, color, isHit) {
        let fx = document.createElement('div');
        fx.className = 'pop-text';
        fx.innerText = txt;
        fx.style.color = color;
        fx.style.left = "30%"; fx.style.top = "100px";
        document.getElementById('stage').appendChild(fx);
        setTimeout(() => fx.remove(), 700);

        if(isHit) {
            document.getElementById('enemy').style.filter = "invert(1)";
            setTimeout(() => document.getElementById('enemy').style.filter = "none", 150);
        }
    }

    initGame();
</script>
</body>
</html>
