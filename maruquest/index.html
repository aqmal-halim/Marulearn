<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruQuest: Math Tower</title>
    <style>
        :root {
            --primary: #FF784E;
            --meadow: #E8F5E9;
            --cave: #F1F5F9;
            --space: #1E293B;
        }

        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            background-color: #F0F4F8; 
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
            transition: background 0.5s;
        }

        #game-container { 
            width: 90%; max-width: 400px; background: white; 
            border: 8px solid var(--primary); border-radius: 40px; 
            padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            position: relative; overflow: hidden;
        }

        /* ── TOP NAV ── */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; z-index: 10; position: relative; }
        .home-btn {
            background: white; border: 2px solid #CBD5E1; padding: 8px 12px; border-radius: 12px;
            font-weight: 900; color: #475569; text-decoration: none; font-size: 0.8rem;
        }
        .stats-col { text-align: right; font-weight: 900; color: #475569; }

        /* ── BATTLE STAGE ── */
        #stage { 
            height: 240px; position: relative; 
            border-radius: 25px; margin-bottom: 15px;
            display: flex; flex-direction: column; align-items: center;
            transition: background 1s ease; border: 4px solid rgba(0,0,0,0.05);
        }
        
        #monster-name {
            font-size: 0.9rem; font-weight: 900; color: #64748B; margin-top: 40px;
            background: rgba(255,255,255,0.8); padding: 2px 10px; border-radius: 20px;
        }

        #hero-wrap { position: absolute; bottom: 15px; left: 20px; width: 85px; transition: 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        #enemy { position: absolute; bottom: 35px; right: 35px; font-size: 85px; transition: 0.3s; }

        /* Animations */
        .hero-attack { transform: translateX(160px) rotate(15deg) scale(1.2); }
        .enemy-attack { transform: translateX(-160px) rotate(-15deg) scale(1.3); }
        .boss-shake { animation: boss-pulse 2s infinite; }
        @keyframes boss-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* HP Bar */
        .hp-meta { width: 150px; text-align: center; margin-top: 10px; }
        .enemy-hp-container { width: 100%; height: 12px; background: #E2E8F0; border-radius: 10px; border: 3px solid #475569; overflow: hidden; }
        #enemy-hp-fill { background: linear-gradient(to right, #FF5E5E, #EF4444); width: 100%; height: 100%; transition: 0.4s; }

        /* ── EQUATION ── */
        #equation-box {
            background: var(--primary); color: white; border-radius: 25px;
            padding: 18px; font-size: 2.2rem; font-weight: 900; text-align: center;
            margin-bottom: 20px; box-shadow: 0 6px 0 #E66A45;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .slot { background: rgba(255,255,255,0.25); border: 3px dashed white; width: 55px; height: 60px; border-radius: 12px; }

        /* ── HAND ── */
        .hand { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card {
            height: 75px; background: #60A5FA; color: white; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 900; cursor: pointer;
            border: 4px solid white; box-shadow: 0 5px 0 #2563EB;
        }
        .card:active { transform: translateY(3px); box-shadow: 0 2px 0 #2563EB; }

        /* FX */
        .crit-text { position: absolute; font-size: 2rem; color: #FFD700; font-weight: 900; text-shadow: 2px 2px 0 #000; animation: crit-anim 0.6s forwards; z-index: 20; }
        @keyframes crit-anim { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

<div id="game-container">
    <div class="nav-bar">
        <a href="#" class="home-btn">🏠 Home</a>
        <div class="stats-col">
            <div>❤️ <span id="p-hp">3</span> | 🏰 F: <span id="floor">1</span></div>
            <div style="font-size: 0.7rem; color: var(--primary)">🏆 Best: F <span id="best-floor">1</span></div>
        </div>
    </div>

    <div id="stage">
        <div id="monster-name">Wild Slime</div>
        <div class="hp-meta">
            <div class="enemy-hp-container"><div id="enemy-hp-fill"></div></div>
        </div>
        <div id="enemy">👾</div>
        
        <div id="hero-wrap">
            <svg viewBox="0 0 130 155" xmlns="http://www.w3.org/2000/svg">
                <circle cx="65" cy="82" r="42" fill="#FFB15E"/>
                <circle cx="55" cy="78" r="6" fill="white"/><circle cx="75" cy="78" r="6" fill="white"/>
                <circle cx="57" cy="80" r="3" fill="#333"/><circle cx="77" cy="80" r="3" fill="#333"/>
                <path d="M52 97 Q65 109 78 97" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
            </svg>
        </div>
    </div>

    <div id="equation-box">
        <div class="slot">?</div> <span>+</span> <span id="const-val">0</span> <span>=</span> <span id="goal-val">0</span>
    </div>

    <div class="hand" id="card-hand"></div>
</div>

<script>
    const monsterNames = ["Dusty", "Sparky", "Gloop", "Bones", "Crabby", "Shadow", "Zappy"];
    const monsterEmojis = ["👾", "👻", "🐙", "🦀", "🐝", "🦖"];
    
    let floor = 1, playerHP = 3, enemyHP = 3, maxEnemyHP = 3;
    let currentGoal, currentConst, startTime, isBusy = false;

    function init() {
        isBusy = false;
        const isBoss = floor % 5 === 0;
        maxEnemyHP = isBoss ? 5 : 3;
        enemyHP = maxEnemyHP;
        
        // Update Visuals
        document.getElementById('floor').innerText = floor;
        document.getElementById('p-hp').innerText = playerHP;
        document.getElementById('enemy').innerText = isBoss ? "👹" : monsterEmojis[Math.floor(Math.random()*monsterEmojis.length)];
        document.getElementById('monster-name').innerText = isBoss ? "BOSS: MEGA ONI" : monsterNames[Math.floor(Math.random()*monsterNames.length)] + " the Monster";
        document.getElementById('enemy').className = isBoss ? 'boss-shake' : '';
        
        // Background Logic
        const stage = document.getElementById('stage');
        if(floor <= 5) stage.style.background = "#E8F5E9"; // Meadow
        else if(floor <= 10) stage.style.background = "#F1F5F9"; // Cave
        else stage.style.background = "#1E293B"; // Space

        // Best Floor Persistence
        let best = localStorage.getItem('maru_best') || 1;
        if(floor > best) { best = floor; localStorage.setItem('maru_best', floor); }
        document.getElementById('best-floor').innerText = best;

        updateHPBar();
        newRound();
    }

    function newRound() {
        currentConst = Math.floor(Math.random() * 5) + 1;
        let ans = Math.floor(Math.random() * 9) + 1;
        currentGoal = currentConst + ans;
        
        document.getElementById('const-val').innerText = currentConst;
        document.getElementById('goal-val').innerText = currentGoal;
        
        const hand = document.getElementById('card-hand');
        hand.innerHTML = '';
        let cards = [ans];
        while(cards.length < 6) {
            let r = Math.floor(Math.random() * 12) + 1;
            if(!cards.includes(r)) cards.push(r);
        }
        
        cards.sort(() => Math.random() - 0.5).forEach(n => {
            let c = document.createElement('div');
            c.className = 'card';
            c.innerText = n;
            c.onclick = () => play(n, c, ans);
            hand.appendChild(c);
        });
        startTime = Date.now();
    }

    function play(n, el, ans) {
        if(isBusy) return;
        isBusy = true;
        const timeTaken = (Date.now() - startTime) / 1000;

        if (n === ans) {
            if(timeTaken < 3) showCrit("CRITICAL HIT! ⚡");
            document.getElementById('hero-wrap').classList.add('hero-attack');
            
            setTimeout(() => {
                enemyHP -= (timeTaken < 3) ? 2 : 1;
                updateHPBar();
                document.getElementById('hero-wrap').classList.remove('hero-attack');
                
                if(enemyHP <= 0) {
                    floor++;
                    setTimeout(init, 500);
                } else {
                    newRound();
                    isBusy = false;
                }
            }, 300);
        } else {
            document.getElementById('enemy').classList.add('enemy-attack');
            setTimeout(() => {
                playerHP--;
                document.getElementById('p-hp').innerText = playerHP;
                document.getElementById('enemy').classList.remove('enemy-attack');
                if(playerHP <= 0) {
                    alert("Game Over! Back to Floor 1.");
                    floor = 1; playerHP = 3; init();
                } else {
                    isBusy = false;
                }
            }, 300);
        }
    }

    function showCrit(msg) {
        let t = document.createElement('div');
        t.className = 'crit-text';
        t.innerText = msg;
        t.style.left = "50%"; t.style.top = "40%";
        document.getElementById('stage').appendChild(t);
        setTimeout(() => t.remove(), 600);
    }

    function updateHPBar() {
        let pct = Math.max(0, (enemyHP / maxEnemyHP) * 100);
        document.getElementById('enemy-hp-fill').style.width = pct + "%";
    }

    init();
</script>
</body>
</html>
