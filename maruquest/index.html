<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaruQuest: Math RPG</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #222; color: white; text-align: center; }
        #game-container { max-width: 600px; margin: 20px auto; border: 4px solid #fff; padding: 20px; border-radius: 10px; }
        .stats { display: flex; justify-content: space-between; font-size: 1.2rem; }
        #enemy-sprite { font-size: 80px; margin: 20px; }
        #equation { font-size: 2rem; background: #444; padding: 10px; border-radius: 5px; margin: 20px 0; }
        .hand { display: flex; justify-content: center; gap: 10px; }
        .number-card { 
            width: 50px; height: 70px; background: #fff; color: #000; 
            font-size: 1.5rem; font-weight: bold; line-height: 70px; 
            cursor: pointer; border-radius: 5px; border: 2px solid #aaa;
        }
        .number-card:hover { background: #ffd700; transform: scale(1.1); }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats">
        <span>Hero HP: <span id="hp">3</span> ❤️</span>
        <span>Floor: <span id="floor">1</span></span>
    </div>
    
    <div id="enemy-area">
        <div id="enemy-name">Wild Slime</div>
        <div id="enemy-sprite">👾</div>
        <div>Enemy HP: <span id="enemy-hp">20</span></div>
    </div>

    <div id="equation"> [ ? ] + 5 = Damage </div>

    <div class="hand" id="hand">
        </div>
</div>

<script>
    // Initial Game State
    let hp = 3;
    let floor = 1;
    let enemyHP = 20;
    let hand = [];
    let constant = 5;

    function startBattle() {
        if (floor % 5 === 0) {
            document.getElementById('enemy-name').innerText = "BOSS: SUM-MONER";
            document.getElementById('enemy-sprite').innerText = "👹";
            enemyHP = 50;
        } else {
            document.getElementById('enemy-name').innerText = "Wild Slime";
            document.getElementById('enemy-sprite').innerText = "👾";
            enemyHP = 20;
        }
        generateHand();
        updateUI();
    }

    function generateHand() {
        hand = Array.from({length: 5}, () => Math.floor(Math.random() * 10) + 1);
        const handDiv = document.getElementById('hand');
        handDiv.innerHTML = '';
        hand.forEach((num, index) => {
            let card = document.createElement('div');
            card.className = 'number-card';
            card.innerText = num;
            card.onclick = () => playTurn(num, index);
            handDiv.appendChild(card);
        });
    }

    function playTurn(num, index) {
        let damage = num + constant;
        enemyHP -= damage;
        
        if (enemyHP <= 0) {
            alert("Victory! Moving to the next room...");
            floor++;
            startBattle();
        } else {
            // Remove used card
            document.getElementsByClassName('number-card')[index].style.visibility = 'hidden';
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('hp').innerText = hp;
        document.getElementById('floor').innerText = floor;
        document.getElementById('enemy-hp').innerText = enemyHP;
    }

    startBattle();
</script>
</body>
</html>
