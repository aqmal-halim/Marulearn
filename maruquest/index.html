<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruQuest: Math Duel</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', cursive; 
            background: #222; margin: 0; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #game-window {
            width: 95%; max-width: 420px; height: 90vh;
            background: #87CEEB; border: 8px solid #333; border-radius: 40px;
            position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* ── ENVIRONMENT ── */
        .scenery { position: absolute; bottom: 0; width: 100%; height: 60%; background: linear-gradient(#7cfc00, #228b22); border-top: 5px solid #556b2f; z-index: 1; }
        .castle { position: absolute; top: 0; width: 100%; height: 40%; background: #999; border-bottom: 8px solid #666; background-image: radial-gradient(#777 10%, transparent 11%); background-size: 40px 40px; }

        /* ── BATTLE AREA ── */
        #stage { position: relative; height: 260px; z-index: 2; }
        #hero { position: absolute; bottom: 20px; left: 30px; font-size: 70px; transition: 0.3s; }
        #enemy { position: absolute; top: 50px; right: 30px; font-size: 90px; transition: 0.3s; }
        
        .target-bubble {
            position: absolute; top: 40px; right: 130px; background: white;
            padding: 8px 15px; border-radius: 20px; border: 3px solid #FF784E;
            font-weight: 900; font-size: 1.2rem; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* ── ACTION UI ── */
        #ui-panel {
            position: absolute; bottom: 0; width: 100%; height: 45%;
            background: rgba(255,255,255,0.95); border-top: 6px solid #FF784E;
            z-index: 10; border-radius: 30px 30px 0 0;
        }

        #equation-card {
            background: #FF784E; color: white; width: 85%; margin: 15px auto;
            padding: 15px; border-radius: 20px; font-size: 2rem; font-weight: 900;
            box-shadow: 0 8px 0 #E66A45; text-align: center;
        }

        .hand { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding: 10px; }
        
        .magic-orb {
            width: 65px; height: 65px; background: #5BBAFF; color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 900; cursor: pointer;
            border: 4px solid white; box-shadow: 0 6px 0 #3a8cc7; transition: 0.1s;
        }
        .magic-orb:active { transform: scale(0.9) translateY(4px); }

        /* ── FX ── */
        .dmg-popup { position: absolute; font-weight: 900; font-size: 2.5rem; z-index: 100; animation: float 0.8s forwards; }
        @keyframes float { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-8px,0); } 75% { transform: translate(8px,0); } }
    </style>
</head>
<body>

<div id="game-window">
    <div class="castle"></div>
    <div class="scenery"></div>
    
    <div style="position: absolute; top: 15px; left: 20px; z-index: 5; font-weight: 900; color: white; text-shadow: 2px 2px #333;">
        ❤️ HP: <span id="p-hp">3</span> | 🏰 Floor: <span id="floor-num">1</span>
    </div>

    <div id="stage">
        <div class="target-bubble">🎯 Goal: <span id="target-num">10</span></div>
        <div id="enemy">👾</div>
        <div id="hero">🧙‍♂️</div>
    </div>

    <div id="ui-panel">
        <div id="equation-card">? + 4 = ?</div>
        <div class="hand" id="orb-hand"></div>
        <center><p style="color:#aaa; font-size:0.8rem; font-weight:900;">HIT THE GOAL EXACTLY FOR CRITICAL HIT!</p></center>
    </div>
</div>

<script>
    let floor = 1;
    let playerHP = 3;
    let enemyHP = 3; // Now simplified to 3 "hits" or stars
    let targetNum = 0;
    let constant = 0;
    let isBusy = false;

    function start() {
        isBusy = false;
        enemyHP = (floor % 5 === 0) ? 5 : 3;
        document.getElementById('enemy').innerText = (floor % 5 === 0) ? "👹" : "👾";
        document.getElementById('floor-num').innerText = floor;
        document.getElementById('p-hp').innerText = playerHP;
        
        generateLevel();
        spawnOrbs();
    }

    function generateLevel() {
        constant = Math.floor(Math.random() * 5) + 1; // 1-5
        let neededCard = Math.floor(Math.random() * 8) + 1; // 1-8
        targetNum = constant + neededCard; 
        
        document.getElementById('target-num').innerText = targetNum;
        document.getElementById('equation-card').innerText = `? + ${constant} = ⚔️`;
        
        // Save the winning number for the orb spawner
        window.winningCard = neededCard;
    }

    function spawnOrbs() {
        const hand = document.getElementById('orb-hand');
        hand.innerHTML = '';
        let cards = [window.winningCard];
        // Fill rest with randoms
        while(cards.length < 5) {
            let r = Math.floor(Math.random() * 9) + 1;
            if(!cards.includes(r)) cards.push(r);
        }
        // Shuffle
        cards.sort(() => Math.random() - 0.5);

        cards.forEach(n => {
            let orb = document.createElement('div');
            orb.className = 'magic-orb';
            orb.innerText = n;
            orb.onclick = () => handleInput(n, orb);
            hand.appendChild(orb);
        });
    }

    function handleInput(n, el) {
        if(isBusy) return;
        isBusy = true;
        el.style.visibility = 'hidden';

        let result = n + constant;
        let diff = result - targetNum;

        if (result === targetNum) {
            effect("CRITICAL!!", "#FFD700", true);
            enemyHP -= 1;
            if(enemyHP <= 0) {
                setTimeout(() => { alert("VICTORY!"); floor++; start(); }, 600);
            } else {
                setTimeout(() => { generateLevel(); isBusy = false; }, 800);
            }
        } else if (result > targetNum) {
            effect("TOO HIGH!", "#FF5E5E", false);
            monsterAttack();
        } else {
            effect("TOO WEAK...", "#5BBAFF", false);
            setTimeout(() => { isBusy = false; }, 600);
        }
    }

    function monsterAttack() {
        setTimeout(() => {
            const enemy = document.getElementById('enemy');
            enemy.style.transform = "translate(-180px, 80px) scale(1.4)";
            setTimeout(() => {
                playerHP--;
                document.getElementById('p-hp').innerText = playerHP;
                document.getElementById('game-window').classList.add('shake');
                setTimeout(() => document.getElementById('game-window').classList.remove('shake'), 200);
                enemy.style.transform = "translate(0,0) scale(1)";
                
                if(playerHP <= 0) {
                    alert("GAME OVER!"); location.reload();
                } else {
                    isBusy = false;
                }
            }, 200);
        }, 400);
    }

    function effect(txt, color, isHit) {
        let el = document.createElement('div');
        el.className = 'dmg-popup';
        el.innerText = txt;
        el.style.color = color;
        el.style.left = isHit ? "200px" : "50px";
        el.style.top = "100px";
        document.getElementById('stage').appendChild(el);
        setTimeout(() => el.remove(), 800);
        
        if(isHit) {
            document.getElementById('enemy').style.filter = "brightness(2)";
            setTimeout(() => document.getElementById('enemy').style.filter = "none", 200);
        }
    }

    start();
</script>
</body>
</html>
