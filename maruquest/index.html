<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔️ MaruQuest!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘Comic Sans MS’, ‘Chalkboard SE’, sans-serif;
background: #1a1a2e;
display: flex; justify-content: center; align-items: center;
min-height: 100vh; overflow: hidden;
}

/* ── SCREENS ── */
.screen { display: none; width: 100%; max-width: 400px; }
.screen.active { display: block; }

/* ── GAME SCREEN ── */
#game-screen {
background: white; border-radius: 30px; margin: 15px;
overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

/* Top bar */
.game-topbar {
background: #16213e; padding: 10px 16px;
display: flex; justify-content: space-between; align-items: center;
}
.home-btn {
background: rgba(255,255,255,0.1); border: none; border-radius: 10px;
padding: 6px 12px; color: white; font-family: inherit; font-weight: 700;
font-size: 0.8em; cursor: pointer; -webkit-appearance: none;
}
.game-stats { display: flex; gap: 12px; align-items: center; }
.stat-item  { color: white; font-weight: 800; font-size: 0.85em; }
.floor-badge {
background: #e94560; color: white; padding: 3px 10px;
border-radius: 20px; font-weight: 900; font-size: 0.8em;
}

/* Timer bar */
.timer-track { height: 7px; background: #e2e8f0; }
.timer-fill  { height: 100%; background: #4ade80; transition: width 0.1s linear; border-radius: 0 4px 4px 0; }
.timer-fill.warning { background: #fb923c; }
.timer-fill.danger  { background: #ef4444; }

/* Combo bar */
.combo-bar {
background: #0f3460; padding: 4px 16px;
display: flex; justify-content: space-between; align-items: center;
min-height: 28px;
}
.combo-text { color: #ffd700; font-weight: 900; font-size: 0.8em; }
.score-text { color: white; font-weight: 700; font-size: 0.8em; }

/* Battle stage */
#stage {
position: relative; height: 200px;
background: linear-gradient(180deg, #e8f4ff 0%, #f0f9e8 100%);
overflow: hidden;
}

/* Ground line */
#stage::after {
content: ‘’;
position: absolute; bottom: 38px; left: 0; right: 0;
height: 3px; background: rgba(0,0,0,0.08); border-radius: 50%;
}

/* Monster area */
#monster-label {
position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
background: rgba(0,0,0,0.7); color: white; padding: 3px 12px;
border-radius: 20px; font-size: 0.68em; font-weight: 800;
white-space: nowrap; z-index: 5;
}
#monster-label.boss { background: #e94560; animation: boss-glow 1s ease-in-out infinite alternate; }
@keyframes boss-glow { from{box-shadow:0 0 5px #e94560} to{box-shadow:0 0 15px #e94560, 0 0 25px #e94560} }

/* HP bar for boss */
.hp-container {
position: absolute; top: 34px; left: 50%; transform: translateX(-50%);
width: 110px; height: 10px; background: #e2e8f0;
border-radius: 10px; overflow: hidden; display: none;
border: 2px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.hp-fill { height: 100%; background: #ef4444; transition: width 0.3s; border-radius: 10px; }

/* Bubbles */
.speech-bubble {
position: absolute; background: white; border-radius: 12px;
padding: 5px 10px; font-size: 0.72em; font-weight: 900; color: #1e293b;
box-shadow: 0 4px 0 rgba(0,0,0,0.08); opacity: 0;
pointer-events: none; white-space: nowrap; z-index: 20;
border: 2px solid #e2e8f0; transition: opacity 0.2s;
}
.speech-bubble::after {
content: ‘’; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
border: 7px solid transparent; border-top-color: white; border-bottom: none;
}
#hero-bubble  { bottom: 120px; left: 15px; }
#enemy-bubble { bottom: 120px; right: 15px; }

/* Enemy */
#enemy-wrap {
position: absolute; bottom: 38px; right: 25px;
font-size: 72px; line-height: 1;
transition: transform 0.3s, opacity 0.3s;
filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.15));
}
#enemy-wrap.hit   { transform: translateX(-120px) rotate(-20deg); opacity: 0.3; }
#enemy-wrap.shake { animation: enemy-shake 0.4s; }
@keyframes enemy-shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-12px) rotate(-5deg)} 75%{transform:translateX(12px) rotate(5deg)} }

/* Hero */
#hero-wrap {
position: absolute; bottom: 38px; left: 15px;
width: 80px; transition: transform 0.3s;
}
#hero-wrap.attack { transform: translateX(130px) rotate(12deg); }

/* Floating damage numbers */
.dmg-float {
position: absolute; font-size: 1.8em; font-weight: 900;
pointer-events: none; z-index: 30; animation: dmg-rise 0.9s ease-out forwards;
}
.dmg-float.hit    { color: #ef4444; text-shadow: 0 0 10px #ef4444; }
.dmg-float.miss   { color: #94a3b8; }
.dmg-float.combo  { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
@keyframes dmg-rise { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-60px) scale(1.3);opacity:0} }

/* Stars burst for perfect */
.star-burst { position: absolute; pointer-events: none; z-index: 25; font-size: 1.5em; animation: star-pop 0.8s ease-out forwards; }
@keyframes star-pop { 0%{transform:scale(0) rotate(0deg);opacity:1} 100%{transform:scale(2) rotate(180deg);opacity:0} }

/* Screen flash overlay */
#flash-overlay {
position: absolute; top: 0; left: 0; right: 0; bottom: 0;
pointer-events: none; opacity: 0; z-index: 15;
transition: opacity 0.1s;
}

/* Equation box */
.equation-box {
background: #0f3460; margin: 0; padding: 14px 20px;
display: flex; justify-content: center; align-items: center;
gap: 10px; font-size: 1.6em; font-weight: 900; color: white;
}
.eq-slot {
background: rgba(255,255,255,0.15); border: 3px dashed rgba(255,255,255,0.4);
width: 48px; height: 52px; border-radius: 12px;
display: flex; align-items: center; justify-content: center;
font-size: 0.9em; color: rgba(255,255,255,0.5);
}
.eq-op   { color: #fbbf24; }
.eq-val  { color: #93c5fd; }
.eq-eq   { color: rgba(255,255,255,0.6); }
.eq-goal { color: #4ade80; }

/* Cards */
.cards-area { padding: 12px 14px 16px; background: #f8fafc; }
.cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

.answer-card {
background: white; border: 3px solid #e2e8f0;
border-radius: 16px; padding: 0; height: 60px;
display: flex; align-items: center; justify-content: center;
font-size: 1.5em; font-weight: 900; color: #1e293b;
cursor: pointer; -webkit-appearance: none; font-family: inherit;
box-shadow: 0 4px 0 #cbd5e1; transition: all 0.1s;
position: relative; overflow: hidden;
}
.answer-card:active { transform: translateY(3px); box-shadow: 0 1px 0 #cbd5e1; }
.answer-card.correct { background: #dcfce7; border-color: #4ade80; box-shadow: 0 4px 0 #16a34a; animation: card-correct 0.3s; }
.answer-card.wrong   { background: #fee2e2; border-color: #f87171; box-shadow: 0 4px 0 #dc2626; animation: card-wrong 0.3s; }
.answer-card:disabled { cursor: not-allowed; opacity: 0.7; }
@keyframes card-correct { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1) translateY(-3px)} }
@keyndef card-wrong   { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
@keyframes card-wrong { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

/* ── GAME OVER SCREEN ── */
#gameover-screen {
background: linear-gradient(160deg, #1a1a2e, #16213e);
border-radius: 30px; padding: 30px 24px; margin: 15px;
text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
border: 3px solid #e94560;
}
.go-emoji  { font-size: 5em; margin: 10px 0; animation: go-bounce 0.6s ease-out; }
@keyframes go-bounce { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
.go-title  { font-size: 1.8em; font-weight: 900; color: white; margin-bottom: 8px; }
.go-floor  { font-size: 1.1em; color: #94a3b8; margin-bottom: 20px; }
.go-stats  { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 14px; margin-bottom: 20px; }
.go-stat   { display: flex; justify-content: space-between; padding: 5px 0; color: white; font-size: 0.9em; border-bottom: 1px solid rgba(255,255,255,0.08); }
.go-stat:last-child { border-bottom: none; }
.go-stat .label { color: #94a3b8; }
.go-stat .value { font-weight: 900; color: #ffd700; }
.new-best { color: #ffd700; font-weight: 900; font-size: 1em; margin-bottom: 15px; animation: pulse-text 1s ease-in-out infinite alternate; }
@keyframes pulse-text { from{opacity:1} to{opacity:0.5} }
.go-btns { display: grid; gap: 10px; }
.retry-btn {
width: 100%; padding: 15px; background: #e94560;
color: white; border: none; border-radius: 16px;
font-family: inherit; font-weight: 900; font-size: 1.1em;
cursor: pointer; box-shadow: 0 5px 0 #a31230;
}
.retry-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #a31230; }
.menu-btn {
width: 100%; padding: 12px; background: rgba(255,255,255,0.08);
color: white; border: 2px solid rgba(255,255,255,0.15); border-radius: 16px;
font-family: inherit; font-weight: 700; font-size: 0.95em; cursor: pointer;
}

/* ── CONFETTI ── */
.confetti-piece {
position: fixed; width: 10px; height: 10px; pointer-events: none;
z-index: 999; border-radius: 2px; animation: confetti-fall linear forwards;
}
@keyframes confetti-fall {
0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ── LEVEL UP BANNER ── */
#levelup-banner {
position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
background: linear-gradient(135deg, #ffd700, #ff9f00);
color: white; padding: 20px 35px; border-radius: 25px;
font-size: 1.5em; font-weight: 900; text-align: center;
box-shadow: 0 10px 40px rgba(255,215,0,0.5); z-index: 999;
pointer-events: none; transition: transform 0.3s ease-out;
text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}
#levelup-banner.show { transform: translate(-50%, -50%) scale(1); }
</style>

</head>

<script>
// ══════════════════════════════════════════
// SOUND ENGINE (Web Audio API — no files needed!)
// ══════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ctx = null;

function getCtx() {
  if (!ctx) ctx = new AudioCtx();
  return ctx;
}

function playTone(freq, type, duration, volume, delay=0) {
  try {
    const c = getCtx();
    const osc  = c.createOscillator();
    const gain = c.createGain();
    osc.connect(gain); gain.connect(c.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, c.currentTime + delay);
    gain.gain.setValueAtTime(volume, c.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + duration);
    osc.start(c.currentTime + delay);
    osc.stop(c.currentTime + delay + duration + 0.05);
  } catch(e){}
}

const SFX = {
  correct() {
    playTone(523, 'square', 0.08, 0.3);
    playTone(659, 'square', 0.08, 0.3, 0.09);
    playTone(784, 'square', 0.15, 0.3, 0.18);
  },
  wrong() {
    playTone(200, 'sawtooth', 0.1, 0.4);
    playTone(150, 'sawtooth', 0.15, 0.4, 0.1);
  },
  levelup() {
    [523,659,784,1047].forEach((f,i) => playTone(f,'square',0.12,0.3,i*0.1));
  },
  boss() {
    playTone(100,'sawtooth',0.3,0.5);
    playTone(80,'sawtooth',0.3,0.5,0.15);
  },
  bossDefeat() {
    [784,880,988,1047,1175].forEach((f,i) => playTone(f,'square',0.15,0.35,i*0.08));
  },
  timeout() {
    playTone(300,'square',0.05,0.3);
    playTone(250,'square',0.05,0.3,0.06);
    playTone(200,'square',0.15,0.3,0.12);
  },
  combo() {
    playTone(880,'square',0.12,0.4);
    playTone(1047,'square',0.12,0.4,0.1);
  },
  gameOver() {
    playTone(300,'sawtooth',0.2,0.5);
    playTone(200,'sawtooth',0.3,0.5,0.2);
    playTone(150,'sawtooth',0.5,0.5,0.4);
  }
};

// ══════════════════════════════════════════
// MONSTERS
// ══════════════════════════════════════════
const MONSTERS = [
  { name:'Zappy',   icon:'👾', taunt:['Zap!','Foolish!','Too slow!'],    death:['Zapped out!','Nooo!'] },
  { name:'Dusty',   icon:'🐝', taunt:['Bzzzzt!','Miss me!','Ha!'],       death:['Not the honey!','Stung myself!'] },
  { name:'Gloop',   icon:'🐙', taunt:['Slippery!','Got ya!','Glub!'],    death:['Deflated!','Popped!'] },
  { name:'Sparky',  icon:'🦖', taunt:['Roooar!','Dino smash!','RAWR!'],  death:['Extinct!','Fossilized!'] },
  { name:'Spooky',  icon:'👻', taunt:['Boo!','Can\'t touch me!','Eek!'], death:['Unghostly!','De-spooked!'] },
  { name:'Chompy',  icon:'🐊', taunt:['Snap!','Chomp chomp!','Hiss!'],   death:['Unbited!','So croc-ky!'] },
  { name:'Glitch',  icon:'🤖', taunt:['ERROR!','Bzzt!','Divide by 0!'],  death:['System crash!','Rebooting...'] },
  { name:'Burny',   icon:'🔥', taunt:['Too hot!','Burnnn!','Sizzle!'],   death:['Extinguished!','Doused!'] },
];

const BOSS_MONSTERS = [
  { name:'MEGA BOSS',    icon:'👹', taunt:['PUNY HUMAN!','I AM UNSTOPPABLE!','GWAHAHAHA!'], death:['IMPOSSIBLE!','HOW?!'] },
  { name:'DARK LORD',    icon:'💀', taunt:['MORTALS...','YOUR END IS NEAR!','DARKNESS!'],  death:['THE LIGHT!','NOOOOOO!'] },
  { name:'STORM KING',   icon:'🌪️', taunt:['FEEL MY WRATH!','WHIRLWIND!','BLOWN AWAY!'],  death:['CALMED!','WEATHERED!'] },
];

// ══════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════
let floor=1, playerHP=3, enemyHP=1, isBusy=false;
let timerInterval=null, timerLeft=100;
let combo=0, score=0, totalScore=0;
let currentMonster=null;
let runFloor=1; // floor at start of this run

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function getBest() { return parseInt(localStorage.getItem('mq_best')||'1'); }
function setBest(f) { if(f>getBest()) localStorage.setItem('mq_best',String(f)); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function say(who, text) {
  const b = document.getElementById(who+'-bubble');
  b.textContent = text; b.style.opacity='1';
  setTimeout(()=>b.style.opacity='0', 1100);
}

function flash(color) {
  const f = document.getElementById('flash-overlay');
  f.style.background = color; f.style.opacity='0.5';
  setTimeout(()=>f.style.opacity='0', 150);
}

function spawnDmg(text, type) {
  const stage = document.getElementById('stage');
  const el = document.createElement('div');
  el.className = 'dmg-float '+type;
  el.textContent = text;
  const x = type==='hit' ? Math.random()*80+60 : Math.random()*50+20;
  el.style.left = x+'px';
  el.style.bottom = (80+Math.random()*40)+'px';
  stage.appendChild(el);
  setTimeout(()=>el.remove(), 900);
}

function spawnStars(x, y) {
  const stage = document.getElementById('stage');
  ['⭐','✨','💫','🌟'].forEach((s,i)=>{
    const el = document.createElement('div');
    el.className = 'star-burst';
    el.textContent = s;
    el.style.left = (x + (i%2===0?-20:20)*Math.random()*2)+'px';
    el.style.bottom = (y + Math.random()*20)+'px';
    el.style.animationDelay = (i*0.1)+'s';
    stage.appendChild(el);
    setTimeout(()=>el.remove(), 800+i*100);
  });
}

function showLevelUp(text) {
  const b = document.getElementById('levelup-banner');
  b.textContent = text;
  b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'), 1500);
}

function confetti(count=40) {
  const colors=['#e94560','#ffd700','#4ade80','#60a5fa','#f472b6','#fb923c'];
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`
      left:${Math.random()*100}vw;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${0.8+Math.random()*1.2}s;
      animation-delay:${Math.random()*0.5}s;
      transform:rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 2000);
  }
}

function updateComboUI() {
  const el = document.getElementById('combo-text');
  if(combo>=2) {
    el.textContent = combo+'× COMBO! 🔥';
    el.style.color = combo>=5 ? '#ff6b6b' : combo>=3 ? '#fbbf24' : '#ffd700';
  } else {
    el.textContent = '';
  }
}

// ══════════════════════════════════════════
// INIT FLOOR
// ══════════════════════════════════════════
function initFloor() {
  isBusy = false;
  document.getElementById('floor-val').textContent = floor;
  document.getElementById('hp-val').textContent = playerHP;
  document.getElementById('score-val').textContent = score;
  document.getElementById('score-display').textContent = score;
  setBest(floor);

  const isBoss = (floor % 5 === 0);
  enemyHP = isBoss ? 3 : 1;

  const hpBar = document.getElementById('boss-hp-container');
  hpBar.style.display = isBoss ? 'block' : 'none';
  document.getElementById('boss-hp-fill').style.width='100%';

  if(isBoss) {
    const bm = BOSS_MONSTERS[Math.floor(Math.random()*BOSS_MONSTERS.length)];
    currentMonster = bm;
    document.getElementById('monster-label').textContent = bm.name;
    document.getElementById('monster-label').className = 'boss';
    document.getElementById('enemy-wrap').textContent = bm.icon;
    SFX.boss();
    showLevelUp('⚠️ BOSS FIGHT! ⚠️');
  } else {
    const m = MONSTERS[Math.floor(Math.random()*MONSTERS.length)];
    currentMonster = m;
    document.getElementById('monster-label').textContent = m.name;
    document.getElementById('monster-label').className = '';
    document.getElementById('enemy-wrap').textContent = m.icon;
    // Show floor milestone
    if(floor % 10 === 0) { confetti(50); showLevelUp('🏆 Floor '+floor+'!'); }
    else if(floor % 5 === 1 && floor > 1) showLevelUp('Floor '+floor+'! Keep going!');
  }

  newRound();
}

// ══════════════════════════════════════════
// NEW ROUND
// ══════════════════════════════════════════
function newRound() {
  // Adaptive ops based on floor (like original)
  let availableOps = ['+'];
  if (floor >= 6)  availableOps = ['+', '-'];
  if (floor >= 11) availableOps = ['+', '-', '×'];
  if (floor >= 16) availableOps = ['+', '-', '×', '÷'];
  const op = availableOps[Math.floor(Math.random()*availableOps.length)];
  let ans, cVal, goal;

  if(op==='×') {
    ans  = Math.floor(Math.random()*9)+1;
    cVal = Math.floor(Math.random()*9)+2;
    goal = ans * cVal;
  } else if(op==='÷') {
    cVal = Math.floor(Math.random()*8)+2;
    goal = Math.floor(Math.random()*9)+1;
    ans  = goal * cVal;
  } else if(op==='-') {
    const maxAns = Math.min(10 + floor*2, 50);
    ans  = Math.floor(Math.random()*maxAns)+5;
    cVal = Math.floor(Math.random()*Math.min(ans-1,15))+1;
    goal = ans - cVal;
  } else {
    const maxAns = Math.min(5 + floor, 40);
    ans  = Math.floor(Math.random()*maxAns)+1;
    cVal = Math.floor(Math.random()*maxAns)+1;
    goal = ans + cVal;
  }

  document.getElementById('eq-op').textContent   = op;
  document.getElementById('eq-cval').textContent = cVal;
  document.getElementById('eq-goal').textContent = goal;
  document.getElementById('eq-slot').textContent = '?';
  document.getElementById('eq-slot').style.color = '';

  // Build 6 cards — correct + 5 wrong
  let cards = [ans];
  let attempts = 0;
  while(cards.length < 6 && attempts < 100) {
    attempts++;
    let range = Math.max(15, Math.floor(goal*0.6));
    let r = Math.floor(Math.random()*range*2) - range + ans;
    if(r<1) r = Math.floor(Math.random()*20)+1;
    if(!cards.includes(r) && r!==ans) cards.push(r);
  }
  // Fill remaining if needed
  let fill=1;
  while(cards.length<6){ if(!cards.includes(fill)) cards.push(fill); fill++; }
  cards.sort(()=>Math.random()-0.5);

  const grid = document.getElementById('cards-grid');
  grid.innerHTML='';
  cards.forEach(n=>{
    const btn = document.createElement('button');
    btn.type='button'; btn.className='answer-card';
    btn.textContent=n;
    btn.addEventListener('click',()=>play(n,ans));
    grid.appendChild(btn);
  });

  startTimer();
  // Monster says taunt occasionally
  if(Math.random()<0.2 && currentMonster) {
    const taunts = currentMonster.taunt;
    say('enemy', taunts[Math.floor(Math.random()*taunts.length)]);
  }
}

// ══════════════════════════════════════════
// TIMER
// ══════════════════════════════════════════
function startTimer() {
  clearInterval(timerInterval);
  timerLeft = 100;
  // Adaptive timer speed based on floor
  let speed = 0.3 + (floor * 0.035);
  if (floor > 20) speed += Math.floor((floor-20)/5) * 0.15;
  speed = Math.min(speed, 1.4);

  timerInterval = setInterval(()=>{
    timerLeft -= speed;
    const fill = document.getElementById('timer-fill');
    fill.style.width = timerLeft+'%';
    fill.className = 'timer-fill' +
      (timerLeft<25 ? ' danger' : timerLeft<50 ? ' warning' : '');
    if(timerLeft<=0){ clearInterval(timerInterval); play(-999,0); }
  },100);
}

// ══════════════════════════════════════════
// PLAY
// ══════════════════════════════════════════
function play(n, ans) {
  if(isBusy) return;

  // Unlock audio on first interaction
  try { getCtx().resume(); } catch(e){}

  isBusy = true;
  clearInterval(timerInterval);

  const cards = document.querySelectorAll('.answer-card');
  cards.forEach(c=>c.disabled=true);

  if(n===ans) {
    // ✅ CORRECT
    combo++;
    const pts = 10 * Math.max(1,combo);
    score += pts;
    document.getElementById('score-val').textContent = score;
    document.getElementById('score-display').textContent = score;
    updateComboUI();

    // Show answer in slot
    document.getElementById('eq-slot').textContent = ans;
    document.getElementById('eq-slot').style.color = '#4ade80';

    // Highlight correct card
    cards.forEach(c=>{ if(parseInt(c.textContent)===ans) c.classList.add('correct'); });

    // Sound
    if(combo>=3) SFX.combo(); else SFX.correct();

    // Hero attack animation
    document.getElementById('hero-wrap').classList.add('attack');
    say('hero', combo>=3 ? '🔥 COMBO x'+combo+'!' : ['Hiyah!','Got you!','Take that!'][Math.floor(Math.random()*3)]);
    flash('#4ade8040');

    setTimeout(()=>{
      document.getElementById('hero-wrap').classList.remove('attack');
      enemyHP--;

      if(enemyHP>0) {
        // Boss still alive
        document.getElementById('boss-hp-fill').style.width=(enemyHP/3*100)+'%';
        document.getElementById('enemy-wrap').classList.add('shake');
        spawnDmg('💥 HIT!', 'hit');
        if(currentMonster) say('enemy', currentMonster.taunt[0]);
        setTimeout(()=>{
          document.getElementById('enemy-wrap').classList.remove('shake');
          isBusy=false;
          newRound();
        },400);
      } else {
        // Enemy defeated!
        document.getElementById('enemy-wrap').classList.add('hit');
        spawnDmg('⚡ KO!','hit');
        if(combo>=5) spawnStars(100,80);
        if(currentMonster) say('enemy', currentMonster.death[Math.floor(Math.random()*currentMonster.death.length)]);

        const isBoss = (floor%5===0);
        if(isBoss) { SFX.bossDefeat(); confetti(60); }
        else SFX.levelup();

        setTimeout(()=>{
          document.getElementById('enemy-wrap').classList.remove('hit');
          floor++;
          isBusy=false;
          initFloor();
        },600);
      }
    },400);

  } else {
    // ❌ WRONG or TIMEOUT
    const isTimeout = (n===-999);
    combo = 0;
    updateComboUI();

    if(isTimeout) {
      SFX.timeout();
      say('enemy', '⏰ TOO SLOW!');
      flash('#ef444440');
      spawnDmg('TIMEOUT!','miss');
    } else {
      SFX.wrong();
      cards.forEach(c=>{ if(parseInt(c.textContent)===n) c.classList.add('wrong'); });
      say('enemy', currentMonster ? currentMonster.taunt[Math.floor(Math.random()*currentMonster.taunt.length)] : 'Ha!');
      flash('#ef444450');
      spawnDmg('✗ MISS','miss');
    }

    // Shake hero
    document.getElementById('hero-wrap').style.transform='translateX(-8px)';
    setTimeout(()=>document.getElementById('hero-wrap').style.transform='',200);

    playerHP--;
    document.getElementById('hp-val').textContent = playerHP;

    if(playerHP<=0) {
      SFX.gameOver();
      setTimeout(()=>showGameOver(), 600);
    } else {
      setTimeout(()=>{ isBusy=false; newRound(); }, 600);
    }
  }
}

// ══════════════════════════════════════════
// GAME OVER
// ══════════════════════════════════════════
function showGameOver() {
  const best = getBest();
  const isNew = floor > best;
  if(isNew) setBest(floor);

  document.getElementById('go-emoji').textContent = floor>10 ? '🏆' : '💀';
  document.getElementById('go-title').textContent = floor>10 ? 'Amazing Run!' : floor>5 ? 'Good Fight!' : 'Tower Broken!';
  document.getElementById('go-floor').textContent = 'Reached Floor '+floor;
  document.getElementById('go-stat-floor').textContent = 'Floor '+floor;
  document.getElementById('go-stat-score').textContent = score;
  document.getElementById('go-stat-best').textContent  = 'Floor '+(isNew?floor:best);
  document.getElementById('new-best-msg').style.display = isNew ? 'block' : 'none';

  if(isNew) confetti(80);
  showScreen('gameover-screen');
}

// ══════════════════════════════════════════
// START GAME
// ══════════════════════════════════════════
function startGame() {
  floor=1; playerHP=3; combo=0; score=0;
  showScreen('game-screen');
  initFloor();
}

// ══════════════════════════════════════════
// EVENT LISTENERS
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{

  // Update best on start screen

  document.getElementById('home-btn').addEventListener('click',()=>{
    clearInterval(timerInterval);
    window.location.href='../';
  });
  document.getElementById('retry-btn').addEventListener('click', startGame);
  document.getElementById('menu-btn').addEventListener('click',()=>{ window.location.href='../'; });
});
</script>
