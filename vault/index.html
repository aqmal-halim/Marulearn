<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruVault: Mission Critical</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0e17;
            --surface: #1a1828;
            --surface2: #221f36;
            --border: #2e2a4a;
            --accent: #ff6b35;
            --accent2: #f7c59f;
            --purple: #7c3aed;
            --purple-light: #a78bfa;
            --green: #10d98c;
            --yellow: #fbbf24;
            --red: #f43f5e;
            --text: #e8e6f0;
            --text-muted: #7a748e;
            --correct: #10d98c;
            --present: #fbbf24;
            --wrong: #f43f5e;
            --font-display: 'Space Mono', monospace;
            --font-body: 'Nunito', sans-serif;
            --radius: 16px;
            --transition: 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        }

        html, body {
            height: 100%;
            background: var(--bg);
            font-family: var(--font-body);
            color: var(--text);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(124,58,237,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 10% 80%, rgba(255,107,53,0.12) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        #app {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            background: var(--surface);
            width: 100%;
            max-width: 440px; 
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Desktop specific styling */
        @media (min-height: 700px) and (min-width: 500px) {
            #game-container {
                height: 92vh;
                border-radius: 28px;
                border: 1px solid var(--border);
                box-shadow: 0 24px 80px rgba(0,0,0,0.6);
            }
        }

        #header {
            background: linear-gradient(135deg, #1a1828 0%, #1e1b34 100%);
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo-group { display: flex; align-items: center; gap: 12px; }
        .vault-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent), #ff8c5a);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; box-shadow: 0 4px 12px rgba(255,107,53,0.4);
        }

        .logo-text { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--text); }
        .logo-sub { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

        #sound-toggle {
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text-muted); width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
        }

        .screen { padding: 20px; flex: 1; display: flex; flex-direction: column; height: 100%; }
        #menu-screen { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        .menu-intro { text-align: center; margin-bottom: 16px; }
        .menu-intro p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; }

        .diff-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
        .diff-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

        .menu-btn {
            padding: 14px 16px; border-radius: 16px; border: 1px solid var(--border);
            background: var(--surface2); color: var(--text); cursor: pointer;
            display: flex; align-items: center; gap: 14px; transition: all 0.2s ease;
        }
        .menu-btn:active { transform: scale(0.98); background: var(--border); }

        .diff-badge { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; background: rgba(255,255,255,0.03); }
        .menu-btn-title { font-size: 0.95rem; font-weight: 900; font-family: var(--font-display); margin-bottom: 2px; }
        .menu-btn-meta { font-size: 0.7rem; color: var(--text-muted); }
        .pb-pill { background: rgba(16,217,140,0.1); color: var(--green); font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; font-family: var(--font-display); margin-left: auto; }
        .pb-pill.empty { background: rgba(122,116,142,0.1); color: var(--text-muted); }

        .home-link {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 14px; border-radius: 16px; border: 1px solid var(--border);
            color: var(--text-muted); font-size: 0.85rem; text-decoration: none; margin-top: auto;
            background: rgba(255,255,255,0.02);
        }

        #game-screen { display: none; flex-direction: column; gap: 12px; }
        #status-bar { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        #lives-display { display: flex; gap: 4px; }
        .heart { font-size: 1rem; color: var(--red); }
        .heart.lost { opacity: 0.2; }

        #timer-wrap {
            display: flex; align-items: center; gap: 8px;
            background: var(--surface2); padding: 6px 12px;
            border-radius: 20px; border: 1px solid var(--border);
        }
        #timer-display { font-family: var(--font-display); font-size: 0.9rem; font-weight: 700; width: 45px; text-align: center; }
        #timer-progress { width: 60px; height: 5px; background: var(--border); border-radius: 3px; }
        #timer-bar { height: 100%; background: var(--green); transition: width 1s linear; border-radius: 3px; }

        #attempt-counter { text-align: center; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 800; margin-top: 4px;}

        #display-screen {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 20px; display: flex; justify-content: center;
            gap: 8px; padding: 16px; height: 100px; align-items: center;
            flex-shrink: 0;
        }

        .code-slot {
            width: 50px; height: 65px; background: var(--surface);
            border-radius: 14px; border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-size: 1.8rem; font-weight: 700;
        }

        .code-slot.filled { border-color: var(--purple-light); color: var(--purple-light); }
        .code-slot.correct { background: rgba(16,217,140,0.15); border-color: var(--correct); color: var(--correct); }
        .code-slot.present { background: rgba(251,191,36,0.15); border-color: var(--present); color: var(--present); }
        .code-slot.wrong { background: rgba(244,63,94,0.12); border-color: var(--wrong); color: var(--wrong); }

        #feedback-box { 
            background: var(--surface2); border: 1px solid var(--border); 
            border-radius: 16px; padding: 14px; display: flex; 
            flex-direction: column; gap: 6px; flex-grow: 1; min-height: 80px;
        }
        .feedback-header { font-size: 0.65rem; font-weight: 800; color: var(--accent2); text-transform: uppercase; letter-spacing: 0.08em; }
        #message { font-size: 0.85rem; font-weight: 700; line-height: 1.4; color: var(--text); }
        
        #last-guess-wrap {
            display: flex; align-items: center; gap: 8px; margin-top: auto;
            padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .lg-label { font-size: 0.6rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase; }
        .lg-box { display: flex; gap: 6px; }
        .lg-slot {
            width: 20px; height: 20px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 900; font-family: var(--font-display);
        }

        #legend { display: flex; justify-content: center; gap: 12px; margin: 4px 0; flex-shrink: 0; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.65rem; color: var(--text-muted); font-weight: 700; }
        .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
        .legend-dot.correct { background: var(--correct); }
        .legend-dot.present { background: var(--present); }
        .legend-dot.wrong { background: rgba(244,63,94,0.5); }

        #keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-bottom: 10px; flex-shrink: 0; }
        .key-btn { 
            height: 54px; font-family: var(--font-display); 
            font-size: 1.4rem; border-radius: 16px; border: 1px solid var(--border); 
            background: var(--surface2); color: var(--text); cursor: pointer;
        }
        .key-btn:active { background: var(--border); }
        .btn-clear { background: rgba(244,63,94,0.08); color: var(--red); font-size: 1rem; }
        .btn-go { background: rgba(16,217,140,0.1); color: var(--green); font-size: 1rem; font-weight: 900; }
        .btn-go:disabled { opacity: 0.2; }

        #overlay {
            display: none; position: absolute; inset: 0; background: rgba(15,14,23,0.97);
            backdrop-filter: blur(10px); z-index: 10; flex-direction: column;
            align-items: center; justify-content: center; padding: 24px; gap: 20px;
        }
        #overlay.show { display: flex; }
        .overlay-emoji { font-size: 3.5rem; margin-bottom: -10px; }
        #overlay-title { font-family: var(--font-display); font-size: 1.6rem; font-weight: 900; letter-spacing: 1px; color: var(--text); }
        
        #overlay-stats { 
            display: flex; 
            flex-direction: row; 
            gap: 12px; 
            width: 100%; 
            justify-content: center;
        }
        .stat-chip { 
            background: var(--surface2); 
            border: 1px solid var(--border); 
            border-radius: 14px; 
            padding: 10px; 
            text-align: center; 
            flex: 1; 
            max-width: 90px;
        }
        .stat-chip .val { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--accent2); margin-bottom: 2px; }
        .stat-chip .lbl { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 800; }
        
        .overlay-btns { display: flex; gap: 12px; width: 100%; margin-top: 10px; }
        .overlay-btn { flex: 1; padding: 16px; border-radius: 18px; border: none; font-weight: 900; cursor: pointer; font-size: 0.95rem; transition: transform 0.1s; }
        .overlay-btn:active { transform: scale(0.96); }
        .overlay-btn.primary { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(255,107,53,0.3); }
        .overlay-btn.secondary { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

        #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 0.8rem; padding: 10px 20px; border-radius: 20px; z-index: 100; transition: transform 0.3s; }
        #toast.show { transform: translateX(-50%) translateY(0); }

        @keyframes flip-in { from { transform: scaleY(0); opacity: 0; } to { transform: scaleY(1); opacity: 1; } }
        .flip { animation: flip-in 0.25s ease forwards; }
    </style>
</head>
<body>
    <div id="app">
        <div id="game-container">
            <div id="header">
                <div class="logo-group">
                    <div class="vault-icon">🔐</div>
                    <div>
                        <div class="logo-text">MaruVault</div>
                        <div class="logo-sub">Mission Critical</div>
                    </div>
                </div>
                <button id="sound-toggle" onclick="toggleSound()">🔊</button>
            </div>

            <div id="menu-screen" class="screen">
                <div class="menu-intro">
                    <p>Decrypt the digital vault using logic.<br>Hints provided after every failed attempt.</p>
                </div>
                <div class="diff-label">Security Level</div>
                <div class="diff-grid">
                    <button class="menu-btn" onclick="initGame('beginner')">
                        <div class="diff-badge">🟢</div>
                        <div class="menu-btn-info">
                            <div class="menu-btn-title">BEGINNER</div>
                            <div class="menu-btn-meta">3 min · 3 digits · 10 lives</div>
                        </div>
                        <div class="pb-pill empty" id="pb-beginner">--</div>
                    </button>
                    <button class="menu-btn" onclick="initGame('intermediate')">
                        <div class="diff-badge">🟡</div>
                        <div class="menu-btn-info">
                            <div class="menu-btn-title">INTERMEDIATE</div>
                            <div class="menu-btn-meta">2 min · 3 digits · 5 lives</div>
                        </div>
                        <div class="pb-pill empty" id="pb-intermediate">--</div>
                    </button>
                    <button class="menu-btn" onclick="initGame('hard')">
                        <div class="diff-badge">🟠</div>
                        <div class="menu-btn-info">
                            <div class="menu-btn-title">HARD</div>
                            <div class="menu-btn-meta">2 min · 4 digits · 5 lives</div>
                        </div>
                        <div class="pb-pill empty" id="pb-hard">--</div>
                    </button>
                    <button class="menu-btn" onclick="initGame('veryhard')">
                        <div class="diff-badge">🔴</div>
                        <div class="menu-btn-info">
                            <div class="menu-btn-title">VERY HARD</div>
                            <div class="menu-btn-meta">2 min · 5 digits · 5 lives</div>
                        </div>
                        <div class="pb-pill empty" id="pb-veryhard">--</div>
                    </button>
                </div>
                <a href="https://aqmal-halim.github.io/Marulearn/index.html" class="home-link">🏠 Back to Marulearn Home</a>
            </div>

            <div id="game-screen" class="screen">
                <div id="status-bar">
                    <div id="lives-display"></div>
                    <div id="timer-wrap">
                        <div id="timer-progress"><div id="timer-bar"></div></div>
                        <div id="timer-display">2:00</div>
                    </div>
                </div>
                <div id="attempt-counter">Attempt 1</div>
                <div id="display-screen"></div>
                
                <div id="legend">
                    <div class="legend-item"><div class="legend-dot correct"></div>Correct</div>
                    <div class="legend-item"><div class="legend-dot present"></div>Misplaced</div>
                    <div class="legend-item"><div class="legend-dot wrong"></div>Wrong</div>
                </div>

                <div id="feedback-box">
                    <div class="feedback-header" id="hint-header">System Status</div>
                    <div id="message">Enter the access code to begin decryption.</div>
                    <div id="last-guess-wrap" style="display: none;">
                        <span class="lg-label">Last:</span>
                        <div id="lg-container" class="lg-box"></div>
                    </div>
                </div>

                <div id="keypad">
                    <button class="key-btn" onclick="press(1)">1</button>
                    <button class="key-btn" onclick="press(2)">2</button>
                    <button class="key-btn" onclick="press(3)">3</button>
                    <button class="key-btn" onclick="press(4)">4</button>
                    <button class="key-btn" onclick="press(5)">5</button>
                    <button class="key-btn" onclick="press(6)">6</button>
                    <button class="key-btn" onclick="press(7)">7</button>
                    <button class="key-btn" onclick="press(8)">8</button>
                    <button class="key-btn" onclick="press(9)">9</button>
                    <button class="key-btn btn-clear" onclick="handleClear()">⌫</button>
                    <button class="key-btn" onclick="press(0)">0</button>
                    <button class="key-btn btn-go" onclick="checkCode()" id="btn-go" disabled>GO</button>
                </div>
            </div>

            <div id="overlay">
                <div class="overlay-emoji" id="overlay-emoji">🎉</div>
                <div id="overlay-title">VAULT CRACKED!</div>
                <div id="overlay-stats">
                    <div class="stat-chip"><div class="val" id="stat-time">0:18</div><div class="lbl">Time</div></div>
                    <div class="stat-chip"><div class="val" id="stat-attempts">4</div><div class="lbl">Tries</div></div>
                    <div class="stat-chip"><div class="val" id="stat-lives">7</div><div class="lbl">Lives</div></div>
                </div>
                <div id="overlay-code" style="font-family: var(--font-display); color: var(--text-muted); font-size: 0.85rem;"></div>
                <div class="overlay-btns">
                    <button class="overlay-btn primary" onclick="restartGame()">Try Again</button>
                    <button class="overlay-btn secondary" onclick="showMenu()">Main Menu</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        let currentInput = [], secretCode = [], attempts = 0, lives = 5, maxLives = 5, timeLeft = 120, totalTime = 120, currentDifficulty = '', gameActive = false, timerInterval, soundOn = true;
        const config = { beginner: { time: 180, lives: 10, slots: 3 }, intermediate: { time: 120, lives: 5, slots: 3 }, hard: { time: 120, lives: 5, slots: 4 }, veryhard: { time: 120, lives: 5, slots: 5 } };
        
        let audioCtx = null;
        function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
        function playTone(freq, type = 'sine', duration = 0.08, vol = 0.15) { if (!soundOn) return; try { const ctx = getAudioCtx(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime); gain.gain.setValueAtTime(vol, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration); osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration); } catch(e) {} }
        const sounds = { keyPress: () => playTone(600, 'square', 0.05, 0.08), backspace: () => playTone(300, 'square', 0.06, 0.08), submit: () => playTone(440, 'sine', 0.1, 0.12), correct: () => playTone(880, 'sine', 0.2, 0.1), present: () => playTone(480, 'sine', 0.12, 0.1), wrong: () => playTone(180, 'sawtooth', 0.15, 0.15), win: () => playTone(1047, 'sine', 0.5, 0.1), lose: () => playTone(147, 'sawtooth', 0.5, 0.1) };

        function formatTime(s) { const m = Math.floor(s / 60); const sec = s % 60; return `${m}:${sec.toString().padStart(2, '0')}`; }
        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1800); }
        function toggleSound() { soundOn = !soundOn; document.getElementById('sound-toggle').textContent = soundOn ? '🔊' : '🔇'; }

        function loadPBs() { 
            Object.keys(config).forEach(diff => { 
                const pb = localStorage.getItem(`maruvault_pb_${diff}`); 
                const el = document.getElementById(`pb-${diff}`); 
                if (el) el.textContent = pb ? formatTime(parseInt(pb)) + ' left' : '--'; 
            }); 
        }

        function showMenu() { 
            gameActive = false; clearInterval(timerInterval); 
            document.getElementById('menu-screen').style.display = 'flex'; 
            document.getElementById('game-screen').style.display = 'none'; 
            document.getElementById('overlay').classList.remove('show'); 
            loadPBs(); 
        }

        function initGame(difficulty) {
            currentDifficulty = difficulty;
            const cfg = config[difficulty];
            timeLeft = cfg.time; totalTime = cfg.time;
            lives = cfg.lives; maxLives = cfg.lives;
            attempts = 0;
            currentInput = [];
            
            const display = document.getElementById('display-screen');
            display.innerHTML = '';
            for (let i = 0; i < cfg.slots; i++) {
                const slot = document.createElement('div');
                slot.className = 'code-slot empty';
                slot.id = `slot-${i}`;
                slot.textContent = '·';
                display.appendChild(slot);
            }

            secretCode = Array.from({ length: cfg.slots }, () => Math.floor(Math.random() * 10));
            
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('last-guess-wrap').style.display = 'none';
            
            gameActive = true;
            updateLivesDisplay();
            updateTimerDisplay();
            updateAttemptCounter();
            updateGoButton();
            setHint("System Status", "Enter code to begin decryption.");
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) endGame(false, 'TIME EXPIRED');
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('timer-display').textContent = formatTime(timeLeft);
            const pct = (timeLeft / totalTime) * 100;
            const bar = document.getElementById('timer-bar');
            bar.style.width = pct + '%';
            bar.style.background = pct <= 20 ? 'var(--red)' : (pct <= 40 ? 'var(--yellow)' : 'var(--green)');
        }

        function updateLivesDisplay() {
            const container = document.getElementById('lives-display');
            container.innerHTML = '';
            for (let i = 0; i < maxLives; i++) {
                const h = document.createElement('span');
                h.className = 'heart' + (i >= lives ? ' lost' : '');
                h.textContent = '❤';
                container.appendChild(h);
            }
        }

        function updateAttemptCounter() { document.getElementById('attempt-counter').textContent = `Attempt ${attempts + 1}`; }

        function press(num) {
            if (!gameActive || currentInput.length >= config[currentDifficulty].slots) return;
            sounds.keyPress();
            currentInput.push(num);
            updateDisplay();
            updateGoButton();
        }

        function handleClear() {
            if (!gameActive || currentInput.length === 0) return;
            sounds.backspace();
            currentInput.pop();
            updateDisplay();
            updateGoButton();
        }

        function updateGoButton() { document.getElementById('btn-go').disabled = currentInput.length < config[currentDifficulty].slots || !gameActive; }

        function updateDisplay() {
            const max = config[currentDifficulty].slots;
            for (let i = 0; i < max; i++) {
                const slot = document.getElementById(`slot-${i}`);
                if (currentInput[i] !== undefined) {
                    slot.textContent = currentInput[i];
                    slot.className = 'code-slot filled';
                } else {
                    slot.textContent = '·';
                    slot.className = 'code-slot empty';
                }
            }
        }

        function setHint(header, text) {
            document.getElementById('hint-header').textContent = header;
            document.getElementById('message').textContent = text;
        }

        function updateLastGuessDisplay(guessArr, resultsArr) {
            const wrap = document.getElementById('last-guess-wrap');
            const container = document.getElementById('lg-container');
            container.innerHTML = '';
            guessArr.forEach((num, i) => {
                const slot = document.createElement('div');
                slot.className = `lg-slot`;
                slot.style.background = `var(--${resultsArr[i]})`;
                slot.style.color = resultsArr[i] === 'wrong' ? 'rgba(255,255,255,0.7)' : 'var(--bg)';
                slot.textContent = num;
                container.appendChild(slot);
            });
            wrap.style.display = 'flex';
        }

        function generateMathHint() {
            const sum = secretCode.reduce((a, b) => a + b, 0);
            const evens = secretCode.filter(n => n % 2 === 0).length;
            const odds = secretCode.length - evens;
            
            const hintPool = [
                `The sum of all digits is ${sum}.`,
                `There are ${evens} even numbers in the code.`,
                `There are ${odds} odd numbers in the code.`,
                `The first digit is ${secretCode[0] > 4 ? 'higher than 4' : '4 or lower'}.`,
                `The last digit is ${secretCode[secretCode.length-1] % 2 === 0 ? 'even' : 'odd'}.`,
                `The digits add up to an ${sum % 2 === 0 ? 'even' : 'odd'} number.`
            ];
            
            if (currentDifficulty === 'hard' || currentDifficulty === 'veryhard') {
                hintPool.push(`The product of the first two digits is ${secretCode[0] * secretCode[1]}.`);
            }

            return hintPool[Math.floor(Math.random() * hintPool.length)];
        }

        function checkCode() {
            const max = config[currentDifficulty].slots;
            const originalGuess = [...currentInput];
            let guess = [...currentInput];
            let tempSecret = [...secretCode];
            let results = new Array(max).fill('wrong');
            let correctCount = 0;

            for (let i = 0; i < max; i++) {
                if (guess[i] === tempSecret[i]) {
                    results[i] = 'correct';
                    tempSecret[i] = null;
                    guess[i] = null;
                    correctCount++;
                }
            }

            for (let i = 0; i < max; i++) {
                if (guess[i] !== null) {
                    const idx = tempSecret.indexOf(guess[i]);
                    if (idx !== -1) {
                        results[i] = 'present';
                        tempSecret[idx] = null;
                    }
                }
            }

            for (let i = 0; i < max; i++) {
                const slot = document.getElementById(`slot-${i}`);
                setTimeout(() => {
                    slot.className = `code-slot ${results[i]} flip`;
                    if (results[i] === 'correct') sounds.correct();
                    else if (results[i] === 'present') sounds.present();
                }, i * 100);
            }

            attempts++;

            if (correctCount === max) {
                setTimeout(() => { sounds.win(); endGame(true, 'VAULT CRACKED!'); }, max * 120);
            } else {
                lives--;
                updateLivesDisplay();
                if (lives <= 0) {
                    setTimeout(() => { sounds.lose(); endGame(false, 'VAULT LOCKED'); }, max * 120);
                } else {
                    sounds.wrong();
                    setTimeout(() => {
                        updateLastGuessDisplay(originalGuess, results);
                        setHint("Logic Hint Received:", generateMathHint());
                        currentInput = [];
                        updateDisplay();
                        updateGoButton();
                        updateAttemptCounter();
                    }, 800);
                }
            }
        }

        function endGame(won, title) {
            gameActive = false;
            clearInterval(timerInterval);
            const overlay = document.getElementById('overlay');
            document.getElementById('overlay-emoji').textContent = won ? '🔓' : '🔒';
            document.getElementById('overlay-title').textContent = title;
            document.getElementById('stat-time').textContent = formatTime(totalTime - timeLeft);
            document.getElementById('stat-attempts').textContent = attempts;
            document.getElementById('stat-lives').textContent = lives;
            document.getElementById('overlay-code').textContent = won ? '' : `Correct Sequence: ${secretCode.join(' ')}`;
            overlay.classList.add('show');

            if (won) {
                const key = `maruvault_pb_${currentDifficulty}`;
                const currentPB = localStorage.getItem(key);
                if (!currentPB || timeLeft > parseInt(currentPB)) {
                    localStorage.setItem(key, timeLeft);
                }
            }
        }

        function restartGame() { initGame(currentDifficulty); }

        window.onload = loadPBs;
    </script>
</body>
</html>
