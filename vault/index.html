<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruVault: Mission Critical</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0e17;
            --surface: #1a1828;
            --surface2: #221f36;
            --border: #2e2a4a;
            --accent: #ff6b35;
            --accent2: #f7c59f;
            --purple: #7c3aed;
            --purple-light: #a78bfa;
            --green: #10d98c;
            --yellow: #fbbf24;
            --red: #f43f5e;
            --text: #e8e6f0;
            --text-muted: #7a748e;
            --correct: #10d98c;
            --present: #fbbf24;
            --wrong: #f43f5e;
            --font-display: 'Space Mono', monospace;
            --font-body: 'Nunito', sans-serif;
            --radius: 16px;
            --transition: 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            height: 100%;
            background: var(--bg);
            font-family: var(--font-body);
            color: var(--text);
            overflow: hidden; /* Prevent body scroll */
        }

        #app {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Align to top to prevent bottom cut on small screens */
            height: 100vh;
            padding: 10px;
            overflow-y: auto; /* Allow scrolling if screen is tiny */
        }

        #game-container {
            background: var(--surface);
            width: 100%;
            max-width: 420px;
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: 0 0 0 1px rgba(124,58,237,0.15), 0 24px 80px rgba(0,0,0,0.6);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            margin: auto; /* Centers in the #app flexbox */
        }

        #header {
            background: linear-gradient(135deg, #1a1828 0%, #1e1b34 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo-group { display: flex; align-items: center; gap: 10px; }
        .vault-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #ff8c5a);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(255,107,53,0.4);
        }

        .logo-text { font-family: var(--font-display); font-size: 1rem; font-weight: 700; color: var(--text); }
        .logo-sub { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; margin-top: -2px; }

        #sound-toggle {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .screen { padding: 16px; flex-grow: 1; overflow-y: auto; }
        
        /* Fixed layout for game screen to avoid cutting */
        #game-screen { display: none; flex-direction: column; gap: 12px; }

        #status-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 4px;
            flex-wrap: wrap; /* Helps on very narrow screens */
            gap: 10px;
        }

        #lives-display { display: flex; gap: 3px; }
        .heart { font-size: 1rem; }
        .heart.lost { opacity: 0.2; filter: grayscale(1); }

        #timer-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface2);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        #timer-display { font-family: var(--font-display); font-size: 0.8rem; min-width: 40px; }
        #timer-progress { width: 50px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
        #timer-bar { height: 100%; background: var(--green); transition: width 1s linear; }

        #display-screen {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            align-items: center;
        }

        .code-slot {
            width: clamp(40px, 12vw, 55px);
            height: clamp(55px, 16vw, 75px);
            background: var(--surface);
            border-radius: 12px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 700;
        }

        #keypad { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            padding-bottom: 10px; /* Buffer for bottom of screen */
        }

        .key-btn { 
            padding: 12px 0;
            font-family: var(--font-display); 
            font-size: 1.2rem; 
            font-weight: 700; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            background: var(--surface2); 
            color: var(--text); 
            cursor: pointer; 
        }

        .key-btn.btn-clear { background: rgba(244,63,94,0.1); color: var(--red); font-size: 0.7rem; }
        .key-btn.btn-go { background: rgba(16,217,140,0.12); color: var(--green); font-size: 0.8rem; }

        /* Rest of existing styles... */
        .diff-grid { display: flex; flex-direction: column; gap: 8px; }
        .menu-btn { padding: 12px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .pb-pill { background: rgba(16,217,140,0.1); color: var(--green); font-size: 0.65rem; padding: 3px 8px; border-radius: 20px; }
        .home-link { text-align: center; color: var(--text-muted); font-size: 0.8rem; text-decoration: none; margin-top: 10px; display: block; }
        #overlay { display: none; position: absolute; inset: 0; background: rgba(15,14,23,0.96); backdrop-filter: blur(8px); z-index: 10; flex-direction: column; align-items: center; justify-content: center; padding: 20px; border-radius: 28px; }
        #overlay.show { display: flex; }
        #feedback-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }
        #legend { display: flex; justify-content: center; gap: 10px; font-size: 0.65rem; color: var(--text-muted); }
        .legend-dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; margin-right: 4px; }
        .legend-dot.correct { background: var(--correct); }
        .legend-dot.present { background: var(--present); }
        .legend-dot.wrong { background: var(--wrong); }
    </style>
</head>
<body>
    <div id="app">
        <div id="game-container">
            <div id="header">
                <div class="logo-group">
                    <div class="vault-icon">🔐</div>
                    <div>
                        <div class="logo-text">MaruVault</div>
                        <div class="logo-sub">Mission Critical</div>
                    </div>
                </div>
                <button id="sound-toggle" onclick="toggleSound()">🔊</button>
            </div>

            <div id="menu-screen" class="screen">
                <div class="diff-grid" style="margin-top: 10px;">
                    <button class="menu-btn" onclick="initGame('beginner')">
                        <div style="font-size: 1.2rem;">🟢</div>
                        <div style="flex:1">BEGINNER <br><small style="font-weight:400; color:var(--text-muted)">3m · 3 digits · 10 lives</small></div>
                        <div class="pb-pill" id="pb-beginner">--</div>
                    </button>
                    <button class="menu-btn" onclick="initGame('intermediate')">
                        <div style="font-size: 1.2rem;">🟡</div>
                        <div style="flex:1">INTERMEDIATE <br><small style="font-weight:400; color:var(--text-muted)">2m · 3 digits · 5 lives</small></div>
                        <div class="pb-pill" id="pb-intermediate">--</div>
                    </button>
                    <button class="menu-btn" onclick="initGame('hard')">
                        <div style="font-size: 1.2rem;">🟠</div>
                        <div style="flex:1">HARD <br><small style="font-weight:400; color:var(--text-muted)">2m · 4 digits · 5 lives</small></div>
                        <div class="pb-pill" id="pb-hard">--</div>
                    </button>
                    <button class="menu-btn" onclick="initGame('veryhard')">
                        <div style="font-size: 1.2rem;">🔴</div>
                        <div style="flex:1">VERY HARD <br><small style="font-weight:400; color:var(--text-muted)">2m · 5 digits · 5 lives</small></div>
                        <div class="pb-pill" id="pb-veryhard">--</div>
                    </button>
                </div>
                <a href="index.html" class="home-link">🏠 Back to Marulearn Home</a>
            </div>

            <div id="game-screen" class="screen">
                <div id="status-bar">
                    <div id="lives-display"></div>
                    <div id="timer-wrap">
                        <div id="timer-progress"><div id="timer-bar"></div></div>
                        <div id="timer-display">2:00</div>
                    </div>
                </div>
                <div id="attempt-counter" style="text-align: center; font-size: 0.7rem; color: var(--text-muted);">Attempt 1</div>
                <div id="display-screen"></div>
                <div id="legend">
                    <div><span class="legend-dot correct"></span>Spot</div>
                    <div><span class="legend-dot present"></span>Code</div>
                    <div><span class="legend-dot wrong"></span>None</div>
                </div>
                <div id="feedback-box">
                    <div id="message">Mission Start!</div>
                </div>
                <div id="keypad">
                    <button class="key-btn" onclick="press(1)">1</button>
                    <button class="key-btn" onclick="press(2)">2</button>
                    <button class="key-btn" onclick="press(3)">3</button>
                    <button class="key-btn" onclick="press(4)">4</button>
                    <button class="key-btn" onclick="press(5)">5</button>
                    <button class="key-btn" onclick="press(6)">6</button>
                    <button class="key-btn" onclick="press(7)">7</button>
                    <button class="key-btn" onclick="press(8)">8</button>
                    <button class="key-btn" onclick="press(9)">9</button>
                    <button class="key-btn btn-clear" onclick="handleClear()">CLR</button>
                    <button class="key-btn" onclick="press(0)">0</button>
                    <button class="key-btn btn-go" onclick="checkCode()" id="btn-go" disabled>GO</button>
                </div>
            </div>

            <div id="overlay">
                <div id="overlay-emoji" style="font-size: 3rem;">🎉</div>
                <div id="overlay-title" style="font-family: var(--font-display); font-weight: 700;">VAULT CRACKED</div>
                <div id="overlay-stats" style="margin: 10px 0; font-size: 0.9rem;"></div>
                <div style="display: flex; gap: 10px; width: 100%;">
                    <button class="key-btn" style="flex:1; font-size: 0.9rem;" onclick="restartGame()">Retry</button>
                    <button class="key-btn" style="flex:1; font-size: 0.9rem;" onclick="showMenu()">Menu</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentInput = [], secretCode = [], attempts = 0, lives = 5, maxLives = 5;
        let timeLeft = 120, totalTime = 120, currentDifficulty = '', gameActive = false;
        let timerInterval, soundOn = true;

        const config = {
            beginner:     { time: 180, lives: 10, slots: 3 },
            intermediate: { time: 120, lives: 5,  slots: 3 },
            hard:         { time: 120, lives: 5,  slots: 4 },
            veryhard:     { time: 120, lives: 5,  slots: 5 }
        };

        function formatTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
        function toggleSound() { soundOn = !soundOn; document.getElementById('sound-toggle').textContent = soundOn ? '🔊' : '🔇'; }

        function showMenu() {
            gameActive = false; clearInterval(timerInterval);
            document.getElementById('menu-screen').style.display = 'block';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('overlay').classList.remove('show');
            loadPBs();
        }

        function loadPBs() {
            Object.keys(config).forEach(diff => {
                const pb = localStorage.getItem(`maruvault_pb_${diff}`);
                const el = document.getElementById(`pb-${diff}`);
                if (el) el.textContent = pb ? formatTime(parseInt(pb)) : '--';
            });
        }

        function initGame(difficulty) {
            currentDifficulty = difficulty;
            const cfg = config[difficulty];
            timeLeft = totalTime = cfg.time;
            lives = maxLives = cfg.lives;
            attempts = 0; currentInput = [];
            
            const display = document.getElementById('display-screen');
            display.innerHTML = '';
            for (let i = 0; i < cfg.slots; i++) {
                const slot = document.createElement('div');
                slot.className = 'code-slot'; slot.id = `slot-${i}`; slot.textContent = '·';
                display.appendChild(slot);
            }

            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('overlay').classList.remove('show');
            
            secretCode = Array.from({ length: cfg.slots }, () => Math.floor(Math.random() * 10));
            gameActive = true;
            updateLivesDisplay(); updateTimerDisplay(); updateGoButton();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--; updateTimerDisplay();
                if (timeLeft <= 0) endGame(false, 'TIME OUT');
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('timer-display').textContent = formatTime(timeLeft);
            const bar = document.getElementById('timer-bar');
            bar.style.width = (timeLeft / totalTime * 100) + '%';
        }

        function updateLivesDisplay() {
            const container = document.getElementById('lives-display');
            container.innerHTML = '';
            for (let i = 0; i < maxLives; i++) {
                const h = document.createElement('span');
                h.className = 'heart' + (i >= lives ? ' lost' : '');
                h.textContent = '❤'; container.appendChild(h);
            }
        }

        function press(num) {
            if (!gameActive || currentInput.length >= config[currentDifficulty].slots) return;
            currentInput.push(num); updateDisplay(); updateGoButton();
        }

        function handleClear() {
            if (!gameActive || currentInput.length === 0) return;
            currentInput.pop(); updateDisplay(); updateGoButton();
        }

        function updateDisplay() {
            const slots = config[currentDifficulty].slots;
            for (let i = 0; i < slots; i++) {
                const el = document.getElementById(`slot-${i}`);
                el.textContent = currentInput[i] !== undefined ? currentInput[i] : '·';
                el.style.borderColor = currentInput[i] !== undefined ? 'var(--purple-light)' : 'var(--border)';
            }
        }

        function updateGoButton() {
            document.getElementById('btn-go').disabled = currentInput.length < config[currentDifficulty].slots || !gameActive;
        }

        function checkCode() {
            const slots = config[currentDifficulty].slots;
            let guess = [...currentInput], tempSecret = [...secretCode], results = new Array(slots).fill('wrong'), correctCount = 0;

            for (let i = 0; i < slots; i++) {
                if (guess[i] === tempSecret[i]) { results[i] = 'correct'; tempSecret[i] = null; guess[i] = null; correctCount++; }
            }
            for (let i = 0; i < slots; i++) {
                if (guess[i] !== null) {
                    let idx = tempSecret.indexOf(guess[i]);
                    if (idx !== -1) { results[i] = 'present'; tempSecret[idx] = null; }
                }
            }

            results.forEach((res, i) => {
                document.getElementById(`slot-${i}`).style.backgroundColor = `var(--${res})`;
                document.getElementById(`slot-${i}`).style.borderColor = `var(--${res})`;
            });

            attempts++;
            if (correctCount === slots) {
                setTimeout(() => endGame(true, 'CRACKED'), 500);
            } else {
                lives--; updateLivesDisplay();
                if (lives <= 0) {
                    setTimeout(() => endGame(false, 'LOCKED'), 500);
                } else {
                    document.getElementById('message').textContent = `Try again! ${lives} left.`;
                    document.getElementById('attempt-counter').textContent = `Attempt ${attempts + 1}`;
                }
            }
        }

        function endGame(won, title) {
            gameActive = false; clearInterval(timerInterval);
            document.getElementById('overlay').classList.add('show');
            document.getElementById('overlay-title').textContent = title;
            document.getElementById('overlay-emoji').textContent = won ? '🔓' : '🔒';
            document.getElementById('overlay-stats').textContent = `${attempts} attempts in ${formatTime(totalTime - timeLeft)}`;
            if(won) localStorage.setItem(`maruvault_pb_${currentDifficulty}`, timeLeft);
        }

        function restartGame() { initGame(currentDifficulty); }
        
        loadPBs();
        showMenu();
    </script>
</body>
</html>
