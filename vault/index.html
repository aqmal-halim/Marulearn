<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maru-Vault Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>🔓 MARU-VAULT</h1>
        <div id="display-screen">
            <div class="code-slot" id="slot-0">?</div>
            <div class="code-slot" id="slot-1">?</div>
            <div class="code-slot" id="slot-2">?</div>
        </div>
        
        <div id="feedback-log">
            <p>Enter 3 digits to crack the safe!</p>
        </div>

        <div id="keypad">
            <button onclick="press(1)">1</button>
            <button onclick="press(2)">2</button>
            <button onclick="press(3)">3</button>
            <button onclick="press(4)">4</button>
            <button onclick="press(5)">5</button>
            <button onclick="press(6)">6</button>
            <button onclick="press(7)">7</button>
            <button onclick="press(8)">8</button>
            <button onclick="press(9)">9</button>
            <button onclick="clearCode()" class="btn-red">CLR</button>
            <button onclick="press(0)">0</button>
            <button onclick="checkCode()" class="btn-green">GO</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
