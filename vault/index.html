<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruVault: Kids Logic Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Vibrant Kids-Friendly Palette */
            --bg: #e0f2fe; /* Light Sky */
            --surface: #ffffff;
            --surface2: #fdfcf0;
            --border: #bae6fd;
            --accent: #f472b6; /* Pink */
            --accent2: #fbbf24; /* Yellow */
            --blue: #38bdf8;
            --purple: #a78bfa;
            --green: #4ade80;
            --red: #fb7185;
            --text: #1e293b;
            --text-muted: #64748b;
            --correct: #4ade80;
            --present: #fbbf24;
            --wrong: #f43f5e; 
            --font-main: 'Nunito', sans-serif;
            --radius: 24px;
            --shadow: 0 8px 0px rgba(0,0,0,0.05);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        }

        html, body {
            height: 100%; width: 100%;
            background: var(--bg);
            font-family: var(--font-main);
            color: var(--text);
            overflow: hidden;
        }

        /* Fun Background Pattern */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.5;
            z-index: 0;
        }

        #app {
            position: relative; z-index: 1;
            width: 100%; height: 100dvh;
            display: flex; justify-content: center; align-items: center;
        }

        #game-container {
            background: var(--surface);
            width: 100%; height: 100%;
            position: relative;
            display: flex; flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(56, 189, 248, 0.2);
        }

        @media (min-height: 600px) and (min-width: 450px) {
            #game-container {
                height: 90vh; width: 400px;
                border-radius: 45px;
                border: 10px solid #ffffff;
            }
        }

        #header {
            padding: 20px;
            display: flex; align-items: center; justify-content: space-between;
            background: #fff; border-bottom: 3px solid #f1f5f9;
        }

        .logo-group { display: flex; align-items: center; gap: 12px; }
        .vault-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; box-shadow: 0 4px 0 #be185d;
        }

        .logo-text { font-size: 1.2rem; font-weight: 900; color: var(--text); }
        .logo-sub { font-size: 0.7rem; color: var(--blue); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .header-controls { display: flex; gap: 10px; }
        #sound-toggle, #back-btn {
            background: #f1f5f9; border: none; font-size: 1.1rem;
            width: 40px; height: 40px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .screen { padding: 20px; flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        
        /* Menu Styling */
        #menu-screen { gap: 15px; }
        .menu-intro { text-align: center; margin-bottom: 5px; }
        .menu-intro h2 { font-weight: 900; color: var(--purple); margin-bottom: 5px; }
        .menu-intro p { font-size: 0.9rem; color: var(--text-muted); font-weight: 700; }

        .diff-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .menu-btn {
            padding: 18px; border-radius: 24px; border: 3px solid #f1f5f9;
            background: #fff; cursor: pointer;
            display: flex; align-items: center; gap: 15px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0 #f1f5f9;
        }
        .menu-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #f1f5f9; }

        .diff-badge { 
            width: 50px; height: 50px; border-radius: 18px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.8rem; background: var(--bg); 
        }
        .menu-btn-title { font-size: 1.1rem; font-weight: 900; color: var(--text); text-align: left; }
        .menu-btn-meta { font-size: 0.8rem; color: var(--text-muted); font-weight: 700; text-align: left; }
        
        .pb-pill { background: #dcfce7; color: #166534; font-size: 0.7rem; padding: 5px 12px; border-radius: 12px; font-weight: 800; margin-left: auto; }
        .pb-pill.empty { background: #f8fafc; color: #94a3b8; }

        /* Game Screen */
        #game-screen { display: none; justify-content: space-between; padding-top: 10px; }
        
        #status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .heart { font-size: 1.4rem; color: var(--red); margin-right: 2px; }
        .heart.lost { opacity: 0.2; filter: grayscale(1); }

        #timer-wrap { display: flex; align-items: center; gap: 10px; background: #fff; padding: 6px 12px; border-radius: 20px; border: 2px solid #f1f5f9; }
        #timer-display { font-weight: 900; font-size: 0.9rem; min-width: 40px; }
        #timer-bar-bg { width: 50px; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
        #timer-bar { height: 100%; background: var(--green); width: 100%; transition: width 1s linear; }

        #display-screen {
            background: #fdfcf0; border: 4px dashed #fef3c7;
            border-radius: 30px; display: flex; justify-content: center;
            gap: 12px; padding: 25px 15px; margin-bottom: 10px;
        }

        .code-slot {
            width: 55px; height: 75px; background: #fff;
            border-radius: 20px; border: 4px solid #e2e8f0;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 900; color: #e2e8f0;
            box-shadow: inset 0 -5px 0 rgba(0,0,0,0.05);
        }
        .code-slot.filled { border-color: var(--blue); color: var(--text); }
        .code-slot.correct { background: var(--green); border-color: #22c55e; color: white; }
        .code-slot.present { background: var(--present); border-color: #d97706; color: white; }
        .code-slot.wrong { background: var(--wrong); border-color: #be123c; color: white; }

        #feedback-box {
            background: #f0f9ff; border: 3px solid #e0f2fe;
            border-radius: 24px; padding: 15px; min-height: 100px;
            text-align: center; margin-bottom: 15px;
        }
        .feedback-header { font-size: 0.7rem; font-weight: 900; color: var(--blue); text-transform: uppercase; margin-bottom: 5px; }
        #message { font-size: 1rem; font-weight: 800; color: var(--text); line-height: 1.3; }

        #keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .key-btn {
            height: 55px; border-radius: 20px; border: none;
            background: #f8fafc; color: var(--text); font-size: 1.5rem; font-weight: 900;
            box-shadow: 0 5px 0 #e2e8f0; cursor: pointer;
        }
        .key-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #e2e8f0; }
        .btn-clear { background: #fee2e2; color: var(--red); box-shadow: 0 5px 0 #fecaca; }
        .btn-go { background: #dcfce7; color: #166534; box-shadow: 0 5px 0 #bbf7d0; grid-column: span 1; }
        .btn-go:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Overlay */
        #overlay {
            display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.95);
            z-index: 100; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center;
        }
        #overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        .overlay-emoji { font-size: 5rem; margin-bottom: 10px; }
        #overlay-title { font-size: 2rem; font-weight: 900; margin-bottom: 20px; }
        
        .overlay-btn {
            width: 100%; padding: 20px; border-radius: 24px; border: none;
            font-size: 1.2rem; font-weight: 900; cursor: pointer; margin-top: 10px;
        }
        .primary-btn { background: var(--accent); color: white; box-shadow: 0 6px 0 #be185d; }
        .secondary-btn { background: #f1f5f9; color: var(--text-muted); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .flip { animation: flip-in 0.4s ease forwards; }
        @keyframes flip-in { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="app">
        <div id="game-container">
            <div id="header">
                <div class="logo-group">
                    <div class="vault-icon">⭐</div>
                    <div>
                        <div class="logo-text">MaruVault</div>
                        <div class="logo-sub">Kids Edition</div>
                    </div>
                </div>
                <div class="header-controls">
                    <button id="back-btn" onclick="showMenu()" style="display:none">⬅</button>
                    <button id="sound-toggle" onclick="toggleSound()">🔊</button>
                </div>
            </div>

            <div id="menu-screen" class="screen">
                <div class="menu-intro">
                    <h2>Hi Explorer! 👋</h2>
                    <p>Can you crack the secret code? Use the hints to unlock the vault!</p>
                </div>
                <div class="diff-grid">
                    <button class="menu-btn" onclick="initGame('beginner')">
                        <div class="diff-badge">🌱</div>
                        <div>
                            <div class="menu-btn-title">Junior Scout</div>
                            <div class="menu-btn-meta">3 Numbers · Lots of Time</div>
                        </div>
                        <div class="pb-pill empty" id="pb-beginner">--</div>
                    </button>
                    <button class="menu-btn" onclick="initGame('intermediate')">
                        <div class="diff-badge">🌟</div>
                        <div>
                            <div class="menu-btn-title">Star Solver</div>
                            <div class="menu-btn-meta">3 Numbers · Tricky</div>
                        </div>
                        <div class="pb-pill empty" id="pb-intermediate">--</div>
                    </button>
                    <button class="menu-btn" onclick="initGame('hard')">
                        <div class="diff-badge">💎</div>
                        <div>
                            <div class="menu-btn-title">Diamond Mind</div>
                            <div class="menu-btn-meta">4 Numbers · Pro</div>
                        </div>
                        <div class="pb-pill empty" id="pb-hard">--</div>
                    </button>
                    <button class="menu-btn" onclick="initGame('veryhard')">
                        <div class="diff-badge">👑</div>
                        <div>
                            <div class="menu-btn-title">Vault Master</div>
                            <div class="menu-btn-meta">5 Numbers · Genius!</div>
                        </div>
                        <div class="pb-pill empty" id="pb-veryhard">--</div>
                    </button>
                </div>
            </div>

            <div id="game-screen" class="screen">
                <div id="status-bar">
                    <div id="lives-display"></div>
                    <div id="timer-wrap">
                        <div id="timer-bar-bg"><div id="timer-bar"></div></div>
                        <div id="timer-display">0:00</div>
                    </div>
                </div>

                <div id="display-screen"></div>

                <div id="feedback-box">
                    <div class="feedback-header" id="hint-header">HINT STATION</div>
                    <div id="message">Pick a number to begin!</div>
                </div>

                <div id="keypad">
                    <button class="key-btn" onclick="press(1)">1</button>
                    <button class="key-btn" onclick="press(2)">2</button>
                    <button class="key-btn" onclick="press(3)">3</button>
                    <button class="key-btn" onclick="press(4)">4</button>
                    <button class="key-btn" onclick="press(5)">5</button>
                    <button class="key-btn" onclick="press(6)">6</button>
                    <button class="key-btn" onclick="press(7)">7</button>
                    <button class="key-btn" onclick="press(8)">8</button>
                    <button class="key-btn" onclick="press(9)">9</button>
                    <button class="key-btn btn-clear" onclick="handleClear()">⌫</button>
                    <button class="key-btn" onclick="press(0)">0</button>
                    <button class="key-btn btn-go" onclick="checkCode()" id="btn-go" disabled>GO!</button>
                </div>
            </div>

            <div id="overlay">
                <div class="overlay-emoji" id="overlay-emoji">🎉</div>
                <h1 id="overlay-title">YOU WON!</h1>
                <p id="overlay-msg" style="font-weight: 800; color: var(--text-muted); margin-bottom: 20px;"></p>
                <button class="overlay-btn primary-btn" onclick="restartGame()">Try Again!</button>
                <button class="overlay-btn secondary-btn" onclick="showMenu()">Main Menu</button>
            </div>
        </div>
    </div>

    <script>
        const config = {
            beginner: { time: 240, lives: 10, slots: 3 },
            intermediate: { time: 180, lives: 6, slots: 3 },
            hard: { time: 150, lives: 6, slots: 4 },
            veryhard: { time: 120, lives: 5, slots: 5 }
        };

        let currentInput = [], secretCode = [], currentDifficulty = '', lives = 0, timeLeft = 0, totalTime = 0, timerInterval, gameActive = false, soundOn = true;

        // Simple Sound Engine
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playNote(freq, dur) {
            if (!soundOn) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function toggleSound() {
            soundOn = !soundOn;
            document.getElementById('sound-toggle').textContent = soundOn ? '🔊' : '🔇';
        }

        function showMenu() {
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById('menu-screen').style.display = 'flex';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('overlay').classList.remove('show');
            loadPBs();
        }

        function loadPBs() {
            Object.keys(config).forEach(diff => {
                const pb = localStorage.getItem(`maruvault_kids_pb_${diff}`);
                const el = document.getElementById(`pb-${diff}`);
                if (el) el.textContent = pb ? pb + 's left' : '--';
            });
        }

        function initGame(diff) {
            currentDifficulty = diff;
            const cfg = config[diff];
            lives = cfg.lives;
            timeLeft = cfg.time;
            totalTime = cfg.time;
            currentInput = [];
            secretCode = Array.from({length: cfg.slots}, () => Math.floor(Math.random() * 10));
            
            gameActive = true;
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('back-btn').style.display = 'flex';
            
            setupDisplay(cfg.slots);
            updateStatus();
            startTimer();
            document.getElementById('message').textContent = "I'm thinking of " + cfg.slots + " numbers...";
        }

        function setupDisplay(slots) {
            const container = document.getElementById('display-screen');
            container.innerHTML = '';
            for(let i=0; i<slots; i++) {
                const div = document.createElement('div');
                div.className = 'code-slot';
                div.id = `slot-${i}`;
                div.textContent = '?';
                container.appendChild(div);
            }
        }

        function press(n) {
            if (!gameActive || currentInput.length >= secretCode.length) return;
            playNote(400 + (n * 20), 0.1);
            currentInput.push(n);
            updateSlots();
        }

        function handleClear() {
            currentInput.pop();
            playNote(200, 0.1);
            updateSlots();
        }

        function updateSlots() {
            for(let i=0; i<secretCode.length; i++) {
                const slot = document.getElementById(`slot-${i}`);
                if (currentInput[i] !== undefined) {
                    slot.textContent = currentInput[i];
                    slot.className = 'code-slot filled';
                } else {
                    slot.textContent = '?';
                    slot.className = 'code-slot';
                }
            }
            document.getElementById('btn-go').disabled = currentInput.length !== secretCode.length;
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if (timeLeft <= 0) endGame(false);
            }, 1000);
        }

        function updateTimerUI() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer-display').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
            const pct = (timeLeft / totalTime) * 100;
            document.getElementById('timer-bar').style.width = pct + '%';
        }

        function updateStatus() {
            const div = document.getElementById('lives-display');
            div.innerHTML = '';
            for(let i=0; i<config[currentDifficulty].lives; i++) {
                const h = document.createElement('span');
                h.className = 'heart' + (i >= lives ? ' lost' : '');
                h.textContent = '❤️';
                div.appendChild(h);
            }
        }

        function generateHint() {
            const rand = Math.random();
            if (rand < 0.3) {
                const sum = secretCode.reduce((a,b) => a+b, 0);
                return `Tip: All the numbers add up to ${sum}!`;
            } else if (rand < 0.6) {
                const evens = secretCode.filter(n => n % 2 === 0).length;
                return `Tip: There are ${evens} even numbers in the code.`;
            } else {
                const first = secretCode[0];
                return `Tip: The first number is ${first > 4 ? 'bigger than 4' : '4 or smaller'}.`;
            }
        }

        function checkCode() {
            gameActive = false;
            let correct = 0;
            let tempSecret = [...secretCode];
            let results = new Array(secretCode.length).fill('wrong');

            // Pass 1: Correct position
            currentInput.forEach((val, i) => {
                if (val === secretCode[i]) {
                    results[i] = 'correct';
                    tempSecret[i] = null;
                    correct++;
                }
            });

            // Pass 2: Present but wrong spot
            currentInput.forEach((val, i) => {
                if (results[i] === 'wrong') {
                    const idx = tempSecret.indexOf(val);
                    if (idx !== -1) {
                        results[i] = 'present';
                        tempSecret[idx] = null;
                    }
                }
            });

            // Animate Reveal
            results.forEach((res, i) => {
                setTimeout(() => {
                    const slot = document.getElementById(`slot-${i}`);
                    slot.className = `code-slot ${res} flip`;
                    playNote(300 + (i * 100), 0.1);
                }, i * 150);
            });

            setTimeout(() => {
                if (correct === secretCode.length) {
                    endGame(true);
                } else {
                    lives--;
                    updateStatus();
                    if (lives <= 0) {
                        endGame(false);
                    } else {
                        gameActive = true;
                        document.getElementById('message').textContent = generateHint();
                        currentInput = [];
                        setTimeout(updateSlots, 1000);
                    }
                }
            }, secretCode.length * 200);
        }

        function endGame(won) {
            gameActive = false;
            clearInterval(timerInterval);
            const overlay = document.getElementById('overlay');
            const emoji = document.getElementById('overlay-emoji');
            const title = document.getElementById('overlay-title');
            const msg = document.getElementById('overlay-msg');

            overlay.classList.add('show');
            if (won) {
                emoji.textContent = '🏆';
                title.textContent = 'SUPER SOLVER!';
                msg.textContent = `You cracked the code in ${totalTime - timeLeft} seconds!`;
                playNote(523, 0.1); setTimeout(()=>playNote(659, 0.1), 100); setTimeout(()=>playNote(783, 0.3), 200);
                
                const key = `maruvault_kids_pb_${currentDifficulty}`;
                const best = localStorage.getItem(key);
                if (!best || timeLeft > best) localStorage.setItem(key, timeLeft);
            } else {
                emoji.textContent = '🎈';
                title.textContent = 'Nice Try!';
                msg.textContent = `The secret code was ${secretCode.join(' ')}. Try again?`;
                playNote(150, 0.5);
            }
        }

        function restartGame() {
            document.getElementById('overlay').classList.remove('show');
            initGame(currentDifficulty);
        }

        window.onload = loadPBs;
    </script>
</body>
</html>
