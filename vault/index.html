<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruVault: Kids Logic Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f9ff;
            --surface: #ffffff;
            --blue: #38bdf8;
            --pink: #f472b6;
            --purple: #a78bfa;
            --yellow: #fbbf24;
            --green: #4ade80;
            --red: #fb7185;
            --text: #1e293b;
            --text-muted: #94a3b8;
            --correct: #4ade80;
            --present: #fbbf24;
            --wrong: #94a3b8; 
            --font-main: 'Nunito', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            height: 100dvh; width: 100%;
            background: var(--bg);
            font-family: var(--font-main);
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        #game-container {
            background: var(--surface);
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            position: relative;
        }

        @media (min-height: 600px) and (min-width: 450px) {
            #game-container { height: 95vh; width: 420px; border-radius: 40px; border: 8px solid white; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        }

        #header {
            padding: 15px 20px; border-bottom: 3px solid #f1f5f9;
            display: flex; align-items: center; justify-content: space-between;
        }

        .logo-group { display: flex; align-items: center; gap: 10px; }
        .vault-icon { width: 40px; height: 40px; background: var(--pink); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; box-shadow: 0 4px 0 #be185d; }
        .logo-text { font-weight: 900; font-size: 1.1rem; }

        .screen { padding: 20px; flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        
        /* Menu */
        .menu-btn {
            padding: 15px; border-radius: 20px; border: 3px solid #f1f5f9;
            background: #fff; cursor: pointer; display: flex; align-items: center; gap: 15px;
            margin-bottom: 10px; box-shadow: 0 5px 0 #f1f5f9; transition: 0.1s;
        }
        .menu-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #f1f5f9; }
        .diff-badge { width: 45px; height: 45px; background: #e0f2fe; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        
        /* Game UI */
        #status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .heart { font-size: 1.3rem; color: var(--red); }
        .heart.lost { opacity: 0.2; }

        #display-screen {
            background: #fff9db; border: 4px dashed #ffe066;
            border-radius: 25px; display: flex; justify-content: center;
            gap: 10px; padding: 20px 10px; margin-bottom: 10px;
        }

        .code-slot {
            width: 50px; height: 65px; background: #fff; border-radius: 15px;
            border: 3px solid #e2e8f0; display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: 900; color: #cbd5e1;
        }
        .code-slot.filled { border-color: var(--blue); color: var(--text); }
        .code-slot.correct { background: var(--green); border-color: #22c55e; color: white; }
        .code-slot.present { background: var(--yellow); border-color: #d97706; color: white; }
        .code-slot.wrong { background: #94a3b8; border-color: #64748b; color: white; }

        /* Last Guess Record */
        #last-guess-wrap {
            background: #f8fafc; border-radius: 15px; padding: 10px;
            margin-bottom: 10px; display: none; align-items: center; justify-content: center; gap: 10px;
        }
        .lg-label { font-size: 0.7rem; font-weight: 900; color: var(--text-muted); text-transform: uppercase; }
        .lg-dots { display: flex; gap: 5px; }
        .lg-dot { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 900; color: white; }

        #feedback-box {
            background: #f0f9ff; border: 3px solid #e0f2fe; border-radius: 20px;
            padding: 12px; text-align: center; margin-bottom: 15px; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center;
        }
        #message { font-size: 0.95rem; font-weight: 800; color: #0369a1; }

        #keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .key-btn {
            height: 50px; border-radius: 15px; border: none; background: #f1f5f9;
            font-size: 1.4rem; font-weight: 900; box-shadow: 0 4px 0 #e2e8f0; cursor: pointer;
        }
        .key-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #e2e8f0; }
        .btn-clear { background: #fee2e2; color: var(--red); box-shadow: 0 4px 0 #fecaca; }
        .btn-go { background: #dcfce7; color: #166534; box-shadow: 0 4px 0 #bbf7d0; }
        .btn-go:disabled { opacity: 0.5; box-shadow: none; }

        #overlay {
            display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.96);
            z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        #overlay.show { display: flex; }
        .overlay-btn { width: 100%; padding: 18px; border-radius: 20px; border: none; font-size: 1.1rem; font-weight: 900; margin-top: 10px; cursor: pointer; }
        .primary { background: var(--pink); color: white; box-shadow: 0 5px 0 #be185d; }

        .flip { animation: bounce 0.4s ease; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="header">
            <div class="logo-group">
                <div class="vault-icon">⭐</div>
                <div class="logo-text">MaruVault Junior</div>
            </div>
            <button id="back-btn" onclick="showMenu()" style="display:none; border:none; background:none; font-size:1.5rem;">🏠</button>
        </div>

        <div id="menu-screen" class="screen">
            <h2 style="text-align:center; margin-bottom:20px; color:var(--purple)">Pick a Level!</h2>
            <div id="diff-list"></div>
        </div>

        <div id="game-screen" class="screen" style="display:none">
            <div id="status-bar">
                <div id="lives-wrap"></div>
                <div id="timer-display" style="font-weight:900; background:#f1f5f9; padding:4px 12px; border-radius:10px;">0:00</div>
            </div>

            <div id="display-screen"></div>

            <div id="last-guess-wrap">
                <span class="lg-label">Last Try:</span>
                <div id="lg-dots" class="lg-dots"></div>
            </div>

            <div id="feedback-box">
                <div id="message">Loading Quest...</div>
            </div>

            <div id="keypad">
                <button class="key-btn" onclick="press(1)">1</button>
                <button class="key-btn" onclick="press(2)">2</button>
                <button class="key-btn" onclick="press(3)">3</button>
                <button class="key-btn" onclick="press(4)">4</button>
                <button class="key-btn" onclick="press(5)">5</button>
                <button class="key-btn" onclick="press(6)">6</button>
                <button class="key-btn" onclick="press(7)">7</button>
                <button class="key-btn" onclick="press(8)">8</button>
                <button class="key-btn" onclick="press(9)">9</button>
                <button class="key-btn btn-clear" onclick="backspace()">⌫</button>
                <button class="key-btn" onclick="press(0)">0</button>
                <button class="key-btn btn-go" id="btn-go" onclick="check()" disabled>GO!</button>
            </div>
        </div>

        <div id="overlay">
            <div id="over-emoji" style="font-size:5rem">🏆</div>
            <h1 id="over-title" style="margin:10px 0">AMAZING!</h1>
            <p id="over-msg" style="margin-bottom:20px; font-weight:700; color:var(--text-muted)"></p>
            <button class="overlay-btn primary" onclick="initGame(currentDiff)">Play Again</button>
            <button class="overlay-btn" onclick="showMenu()">Main Menu</button>
        </div>
    </div>

    <script>
        const config = {
            beginner: { name: 'Junior', icon: '🌱', slots: 3, lives: 10, time: 300 },
            medium: { name: 'Expert', icon: '🌟', slots: 3, lives: 6, time: 180 },
            hard: { name: 'Master', icon: '💎', slots: 4, lives: 6, time: 150 }
        };

        let secret = [], input = [], currentDiff = '', lives = 0, time = 0, timer, active = false;

        function showMenu() {
            active = false; clearInterval(timer);
            document.getElementById('menu-screen').style.display = 'block';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('overlay').classList.remove('show');
            
            const list = document.getElementById('diff-list');
            list.innerHTML = '';
            Object.keys(config).forEach(k => {
                const c = config[k];
                const btn = document.createElement('button');
                btn.className = 'menu-btn';
                btn.onclick = () => initGame(k);
                btn.innerHTML = `<div class="diff-badge">${c.icon}</div>
                    <div style="text-align:left"><div style="font-weight:900">${c.name}</div>
                    <div style="font-size:0.8rem; color:var(--text-muted)">${c.slots} Numbers</div></div>`;
                list.appendChild(btn);
            });
        }

        function initGame(k) {
            currentDiff = k;
            const c = config[k];
            secret = Array.from({length: c.slots}, () => Math.floor(Math.random() * 10));
            lives = c.lives;
            time = c.time;
            input = [];
            active = true;

            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('last-guess-wrap').style.display = 'none';
            
            const display = document.getElementById('display-screen');
            display.innerHTML = '';
            for(let i=0; i<c.slots; i++) {
                display.innerHTML += `<div class="code-slot" id="s-${i}">?</div>`;
            }

            updateUI();
            startTimer();
            document.getElementById('message').textContent = "Type " + c.slots + " numbers to unlock!";
        }

        function startTimer() {
            clearInterval(timer);
            timer = setInterval(() => {
                time--;
                let m = Math.floor(time/60), s = time%60;
                document.getElementById('timer-display').textContent = `${m}:${s<10?'0':''}${s}`;
                if(time <= 0) end(false);
            }, 1000);
        }

        function press(n) {
            if(!active || input.length >= secret.length) return;
            input.push(n);
            updateUI();
        }

        function backspace() {
            input.pop();
            updateUI();
        }

        function updateUI() {
            for(let i=0; i<secret.length; i++) {
                const el = document.getElementById(`s-${i}`);
                if(input[i] !== undefined) {
                    el.textContent = input[i];
                    el.className = 'code-slot filled';
                } else {
                    el.textContent = '?';
                    el.className = 'code-slot';
                }
            }
            document.getElementById('btn-go').disabled = input.length !== secret.length;

            const lw = document.getElementById('lives-wrap');
            lw.innerHTML = '';
            for(let i=0; i<config[currentDiff].lives; i++) {
                lw.innerHTML += `<span class="heart ${i>=lives?'lost':''}">❤️</span>`;
            }
        }

        function check() {
            active = false;
            let correct = 0, res = new Array(secret.length).fill('wrong'), tempSecret = [...secret];

            input.forEach((v, i) => {
                if(v === secret[i]) { res[i] = 'correct'; tempSecret[i] = null; correct++; }
            });

            input.forEach((v, i) => {
                if(res[i] === 'wrong') {
                    let idx = tempSecret.indexOf(v);
                    if(idx !== -1) { res[i] = 'present'; tempSecret[idx] = null; }
                }
            });

            // Update record
            const lgWrap = document.getElementById('last-guess-wrap');
            const lgDots = document.getElementById('lg-dots');
            lgDots.innerHTML = '';
            input.forEach((v, i) => {
                lgDots.innerHTML += `<div class="lg-dot" style="background:var(--${res[i]})">${v}</div>`;
            });
            lgWrap.style.display = 'flex';

            res.forEach((r, i) => {
                setTimeout(() => {
                    const el = document.getElementById(`s-${i}`);
                    el.className = `code-slot ${r} flip`;
                }, i * 100);
            });

            setTimeout(() => {
                if(correct === secret.length) return end(true);
                lives--;
                updateUI();
                if(lives <= 0) return end(false);
                
                document.getElementById('message').textContent = getHint();
                input = [];
                active = true;
                setTimeout(updateUI, 1000);
            }, 1000);
        }

        function getHint() {
            const r = Math.random();
            if(r < 0.4) {
                return `Clue: The numbers add up to ${secret.reduce((a,b)=>a+b,0)}!`;
            } else if(r < 0.7) {
                const evens = secret.filter(n => n % 2 === 0).length;
                return `Clue: There are ${evens} even numbers!`;
            } else {
                return `Clue: The first number is ${secret[0] > 4 ? 'High (5-9)' : 'Low (0-4)'}!`;
            }
        }

        function end(win) {
            clearInterval(timer);
            document.getElementById('overlay').classList.add('show');
            document.getElementById('over-emoji').textContent = win ? '🏆' : '🎈';
            document.getElementById('over-title').textContent = win ? 'GREAT JOB!' : 'NICE TRY!';
            document.getElementById('over-msg').textContent = win ? 'You cracked the code!' : `The code was ${secret.join('')}`;
        }

        showMenu();
    </script>
</body>
</html>
