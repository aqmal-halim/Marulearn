<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruVault: Mission Critical</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0e17;
            --surface: #1a1828;
            --surface2: #221f36;
            --border: #2e2a4a;
            --accent: #ff6b35;
            --accent2: #f7c59f;
            --purple: #7c3aed;
            --purple-light: #a78bfa;
            --green: #10d98c;
            --yellow: #fbbf24;
            --red: #f43f5e;
            --text: #e8e6f0;
            --text-muted: #7a748e;
            --correct: #10d98c;
            --present: #fbbf24;
            --wrong: #f43f5e;
            --font-display: 'Space Mono', monospace;
            --font-body: 'Nunito', sans-serif;
            --radius: 16px;
            --transition: 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            height: 100%;
            background: var(--bg);
            font-family: var(--font-body);
            color: var(--text);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(124,58,237,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 10% 80%, rgba(255,107,53,0.12) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        #app {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        #game-container {
            background: var(--surface);
            width: 100%;
            max-width: 400px;
            max-height: 95vh;
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: 0 24px 80px rgba(0,0,0,0.6);
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        #header {
            background: linear-gradient(135deg, #1a1828 0%, #1e1b34 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo-group { display: flex; align-items: center; gap: 10px; }
        .vault-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #ff8c5a);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(255,107,53,0.4);
            flex-shrink: 0;
        }

        .logo-text { font-family: var(--font-display); font-size: 1rem; font-weight: 700; color: var(--text); }
        .logo-sub { font-size: 0.6rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

        #sound-toggle {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 34px;
            height: 34px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── SCREENS ── */
        .screen { padding: 16px; flex: 1; }
        #menu-screen { display: flex; flex-direction: column; gap: 4px; }
        .menu-intro { text-align: center; margin-bottom: 12px; }
        .menu-intro p { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; }

        .diff-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
        .diff-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

        .menu-btn {
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
        }

        .diff-badge { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
        .menu-btn-title { font-size: 0.85rem; font-weight: 900; font-family: var(--font-display); }
        .menu-btn-meta { font-size: 0.68rem; color: var(--text-muted); }
        .pb-pill { background: rgba(16,217,140,0.1); color: var(--green); font-size: 0.65rem; padding: 2px 8px; border-radius: 20px; font-family: var(--font-display); margin-left: auto; }

        .home-link {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 10px; border-radius: 12px; border: 1px solid var(--border);
            color: var(--text-muted); font-size: 0.75rem; text-decoration: none;
            margin-top: 4px;
        }

        /* ── GAME SCREEN ── */
        #game-screen { display: none; flex-direction: column; gap: 10px; }
        #status-bar { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        #lives-display { display: flex; gap: 3px; }
        .heart { font-size: 0.9rem; }
        .heart.lost { opacity: 0.2; }

        #timer-wrap {
            display: flex; align-items: center; gap: 6px;
            background: var(--surface2); padding: 5px 10px;
            border-radius: 20px; border: 1px solid var(--border);
        }
        #timer-display { font-family: var(--font-display); font-size: 0.8rem; font-weight: 700; width: 40px; text-align: center; }
        #timer-progress { width: 50px; height: 4px; background: var(--border); border-radius: 2px; }
        #timer-bar { height: 100%; background: var(--green); transition: width 1s linear; }

        /* ── NEW HINT DISPLAY ── */
        #hint-display { 
            text-align: center; 
            font-size: 0.7rem; 
            font-family: var(--font-display);
            color: var(--accent2); 
            text-transform: uppercase; 
            font-weight: 700; 
            background: rgba(255,107,53,0.05);
            padding: 4px;
            border-radius: 8px;
            min-height: 24px;
        }

        #display-screen {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 16px; display: flex; justify-content: center;
            gap: 8px; padding: 12px; min-height: 80px; align-items: center;
        }

        .code-slot {
            width: 50px; height: 65px; background: var(--surface);
            border-radius: 12px; border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-size: 1.6rem; font-weight: 700;
        }

        .code-slot.filled { border-color: var(--purple-light); color: var(--purple-light); }
        .code-slot.correct { background: rgba(16,217,140,0.15); border-color: var(--correct); color: var(--correct); }
        .code-slot.present { background: rgba(251,191,36,0.15); border-color: var(--present); color: var(--present); }
        .code-slot.wrong { background: rgba(244,63,94,0.12); border-color: var(--wrong); color: var(--wrong); }

        #history-section { display: none; flex-direction: column; gap: 4px; }
        #history-label { font-size: 0.6rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        #history-log { display: flex; flex-direction: column; gap: 4px; max-height: 60px; overflow-y: auto; }
        .history-row { display: flex; gap: 6px; align-items: center; }
        .hist-dot { width: 18px; height: 18px; border-radius: 4px; font-family: var(--font-display); font-size: 0.65rem; display: flex; align-items: center; justify-content: center; }
        .hist-dot.correct { background: rgba(16,217,140,0.2); color: var(--correct); }
        .hist-dot.present { background: rgba(251,191,36,0.2); color: var(--present); }
        .hist-dot.wrong { background: rgba(244,63,94,0.1); color: var(--wrong); }

        #keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: auto; }
        .key-btn { aspect-ratio: 1.4 / 1; font-family: var(--font-display); font-size: 1.1rem; border-radius: 12px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; }
        .btn-clear { background: rgba(244,63,94,0.1); color: var(--red); font-size: 0.7rem; }
        .btn-go { background: rgba(16,217,140,0.12); color: var(--green); font-size: 0.8rem; }
        .btn-go:disabled { opacity: 0.3; }

        #overlay {
            display: none; position: absolute; inset: 0; background: rgba(15,14,23,0.96);
            backdrop-filter: blur(8px); z-index: 10; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px; gap: 12px; border-radius: 28px;
        }
        #overlay.show { display: flex; }
        .overlay-emoji { font-size: 3rem; }
        #overlay-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; }
        
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 0.75rem; padding: 8px 16px; border-radius: 20px; z-index: 100; transition: transform 0.3s; }
        #toast.show { transform: translateX(-50%) translateY(0); }

        @keyframes flip-in { from { transform: scaleY(0); opacity: 0; } to { transform: scaleY(1); opacity: 1; } }
        .flip { animation: flip-in 0.25s ease forwards; }
    </style>
</head>
<body>
    <div id="app">
        <div id="game-container">
            <div id="header">
                <div class="logo-group">
                    <div class="vault-icon">🔐</div>
                    <div>
                        <div class="logo-text">MaruVault</div>
                        <div class="logo-sub">Mission Critical</div>
                    </div>
                </div>
                <button id="sound-toggle" onclick="toggleSound()">🔊</button>
            </div>

            <div id="menu-screen" class="screen">
                <div class="menu-intro">
                    <p>Crack the code before time runs out.<br>Green = right place · Yellow = wrong place</p>
                </div>
                <div class="diff-label">Select Difficulty</div>
                <div class="diff-grid">
                    <button class="menu-btn" onclick="initGame('beginner')">
                        <div class="diff-badge">🟢</div>
                        <div class="menu-btn-info">
                            <div class="menu-btn-title">BEGINNER</div>
                            <div class="menu-btn-meta">3 min · 3 digits · 10 lives</div>
                        </div>
                        <div class="pb-pill empty" id="pb-beginner">--</div>
                    </button>
                    <button class="menu-btn" onclick="initGame('intermediate')">
                        <div class="diff-badge">🟡</div>
                        <div class="menu-btn-info">
                            <div class="menu-btn-title">INTERMEDIATE</div>
                            <div class="menu-btn-meta">2 min · 3 digits · 5 lives</div>
                        </div>
                        <div class="pb-pill empty" id="pb-intermediate">--</div>
                    </button>
                    <button class="menu-btn" onclick="initGame('hard')">
                        <div class="diff-badge">🟠</div>
                        <div class="menu-btn-info">
                            <div class="menu-btn-title">HARD</div>
                            <div class="menu-btn-meta">2 min · 4 digits · 5 lives</div>
                        </div>
                        <div class="pb-pill empty" id="pb-hard">--</div>
                    </button>
                    <button class="menu-btn" onclick="initGame('veryhard')">
                        <div class="diff-badge">🔴</div>
                        <div class="menu-btn-info">
                            <div class="menu-btn-title">VERY HARD</div>
                            <div class="menu-btn-meta">2 min · 5 digits · 5 lives</div>
                        </div>
                        <div class="pb-pill empty" id="pb-veryhard">--</div>
                    </button>
                </div>
                <a href="https://aqmal-halim.github.io/Marulearn/index.html" class="home-link">🏠 Back to Marulearn Home</a>
            </div>

            <div id="game-screen" class="screen">
                <div id="status-bar">
                    <div id="lives-display"></div>
                    <div id="timer-wrap">
                        <div id="timer-progress"><div id="timer-bar"></div></div>
                        <div id="timer-display">2:00</div>
                    </div>
                </div>
                
                <div id="hint-display">Ready for Input</div>
                
                <div id="display-screen"></div>
                
                <div id="history-section">
                    <div id="history-label">Guess History</div>
                    <div id="history-log"></div>
                </div>

                <div id="keypad">
                    <button class="key-btn" onclick="press(1)">1</button>
                    <button class="key-btn" onclick="press(2)">2</button>
                    <button class="key-btn" onclick="press(3)">3</button>
                    <button class="key-btn" onclick="press(4)">4</button>
                    <button class="key-btn" onclick="press(5)">5</button>
                    <button class="key-btn" onclick="press(6)">6</button>
                    <button class="key-btn" onclick="press(7)">7</button>
                    <button class="key-btn" onclick="press(8)">8</button>
                    <button class="key-btn" onclick="press(9)">9</button>
                    <button class="key-btn btn-clear" onclick="handleClear()">⌫</button>
                    <button class="key-btn" onclick="press(0)">0</button>
                    <button class="key-btn btn-go" onclick="checkCode()" id="btn-go" disabled>GO</button>
                </div>
            </div>

            <div id="overlay">
                <div class="overlay-emoji" id="overlay-emoji">🎉</div>
                <div id="overlay-title">VAULT CRACKED!</div>
                <div id="overlay-stats" style="display:flex; gap:10px; margin: 10px 0;">
                    <div style="text-align:center"><div id="stat-time" style="font-size:1.2rem; color:var(--accent)"></div><div style="font-size:0.6rem; color:var(--text-muted)">TIME</div></div>
                    <div style="text-align:center"><div id="stat-attempts" style="font-size:1.2rem; color:var(--accent)"></div><div style="font-size:0.6rem; color:var(--text-muted)">TRIES</div></div>
                </div>
                <div id="overlay-code" style="font-family: var(--font-display); color: var(--text-muted); margin-bottom: 15px;"></div>
                <div style="display:flex; gap:8px; width:100%">
                    <button class="overlay-btn" style="flex:1; padding:12px; background:var(--accent); border:none; border-radius:12px; color:white; font-weight:bold;" onclick="restartGame()">Retry</button>
                    <button class="overlay-btn" style="flex:1; padding:12px; background:var(--surface2); border:1px solid var(--border); border-radius:12px; color:var(--text-muted);" onclick="showMenu()">Menu</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let currentInput = [], secretCode = [], attempts = 0, lives = 5, maxLives = 5, timeLeft = 120, totalTime = 120, currentDifficulty = '', gameActive = false, timerInterval, soundOn = true;
        const config = { beginner: { time: 180, lives: 10, slots: 3 }, intermediate: { time: 120, lives: 5, slots: 3 }, hard: { time: 120, lives: 5, slots: 4 }, veryhard: { time: 120, lives: 5, slots: 5 } };
        
        let audioCtx = null;
        function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
        function playTone(freq, type = 'sine', duration = 0.08, vol = 0.1) { if (!soundOn) return; try { const ctx = getAudioCtx(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime); gain.gain.setValueAtTime(vol, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration); osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration); } catch(e) {} }
        const sounds = { key: () => playTone(600, 'square', 0.05), back: () => playTone(300, 'square', 0.05), go: () => playTone(440, 'sine', 0.1), win: () => playTone(880, 'sine', 0.4), lose: () => playTone(150, 'sawtooth', 0.4) };

        function formatTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1500); }
        function toggleSound() { soundOn = !soundOn; document.getElementById('sound-toggle').textContent = soundOn ? '🔊' : '🔇'; }
        
        function showMenu() { gameActive = false; clearInterval(timerInterval); document.getElementById('menu-screen').style.display = 'flex'; document.getElementById('game-screen').style.display = 'none'; document.getElementById('overlay').classList.remove('show'); loadPBs(); }
        function loadPBs() { Object.keys(config).forEach(d => { const pb = localStorage.getItem(`maruvault_pb_${d}`); document.getElementById(`pb-${d}`).textContent = pb ? formatTime(pb) + ' left' : '--'; }); }

        function initGame(diff) {
            currentDifficulty = diff;
            const cfg = config[diff];
            timeLeft = totalTime = cfg.time;
            lives = maxLives = cfg.lives;
            attempts = 0;
            currentInput = [];
            secretCode = Array.from({length: cfg.slots}, () => Math.floor(Math.random()*10));
            
            const display = document.getElementById('display-screen');
            display.innerHTML = '';
            for(let i=0; i<cfg.slots; i++) {
                const s = document.createElement('div');
                s.className = 'code-slot empty'; s.id = `slot-${i}`; s.textContent = '·';
                display.appendChild(s);
            }

            document.getElementById('hint-display').textContent = "Analyzing Vault...";
            document.getElementById('history-log').innerHTML = '';
            document.getElementById('history-section').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('overlay').classList.remove('show');
            
            gameActive = true;
            updateLives();
            updateTimer();
            startTimer();
        }

        function restartGame() { initGame(currentDifficulty); }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--; updateTimer();
                if(timeLeft <= 0) endGame(false, "EXPIRED");
            }, 1000);
        }

        function updateTimer() {
            document.getElementById('timer-display').textContent = formatTime(timeLeft);
            const pct = (timeLeft/totalTime)*100;
            document.getElementById('timer-bar').style.width = pct+'%';
        }

        function updateLives() {
            const container = document.getElementById('lives-display');
            container.innerHTML = '';
            for(let i=0; i<maxLives; i++) {
                const h = document.createElement('span');
                h.className = 'heart' + (i >= lives ? ' lost' : '');
                h.textContent = '❤'; container.appendChild(h);
            }
        }

        function press(n) {
            if(!gameActive || currentInput.length >= config[currentDifficulty].slots) return;
            sounds.key(); currentInput.push(n); updateDisplay();
        }

        function handleClear() {
            if(!gameActive || currentInput.length === 0) return;
            sounds.back(); currentInput.pop(); updateDisplay();
        }

        function updateDisplay() {
            const slots = config[currentDifficulty].slots;
            for(let i=0; i<slots; i++) {
                const el = document.getElementById(`slot-${i}`);
                if(currentInput[i] !== undefined) {
                    el.textContent = currentInput[i]; el.className = 'code-slot filled';
                } else {
                    el.textContent = '·'; el.className = 'code-slot empty';
                }
            }
            document.getElementById('btn-go').disabled = currentInput.length < slots;
        }

        function checkCode() {
            const slots = config[currentDifficulty].slots;
            let guess = [...currentInput], tempSecret = [...secretCode], results = new Array(slots).fill('wrong');
            let correct = 0, present = 0;

            // First pass: Correct position
            for(let i=0; i<slots; i++) {
                if(guess[i] === tempSecret[i]) {
                    results[i] = 'correct'; tempSecret[i] = null; guess[i] = null; correct++;
                }
            }
            // Second pass: Wrong position
            for(let i=0; i<slots; i++) {
                if(guess[i] !== null) {
                    const idx = tempSecret.indexOf(guess[i]);
                    if(idx !== -1) {
                        results[i] = 'present'; tempSecret[idx] = null; present++;
                    }
                }
            }

            // Visual feedback
            results.forEach((res, i) => {
                const el = document.getElementById(`slot-${i}`);
                setTimeout(() => { el.className = `code-slot ${res} flip`; }, i*80);
            });

            // Update Hint
            const hintMsg = correct === slots ? "Access Granted" : `${correct} Correct • ${present} Misplaced`;
            document.getElementById('hint-display').textContent = hintMsg;

            addToHistory([...currentInput], results);
            attempts++;

            if(correct === slots) {
                setTimeout(() => { sounds.win(); endGame(true, "CRACKED"); }, 500);
            } else {
                lives--; updateLives();
                if(lives <= 0) {
                    setTimeout(() => { sounds.lose(); endGame(false, "LOCKED"); }, 500);
                } else {
                    setTimeout(() => { currentInput = []; updateDisplay(); }, 800);
                }
            }
        }

        function addToHistory(guess, res) {
            document.getElementById('history-section').style.display = 'flex';
            const log = document.getElementById('history-log'), row = document.createElement('div');
            row.className = 'history-row';
            guess.forEach((n, i) => {
                const d = document.createElement('div'); d.className = `hist-dot ${res[i]}`; d.textContent = n;
                row.appendChild(d);
            });
            log.insertBefore(row, log.firstChild);
        }

        function endGame(won, title) {
            gameActive = false; clearInterval(timerInterval);
            const ov = document.getElementById('overlay');
            ov.classList.add('show');
            document.getElementById('overlay-emoji').textContent = won ? '🔓' : '🔒';
            document.getElementById('overlay-title').textContent = title;
            document.getElementById('stat-time').textContent = formatTime(totalTime-timeLeft);
            document.getElementById('stat-attempts').textContent = attempts;
            document.getElementById('overlay-code').textContent = won ? '' : `CODE: ${secretCode.join('')}`;
            if(won) {
                const pb = localStorage.getItem(`maruvault_pb_${currentDifficulty}`);
                if(!pb || timeLeft > pb) localStorage.setItem(`maruvault_pb_${currentDifficulty}`, timeLeft);
            }
        }

        loadPBs();
    </script>
</body>
</html>
