<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruVault: Mission Critical</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0e17;
            --surface: #1a1828;
            --surface2: #221f36;
            --border: #2e2a4a;
            --accent: #ff6b35;
            --accent2: #f7c59f;
            --purple: #7c3aed;
            --purple-light: #a78bfa;
            --green: #10d98c;
            --yellow: #fbbf24;
            --red: #f43f5e;
            --text: #e8e6f0;
            --text-muted: #7a748e;
            --correct: #10d98c;
            --present: #fbbf24;
            --wrong: #f43f5e;
            --font-display: 'Space Mono', monospace;
            --font-body: 'Nunito', sans-serif;
            --radius: 16px;
            --transition: 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            height: 100%;
            background: var(--bg);
            font-family: var(--font-body);
            color: var(--text);
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(124,58,237,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 10% 80%, rgba(255,107,53,0.12) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
            pointer-events: none;
            z-index: 0;
        }

        #app {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        #game-container {
            background: var(--surface);
            width: 100%;
            max-width: 420px;
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: 0 0 0 1px rgba(124,58,237,0.15), 0 24px 80px rgba(0,0,0,0.6);
            overflow: hidden;
            position: relative;
        }

        #header {
            background: linear-gradient(135deg, #1a1828 0%, #1e1b34 100%);
            padding: 18px 22px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vault-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #ff8c5a);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 4px 12px rgba(255,107,53,0.4);
            flex-shrink: 0;
        }

        .logo-text {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .logo-sub {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-top: 1px;
        }

        #sound-toggle {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .screen { padding: 20px 22px 22px; }
        #menu-screen { display: flex; flex-direction: column; gap: 0; }
        .menu-intro { text-align: center; margin-bottom: 18px; }
        .menu-intro p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; }

        .diff-label {
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            padding-left: 2px;
        }

        .diff-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }

        .menu-btn {
            padding: 13px 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-family: var(--font-body);
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s ease;
            text-align: left;
            position: relative;
        }

        .menu-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .diff-badge { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }

        .menu-btn[data-diff="beginner"] .diff-badge { background: rgba(16,217,140,0.15); }
        .menu-btn[data-diff="intermediate"] .diff-badge { background: rgba(251,191,36,0.15); }
        .menu-btn[data-diff="hard"] .diff-badge { background: rgba(255,107,53,0.15); }
        .menu-btn[data-diff="veryhard"] .diff-badge { background: rgba(244,63,94,0.15); }

        .menu-btn-title { font-size: 0.95rem; font-weight: 900; font-family: var(--font-display); }
        .menu-btn-meta { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }

        .pb-pill {
            background: rgba(16,217,140,0.1);
            color: var(--green);
            font-size: 0.68rem;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 20px;
            border: 1px solid rgba(16,217,140,0.2);
            white-space: nowrap;
        }

        .pb-pill.empty { background: rgba(122,116,142,0.1); color: var(--text-muted); border-color: var(--border); }

        #game-screen { display: none; flex-direction: column; gap: 14px; }
        #status-bar { display: flex; justify-content: space-between; align-items: center; }
        #lives-display { display: flex; gap: 4px; align-items: center; }
        .heart { font-size: 1.1rem; transition: all 0.3s; }
        .heart.lost { opacity: 0.2; transform: scale(0.7); filter: grayscale(1); }

        #timer-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface2);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        #timer-progress { width: 60px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
        #timer-bar { height: 100%; background: var(--green); transition: width 1s linear; }
        #timer-bar.warn { background: var(--yellow); }
        #timer-bar.danger { background: var(--red); animation: pulse-bar 0.8s infinite; }
        @keyframes pulse-bar { 50% { opacity: 0.5; } }

        #display-screen {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            min-height: 100px;
            align-items: center;
        }

        .code-slot {
            width: clamp(44px, 14vw, 62px);
            height: clamp(62px, 18vw, 80px);
            background: var(--surface);
            border-radius: 14px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            transition: all 0.25s;
        }

        .code-slot.correct { background: rgba(16,217,140,0.15); border-color: var(--correct); color: var(--correct); }
        .code-slot.present { background: rgba(251,191,36,0.15); border-color: var(--present); color: var(--present); }
        .code-slot.wrong { background: rgba(244,63,94,0.12); border-color: var(--wrong); color: var(--wrong); }
        .code-slot.filled { border-color: var(--purple-light); color: var(--purple-light); }

        #keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .key-btn {
            aspect-ratio: 1.15 / 1;
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
        }

        .key-btn.btn-go { background: rgba(16,217,140,0.12); color: var(--green); border-color: rgba(16,217,140,0.3); }
        .key-btn.btn-clear { background: rgba(244,63,94,0.1); color: var(--red); }

        #overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(15,14,23,0.96);
            backdrop-filter: blur(8px);
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px;
            border-radius: 28px;
        }
        #overlay.show { display: flex; }

        .stat-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 8px 14px; text-align: center; }
        .overlay-btns { display: flex; gap: 10px; width: 100%; margin-top: 20px;}
        .overlay-btn { flex: 1; padding: 13px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; }
        .overlay-btn.primary { background: var(--accent); color: white; }

        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface2);
            padding: 10px 20px;
            border-radius: 20px;
            transition: transform 0.3s;
            z-index: 100;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
        
        .flip { animation: flip-in 0.3s ease forwards; }
        @keyframes flip-in { from { transform: rotateX(90deg); } to { transform: rotateX(0); } }
    </style>
</head>
<body>
    <div id="app">
        <div id="game-container">
            <div id="header">
                <div class="logo-group">
                    <div class="vault-icon">🔐</div>
                    <div>
                        <div class="logo-text">MaruVault</div>
                        <div class="logo-sub">Mission Critical</div>
                    </div>
                </div>
                <button id="sound-toggle" onclick="toggleSound()">🔊</button>
            </div>

            <div id="menu-screen" class="screen">
                <div class="menu-intro">
                    <p>Crack the code before time runs out.<br>Green = right place · Yellow = wrong place</p>
                </div>
                <div class="diff-label">Select Difficulty</div>
                <div class="diff-grid">
                    <button class="menu-btn" data-diff="beginner" onclick="initGame('beginner')">
                        <div class="diff-badge">🟢</div>
                        <div class="menu-btn-info">
                            <div class="menu-btn-title">BEGINNER</div>
                            <div class="menu-btn-meta">3 min · 3 digits · 10 lives</div>
                        </div>
                        <div class="pb-pill empty" id="pb-beginner">--</div>
                    </button>
                    <button class="menu-btn" data-diff="intermediate" onclick="initGame('intermediate')">
                        <div class="diff-badge">🟡</div>
                        <div class="menu-btn-info">
                            <div class="menu-btn-title">INTERMEDIATE</div>
                            <div class="menu-btn-meta">2 min · 3 digits · 5 lives</div>
                        </div>
                        <div class="pb-pill empty" id="pb-intermediate">--</div>
                    </button>
                    <button class="menu-btn" data-diff="hard" onclick="initGame('hard')">
                        <div class="diff-badge">🟠</div>
                        <div class="menu-btn-info">
                            <div class="menu-btn-title">HARD</div>
                            <div class="menu-btn-meta">2 min · 4 digits · 5 lives</div>
                        </div>
                        <div class="pb-pill empty" id="pb-hard">--</div>
                    </button>
                    <button class="menu-btn" data-diff="veryhard" onclick="initGame('veryhard')">
                        <div class="diff-badge">🔴</div>
                        <div class="menu-btn-info">
                            <div class="menu-btn-title">VERY HARD</div>
                            <div class="menu-btn-meta">2 min · 5 digits · 5 lives</div>
                        </div>
                        <div class="pb-pill empty" id="pb-veryhard">--</div>
                    </button>
                </div>
            </div>

            <div id="game-screen" class="screen">
                <div id="status-bar">
                    <div id="lives-display"></div>
                    <div id="timer-wrap">
                        <span id="timer-icon">⏱</span>
                        <div id="timer-progress"><div id="timer-bar"></div></div>
                        <div id="timer-display">2:00</div>
                    </div>
                </div>
                <div id="attempt-counter" style="text-align: center; font-size: 0.7rem; color: var(--text-muted);">Attempt 1</div>
                <div id="display-screen"></div>
                <div id="feedback-box" style="background: var(--surface2); padding: 10px; border-radius: 12px; display: flex; align-items: center; gap: 10px;">
                    <div id="feedback-icon">🎯</div>
                    <div id="message" style="font-size: 0.8rem;">Mission Start!</div>
                </div>
                <div id="keypad">
                    <button class="key-btn" onclick="press(1)">1</button>
                    <button class="key-btn" onclick="press(2)">2</button>
                    <button class="key-btn" onclick="press(3)">3</button>
                    <button class="key-btn" onclick="press(4)">4</button>
                    <button class="key-btn" onclick="press(5)">5</button>
                    <button class="key-btn" onclick="press(6)">6</button>
                    <button class="key-btn" onclick="press(7)">7</button>
                    <button class="key-btn" onclick="press(8)">8</button>
                    <button class="key-btn" onclick="press(9)">9</button>
                    <button class="key-btn btn-clear" onclick="handleClear()">⌫</button>
                    <button class="key-btn" onclick="press(0)">0</button>
                    <button class="key-btn btn-go" id="btn-go" onclick="checkCode()" disabled>GO ▶</button>
                </div>
            </div>

            <div id="overlay">
                <div id="overlay-emoji" style="font-size: 3rem;">🎉</div>
                <div id="overlay-title" style="font-size: 1.5rem; font-weight: 800; margin: 10px 0;">VAULT CRACKED!</div>
                <div id="overlay-stats" style="display: flex; gap: 10px;">
                    <div class="stat-chip"><div id="stat-time" class="val">0s</div><div class="lbl">Time</div></div>
                    <div class="stat-chip"><div id="stat-attempts" class="val">0</div><div class="lbl">Tries</div></div>
                </div>
                <div id="overlay-code" style="margin-top: 15px; color: var(--text-muted);"></div>
                <div class="overlay-btns">
                    <button class="overlay-btn primary" onclick="restartGame()">Play Again</button>
                    <button class="overlay-btn" style="background: var(--surface2); color: white;" onclick="showMenu()">Menu</button>
                </div>
            </div>
        </div>
    </div>
    <div id="toast"></div>

    <script>
        let currentInput = [];
        let secretCode = [];
        let attempts = 0;
        let lives = 5;
        let maxLives = 5;
        let timeLeft = 120;
        let totalTime = 120;
        let currentDifficulty = '';
        let gameActive = false;
        let timerInterval;
        let soundOn = true;
        let audioCtx = null;

        const config = {
            beginner:     { time: 180, lives: 10, slots: 3 },
            intermediate: { time: 120, lives: 5,  slots: 3 },
            hard:         { time: 120, lives: 5,  slots: 4 },
            veryhard:     { time: 120, lives: 5,  slots: 5 }
        };

        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function playTone(freq, type = 'sine', duration = 0.08, vol = 0.1) {
            if (!soundOn) return;
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = type;
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.setValueAtTime(vol, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
            osc.start(); osc.stop(ctx.currentTime + duration);
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        function showMenu() {
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById('menu-screen').style.display = 'flex';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('overlay').classList.remove('show');
            loadPBs();
        }

        function loadPBs() {
            Object.keys(config).forEach(diff => {
                const pb = localStorage.getItem(`maruvault_pb_${diff}`);
                const el = document.getElementById(`pb-${diff}`);
                if (el) {
                    el.textContent = pb ? formatTime(parseInt(pb)) + ' left' : '--';
                    el.classList.toggle('empty', !pb);
                }
            });
        }

        function initGame(difficulty) {
            getAudioCtx(); // Initialize audio on user interaction
            currentDifficulty = difficulty;
            const cfg = config[difficulty];
            timeLeft = cfg.time;
            totalTime = cfg.time;
            lives = cfg.lives;
            maxLives = cfg.lives;
            attempts = 0;

            const display = document.getElementById('display-screen');
            display.innerHTML = '';
            for (let i = 0; i < cfg.slots; i++) {
                const slot = document.createElement('div');
                slot.className = 'code-slot empty';
                slot.id = `slot-${i}`;
                slot.textContent = '·';
                display.appendChild(slot);
            }

            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            startGame();
        }

        function startGame() {
            const slotCount = config[currentDifficulty].slots;
            secretCode = Array.from({ length: slotCount }, () => Math.floor(Math.random() * 10));
            currentInput = [];
            gameActive = true;
            updateLivesDisplay();
            updateTimerDisplay();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) endGame(false, 'TIME OUT');
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('timer-display').textContent = formatTime(timeLeft);
            const pct = (timeLeft / totalTime) * 100;
            const bar = document.getElementById('timer-bar');
            bar.style.width = pct + '%';
            bar.className = pct < 15 ? 'danger' : pct < 35 ? 'warn' : '';
        }

        function updateLivesDisplay() {
            const container = document.getElementById('lives-display');
            container.innerHTML = '';
            for (let i = 0; i < maxLives; i++) {
                const h = document.createElement('span');
                h.className = 'heart' + (i >= lives ? ' lost' : '');
                h.textContent = '❤';
                container.appendChild(h);
            }
        }

        function press(num) {
            if (!gameActive) return;
            const maxSlots = config[currentDifficulty].slots;
            if (currentInput.length < maxSlots) {
                playTone(600, 'sine', 0.05);
                currentInput.push(num);
                updateDisplay();
            }
        }

        function handleClear() {
            if (currentInput.length > 0) {
                playTone(300, 'sine', 0.05);
                currentInput.pop();
                updateDisplay();
            }
        }

        function updateDisplay() {
            const maxSlots = config[currentDifficulty].slots;
            for (let i = 0; i < maxSlots; i++) {
                const slot = document.getElementById(`slot-${i}`);
                if (currentInput[i] !== undefined) {
                    slot.textContent = currentInput[i];
                    slot.className = 'code-slot filled';
                } else {
                    slot.textContent = '·';
                    slot.className = 'code-slot empty';
                }
            }
            document.getElementById('btn-go').disabled = currentInput.length < maxSlots;
        }

        function checkCode() {
            const maxSlots = config[currentDifficulty].slots;
            let guess = [...currentInput];
            let tempSecret = [...secretCode];
            let results = new Array(maxSlots).fill('wrong');
            let correctCount = 0;

            // Correct positions
            for (let i = 0; i < maxSlots; i++) {
                if (guess[i] === tempSecret[i]) {
                    results[i] = 'correct';
                    tempSecret[i] = null;
                    guess[i] = null;
                    correctCount++;
                }
            }
            // Wrong positions
            for (let i = 0; i < maxSlots; i++) {
                if (guess[i] !== null) {
                    const idx = tempSecret.indexOf(guess[i]);
                    if (idx !== -1) {
                        results[i] = 'present';
                        tempSecret[idx] = null;
                    }
                }
            }

            results.forEach((res, i) => {
                setTimeout(() => {
                    const slot = document.getElementById(`slot-${i}`);
                    slot.className = `code-slot ${res} flip`;
                }, i * 100);
            });

            attempts++;
            if (correctCount === maxSlots) {
                setTimeout(() => endGame(true, 'VAULT CRACKED!'), 600);
            } else {
                lives--;
                updateLivesDisplay();
                if (lives <= 0) {
                    setTimeout(() => endGame(false, 'LOCKED OUT'), 600);
                } else {
                    setTimeout(() => {
                        currentInput = [];
                        updateDisplay();
                        document.getElementById('message').textContent = `${correctCount} correct, ${results.filter(r=>r==='present').length} misplaced.`;
                    }, 1000);
                }
            }
        }

        function endGame(won, title) {
            gameActive = false;
            clearInterval(timerInterval);
            const overlay = document.getElementById('overlay');
            overlay.classList.add('show');
            document.getElementById('overlay-title').textContent = title;
            document.getElementById('overlay-title').className = won ? 'win' : 'lose';
            document.getElementById('stat-time').textContent = formatTime(totalTime - timeLeft);
            document.getElementById('stat-attempts').textContent = attempts;
            document.getElementById('overlay-code').textContent = won ? '' : `Code was: ${secretCode.join(' ')}`;
            if (won) {
                const currentPB = localStorage.getItem(`maruvault_pb_${currentDifficulty}`);
                if (!currentPB || timeLeft > parseInt(currentPB)) {
                    localStorage.setItem(`maruvault_pb_${currentDifficulty}`, timeLeft);
                }
            }
        }

        function restartGame() { initGame(currentDifficulty); }
        function toggleSound() { soundOn = !soundOn; document.getElementById('sound-toggle').textContent = soundOn ? '🔊' : '🔇'; }

        loadPBs();
    </script>
</body>
</html>
