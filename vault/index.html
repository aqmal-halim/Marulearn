<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaruVault: Code Breaker 🕵️‍♂️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #FFD9C6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        #game-container {
            background: white;
            width: 100%;
            max-width: 380px;
            padding: 20px;
            border-radius: 32px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.06);
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #FF784E;
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        #display-screen {
            background: #F5F3FF;
            border: 3px solid #C4B5FD;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            gap: clamp(8px, 3vw, 15px);
            padding: clamp(15px, 4vw, 25px);
            margin-bottom: 15px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
        }

        .code-slot {
            width: clamp(45px, 15vw, 60px);
            height: clamp(65px, 20vw, 80px);
            background: white;
            border-radius: 12px;
            border-bottom: 4px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.8rem, 8vw, 2.5rem);
            font-weight: 900;
            color: #8B5CF6;
        }

        #feedback-log {
            min-height: 55px;
            margin-bottom: 15px;
            padding: 8px;
            background: #FFFBEB;
            border-radius: 12px;
            color: #B45309;
            font-weight: 700;
            font-size: clamp(0.8rem, 3.5vw, 0.95rem);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(8px, 2.5vw, 12px);
            width: 100%;
        }

        button {
            aspect-ratio: 1 / 1; 
            width: 100%;
            font-size: clamp(1.2rem, 6vw, 1.6rem);
            font-weight: 900;
            border: none;
            border-radius: 16px;
            background: #EBF5FF;
            color: #5BBAFF;
            border-bottom: clamp(3px, 1vw, 5px) solid #B8DBFF;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
        }

        button:active {
            transform: translateY(3px);
            border-bottom-width: 1px;
        }

        .btn-red {
            background: #FFF1F1;
            color: #FF5E5E;
            border-bottom-color: #FFD1D1;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
        }

        .btn-green {
            background: #EDFFF5;
            color: #2ED573;
            border-bottom-color: #9FE8C0;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>🔓 MARU-VAULT</h1>
        
        <div id="display-screen">
            <div class="code-slot" id="slot-0">?</div>
            <div class="code-slot" id="slot-1">?</div>
            <div class="code-slot" id="slot-2">?</div>
        </div>
        
        <div id="feedback-log">
            <p id="message">Ready to crack the code? Enter 3 digits!</p>
        </div>

        <div id="keypad">
            <button onclick="press(1)">1</button>
            <button onclick="press(2)">2</button>
            <button onclick="press(3)">3</button>
            <button onclick="press(4)">4</button>
            <button onclick="press(5)">5</button>
            <button onclick="press(6)">6</button>
            <button onclick="press(7)">7</button>
            <button onclick="press(8)">8</button>
            <button onclick="press(9)">9</button>
            <button onclick="clearCode()" class="btn-red">CLR</button>
            <button onclick="press(0)">0</button>
            <button onclick="checkCode()" class="btn-green">GO</button>
        </div>
    </div>

    <script>
        let currentInput = [];
        let secretCode = [];
        let attempts = 0;

        // Generate a random 3-digit code
        function generateNewCode() {
            secretCode = [
                Math.floor(Math.random() * 10),
                Math.floor(Math.random() * 10),
                Math.floor(Math.random() * 10)
            ];
            attempts = 0;
            console.log("Secret Code is:", secretCode.join('')); 
        }

        function press(num) {
            // If user starts typing again after a wrong guess, clear slots automatically
            if (currentInput.length === 3) {
                currentInput = [];
            }
            
            if (currentInput.length < 3) {
                currentInput.push(num);
                updateDisplay();
            }
        }

        function clearCode() {
            currentInput = [];
            updateDisplay();
            const msg = document.getElementById('message');
            msg.innerText = "Ready to try again?";
            msg.style.color = "#B45309";
        }

        function updateDisplay() {
            for (let i = 0; i < 3; i++) {
                const slot = document.getElementById(`slot-${i}`);
                slot.innerText = currentInput[i] !== undefined ? currentInput[i] : "?";
                slot.style.color = currentInput[i] !== undefined ? "#FF784E" : "#8B5CF6";
            }
        }

        function checkCode() {
            if (currentInput.length < 3) {
                document.getElementById('message').innerText = "Enter all 3 digits first!";
                return;
            }

            const msgArea = document.getElementById('message');
            const guessStr = currentInput.join('');
            const secretStr = secretCode.join('');

            if (guessStr === secretStr) {
                msgArea.innerHTML = "🎉 <b>CRACKED!</b> You opened the vault!";
                msgArea.style.color = "#2ED573";
                setTimeout(() => {
                    generateNewCode();
                    clearCode();
                }, 4000);
            } else {
                attempts++;
                provideSmartHint(currentInput, secretCode);
            }
        }

        function provideSmartHint(guess, secret) {
            const msgArea = document.getElementById('message');
            const guessSum = guess.reduce((a, b) => a + b, 0);
            const secretSum = secret.reduce((a, b) => a + b, 0);
            
            // Cycle through different hints to keep them learning
            let hintType = attempts % 3;

            if (hintType === 1) {
                // Hint 1: Addition
                if (guessSum < secretSum) {
                    msgArea.innerText = `💡 Hint: The sum of the digits is HIGHER than ${guessSum}.`;
                } else if (guessSum > secretSum) {
                    msgArea.innerText = `💡 Hint: The sum of the digits is LOWER than ${guessSum}.`;
                } else {
                    msgArea.innerText = `💡 Hint: The sum is exactly ${guessSum}, but the numbers are wrong!`;
                }
            } else if (hintType === 2) {
                // Hint 2: Even/Odd count
                const evens = secret.filter(n => n % 2 === 0).length;
                msgArea.innerText = `🕵️‍♂️ Spy Tip: There are ${evens} even numbers in the code.`;
            } else {
                // Hint 3: Placement
                let correctPos = 0;
                for(let i=0; i<3; i++) {
                    if(guess[i] === secret[i]) correctPos++;
                }
                
                if(correctPos > 0) {
                    msgArea.innerText = `🎯 Good job! ${correctPos} number(s) are in the CORRECT spot.`;
                } else {
                    msgArea.innerText = "❌ None of those numbers are in the right spot!";
                }
            }
        }

        // Initialize game
        generateNewCode();
    </script>
</body>
</html>
