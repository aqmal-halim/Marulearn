<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruVault: Kids Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Playful & High-Contrast Kids Palette */
            --bg: #fdf4ff; /* Soft Lavender Tint */
            --surface: #ffffff;
            --surface2: #fff7ed;
            --border: #e2e8f0;
            --accent: #ff477e; /* Bright Pink */
            --accent2: #00d2ff; /* Sky Blue */
            --purple: #a855f7;
            --green: #4ade80; /* Lime Green */
            --yellow: #fbbf24;
            --red: #ff5a5f;
            --text: #2d3436;
            --text-muted: #636e72;
            --correct: #4ade80;
            --present: #ffb142;
            --wrong: #ff5252;
            --font-display: 'Nunito', sans-serif;
            --font-body: 'Nunito', sans-serif;
            --radius: 24px;
            --transition: 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        }

        html, body {
            height: 100%;
            width: 100%;
            background: var(--bg);
            font-family: var(--font-body);
            color: var(--text);
            overflow: hidden;
        }

        /* Decorative Bubbles Background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 10% 10%, rgba(255, 71, 126, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 20%, rgba(0, 210, 255, 0.1) 0%, transparent 25%),
                radial-gradient(circle at 50% 90%, rgba(168, 85, 247, 0.1) 0%, transparent 30%);
            pointer-events: none;
            z-index: 0;
        }

        #app {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            background: var(--surface);
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (min-height: 700px) and (min-width: 500px) {
            #game-container {
                height: 92vh;
                width: 440px;
                border-radius: 50px;
                border: 12px solid #ffffff;
                box-shadow: 0 30px 60px rgba(255, 71, 126, 0.15);
            }
        }

        #header {
            background: #ffffff;
            padding: 20px;
            border-bottom: 4px solid #f8fafc;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo-group { display: flex; align-items: center; gap: 12px; }
        .vault-icon {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, var(--accent), #ff8fa3);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; box-shadow: 0 4px 0px #d6336c;
        }

        .logo-text { font-size: 1.3rem; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }
        .logo-sub { font-size: 0.7rem; color: var(--accent2); font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        .header-controls { display: flex; gap: 10px; }

        #sound-toggle, #back-btn {
            background: #f1f5f9; border: none;
            color: var(--text); width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            box-shadow: 0 3px 0 #cbd5e1;
        }
        #sound-toggle:active, #back-btn:active { transform: translateY(2px); box-shadow: none; }

        #back-btn { display: none; background: #ffe4e6; color: var(--accent); box-shadow: 0 3px 0 #fecaca; }

        .screen { padding: 25px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        #menu-screen { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .menu-intro { text-align: center; margin-bottom: 15px; }
        .menu-intro p { font-size: 1rem; color: var(--text-muted); font-weight: 700; line-height: 1.4; }

        .diff-label { font-size: 0.85rem; font-weight: 900; text-transform: uppercase; color: var(--accent2); margin-bottom: 8px; text-align: center; letter-spacing: 1px; }
        .diff-grid { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }

        .menu-btn {
            padding: 18px; border-radius: 24px; border: 3px solid #f1f5f9;
            background: #ffffff; color: var(--text); cursor: pointer;
            display: flex; align-items: center; gap: 18px; transition: all 0.2s ease;
            box-shadow: 0 6px 0 #f1f5f9;
        }
        .menu-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #f1f5f9; }

        .diff-badge { width: 50px; height: 50px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0; background: #fdf4ff; }
        .menu-btn-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 2px; }
        .menu-btn-meta { font-size: 0.8rem; color: var(--text-muted); font-weight: 700; }
        .pb-pill { background: #dcfce7; color: #16a34a; font-size: 0.75rem; padding: 5px 12px; border-radius: 20px; font-weight: 900; margin-left: auto; }
        .pb-pill.empty { background: #f1f5f9; color: var(--text-muted); }

        .home-link {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 18px; border-radius: 24px; border: none;
            color: #ffffff; font-weight: 900; font-size: 1rem; text-decoration: none; margin-top: auto;
            background: #6366f1; box-shadow: 0 6px 0 #4338ca;
        }

        #game-screen { display: none; flex-direction: column; height: 100%; justify-content: space-between; }
        
        #status-bar { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; margin-bottom: 20px; }
        #lives-display { display: flex; gap: 8px; }
        .heart { font-size: 1.5rem; color: var(--red); filter: drop-shadow(0 3px 0 #ffe4e6); }
        .heart.lost { opacity: 0.15; filter: grayscale(1); }

        #timer-wrap {
            display: flex; align-items: center; gap: 10px;
            background: #fff; padding: 10px 16px;
            border-radius: 30px; border: 3px solid #f1f5f9;
        }
        #timer-display { font-size: 1rem; font-weight: 900; min-width: 50px; color: var(--text); }
        #timer-progress { width: 70px; height: 12px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
        #timer-bar { height: 100%; background: var(--green); transition: width 1s linear; }

        #attempt-counter { text-align: center; font-size: 0.9rem; color: var(--accent); text-transform: uppercase; font-weight: 900; margin-bottom: 12px; }

        #display-screen {
            background: #fffaf0; border: 4px dashed #ffe4e6;
            border-radius: 30px; display: flex; justify-content: center;
            gap: 15px; padding: 25px; min-height: 110px; align-items: center;
            flex-shrink: 0; margin-bottom: 20px;
        }

        .code-slot {
            width: 55px; height: 75px; background: #ffffff;
            border-radius: 20px; border: 4px solid #f1f5f9;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 900; color: #e2e8f0;
            box-shadow: 0 4px 0 #f1f5f9;
        }

        .code-slot.filled { border-color: var(--accent); color: var(--text); box-shadow: 0 4px 0 #ffdae5; }
        .code-slot.correct { background: #dcfce7; border-color: var(--correct); color: #15803d; box-shadow: 0 4px 0 #bbf7d0; }
        .code-slot.present { background: #fef3c7; border-color: var(--present); color: #b45309; box-shadow: 0 4px 0 #fde68a; }
        .code-slot.wrong { background: #ffe4e6; border-color: var(--red); color: #b91c1c; box-shadow: 0 4px 0 #fecaca; }

        #feedback-box { 
            background: #fdf4ff; border: 3px solid #fae8ff; 
            border-radius: 30px; padding: 18px; display: flex; 
            flex-direction: column; gap: 8px; min-height: 125px; flex-shrink: 0;
            margin-bottom: 20px; text-align: center;
        }
        .feedback-header { font-size: 0.8rem; font-weight: 900; color: var(--purple); text-transform: uppercase; letter-spacing: 1px; }
        #message { font-size: 1.1rem; font-weight: 800; line-height: 1.4; color: var(--text); }
        
        #last-guess-wrap {
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: auto;
            padding-top: 12px; border-top: 3px solid #fae8ff;
        }
        .lg-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 900; text-transform: uppercase; }
        .lg-box { display: flex; gap: 8px; }
        .lg-slot {
            width: 28px; height: 28px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; font-weight: 900; color: white;
        }

        #legend { display: flex; justify-content: center; gap: 18px; margin-bottom: 20px; flex-shrink: 0; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-muted); font-weight: 800; }
        .legend-dot { width: 14px; height: 14px; border-radius: 5px; }
        .legend-dot.correct { background: var(--correct); }
        .legend-dot.present { background: var(--present); }
        .legend-dot.wrong { background: var(--red); }

        #keypad { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 12px; flex-shrink: 0;
        }
        .key-btn { 
            height: 60px; font-size: 1.8rem; font-weight: 900; border-radius: 22px; border: none; 
            background: #ffffff; color: var(--text); cursor: pointer;
            box-shadow: 0 5px 0 #f1f5f9; border: 2px solid #f1f5f9;
        }
        .key-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #f1f5f9; }
        
        .btn-clear { background: #ffe4e6; color: var(--red); border-color: #fecaca; box-shadow: 0 5px 0 #fecaca; }
        .btn-clear:active { box-shadow: 0 2px 0 #fecaca; }

        .btn-go { background: #dcfce7; color: #16a34a; border-color: #bbf7d0; box-shadow: 0 5px 0 #bbf7d0; font-size: 1.1rem; }
        .btn-go:active { box-shadow: 0 2px 0 #bbf7d0; }
        .btn-go:disabled { opacity: 0.4; box-shadow: none; transform: none; border-color: #f1f5f9; }

        #overlay {
            display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px); z-index: 10; flex-direction: column;
            align-items: center; justify-content: center; padding: 40px; gap: 25px;
        }
        #overlay.show { display: flex; }
        .overlay-emoji { font-size: 5.5rem; filter: drop-shadow(0 15px 15px rgba(255, 71, 126, 0.2)); }
        #overlay-title { font-size: 2.2rem; font-weight: 900; color: var(--text); text-align: center; line-height: 1; }
        
        #overlay-stats { display: flex; gap: 15px; width: 100%; justify-content: center; }
        .stat-chip { background: #fffaf0; border: 3px solid #ffedd5; border-radius: 24px; padding: 18px; text-align: center; flex: 1; }
        .stat-chip .val { font-size: 1.5rem; font-weight: 900; color: var(--accent); margin-bottom: 4px; }
        .stat-chip .lbl { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 900; }
        
        .overlay-btns { display: flex; flex-direction: column; gap: 15px; width: 100%; margin-top: 15px; }
        .overlay-btn { width: 100%; padding: 20px; border-radius: 25px; border: none; font-weight: 900; cursor: pointer; font-size: 1.2rem; }
        .overlay-btn.primary { background: var(--accent); color: white; box-shadow: 0 8px 0 #d6336c; }
        .overlay-btn.primary:active { transform: translateY(4px); box-shadow: 0 4px 0 #d6336c; }
        .overlay-btn.secondary { background: #f1f5f9; color: var(--text-muted); box-shadow: 0 5px 0 #cbd5e1; }
        .overlay-btn.secondary:active { transform: translateY(3px); box-shadow: 0 2px 0 #cbd5e1; }

        #toast { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%) translateY(100px); background: #2d3436; color: white; font-size: 1rem; padding: 14px 28px; border-radius: 50px; z-index: 100; transition: transform 0.3s; font-weight: 800; }
        #toast.show { transform: translateX(-50%) translateY(0); }

        @keyframes flip-in { from { transform: rotateX(90deg); opacity: 0; } to { transform: rotateX(0deg); opacity: 1; } }
        .flip { animation: flip-in 0.35s ease forwards; }
    </style>
</head>
<body>
    <div id="app">
        <div id="game-container">
            <div id="header">
                <div class="logo-group">
                    <div class="vault-icon">⭐</div>
                    <div>
                        <div class="logo-text">MaruVault</div>
                        <div class="logo-sub">Puzzle Fun!</div>
                    </div>
                </div>
                <div class="header-controls">
                    <button id="back-btn" onclick="showMenu()">⬅</button>
                    <button id="sound-toggle" onclick="toggleSound()">🔊</button>
                </div>
            </div>

            <div id="menu-screen" class="screen">
                <div class="menu-intro">
                    <p>Can you guess the secret code?<br>Pick a level to start your adventure!</p>
                </div>
                <div class="diff-label">Choose Your Quest</div>
                <div class="diff-grid">
                    <button class="menu-btn" onclick="initGame('beginner')">
                        <div class="diff-badge">🌱</div>
                        <div>
                            <div class="menu-btn-title">BEGINNER</div>
                            <div class="menu-btn-meta">3 Digits · Super Easy</div>
                        </div>
                        <div class="pb-pill empty" id="pb-beginner">--</div>
                    </button>
                    <button class="menu-btn" onclick="initGame('intermediate')">
                        <div class="diff-badge">🌟</div>
                        <div>
                            <div class="menu-btn-title">INTERMEDIATE</div>
                            <div class="menu-btn-meta">3 Digits · Fun Challenge</div>
                        </div>
                        <div class="pb-pill empty" id="pb-intermediate">--</div>
                    </button>
                    <button class="menu-btn" onclick="initGame('hard')">
                        <div class="diff-badge">💎</div>
                        <div>
                            <div class="menu-btn-title">HARD</div>
                            <div class="menu-btn-meta">4 Digits · Logic Pro</div>
                        </div>
                        <div class="pb-pill empty" id="pb-hard">--</div>
                    </button>
                    <button class="menu-btn" onclick="initGame('veryhard')">
                        <div class="diff-badge">👑</div>
                        <div>
                            <div class="menu-btn-title">VERY HARD</div>
                            <div class="menu-btn-meta">5 Digits · Math Master</div>
                        </div>
                        <div class="pb-pill empty" id="pb-veryhard">--</div>
                    </button>
                </div>
                <a href="https://aqmal-halim.github.io/Marulearn/index.html" class="home-link">🏠 Back to Main Menu</a>
            </div>

            <div id="game-screen" class="screen">
                <div id="status-bar">
                    <div id="lives-display"></div>
                    <div id="timer-wrap">
                        <div id="timer-progress"><div id="timer-bar"></div></div>
                        <div id="timer-display">2:00</div>
                    </div>
                </div>
                <div id="attempt-counter">Round 1</div>
                <div id="display-screen"></div>
                
                <div id="legend">
                    <div class="legend-item"><div class="legend-dot correct"></div>Yes!</div>
                    <div class="legend-item"><div class="legend-dot present"></div>Almost</div>
                    <div class="legend-item"><div class="legend-dot wrong"></div>Not Yet</div>
                </div>

                <div id="feedback-box">
                    <div class="feedback-header" id="hint-header">Hint Station</div>
                    <div id="message">Type a code to start!</div>
                    <div id="last-guess-wrap" style="display: none;">
                        <span class="lg-label">Last Try:</span>
                        <div id="lg-container" class="lg-box"></div>
                    </div>
                </div>

                <div id="keypad">
                    <button class="key-btn" onclick="press(1)">1</button>
                    <button class="key-btn" onclick="press(2)">2</button>
                    <button class="key-btn" onclick="press(3)">3</button>
                    <button class="key-btn" onclick="press(4)">4</button>
                    <button class="key-btn" onclick="press(5)">5</button>
                    <button class="key-btn" onclick="press(6)">6</button>
                    <button class="key-btn" onclick="press(7)">7</button>
                    <button class="key-btn" onclick="press(8)">8</button>
                    <button class="key-btn" onclick="press(9)">9</button>
                    <button class="key-btn btn-clear" onclick="handleClear()">⌫</button>
                    <button class="key-btn" onclick="press(0)">0</button>
                    <button class="key-btn btn-go" onclick="checkCode()" id="btn-go" disabled>CHECK</button>
                </div>
            </div>

            <div id="overlay">
                <div class="overlay-emoji" id="overlay-emoji">🎉</div>
                <div id="overlay-title">YOU WIN!</div>
                <div id="overlay-stats">
                    <div class="stat-chip"><div class="val" id="stat-time">0:00</div><div class="lbl">Time</div></div>
                    <div class="stat-chip"><div class="val" id="stat-attempts">0</div><div class="lbl">Tries</div></div>
                    <div class="stat-chip"><div class="val" id="stat-lives">0</div><div class="lbl">Hearts</div></div>
                </div>
                <div id="overlay-code" style="font-weight: 800; color: var(--text-muted); font-size: 1rem; margin-top: 5px;"></div>
                <div class="overlay-btns">
                    <button class="overlay-btn primary" onclick="restartGame()">Play Again!</button>
                    <button class="overlay-btn secondary" onclick="showMenu()">Main Menu</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let currentInput = [], secretCode = [], attempts = 0, lives = 5, maxLives = 5, timeLeft = 120, totalTime = 120, currentDifficulty = '', gameActive = false, timerInterval, soundOn = true;
        const config = { beginner: { time: 180, lives: 10, slots: 3 }, intermediate: { time: 120, lives: 5, slots: 3 }, hard: { time: 120, lives: 5, slots: 4 }, veryhard: { time: 120, lives: 5, slots: 5 } };
        
        let audioCtx = null;
        function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
        function playTone(freq, type = 'sine', duration = 0.08, vol = 0.1) { if (!soundOn) return; try { const ctx = getAudioCtx(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime); gain.gain.setValueAtTime(vol, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration); osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration); } catch(e) {} }
        const sounds = { keyPress: () => playTone(500, 'sine', 0.05, 0.05), backspace: () => playTone(300, 'sine', 0.06, 0.05), submit: () => playTone(440, 'sine', 0.1, 0.08), correct: () => playTone(880, 'sine', 0.2, 0.08), present: () => playTone(480, 'sine', 0.12, 0.08), wrong: () => playTone(200, 'sine', 0.15, 0.1), win: () => { playTone(523, 'sine', 0.1); setTimeout(() => playTone(659, 'sine', 0.1), 100); setTimeout(() => playTone(783, 'sine', 0.3), 200); }, lose: () => playTone(150, 'sawtooth', 0.5, 0.1) };

        function formatTime(s) { const m = Math.floor(s / 60); const sec = s % 60; return `${m}:${sec.toString().padStart(2, '0')}`; }
        function toggleSound() { soundOn = !soundOn; document.getElementById('sound-toggle').textContent = soundOn ? '🔊' : '🔇'; }

        function loadPBs() { 
            Object.keys(config).forEach(diff => { 
                const pb = localStorage.getItem(`maruvault_pb_${diff}`); 
                const el = document.getElementById(`pb-${diff}`); 
                if (el) el.textContent = pb ? formatTime(parseInt(pb)) + ' left' : '--'; 
            }); 
        }

        function showMenu() { 
            gameActive = false; clearInterval(timerInterval); 
            document.getElementById('menu-screen').style.display = 'flex'; 
            document.getElementById('game-screen').style.display = 'none'; 
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('overlay').classList.remove('show'); 
            loadPBs(); 
        }

        function initGame(difficulty) {
            currentDifficulty = difficulty;
            const cfg = config[difficulty];
            timeLeft = cfg.time; totalTime = cfg.time;
            lives = cfg.lives; maxLives = cfg.lives;
            attempts = 0; currentInput = [];
            
            const display = document.getElementById('display-screen');
            display.innerHTML = '';
            for (let i = 0; i < cfg.slots; i++) {
                const slot = document.createElement('div');
                slot.className = 'code-slot empty';
                slot.id = `slot-${i}`;
                slot.textContent = '?';
                display.appendChild(slot);
            }

            secretCode = Array.from({ length: cfg.slots }, () => Math.floor(Math.random() * 10));
            
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('back-btn').style.display = 'flex';
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('last-guess-wrap').style.display = 'none';
            
            gameActive = true;
            updateLivesDisplay();
            updateTimerDisplay();
            updateAttemptCounter();
            updateGoButton();
            document.getElementById('hint-header').textContent = "Hint Station";
            document.getElementById('message').textContent = "Type a code to start!";
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) endGame(false, 'TIME RAN OUT!');
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('timer-display').textContent = formatTime(timeLeft);
            const pct = (timeLeft / totalTime) * 100;
            const bar = document.getElementById('timer-bar');
            bar.style.width = pct + '%';
            bar.style.background = pct <= 20 ? 'var(--red)' : (pct <= 40 ? 'var(--yellow)' : 'var(--green)');
        }

        function updateLivesDisplay() {
            const container = document.getElementById('lives-display');
            container.innerHTML = '';
            for (let i = 0; i < maxLives; i++) {
                const h = document.createElement('span');
                h.className = 'heart' + (i >= lives ? ' lost' : '');
                h.textContent = '❤';
                container.appendChild(h);
            }
        }

        function updateAttemptCounter() { document.getElementById('attempt-counter').textContent = `Round ${attempts + 1}`; }

        function press(num) {
            if (!gameActive || currentInput.length >= config[currentDifficulty].slots) return;
            sounds.keyPress();
            currentInput.push(num);
            updateDisplay();
            updateGoButton();
        }

        function handleClear() {
            if (!gameActive || currentInput.length === 0) return;
            sounds.backspace();
            currentInput.pop();
            updateDisplay();
            updateGoButton();
        }

        function updateGoButton() { document.getElementById('btn-go').disabled = currentInput.length < config[currentDifficulty].slots || !gameActive; }

        function updateDisplay() {
            const max = config[currentDifficulty].slots;
            for (let i = 0; i < max; i++) {
                const slot = document.getElementById(`slot-${i}`);
                if (currentInput[i] !== undefined) {
                    slot.textContent = currentInput[i];
                    slot.className = 'code-slot filled';
                } else {
                    slot.textContent = '?';
                    slot.className = 'code-slot empty';
                }
            }
        }

        function updateLastGuessDisplay(guessArr, resultsArr) {
            const wrap = document.getElementById('last-guess-wrap');
            const container = document.getElementById('lg-container');
            container.innerHTML = '';
            guessArr.forEach((num, i) => {
                const slot = document.createElement('div');
                slot.className = `lg-slot`;
                slot.style.background = `var(--${resultsArr[i]})`;
                slot.textContent = num;
                container.appendChild(slot);
            });
            wrap.style.display = 'flex';
        }

        function generateMathHint() {
            const sum = secretCode.reduce((a, b) => a + b, 0);
            const evens = secretCode.filter(n => n % 2 === 0).length;
            const hintPool = [
                `All numbers added together = ${sum}.`,
                `There are ${evens} even numbers!`,
                `There are ${secretCode.length - evens} odd numbers!`,
                `The first number is ${secretCode[0] > 4 ? 'big (> 4)' : 'small (≤ 4)'}.`,
                `The last number is ${secretCode[secretCode.length-1] % 2 === 0 ? 'even' : 'odd'}.`
            ];
            return hintPool[Math.floor(Math.random() * hintPool.length)];
        }

        function checkCode() {
            const max = config[currentDifficulty].slots;
            const originalGuess = [...currentInput];
            let guess = [...currentInput];
            let tempSecret = [...secretCode];
            let results = new Array(max).fill('wrong');
            let correctCount = 0;

            for (let i = 0; i < max; i++) {
                if (guess[i] === tempSecret[i]) {
                    results[i] = 'correct';
                    tempSecret[i] = null;
                    guess[i] = null;
                    correctCount++;
                }
            }

            for (let i = 0; i < max; i++) {
                if (guess[i] !== null) {
                    const idx = tempSecret.indexOf(guess[i]);
                    if (idx !== -1) {
                        results[i] = 'present';
                        tempSecret[idx] = null;
                    }
                }
            }

            for (let i = 0; i < max; i++) {
                const slot = document.getElementById(`slot-${i}`);
                setTimeout(() => {
                    slot.className = `code-slot ${results[i]} flip`;
                    if (results[i] === 'correct') sounds.correct();
                }, i * 80);
            }

            attempts++;

            if (correctCount === max) {
                setTimeout(() => { sounds.win(); endGame(true, 'YOU DID IT!'); }, max * 100);
            } else {
                lives--;
                updateLivesDisplay();
                if (lives <= 0) {
                    setTimeout(() => { sounds.lose(); endGame(false, 'STAY POSITIVE!'); }, max * 100);
                } else {
                    sounds.wrong();
                    setTimeout(() => {
                        updateLastGuessDisplay(originalGuess, results);
                        document.getElementById('hint-header').textContent = "New Logic Hint:";
                        document.getElementById('message').textContent = generateMathHint();
                        currentInput = [];
                        updateDisplay();
                        updateGoButton();
                        updateAttemptCounter();
                    }, 600);
                }
            }
        }

        function endGame(won, title) {
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById('overlay-emoji').textContent = won ? '🏆' : '🎈';
            document.getElementById('overlay-title').textContent = title;
            document.getElementById('stat-time').textContent = formatTime(totalTime - timeLeft);
            document.getElementById('stat-attempts').textContent = attempts;
            document.getElementById('stat-lives').textContent = lives;
            document.getElementById('overlay-code').textContent = won ? 'You solved it!' : `The code was: ${secretCode.join(' ')}`;
            document.getElementById('overlay').classList.add('show');
            if (won) {
                const key = `maruvault_pb_${currentDifficulty}`;
                const currentPB = localStorage.getItem(key);
                if (!currentPB || timeLeft > parseInt(currentPB)) localStorage.setItem(key, timeLeft);
            }
        }

        function restartGame() { initGame(currentDifficulty); }
        window.onload = loadPBs;
    </script>
</body>
</html>
