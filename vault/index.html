            <div class="diff-label">Pick a Challenge 🎯</div>
            <div class="diff-grid">

                <button class="menu-btn" onclick="initGame('intermediate')">

        <div id="game-screen" class="screen">

            <div id="legend">
                <div class="legend-item"><div class="legend-dot correct"></div>Correct</div>
                <div class="legend-item"><div class="legend-dot present"></div>Mix-up</div>

            <div id="feedback-box">

            <div id="keypad">
                <button class="key-btn" onclick="press(1)">1</button>
                <button class="key-btn" onclick="press(2)">2</button>
                <button class="key-btn" onclick="press(3)">3</button>
                <button class="key-btn" onclick="press(4)">4</button>
                <button class="key-btn" onclick="press(5)">5</button>
                <button class="key-btn" onclick="press(6)">6</button>
                <button class="key-btn" onclick="press(7)">7</button>
                <button class="key-btn" onclick="press(8)">8</button>
                <button class="key-btn" onclick="press(9)">9</button>
                <button class="key-btn btn-clear" onclick="handleClear()">⌫</button>
                <button class="key-btn" onclick="press(0)">0</button>
                <button class="key-btn btn-go" onclick="checkCode()" id="btn-go" disabled>CHECK</button>

                <div class="stat-chip"><div class="val" id="stat-attempts">0</div><div class="lbl">Tries</div></div>
                <div class="stat-chip"><div class="val" id="stat-lives">0</div><div class="lbl">Hearts</div></div>

<div id="toast"></div>

<script>
    let currentInput = [], secretCode = [], attempts = 0, lives = 5, maxLives = 5, timeLeft = 120, totalTime = 120, currentDifficulty = '', gameActive = false, timerInterval, soundOn = true;
    const config = { beginner: { time: 180, lives: 10, slots: 3 }, intermediate: { time: 120, lives: 5, slots: 3 }, hard: { time: 120, lives: 5, slots: 4 }, veryhard: { time: 120, lives: 5, slots: 5 } };
    
    let audioCtx = null;
    function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
    function playTone(freq, type = 'sine', duration = 0.08, vol = 0.1) { if (!soundOn) return; try { const ctx = getAudioCtx(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime); gain.gain.setValueAtTime(vol, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration); osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration); } catch(e) {} }
    const sounds = { keyPress: () => playTone(500, 'sine', 0.05, 0.05), backspace: () => playTone(300, 'sine', 0.06, 0.05), submit: () => playTone(440, 'sine', 0.1, 0.08), correct: () => playTone(880, 'sine', 0.2, 0.08), present: () => playTone(480, 'sine', 0.12, 0.08), wrong: () => playTone(200, 'sine', 0.15, 0.1), win: () => { playTone(523, 'sine', 0.1); setTimeout(() => playTone(659, 'sine', 0.1), 100); setTimeout(() => playTone(783, 'sine', 0.3), 200); }, lose: () => playTone(150, 'sawtooth', 0.5, 0.1) };

    function formatTime(s) { const m = Math.floor(s / 60); const sec = s % 60; return `${m}:${sec.toString().padStart(2, '0')}`; }
    function toggleSound() { soundOn = !soundOn; document.getElementById('sound-toggle').textContent = soundOn ? '🔊' : '🔇'; }

    function loadPBs() { 
        Object.keys(config).forEach(diff => { 
            const pb = localStorage.getItem(`maruvault_pb_${diff}`); 
            const el = document.getElementById(`pb-${diff}`); 
            if (el) el.textContent = pb ? formatTime(parseInt(pb)) + ' left' : '--'; 
        }); 
    }

    function showMenu() { 
        gameActive = false; clearInterval(timerInterval); 
        document.getElementById('menu-screen').style.display = 'flex'; 
        document.getElementById('game-screen').style.display = 'none'; 
        document.getElementById('back-btn').style.display = 'none';
        document.getElementById('overlay').classList.remove('show'); 
        loadPBs(); 
    }

    function initGame(difficulty) {
        currentDifficulty = difficulty;
        const cfg = config[difficulty];
        timeLeft = cfg.time; totalTime = cfg.time;
        lives = cfg.lives; maxLives = cfg.lives;
        attempts = 0; currentInput = [];
        
        const display = document.getElementById('display-screen');
        display.innerHTML = '';
        for (let i = 0; i < cfg.slots; i++) {
            const slot = document.createElement('div');
            slot.className = 'code-slot empty';
            slot.id = `slot-${i}`;
            slot.textContent = '?';
            display.appendChild(slot);
        }

        secretCode = Array.from({ length: cfg.slots }, () => Math.floor(Math.random() * 10));
        
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        document.getElementById('back-btn').style.display = 'flex';
        document.getElementById('overlay').classList.remove('show');
        document.getElementById('last-guess-wrap').style.display = 'none';
        
        gameActive = true;
        updateLivesDisplay();
        updateTimerDisplay();
        updateAttemptCounter();
        updateGoButton();
        document.getElementById('hint-header').textContent = "✨ Hint Station";
        document.getElementById('message').textContent = "Type a code to start!";
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) endGame(false, 'TIME RAN OUT!');
        }, 1000);
    }

    function updateTimerDisplay() {
        document.getElementById('timer-display').textContent = formatTime(timeLeft);
        const pct = (timeLeft / totalTime) * 100;
        const bar = document.getElementById('timer-bar');
        bar.style.width = pct + '%';
        bar.style.background = pct <= 20 ? 'var(--red)' : (pct <= 40 ? 'var(--yellow)' : 'var(--green)');
    }

    function updateLivesDisplay() {
        const container = document.getElementById('lives-display');
        container.innerHTML = '';
        for (let i = 0; i < maxLives; i++) {
            const h = document.createElement('span');
            h.className = 'heart' + (i >= lives ? ' lost' : '');
            h.textContent = '❤';
            container.appendChild(h);
        }
    }

    function updateAttemptCounter() { document.getElementById('attempt-counter').textContent = `Round ${attempts + 1} 🎯`; }

    function press(num) {
        if (!gameActive || currentInput.length >= config[currentDifficulty].slots) return;
        sounds.keyPress();
        currentInput.push(num);
        updateDisplay();
        updateGoButton();
    }

    function handleClear() {
        if (!gameActive || currentInput.length === 0) return;
        sounds.backspace();
        currentInput.pop();
        updateDisplay();
        updateGoButton();
    }

    function updateGoButton() { document.getElementById('btn-go').disabled = currentInput.length < config[currentDifficulty].slots || !gameActive; }

    function updateDisplay() {
        const max = config[currentDifficulty].slots;
        for (let i = 0; i < max; i++) {
            const slot = document.getElementById(`slot-${i}`);
            if (currentInput[i] !== undefined) {
                slot.textContent = currentInput[i];
                slot.className = 'code-slot filled';
            } else {
                slot.textContent = '?';
                slot.className = 'code-slot empty';
            }
        }
    }

    function updateLastGuessDisplay(guessArr, resultsArr) {
        const wrap = document.getElementById('last-guess-wrap');
        const container = document.getElementById('lg-container');
        container.innerHTML = '';
        guessArr.forEach((num, i) => {
            const slot = document.createElement('div');
            slot.className = `lg-slot`;
            slot.style.background = `var(--${resultsArr[i]})`;
            slot.textContent = num;
            container.appendChild(slot);
        });
        wrap.style.display = 'flex';
    }

    function generateMathHint() {
        const sum = secretCode.reduce((a, b) => a + b, 0);
        const evens = secretCode.filter(n => n % 2 === 0).length;
        const hintPool = [
            `All numbers added together = ${sum}.`,
            `There are ${evens} even numbers!`,
            `There are ${secretCode.length - evens} odd numbers!`,
            `The first number is ${secretCode[0] > 4 ? 'big (> 4)' : 'small (≤ 4)'}.`,
            `The last number is ${secretCode[secretCode.length-1] % 2 === 0 ? 'even' : 'odd'}.`
        ];
        return hintPool[Math.floor(Math.random() * hintPool.length)];
    }

    function checkCode() {
        const max = config[currentDifficulty].slots;
        const originalGuess = [...currentInput];
        let guess = [...currentInput];
        let tempSecret = [...secretCode];
        let results = new Array(max).fill('wrong');
        let correctCount = 0;

        for (let i = 0; i < max; i++) {
            if (guess[i] === tempSecret[i]) {
                results[i] = 'correct';
                tempSecret[i] = null;
                guess[i] = null;
                correctCount++;
            }
        }

        for (let i = 0; i < max; i++) {
            if (guess[i] !== null) {
                const idx = tempSecret.indexOf(guess[i]);
                if (idx !== -1) {
                    results[i] = 'present';
                    tempSecret[idx] = null;
                }
            }
        }

        for (let i = 0; i < max; i++) {
            const slot = document.getElementById(`slot-${i}`);
            setTimeout(() => {
                slot.className = `code-slot ${results[i]} flip`;
                if (results[i] === 'correct') sounds.correct();
            }, i * 80);
        }

        attempts++;

        if (correctCount === max) {
            setTimeout(() => { sounds.win(); endGame(true, 'YOU DID IT! 🎉'); }, max * 100);
        } else {
            lives--;
            updateLivesDisplay();
            if (lives <= 0) {
                setTimeout(() => { sounds.lose(); endGame(false, 'GAME OVER 😢'); }, max * 100);
            } else {
                sounds.wrong();
                setTimeout(() => {
                    updateLastGuessDisplay(originalGuess, results);
                    document.getElementById('hint-header').textContent = "🧠 New Logic Hint:";
                    document.getElementById('message').textContent = generateMathHint();
                    currentInput = [];
                    updateDisplay();
                    updateGoButton();
                    updateAttemptCounter();
                }, 600);
            }
        }
    }

    function endGame(won, title) {
        gameActive = false;
        clearInterval(timerInterval);
        document.getElementById('overlay-emoji').textContent = won ? '🏆' : '🎈';
        document.getElementById('overlay-title').textContent = title;
        document.getElementById('stat-time').textContent = formatTime(totalTime - timeLeft);
        document.getElementById('stat-attempts').textContent = attempts;
        document.getElementById('stat-lives').textContent = lives;
        document.getElementById('overlay-code').textContent = won ? '🌟 You solved it!' : `The code was: ${secretCode.join(' ')}`;
        document.getElementById('overlay').classList.add('show');
        if (won) {
            const key = `maruvault_pb_${currentDifficulty}`;
            const currentPB = localStorage.getItem(key);
            if (!currentPB || timeLeft > parseInt(currentPB)) localStorage.setItem(key, timeLeft);
        }
    }

    function restartGame() { initGame(currentDifficulty); }
    window.onload = loadPBs;
</script>
