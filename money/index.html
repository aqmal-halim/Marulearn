<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 Money Master!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    /* Updated gradient to match your style */
    background: linear-gradient(135deg, #a8edea 0%, #fed6e3 50%, #c2e9fb 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .container {
    background: white; border-radius: 30px; padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-width: 500px; width: 100%; text-align: center;
  }
  h1 { color: #00b894; font-size: 2.2em; margin-bottom: 10px; text-shadow: 3px 3px 0 #ffeaa7; }
  
  .screen { display: none; }
  .screen.active { display: block; }
  
  .level-btn {
    display: block; width: 100%; padding: 18px; margin: 10px 0;
    border: none; border-radius: 20px; font-size: 1.2em; font-weight: bold;
    cursor: pointer; transition: transform 0.2s; font-family: inherit; color: white; text-align: left;
  }
  .level-btn:hover { transform: scale(1.05); }
  .level-btn small { display: block; font-size: 0.7em; opacity: 0.9; font-weight: normal; }
  
  .easy { background: #55efc4; }
  .medium { background: #00cec9; }
  .hard { background: #0984e3; }
  .expert { background: #6c5ce7; }

  .stats { display: flex; justify-content: space-around; margin-bottom: 20px; font-size: 1.1em; }
  .stat { background: #f1f2f6; padding: 10px 20px; border-radius: 15px; font-weight: bold; }
  .score { color: #00b894; }
  .streak { color: #e17055; }

  .progress-bar { background: #dfe4ea; border-radius: 10px; height: 15px; overflow: hidden; margin-bottom: 20px; }
  .progress-fill { background: linear-gradient(90deg, #55efc4, #0984e3); height: 100%; transition: width 0.3s; width: 0%; }

  .problem-box {
    background: #f1f2f6; border-radius: 20px; padding: 25px; margin: 20px 0;
    border: 3px dashed #00b894;
  }
  .highlight { display: inline-block; background: #ffeaa7; color: #d63031; padding: 3px 10px; border-radius: 10px; font-family: 'Courier New', monospace; font-weight: bold; }

  /* Coin Wallet Styles */
  .wallet { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
  .coin-btn {
    cursor: pointer; background: white; border: 3px solid #dfe4ea;
    border-radius: 15px; padding: 12px; font-weight: bold; font-family: inherit;
    display: flex; flex-direction: column; align-items: center; transition: 0.2s;
  }
  .coin-btn:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
  .coin-btn:active:not(:disabled) { transform: scale(0.9); }
  .coin-img { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; color: white; font-size: 0.9em; }
  .c500 { background: #d4af37; } .c100 { background: #a5b1c2; }
  .c50 { background: #778ca3; } .c10 { background: #cd7f32; }

  .submit-btn {
    display: block; width: 100%; padding: 15px; background: #00b894;
    color: white; border: none; border-radius: 20px; font-size: 1.3em;
    font-weight: bold; cursor: pointer; font-family: inherit; margin-top: 10px;
  }
  .clear-btn { background: #ff7675; margin-top: 10px; font-size: 1em; padding: 10px; }

  .feedback { font-size: 1.3em; margin-top: 15px; min-height: 40px; font-weight: bold; }
  .correct { color: #00b894; }
  .wrong { color: #d63031; }

  .shake { animation: shake 0.4s; }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
  
  .home-link { display: block; margin-top: 20px; color: #747d8c; text-decoration: none; font-size: 0.9em; }
</style>
</head>
<body>
<div class="container">

  <div id="start-screen" class="screen active">
    <h1>💰 Money Master!</h1>
    <p style="color:#636e72; margin-bottom:20px;">Master the Japanese Yen! 💴</p>
    <button class="level-btn easy" onclick="startGame('easy')">🌱 Beginner <small>Add ¥100 coins</small></button>
    <button class="level-btn medium" onclick="startGame('medium')">🌟 Intermediate <small>Use ¥100 & ¥50 coins</small></button>
    <button class="level-btn hard" onclick="startGame('hard')">🔥 Advanced <small>All coins unlocked!</small></button>
    <button class="level-btn expert" onclick="startGame('expert')">🏆 Champion <small>Calculate the change from ¥1000</small></button>
    <a href="../" class="home-link">← Back to Marulearn</a>
  </div>

  <div id="game-screen" class="screen">
    <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
    <div class="stats">
      <div class="stat score">⭐ <span id="score">0</span></div>
      <div class="stat">❓ <span id="q-num">1</span>/10</div>
      <div class="stat streak">🔥 <span id="streak">0</span></div>
    </div>

    <div class="problem-box">
      <div id="item-emoji" style="font-size:3.5em; margin-bottom:10px;">🍎</div>
      <div class="problem-text" id="problem-text" style="font-size: 1.2em; font-weight: bold;">Loading...</div>
    </div>

    <div id="wallet-area">
      <div class="stat" style="width:100%; font-size:1.6em; margin-bottom:15px; border:2px solid #00b894; background: white;">
        Paid: ¥<span id="current-total">0</span>
      </div>
      <div class="wallet">
        <button id="coin-500" class="coin-btn" onclick="addMoney(500)"><div class="coin-img c500">500</div>¥500</button>
        <button id="coin-100" class="coin-btn" onclick="addMoney(100)"><div class="coin-img c100">100</div>¥100</button>
        <button id="coin-50" class="coin-btn" onclick="addMoney(50)"><div class="coin-img c50">50</div>¥50</button>
        <button id="coin-10" class="coin-btn" onclick="addMoney(10)"><div class="coin-img c10">10</div>¥10</button>
      </div>
      <button class="submit-btn" onclick="checkAnswer()">Pay Now! ✓</button>
      <button class="submit-btn clear-btn" onclick="resetTotal()">Clear Money</button>
    </div>

    <div id="input-area" style="display:none;">
      <p style="margin-bottom:10px; font-weight:bold;">Type the change amount:</p>
      <input type="number" id="change-input" style="font-size:2em; width:160px; text-align:center; border-radius:15px; border:4px solid #00b894; outline:none;" placeholder="¥">
      <button class="submit-btn" onclick="checkAnswer()">Check! ✓</button>
    </div>

    <div class="feedback" id="feedback"></div>
  </div>

  <div id="end-screen" class="screen">
    <div style="font-size:5em; margin:20px 0;" id="trophy">🏆</div>
    <h1 id="end-title">Amazing!</h1>
    <div style="font-size:2em; color:#00b894; margin:20px 0; font-weight:bold;">Score: <span id="final-score">0</span>/10</div>
    <p id="end-message" style="margin-bottom:20px;"></p>
    <button class="level-btn easy" onclick="location.reload()" style="text-align:center;">🏠 Play Again</button>
    <a href="../" class="home-link">← Back to Marulearn</a>
  </div>

</div>

<script>
  let score = 0, streak = 0, questionNum = 0, mode = 'easy', targetPrice = 0, currentTotal = 0, correctChange = 0;
  const items = [{e:'🍎', p:150}, {e:'🍦', p:320}, {e:'🍩', p:210}, {e:'🧸', p:850}, {e:'🍰', p:450}, {e:'🥤', p:120}, {e:'🍔', p:680}, {e:'🍌', p:90}, {e:'🍫', p:110}];
  const encouragement = ['Awesome! 🎉', 'Great job! ⭐', 'You rock! 🚀', 'Fantastic! 🌟', 'Super! 🎊'];
  const tryAgain = ['Not quite! Try again! 💪', 'Oops! Give it another shot! 🎯', 'Almost! Try once more! ✨'];

  function startGame(m) {
    mode = m; score = 0; streak = 0; questionNum = 0;
    showScreen('game-screen');
    setupCoins();
    nextQuestion();
  }

  function setupCoins() {
    document.getElementById('coin-500').disabled = (mode === 'easy' || mode === 'medium');
    document.getElementById('coin-50').disabled = (mode === 'easy');
    document.getElementById('coin-10').disabled = (mode === 'easy' || mode === 'medium');
  }

  function nextQuestion() {
    questionNum++;
    if (questionNum > 10) { endGame(); return; }
    currentTotal = 0;
    document.getElementById('feedback').textContent = '';
    document.getElementById('current-total').textContent = '0';
    document.getElementById('q-num').textContent = questionNum;
    document.getElementById('progress').style.width = ((questionNum - 1) / 10 * 100) + '%';
    
    let item = items[Math.floor(Math.random()*items.length)];
    document.getElementById('item-emoji').textContent = item.e;
    
    if (mode === 'expert') {
        targetPrice = (Math.floor(Math.random()*80)+10) * 10;
        correctChange = 1000 - targetPrice;
        document.getElementById('wallet-area').style.display = 'none';
        document.getElementById('input-area').style.display = 'block';
        document.getElementById('problem-text').innerHTML = `You pay <span class="highlight">¥1000</span> for the ${item.e}.<br>The price is <span class="highlight">¥${targetPrice}</span>. What is the change?`;
        document.getElementById('change-input').focus();
    } else {
        document.getElementById('wallet-area').style.display = 'block';
        document.getElementById('input-area').style.display = 'none';
        if (mode === 'easy') targetPrice = (Math.floor(Math.random()*9)+1) * 100;
        else if (mode === 'medium') targetPrice = (Math.floor(Math.random()*15)+1) * 50;
        else targetPrice = Math.floor(Math.random()*90 + 5) * 10;
        document.getElementById('problem-text').innerHTML = `Pay exactly <span class="highlight">¥${targetPrice}</span> for the ${item.e}!`;
    }
  }

  function addMoney(amt) {
    currentTotal += amt;
    document.getElementById('current-total').textContent = currentTotal;
  }

  function checkAnswer() {
    const feedback = document.getElementById('feedback');
    let isCorrect = (mode === 'expert') ? (parseInt(document.getElementById('change-input').value) === correctChange) : (currentTotal === targetPrice);

    if (isCorrect) {
        score++; streak++;
        const msg = encouragement[Math.floor(Math.random() * encouragement.length)];
        feedback.textContent = streak >= 3 ? `${msg} 🔥 ${streak} in a row!` : msg;
        feedback.className = 'feedback correct';
        document.getElementById('score').textContent = score;
        document.getElementById('streak').textContent = streak;
        document.getElementById('change-input').value = '';
        setTimeout(nextQuestion, 1500);
    } else {
        streak = 0;
        document.getElementById('streak').textContent = streak;
        feedback.textContent = tryAgain[Math.floor(Math.random() * tryAgain.length)];
        feedback.className = 'feedback wrong';
        document.getElementById('game-screen').classList.add('shake');
        setTimeout(() => document.getElementById('game-screen').classList.remove('shake'), 400);
    }
  }

  function resetTotal() { currentTotal = 0; document.getElementById('current-total').textContent = '0'; }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function endGame() {
    showScreen('end-screen');
    document.getElementById('final-score').textContent = score;
    const trophy = document.getElementById('trophy');
    const title = document.getElementById('end-title');
    const msg = document.getElementById('end-message');
    if (score === 10) {
      trophy.textContent = '🏆'; title.textContent = 'PERFECT! 🎊'; msg.textContent = 'You are a Money Master!';
    } else if (score >= 7) {
      trophy.textContent = '🥇'; title.textContent = 'Awesome Work!'; msg.textContent = 'You did great!';
    } else {
      trophy.textContent = '🌱'; title.textContent = 'Keep Practicing!'; msg.textContent = 'You are getting better!';
    }
  }

  // Keyboard support for Expert mode
  document.getElementById('change-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') checkAnswer();
  });
</script>
</body>
</html>
