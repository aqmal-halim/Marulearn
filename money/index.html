<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Master - Marulearn</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #1e3799; font-size: 2.2em; margin-bottom: 10px; }
        .screen { display: none; }
        .screen.active { display: block; }
        
        /* Level Buttons */
        .level-btn {
            display: block; width: 100%; padding: 18px 20px; margin: 10px 0;
            border: none; border-radius: 20px; font-size: 1.15em; font-weight: bold;
            cursor: pointer; color: white; text-align: left;
            font-family: inherit;
        }
        .level-btn small { display: block; font-size: 0.75em; opacity: 0.9; font-weight: normal; margin-top: 3px; }
        .easy { background: #60a5fa; }
        .medium { background: #3b82f6; }
        .hard { background: #1d4ed8; }
        .expert { background: #1e3a8a; }

        /* Game Elements */
        .problem-box {
            background: #f1f2f6; border-radius: 20px; padding: 25px;
            margin: 20px 0; border: 4px dashed #3b82f6;
        }
        .item-emoji { font-size: 4.5em; display: block; margin-bottom: 5px; }
        .price-tag { font-size: 2.8em; font-weight: bold; color: #1d4ed8; }
        
        .wallet {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0;
        }
        .coin-btn {
            cursor: pointer; background: white; border: 3px solid #dfe6e9;
            border-radius: 20px; padding: 15px; font-weight: bold;
            display: flex; flex-direction: column; align-items: center;
            font-family: inherit; transition: 0.2s;
        }
        .coin-btn:hover { border-color: #3b82f6; }
        .coin-btn:active { transform: scale(0.95); }
        .coin-img {
            width: 55px; height: 55px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; margin-bottom: 8px;
            font-size: 1.1em; color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }
        .c500 { background: #d4af37; } /* Gold */
        .c100 { background: #a5b1c2; } /* Silver */
        .c50 { background: #778ca3; }  /* Dark Silver */
        .c10 { background: #cd7f32; }  /* Bronze */

        .total-box {
            background: #1e3a8a; color: white; padding: 15px;
            border-radius: 15px; font-size: 1.6em; margin-bottom: 15px;
        }
        .input-style {
            font-size: 1.5em; width: 120px; text-align: center; 
            border-radius: 15px; border: 3px solid #3b82f6; padding: 5px;
            font-family: 'Courier New', monospace; outline: none;
        }
        .btn-action {
            background: #1d4ed8; color: white; border: none; padding: 15px;
            border-radius: 15px; width: 100%; cursor: pointer;
            font-size: 1.1em; font-weight: bold; font-family: inherit;
        }
        .btn-reset { background: #ff7675; margin-top: 10px; }
        .home-link { display: block; margin-top: 25px; color: #747d8c; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="screen active">
        <h1>Money Master 💰</h1>
        <p style="color:#1e3a8a; margin-bottom:20px;">Master the Japanese Yen!</p>
        <button class="level-btn easy" onclick="startGame('easy')">
            🌱 Beginner
            <small>Prices: ¥100 - ¥500 · Use 100 Yen coins</small>
        </button>
        <button class="level-btn medium" onclick="startGame('medium')">
            🌟 Intermediate
            <small>Prices: ¥50 - ¥950 · Use all coins</small>
        </button>
        <button class="level-btn hard" onclick="startGame('hard')">
            🔥 Advanced
            <small>Complex prices · Exact counting required</small>
        </button>
        <button class="level-btn expert" onclick="startGame('expert')">
            🏆 Change Master
            <small>Pay ¥1000 and calculate the CHANGE!</small>
        </button>
        <a href="../" class="home-link">← Back to Marulearn</a>
    </div>

    <div id="game-screen" class="screen">
        <div class="problem-box">
            <span id="item-emoji" class="item-emoji">🍎</span>
            <div id="target-price" class="price-tag">¥0</div>
            <p id="instruction" style="font-weight:bold; color:#1e3a8a; margin-top:10px;">Pay the exact amount!</p>
        </div>

        <div class="total-box">
            <span id="total-label">Total Paid:</span> ¥<span id="current-total">0</span>
        </div>

        <div id="change-input-area" style="display:none; margin-bottom:20px;">
            <p style="font-weight:bold; margin-bottom:10px;">How much change do you get back?</p>
            <input type="number" id="change-input" class="input-style" placeholder="¥¥¥">
        </div>

        <div class="wallet" id="coin-wallet">
            <button class="coin-btn" onclick="addMoney(500)"><div class="coin-img c500">500</div>500 Yen</button>
            <button class="coin-btn" onclick="addMoney(100)"><div class="coin-img c100">100</div>100 Yen</button>
            <button class="coin-btn" onclick="addMoney(50)"><div class="coin-img c50">50</div>50 Yen</button>
            <button class="coin-btn" onclick="addMoney(10)"><div class="coin-img c10">10</div>10 Yen</button>
        </div>

        <button id="submit-btn" class="btn-action" style="display:none;" onclick="checkChange()">Check My Change! ✓</button>
        <button id="reset-btn" class="btn-action btn-reset" onclick="resetTotal()">Clear Money</button>
        
        <a href="javascript:void(0)" onclick="location.reload()" class="home-link">← Change Level</a>
    </div>
</div>

<script>
    let mode = 'easy';
    let targetPrice = 0;
    let currentTotal = 0;
    let expectedChange = 0;

    const items = [
        {e:'🍎', p:150}, {e:'🍦', p:300}, {e:'🍩', p:210}, 
        {e:'🧸', p:850}, {e:'🍰', p:450}, {e:'🥤', p:120},
        {e:'🍔', p:680}, {e:'🍌', p:90}, {e:'🍫', p:110}
    ];

    function startGame(m) {
        mode = m;
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        nextQuestion();
    }

    function nextQuestion() {
        currentTotal = 0;
        document.getElementById('change-input-area').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('coin-wallet').style.display = 'grid';
        document.getElementById('reset-btn').style.display = 'block';
        document.getElementById('instruction').textContent = "Pay the exact amount!";
        document.getElementById('total-label').textContent = "Total Paid:";
        
        let item = items[Math.floor(Math.random()*items.length)];
        
        if (mode === 'easy') {
            targetPrice = (Math.floor(Math.random()*5)+1) * 100;
        } else if (mode === 'medium') {
            targetPrice = (Math.floor(Math.random()*15)+1) * 50;
        } else if (mode === 'hard') {
            targetPrice = Math.floor(Math.random()*90 + 10) * 10;
        } else if (mode === 'expert') {
            targetPrice = Math.floor(Math.random()*40 + 10) * 10;
            document.getElementById('instruction').textContent = "You pay with a ¥1000 bill...";
            document.getElementById('total-label').textContent = "You Handed:";
            currentTotal = 1000;
            expectedChange = 1000 - targetPrice;
            document.getElementById('change-input-area').style.display = 'block';
            document.getElementById('submit-btn').style.display = 'block';
            document.getElementById('coin-wallet').style.display = 'none';
            document.getElementById('reset-btn').style.display = 'none';
        }

        document.getElementById('item-emoji').textContent = item.e;
        document.getElementById('target-price').textContent = `¥${targetPrice}`;
        updateUI();
    }

    function addMoney(amt) {
        currentTotal += amt;
        updateUI();
        if (currentTotal === targetPrice) {
            setTimeout(() => {
                alert("Perfect! You bought the item! 🎉");
                nextQuestion();
            }, 100);
        } else if (currentTotal > targetPrice) {
            setTimeout(() => {
                alert("Oops! That's too much money. Try again!");
                resetTotal();
            }, 100);
        }
    }

    function checkChange() {
        let userChange = parseInt(document.getElementById('change-input').value);
        if (userChange === expectedChange) {
            alert("Correct! You are a Change Master! 🎊");
            document.getElementById('change-input').value = "";
            nextQuestion();
        } else {
            alert("Not quite! Subtract ¥" + targetPrice + " from ¥1000 and try again.");
        }
    }

    function updateUI() {
        document.getElementById('current-total').textContent = currentTotal;
    }

    function resetTotal() {
        currentTotal = 0;
        updateUI();
    }
</script>
</body>
</html>
