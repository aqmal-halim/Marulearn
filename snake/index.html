<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Marulearn – Math Pathfinder Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sky: #e0f2ff;
      --yellow: #ffd93d;
      --orange: #ff9f43;
      --coral: #ff6b6b;
      --mint: #6bcb77;
      --teal: #4db6e8;
      --purple: #a678f0;
      --white: #ffffff;
      --ink: #2d3a4a;
      --card-shadow: 0 8px 0 rgba(0,0,0,0.06);
      --tile-size: 68px;
      --gap: 10px;
      --r: 20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--sky);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      touch-action: none;
      color: var(--ink);
    }

    #bg-canvas { position: fixed; inset: 0; z-index: 0; }

    .page {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 20px;
      width: 100%;
      max-width: 500px;
      height: 100vh;
      justify-content: space-between;
    }

    .header { text-align: center; width: 100%; }
    .logo {
      font-family: 'Baloo 2', cursive;
      font-size: 2.2rem; font-weight: 800;
      margin-bottom: 10px;
    }
    .logo span { color: var(--orange); }

    .stats-bar {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 10px;
      width: 100%;
    }

    .stat-card {
      background: var(--white);
      border-radius: var(--r);
      box-shadow: var(--card-shadow);
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #a0aec0; }
    .stat-value { font-family: 'Baloo 2', cursive; font-size: 1.6rem; line-height: 1; }
    .stat-value.target { color: var(--purple); font-size: 2rem; }

    .grid-container {
      background: rgba(255, 255, 255, 0.4);
      padding: 12px;
      border-radius: 24px;
      backdrop-filter: blur(10px);
      border: 4px solid var(--white);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, var(--tile-size));
      grid-template-rows: repeat(5, var(--tile-size));
      gap: var(--gap);
    }

    .tile {
      width: var(--tile-size); height: var(--tile-size);
      background: var(--white);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Baloo 2', cursive;
      font-size: 1.8rem; font-weight: 800;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s;
      position: relative;
    }

    .tile::after {
      content: ''; position: absolute; inset: 0;
      border-radius: 16px; box-shadow: inset 0 -5px 0 rgba(0,0,0,0.1);
    }

    .tile.selected { background: var(--teal) !important; color: white; transform: scale(0.9); }
    .tile.match { background: var(--mint) !important; color: white; transform: scale(1.1); z-index: 10; }
    .tile.over { background: var(--coral) !important; color: white; animation: shake 0.3s; }
    
    .tile.clearing { animation: pop-out 0.3s forwards; }
    @keyframes pop-out { to { transform: scale(0); opacity: 0; } }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .progress-container { width: 100%; height: 10px; background: #cbd5e0; border-radius: 5px; overflow: hidden; margin: 12px 0; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--mint), var(--teal)); width: 0%; transition: width 0.4s ease; }

    .btn-group { display: flex; gap: 12px; width: 100%; margin-bottom: 8px; }
    .btn {
      flex: 1; padding: 12px; border: none; border-radius: 18px;
      font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 800;
      cursor: pointer; color: white; box-shadow: 0 5px 0 rgba(0,0,0,0.1);
      transition: all 0.1s;
    }
    .btn-shuffle { background: var(--orange); }
    .btn-new { background: var(--purple); }
    .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }

    .toast {
      position: fixed; top: 20px; background: var(--white); padding: 10px 25px;
      border-radius: 50px; font-weight: 800; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transform: translateY(-100px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
    }
    .toast.show { transform: translateY(0); }

    @media (max-width: 400px) {
      :root { --tile-size: 58px; --gap: 8px; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="toast" class="toast">Brilliant! ✨</div>

<div class="page">
  <div class="header">
    <div class="logo">Maru<span>learn</span> Math</div>
    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-label">Target</span>
        <span id="target" class="stat-value target">10</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Level</span>
        <span id="level" class="stat-value">1</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Score</span>
        <span id="score" class="stat-value">0</span>
      </div>
    </div>
    <div class="progress-container">
      <div id="progress" class="progress-bar"></div>
    </div>
  </div>

  <div class="grid-container">
    <div id="grid" class="grid"></div>
  </div>

  <div class="footer" style="width: 100%;">
    <div class="btn-group">
      <button class="btn btn-shuffle" onclick="shuffle()">🔀 Shuffle</button>
      <button class="btn btn-new" onclick="initGame()">🌟 Reset</button>
    </div>
    <p style="text-align:center; font-size:0.75rem; color:#718096; font-weight:700;">Find a path that equals the target!</p>
  </div>
</div>

<script>
  const state = {
    target: 0,
    score: 0,
    level: 1,
    currentSum: 0,
    selected: [],
    clearedInLevel: 0,
    levelUpAt: 6,
    isDragging: false
  };

  const colors = ['#ffeaa7', '#fab1a0', '#a29bfe', '#81ecec', '#55efc4', '#ff7675'];
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;

    if (type === 'select') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440 + (state.selected.length * 50), now);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(); osc.stop(now + 0.1);
    } else if (type === 'match') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(523.25, now); // C5
      osc.frequency.exponentialRampToValueAtTime(1046.5, now + 0.3); // C6
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(); osc.stop(now + 0.4);
    } else if (type === 'error') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, now);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.2);
      osc.start(); osc.stop(now + 0.2);
    } else if (type === 'levelup') {
      const notes = [523, 659, 783, 1046];
      notes.forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.setValueAtTime(f, now + (i * 0.1));
        g.gain.setValueAtTime(0.1, now + (i * 0.1));
        g.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.1) + 0.3);
        o.start(now + (i * 0.1)); o.stop(now + (i * 0.1) + 0.3);
      });
    }
  }

  function initGame() {
    state.score = 0; state.level = 1; state.clearedInLevel = 0;
    updateUI();
    buildGrid();
    newTarget();
  }

  function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let i = 0; i < 25; i++) {
      const val = Math.floor(Math.random() * 9) + 1;
      const tile = createTile(val, i);
      grid.appendChild(tile);
    }
  }

  function createTile(val, index) {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.textContent = val;
    tile.dataset.index = index;
    tile.style.backgroundColor = colors[val % colors.length];
    
    tile.addEventListener('mousedown', (e) => startDrag(e, tile));
    tile.addEventListener('mouseenter', () => enterTile(tile));
    tile.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(e, tile); });
    return tile;
  }

  function newTarget() {
    const min = 8 + (state.level * 2);
    const max = 15 + (state.level * 4);
    state.target = Math.floor(Math.random() * (max - min)) + min;
    document.getElementById('target').textContent = state.target;
  }

  function startDrag(e, tile) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    state.isDragging = true;
    state.selected = [];
    state.currentSum = 0;
    enterTile(tile);
  }

  function enterTile(tile) {
    if (!state.isDragging || state.selected.includes(tile) || tile.classList.contains('clearing')) return;

    if (state.selected.length > 0) {
      const last = state.selected[state.selected.length - 1];
      const idx1 = parseInt(last.dataset.index);
      const idx2 = parseInt(tile.dataset.index);
      const diff = Math.abs(idx1 - idx2);
      const sameRow = Math.floor(idx1/5) === Math.floor(idx2/5);
      if (!( (diff === 1 && sameRow) || diff === 5 )) return;
    }

    state.selected.push(tile);
    state.currentSum += parseInt(tile.textContent);
    tile.classList.add('selected');
    playSound('select');

    state.selected.forEach(t => t.classList.remove('match', 'over'));
    if (state.currentSum === state.target) {
      state.selected.forEach(t => t.classList.add('match'));
    } else if (state.currentSum > state.target) {
      state.selected.forEach(t => t.classList.add('over'));
      playSound('error');
    }
  }

  function endDrag() {
    if (!state.isDragging) return;
    state.isDragging = false;

    if (state.currentSum === state.target) {
      handleMatch();
    } else {
      state.selected.forEach(t => t.classList.remove('selected', 'match', 'over'));
    }
  }

  function handleMatch() {
    playSound('match');
    state.score += (state.selected.length * 10 * state.level);
    state.clearedInLevel++;
    
    // Mark for clearing
    state.selected.forEach(t => t.classList.add('clearing'));

    setTimeout(() => {
      replenishTiles();
      checkLevelUp();
      newTarget();
    }, 300);
  }

  function replenishTiles() {
    const grid = document.getElementById('grid');
    const tiles = Array.from(grid.children);
    
    // Sort selected indices descending to handle removal correctly
    const indicesToClear = state.selected.map(t => parseInt(t.dataset.index)).sort((a,b) => b-a);
    
    indicesToClear.forEach(idx => {
      const val = Math.floor(Math.random() * 9) + 1;
      const newTile = createTile(val, idx);
      grid.replaceChild(newTile, tiles[idx]);
      
      // Kid-friendly animation
      newTile.style.transform = 'scale(0)';
      setTimeout(() => newTile.style.transform = 'scale(1)', 50);
    });

    updateUI();
  }

  function checkLevelUp() {
    if (state.clearedInLevel >= state.levelUpAt) {
      state.level++;
      state.clearedInLevel = 0;
      state.levelUpAt = Math.min(state.levelUpAt + 1, 12);
      showToast("LEVEL UP! 🚀");
      playSound('levelup');
    }
  }

  function updateUI() {
    document.getElementById('score').textContent = state.score;
    document.getElementById('level').textContent = state.level;
    const prog = (state.clearedInLevel / state.levelUpAt) * 100;
    document.getElementById('progress').style.width = prog + '%';
  }

  function showToast(msg = "Perfect! ✨") {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  }

  function shuffle() {
    buildGrid();
    newTarget();
  }

  window.addEventListener('mouseup', endDrag);
  window.addEventListener('touchend', endDrag);
  window.addEventListener('touchmove', (e) => {
    if (!state.isDragging) return;
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (el && el.classList.contains('tile')) enterTile(el);
  });

  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  const circles = Array(12).fill().map(() => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 80 + 40,
    v: Math.random() * 0.4 + 0.1
  }));

  function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    circles.forEach(c => {
      c.y -= c.v;
      if (c.y < -c.r) c.y = canvas.height + c.r;
      ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  initGame();
  draw();
</script>

</body>
</html>
