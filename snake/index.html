<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Marulearn – Math Pathfinder Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sky: #e0f2ff;
      --yellow: #ffd93d;
      --orange: #ff9f43;
      --coral: #ff6b6b;
      --mint: #6bcb77;
      --teal: #4db6e8;
      --purple: #a678f0;
      --white: #ffffff;
      --ink: #2d3a4a;
      --card-shadow: 0 8px 0 rgba(0,0,0,0.06);
      --tile-size: 68px;
      --gap: 10px;
      --r: 20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--sky);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      touch-action: none;
      color: var(--ink);
    }

    #bg-canvas { position: fixed; inset: 0; z-index: 0; }

    .page {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 15px;
      width: 100%;
      max-width: 500px;
      height: 100vh;
      justify-content: space-between;
    }

    .header { text-align: center; width: 100%; }
    
    .nav-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 10px;
    }

    .home-btn {
      background: var(--white);
      border: none;
      border-radius: 12px;
      width: 45px;
      height: 45px;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .logo {
      font-family: 'Baloo 2', cursive;
      font-size: 1.8rem; font-weight: 800;
    }
    .logo span { color: var(--orange); }

    .stats-bar {
      display: grid;
      grid-template-columns: 1.2fr 1fr 0.8fr 0.8fr;
      gap: 8px;
      width: 100%;
    }

    .stat-card {
      background: var(--white);
      border-radius: var(--r);
      box-shadow: var(--card-shadow);
      padding: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; color: #a0aec0; }
    .stat-value { font-family: 'Baloo 2', cursive; font-size: 1.4rem; line-height: 1; }
    .stat-value.target { color: var(--purple); font-size: 1.8rem; }
    .stat-value.timer { color: var(--coral); }
    .stat-value.lives { color: var(--orange); }

    .grid-container {
      background: rgba(255, 255, 255, 0.4);
      padding: 10px;
      border-radius: 24px;
      backdrop-filter: blur(10px);
      border: 4px solid var(--white);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, var(--tile-size));
      grid-template-rows: repeat(5, var(--tile-size));
      gap: var(--gap);
    }

    .tile {
      width: var(--tile-size); height: var(--tile-size);
      background: var(--white);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Baloo 2', cursive;
      font-size: 1.8rem; font-weight: 800;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
    }

    .tile::after {
      content: ''; position: absolute; inset: 0;
      border-radius: 16px; box-shadow: inset 0 -5px 0 rgba(0,0,0,0.1);
    }

    .tile.selected { background: var(--teal) !important; color: white; transform: scale(0.9); }
    .tile.match { background: var(--mint) !important; color: white; transform: scale(1.1); z-index: 10; }
    .tile.over { background: var(--coral) !important; color: white; animation: shake 0.3s; }
    .tile.clearing { animation: pop-out 0.3s forwards; }

    @keyframes pop-out { to { transform: scale(0); opacity: 0; } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

    .progress-container { width: 100%; height: 10px; background: #cbd5e0; border-radius: 5px; overflow: hidden; margin: 10px 0; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--mint), var(--teal)); width: 0%; transition: width 0.4s ease; }

    .btn-group { display: flex; gap: 10px; width: 100%; margin-bottom: 8px; }
    .btn {
      flex: 1; padding: 12px; border: none; border-radius: 18px;
      font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 800;
      cursor: pointer; color: white; box-shadow: 0 5px 0 rgba(0,0,0,0.1);
      transition: all 0.1s;
    }
    .btn-shuffle { background: var(--orange); }
    .btn-new { background: var(--purple); }
    .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }

    /* Overlay for Start & Game Over */
    .overlay {
      position: fixed; inset: 0; background: rgba(45, 58, 74, 0.85);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 2000; color: white; text-align: center; padding: 20px;
    }
    .overlay h2 { font-family: 'Baloo 2', cursive; font-size: 3rem; margin-bottom: 10px; }
    .hidden { display: none !important; }

    .toast {
      position: fixed; top: 20px; background: var(--white); padding: 10px 25px;
      border-radius: 50px; font-weight: 800; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transform: translateY(-100px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 3000;
    }
    .toast.show { transform: translateY(0); }

    @media (max-width: 400px) { :root { --tile-size: 55px; --gap: 8px; } }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="toast" class="toast">Brilliant! ✨</div>

<div id="start-overlay" class="overlay">
  <h2>Marulearn</h2>
  <p style="margin-bottom:20px; font-size:1.2rem;">Find the path to the target before time runs out!</p>
  <button class="btn btn-new" style="flex:none; width:200px;" onclick="startGame()">PLAY 🎮</button>
</div>

<div id="gameover-overlay" class="overlay hidden">
  <h2>Game Over!</h2>
  <p id="final-score" style="margin-bottom:20px; font-size:1.5rem;">Score: 0</p>
  <button class="btn btn-new" style="flex:none; width:200px;" onclick="startGame()">RETRY 🔄</button>
</div>

<div class="page">
  <div class="header">
    <div class="nav-top">
      <a href="https://aqmal-halim.github.io/Marulearn/index.html" class="home-btn">🏠</a>
      <div class="logo">Maru<span>learn</span> Math</div>
      <div style="width:45px;"></div> </div>
    
    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-label">Target</span>
        <span id="target" class="stat-value target">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Time</span>
        <span id="timer" class="stat-value timer">20</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Lives</span>
        <span id="lives" class="stat-value lives">5</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Level</span>
        <span id="level" class="stat-value">1</span>
      </div>
    </div>
    <div class="progress-container">
      <div id="progress" class="progress-bar"></div>
    </div>
  </div>

  <div class="grid-container">
    <div id="grid" class="grid"></div>
  </div>

  <div class="footer" style="width: 100%;">
    <div class="btn-group">
      <button class="btn btn-shuffle" onclick="shuffle()">🔀 Shuffle</button>
      <button class="btn btn-new" onclick="resetCurrentGame()">🌟 Reset</button>
    </div>
    <p style="text-align:center; font-size:0.7rem; color:#718096; font-weight:700;">Score: <span id="score-text">0</span></p>
  </div>
</div>

<script>
  const state = {
    target: 0, score: 0, level: 1, lives: 5, timeLeft: 20,
    currentSum: 0, selected: [], clearedInLevel: 0, levelUpAt: 6,
    isDragging: false, timerId: null, active: false
  };

  const colors = ['#ffeaa7', '#fab1a0', '#a29bfe', '#81ecec', '#55efc4', '#ff7675'];
  let audioCtx;

  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'select') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(440 + (state.selected.length * 40), now);
      gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(); osc.stop(now + 0.1);
    } else if (type === 'match') {
      osc.type = 'triangle'; osc.frequency.setValueAtTime(523, now);
      osc.frequency.exponentialRampToValueAtTime(1046, now + 0.3);
      gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(); osc.stop(now + 0.3);
    } else if (type === 'lose_life') {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now);
      gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.4);
      osc.start(); osc.stop(now + 0.4);
    }
  }

  function startGame() {
    initAudio();
    document.getElementById('start-overlay').classList.add('hidden');
    document.getElementById('gameover-overlay').classList.add('hidden');
    state.score = 0; state.level = 1; state.lives = 5; state.clearedInLevel = 0;
    state.active = true;
    updateUI();
    buildGrid();
    newTarget();
  }

  function startTimer() {
    clearInterval(state.timerId);
    state.timeLeft = 20;
    document.getElementById('timer').textContent = state.timeLeft;
    state.timerId = setInterval(() => {
      if (!state.active) return;
      state.timeLeft--;
      document.getElementById('timer').textContent = state.timeLeft;
      if (state.timeLeft <= 0) handleTimeOut();
    }, 1000);
  }

  function handleTimeOut() {
    state.lives--;
    playSound('lose_life');
    showToast("Time's up! ❤️-1");
    updateUI();
    if (state.lives <= 0) endGame();
    else newTarget();
  }

  function endGame() {
    state.active = false;
    clearInterval(state.timerId);
    document.getElementById('final-score').textContent = `Final Score: ${state.score}`;
    document.getElementById('gameover-overlay').classList.remove('hidden');
  }

  function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let i = 0; i < 25; i++) {
      grid.appendChild(createTile(Math.floor(Math.random() * 9) + 1, i));
    }
  }

  function createTile(val, index) {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.textContent = val;
    tile.dataset.index = index;
    tile.style.backgroundColor = colors[val % colors.length];
    tile.addEventListener('mousedown', (e) => startDrag(e, tile));
    tile.addEventListener('mouseenter', () => enterTile(tile));
    tile.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(e, tile); });
    return tile;
  }

  function newTarget() {
    if (!state.active) return;
    const min = 8 + (state.level * 2);
    const max = 15 + (state.level * 4);
    state.target = Math.floor(Math.random() * (max - min)) + min;
    document.getElementById('target').textContent = state.target;
    startTimer();
  }

  function startDrag(e, tile) {
    if (!state.active) return;
    initAudio();
    state.isDragging = true; state.selected = []; state.currentSum = 0;
    enterTile(tile);
  }

  function enterTile(tile) {
    if (!state.isDragging || state.selected.includes(tile) || tile.classList.contains('clearing')) return;

    if (state.selected.length > 0) {
      const last = state.selected[state.selected.length - 1];
      const idx1 = parseInt(last.dataset.index);
      const idx2 = parseInt(tile.dataset.index);
      const diff = Math.abs(idx1 - idx2);
      const sameRow = Math.floor(idx1/5) === Math.floor(idx2/5);
      if (!( (diff === 1 && sameRow) || diff === 5 )) return;
    }

    state.selected.push(tile);
    state.currentSum += parseInt(tile.textContent);
    tile.classList.add('selected');
    playSound('select');

    state.selected.forEach(t => t.classList.remove('match', 'over'));
    if (state.currentSum === state.target) state.selected.forEach(t => t.classList.add('match'));
    else if (state.currentSum > state.target) state.selected.forEach(t => t.classList.add('over'));
  }

  function endDrag() {
    if (!state.isDragging) return;
    state.isDragging = false;
    if (state.currentSum === state.target) handleMatch();
    else state.selected.forEach(t => t.classList.remove('selected', 'match', 'over'));
  }

  function handleMatch() {
    playSound('match');
    state.score += (state.selected.length * 10 * state.level);
    state.clearedInLevel++;
    state.selected.forEach(t => t.classList.add('clearing'));
    setTimeout(() => {
      replenishTiles();
      if (state.clearedInLevel >= state.levelUpAt) {
        state.level++; state.clearedInLevel = 0;
        showToast("LEVEL UP! 🚀");
      }
      newTarget();
    }, 300);
  }

  function replenishTiles() {
    const grid = document.getElementById('grid');
    const tiles = Array.from(grid.children);
    state.selected.forEach(t => {
      const idx = parseInt(t.dataset.index);
      const newT = createTile(Math.floor(Math.random() * 9) + 1, idx);
      grid.replaceChild(newT, tiles[idx]);
    });
    updateUI();
  }

  function updateUI() {
    document.getElementById('score-text').textContent = state.score;
    document.getElementById('level').textContent = state.level;
    document.getElementById('lives').textContent = state.lives;
    const prog = (state.clearedInLevel / state.levelUpAt) * 100;
    document.getElementById('progress').style.width = prog + '%';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  }

  function shuffle() { if(state.active) { buildGrid(); newTarget(); } }
  function resetCurrentGame() { startGame(); }

  window.addEventListener('mouseup', endDrag);
  window.addEventListener('touchend', endDrag);
  window.addEventListener('touchmove', (e) => {
    if (!state.isDragging) return;
    const t = e.touches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    if (el && el.classList.contains('tile')) enterTile(el);
  });

  // BG Animation
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();
  const circles = Array(10).fill().map(() => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*80+20, v: Math.random()*0.3+0.1 }));
  function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = 'rgba(255,255,255,0.2)';
    circles.forEach(c => { c.y -= c.v; if (c.y < -c.r) c.y = canvas.height + c.r; ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill(); });
    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
