<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕐 Clock Champion!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 50%, #4facfe 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: white;
    border-radius: 30px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    max-width: 500px;
    width: 100%;
    text-align: center;
  }
  h1 {
    color: #2980b9;
    font-size: 2.2em;
    margin-bottom: 10px;
    text-shadow: 3px 3px 0 #ffeaa7;
  }
  .screen { display: none; }
  .screen.active { display: block; }
  .level-btn {
    display: block;
    width: 100%;
    padding: 18px;
    margin: 10px 0;
    border: none;
    border-radius: 20px;
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s;
    font-family: inherit;
    color: white;
    text-align: left;
    padding-left: 25px;
  }
  .level-btn:hover { transform: scale(1.03); }
  .level-btn small { display: block; font-size: 0.75em; opacity: 0.9; font-weight: normal; margin-top: 3px; }
  .easy { background: #74b9ff; }
  .medium { background: #0984e3; }
  .hard { background: #2980b9; }
  .expert { background: #6c5ce7; }
  .stats {
    display: flex;
    justify-content: space-around;
    margin-bottom: 20px;
    font-size: 1.05em;
  }
  .stat {
    background: #f1f2f6;
    padding: 10px 18px;
    border-radius: 15px;
    font-weight: bold;
  }
  .score { color: #2980b9; }
  .streak { color: #e17055; }

  /* Clock SVG styles */
  .clock-wrapper {
    margin: 20px auto;
    display: flex;
    justify-content: center;
  }
  .clock-face {
    background: radial-gradient(circle, #fff 0%, #f5f6fa 100%);
    border: 8px solid #2980b9;
    border-radius: 50%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2), inset 0 0 20px rgba(0,0,0,0.05);
  }
  .number {
    font-family: 'Comic Sans MS', serif;
    font-size: 22px;
    font-weight: bold;
    fill: #2d3436;
  }
  .tick { stroke: #636e72; stroke-width: 2; }
  .tick-major { stroke: #2d3436; stroke-width: 3; }
  .hour-hand {
    stroke: #2d3436;
    stroke-width: 8;
    stroke-linecap: round;
  }
  .minute-hand {
    stroke: #0984e3;
    stroke-width: 5;
    stroke-linecap: round;
  }
  .center-dot { fill: #d63031; }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 20px 0;
  }
  .option-btn {
    background: #f1f2f6;
    border: 3px solid #dfe4ea;
    padding: 18px 10px;
    border-radius: 15px;
    font-family: inherit;
    font-size: 1.4em;
    font-weight: bold;
    cursor: pointer;
    color: #2d3436;
    transition: all 0.2s;
  }
  .option-btn:hover:not(:disabled) {
    border-color: #0984e3;
    background: #e8f4ff;
    transform: scale(1.03);
  }
  .option-btn.correct {
    background: #00b894;
    color: white;
    border-color: #00b894;
  }
  .option-btn.wrong {
    background: #d63031;
    color: white;
    border-color: #d63031;
    animation: shake 0.4s;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  .option-btn:disabled { cursor: not-allowed; }

  .hint-btn {
    background: #fdcb6e;
    color: #2d3436;
    padding: 10px 20px;
    border: none;
    border-radius: 15px;
    font-family: inherit;
    font-size: 0.95em;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
  }
  .feedback {
    font-size: 1.3em;
    margin-top: 15px;
    min-height: 40px;
    font-weight: bold;
  }
  .correct-text { color: #00b894; }
  .wrong-text { color: #d63031; }
  .hint-text { color: #e17055; font-size: 1em; }
  .trophy { font-size: 5em; margin: 20px 0; }
  .final-score {
    font-size: 2em;
    color: #2980b9;
    margin: 20px 0;
    font-weight: bold;
  }
  .message {
    font-size: 1.2em;
    color: #2d3436;
    margin: 15px 0;
  }
  .progress-bar {
    background: #dfe4ea;
    border-radius: 10px;
    height: 15px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-fill {
    background: linear-gradient(90deg, #74b9ff, #6c5ce7);
    height: 100%;
    transition: width 0.3s;
    width: 0%;
  }
  .home-link {
    display: block;
    margin-top: 20px;
    color: #747d8c;
    text-decoration: none;
    font-size: 0.9em;
  }
</style>
</head>
<body>
<div class="container">

  <div id="start-screen" class="screen active">
    <h1>🕐 Clock Champion!</h1>
    <p style="color:#636e72; margin-bottom:20px;">Can you read the time? Pick your level! ⏰</p>
    <button class="level-btn easy" onclick="startGame('easy')">
      🌱 Beginner
      <small>Just the hours (3:00, 7:00...)</small>
    </button>
    <button class="level-btn medium" onclick="startGame('medium')">
      🌟 Easy
      <small>Half hours too (3:30, 7:30...)</small>
    </button>
    <button class="level-btn hard" onclick="startGame('hard')">
      🔥 Medium
      <small>Every 15 minutes (3:15, 3:45...)</small>
    </button>
    <button class="level-btn expert" onclick="startGame('expert')">
      🏆 Expert
      <small>Every 5 minutes (3:05, 7:25...)</small>
    </button>
    <a href="../" class="home-link">← Back to Marulearn</a>
  </div>

  <div id="game-screen" class="screen">
    <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
    <div class="stats">
      <div class="stat score">⭐ <span id="score">0</span></div>
      <div class="stat">❓ <span id="q-num">1</span>/10</div>
      <div class="stat streak">🔥 <span id="streak">0</span></div>
    </div>

    <div class="clock-wrapper">
      <svg id="clock" class="clock-face" width="240" height="240" viewBox="0 0 240 240"></svg>
    </div>

    <p style="color:#2d3436; font-weight:bold; font-size:1.1em;">What time is it?</p>

    <div class="options-grid" id="options"></div>

    <div class="feedback" id="feedback"></div>
    <button class="hint-btn" id="hint-btn" onclick="showHint()" style="display:none;">💡 Need a hint?</button>
  </div>

  <div id="end-screen" class="screen">
    <div class="trophy" id="trophy">🏆</div>
    <h1 id="end-title">Amazing!</h1>
    <div class="final-score">You scored <span id="final-score">0</span>/10!</div>
    <div class="message" id="end-message"></div>
    <button class="level-btn easy" onclick="goHome()" style="text-align:center; padding-left:18px;">🏠 Play Again</button>
    <a href="../" class="home-link">← Back to Marulearn</a>
  </div>

</div>

<script>
  let score = 0;
  let streak = 0;
  let questionNum = 0;
  let currentHour = 0;
  let currentMinute = 0;
  let attempts = 0;
  let level = 'easy';
  const totalQuestions = 10;
  const encouragement = ['Awesome! 🎉', 'Great job! ⭐', 'You rock! 🚀', 'Brilliant! 💫', 'Fantastic! 🌟'];
  const tryAgain = ['Not quite! Look again! 👀', 'Oops! Try once more! 🎯', 'Keep going! ✨'];

  function drawClock(hour, minute) {
    const svg = document.getElementById('clock');
    svg.innerHTML = '';
    const cx = 120, cy = 120, r = 110;

    // Ticks
    for (let i = 0; i < 60; i++) {
      const angle = (i * 6 - 90) * Math.PI / 180;
      const isHour = i % 5 === 0;
      const x1 = cx + Math.cos(angle) * (r - (isHour ? 15 : 8));
      const y1 = cy + Math.sin(angle) * (r - (isHour ? 15 : 8));
      const x2 = cx + Math.cos(angle) * (r - 3);
      const y2 = cy + Math.sin(angle) * (r - 3);
      svg.innerHTML += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" class="${isHour ? 'tick-major' : 'tick'}"/>`;
    }

    // Numbers 1-12
    for (let i = 1; i <= 12; i++) {
      const angle = (i * 30 - 90) * Math.PI / 180;
      const x = cx + Math.cos(angle) * (r - 30);
      const y = cy + Math.sin(angle) * (r - 30) + 8;
      svg.innerHTML += `<text x="${x}" y="${y}" text-anchor="middle" class="number">${i}</text>`;
    }

    // Hour hand
    const hourAngle = ((hour % 12) * 30 + minute * 0.5 - 90) * Math.PI / 180;
    const hx = cx + Math.cos(hourAngle) * 55;
    const hy = cy + Math.sin(hourAngle) * 55;
    svg.innerHTML += `<line x1="${cx}" y1="${cy}" x2="${hx}" y2="${hy}" class="hour-hand"/>`;

    // Minute hand
    const minAngle = (minute * 6 - 90) * Math.PI / 180;
    const mx = cx + Math.cos(minAngle) * 85;
    const my = cy + Math.sin(minAngle) * 85;
    svg.innerHTML += `<line x1="${cx}" y1="${cy}" x2="${mx}" y2="${my}" class="minute-hand"/>`;

    // Center dot
    svg.innerHTML += `<circle cx="${cx}" cy="${cy}" r="7" class="center-dot"/>`;
  }

  function formatTime(h, m) {
    const mm = m < 10 ? '0' + m : m;
    return `${h}:${mm}`;
  }

  function startGame(lvl) {
    level = lvl;
    score = 0;
    streak = 0;
    questionNum = 0;
    showScreen('game-screen');
    nextQuestion();
  }

  function getMinuteOptions() {
    if (level === 'easy') return [0];
    if (level === 'medium') return [0, 30];
    if (level === 'hard') return [0, 15, 30, 45];
    return [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55];
  }

  function nextQuestion() {
    questionNum++;
    attempts = 0;
    if (questionNum > totalQuestions) {
      endGame();
      return;
    }

    currentHour = Math.floor(Math.random() * 12) + 1;
    const minOptions = getMinuteOptions();
    currentMinute = minOptions[Math.floor(Math.random() * minOptions.length)];

    drawClock(currentHour, currentMinute);

    // Generate 4 answer options
    const correctAnswer = formatTime(currentHour, currentMinute);
    const options = new Set([correctAnswer]);

    while (options.size < 4) {
      let wrongH = Math.floor(Math.random() * 12) + 1;
      let wrongM = minOptions[Math.floor(Math.random() * minOptions.length)];
      // Make wrong answers plausible (close to correct)
      if (Math.random() < 0.5) wrongH = currentHour;
      options.add(formatTime(wrongH, wrongM));
    }

    const shuffled = Array.from(options).sort(() => Math.random() - 0.5);
    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';
    shuffled.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => checkAnswer(opt, btn);
      optionsDiv.appendChild(btn);
    });

    document.getElementById('q-num').textContent = questionNum;
    document.getElementById('feedback').textContent = '';
    document.getElementById('hint-btn').style.display = 'none';
    document.getElementById('progress').style.width = ((questionNum - 1) / totalQuestions * 100) + '%';
  }

  function checkAnswer(selected, btn) {
    const feedback = document.getElementById('feedback');
    const correct = formatTime(currentHour, currentMinute);
    attempts++;

    if (selected === correct) {
      btn.classList.add('correct');
      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

      if (attempts === 1) {
        score++;
        streak++;
        const msg = encouragement[Math.floor(Math.random() * encouragement.length)];
        feedback.textContent = streak >= 3 ? `${msg} 🔥 ${streak} in a row!` : msg;
      } else {
        streak = 0;
        feedback.textContent = `Yes! It's ${correct}! 🌟 Moving on...`;
      }
      feedback.className = 'feedback correct-text';
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak;
      setTimeout(nextQuestion, 1500);
    } else {
      btn.classList.add('wrong');
      btn.disabled = true;
      streak = 0;
      document.getElementById('streak').textContent = streak;
      const msg = tryAgain[Math.floor(Math.random() * tryAgain.length)];
      feedback.textContent = msg;
      feedback.className = 'feedback wrong-text';
      if (attempts >= 2) {
        document.getElementById('hint-btn').style.display = 'inline-block';
      }
    }
  }

  function showHint() {
    const feedback = document.getElementById('feedback');
    let hint = `💡 Hint: The short hand points to the hour (${currentHour}).`;
    if (currentMinute === 0) {
      hint += ` The long hand points to 12, so it's exactly ${currentHour} o'clock!`;
    } else if (currentMinute === 30) {
      hint += ` The long hand points to 6, which means 30 minutes!`;
    } else if (currentMinute === 15) {
      hint += ` The long hand points to 3, which means 15 minutes!`;
    } else if (currentMinute === 45) {
      hint += ` The long hand points to 9, which means 45 minutes!`;
    } else {
      hint += ` Count by 5s where the long hand points! It's pointing near ${currentMinute / 5}.`;
    }
    feedback.innerHTML = hint;
    feedback.className = 'feedback hint-text';
  }

  function endGame() {
    showScreen('end-screen');
    document.getElementById('final-score').textContent = score;
    const trophy = document.getElementById('trophy');
    const title = document.getElementById('end-title');
    const msg = document.getElementById('end-message');
    if (score === 10) {
      trophy.textContent = '🏆';
      title.textContent = 'PERFECT! 🎊';
      msg.textContent = 'You are a Clock MASTER!';
    } else if (score >= 7) {
      trophy.textContent = '🥇';
      title.textContent = 'Awesome Work!';
      msg.textContent = 'Great time-telling skills!';
    } else if (score >= 4) {
      trophy.textContent = '🥈';
      title.textContent = 'Nice Try!';
      msg.textContent = 'Keep practicing — you\'re getting there!';
    } else {
      trophy.textContent = '🌱';
      title.textContent = 'Keep Practicing!';
      msg.textContent = 'Telling time takes practice. Try again!';
    }
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function goHome() {
    showScreen('start-screen');
  }
</script>
</body>
</html>
