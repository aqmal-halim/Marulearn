<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🌱 Life Story!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --amber:#f59e0b;--amber-dark:#d97706;--green:#10b981;--green-dark:#059669;
  --indigo:#6366f1;--indigo-dark:#4f46e5;--violet:#8b5cf6;--gold:#f59e0b;
  --red:#ef4444;--blue:#3b82f6;--pink:#ec4899;
  --text:#1e1b4b;--text2:#64748b;--border:#c7d2fe;
  --glass:rgba(255,255,255,0.65);--glass2:rgba(255,255,255,0.45);
  --shadow:rgba(99,102,241,0.15);--shadow2:rgba(139,92,246,0.12);
  --bg1:#f0f4ff;--bg2:#faf5ff;--bg3:#fff1f9;
}
body{
  font-family:'Quicksand','Nunito',sans-serif;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 30%,#f093fb 60%,#f5576c 100%);
  background-attachment:fixed;
  min-height:100vh;color:var(--text);overflow-x:hidden
}
body::before{
  content:'';position:fixed;inset:0;
  background:linear-gradient(135deg,rgba(99,102,241,.08) 0%,rgba(139,92,246,.06) 50%,rgba(236,72,153,.05) 100%);
  pointer-events:none;z-index:0
}
.glass{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1.5px solid rgba(255,255,255,0.7)}
.screen{display:none}.screen.active{display:block}
#start-screen{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;position:relative;z-index:1}
#start-screen.active{display:flex}
.start-logo{font-size:5.5em;animation:bounce-in .6s cubic-bezier(.34,1.56,.64,1);margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(245,158,11,0.4))}
@keyframes bounce-in{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.start-title{font-size:2.8em;font-weight:900;color:white;margin-bottom:4px;text-shadow:0 2px 20px rgba(0,0,0,0.2);font-family:'Nunito',sans-serif;letter-spacing:-1px}
.start-sub{color:rgba(255,255,255,0.85);font-size:.95em;margin-bottom:28px;text-align:center;font-weight:600}
.start-card{width:100%;max-width:380px;background:rgba(255,255,255,0.75);backdrop-filter:blur(20px);border-radius:32px;padding:28px 24px;box-shadow:0 20px 60px rgba(99,102,241,0.25);border:2px solid rgba(255,255,255,0.9)}
.form-label{font-size:.72em;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--indigo);margin-bottom:6px;display:block}
.form-input{width:100%;background:rgba(255,255,255,0.8);border:2px solid var(--border);border-radius:16px;padding:12px 16px;font-family:inherit;font-size:1em;font-weight:700;color:var(--text);outline:none;margin-bottom:18px}
.gender-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
.gender-btn{background:rgba(248,250,252,0.9);border:2.5px solid #e2e8f0;border-radius:16px;padding:14px 10px;font-family:inherit;font-weight:800;cursor:pointer;color:var(--text2)}
.gender-btn.selected{background:linear-gradient(135deg,#eef2ff,#ede9fe);border-color:var(--indigo);color:var(--indigo)}
.btn-start{width:100%;padding:16px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;font-weight:900;border:none;border-radius:18px;cursor:pointer;box-shadow:0 6px 0 #4338ca}
.btn-continue{width:100%;max-width:380px;margin-top:12px;padding:13px;background:rgba(255,255,255,0.3);color:white;font-weight:800;border:2px solid rgba(255,255,255,0.5);border-radius:16px;cursor:pointer}
#game-screen{max-width:440px;margin:0 auto;padding:16px 14px 100px;position:relative;z-index:1}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.top-name{font-weight:900;font-size:1.2em;color:white}
.top-right{display:flex;align-items:center;gap:8px}
.top-money{font-weight:800;color:white;background:rgba(16,185,129,0.35);padding:5px 12px;border-radius:20px}
.save-indicator{font-size:.7em;font-weight:800;color:#10b981;background:rgba(236,253,245,0.9);padding:3px 8px;border-radius:10px;opacity:0}
.save-indicator.show{opacity:1}
.btn-new{background:rgba(255,255,255,0.25);color:white;border:1.5px solid rgba(255,255,255,0.4);padding:6px 10px;border-radius:12px;cursor:pointer}
.avatar-card{background:linear-gradient(135deg,rgba(255,255,255,0.8),rgba(238,242,255,0.75));border-radius:28px;padding:20px 22px;display:flex;align-items:center;gap:18px;margin-bottom:12px;border:2px solid rgba(255,255,255,0.85)}
.ava-emoji{font-size:4.2em;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.ava-age{font-size:3em;font-weight:900;background:linear-gradient(135deg,#f59e0b,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.stats-card{background:rgba(255,255,255,0.75);border-radius:24px;padding:18px;border:2px solid rgba(255,255,255,0.8);margin-bottom:12px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.stat-head{display:flex;justify-content:space-between;margin-bottom:6px}
.stat-name{font-size:.74em;font-weight:800;color:var(--text2)}
.stat-val{font-size:.74em;font-weight:900}
.stat-bar{height:11px;background:rgba(226,232,240,0.6);border-radius:99px;overflow:hidden}
.stat-fill{height:100%;border-radius:99px;transition:width .5s ease}
.panel-card{background:rgba(255,255,255,0.72);border-radius:24px;padding:18px 16px;border:2px solid rgba(255,255,255,0.8);margin-bottom:12px}
.tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.tab-btn{padding:8px 14px;border-radius:12px;font-weight:800;font-size:.78em;cursor:pointer;border:none;background:rgba(248,250,252,0.7);color:var(--text2)}
.tab-btn.on{background:linear-gradient(135deg,var(--indigo),var(--violet));color:white}
.act-item{background:rgba(250,250,252,0.8);border-radius:16px;padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;border:2px solid transparent;margin-bottom:8px}
.act-item.disabled{opacity:.45;cursor:not-allowed}
.log-box{max-height:200px;overflow-y:auto}
.log-entry{padding:7px 12px;border-radius:12px;margin-bottom:5px;font-size:.8em;font-weight:700;border-left:3px solid #ccc}
.log-good{background:rgba(236,253,245,0.9);color:#065f46;border-color:#10b981}
.log-bad{background:rgba(254,242,242,0.9);color:#991b1b;border-color:#ef4444}
.age-up-top{width:100%;padding:15px;background:linear-gradient(135deg,#10b981,#059669);color:white;font-weight:900;border:none;border-radius:18px;cursor:pointer;margin-bottom:12px;box-shadow:0 6px 0 #047857}
.badge-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px}
.badge-pill{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #f59e0b;border-radius:20px;padding:5px 12px;font-size:.75em;font-weight:800;color:#92400e}
.energy-bar-wrap{background:rgba(255,255,255,0.6);border-radius:18px;padding:12px 16px;margin-bottom:12px;border:2px solid rgba(255,255,255,0.75);display:flex;align-items:center;gap:12px}
.energy-track{flex:1;height:12px;background:rgba(241,245,249,0.7);border-radius:99px;overflow:hidden}
.energy-fill{height:100%;border-radius:99px;transition:width .5s}
.modal-bg{position:fixed;inset:0;background:rgba(30,27,75,.55);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.modal-card{background:white;border-radius:32px;padding:32px 24px;width:88%;max-width:380px;text-align:center;animation:modal-in .3s}
@keyframes modal-in{from{transform:scale(.8);opacity:0}}
.mbtn{padding:13px 16px;border:none;border-radius:16px;font-weight:800;cursor:pointer;margin-top:8px;display:block;width:100%}
.mbtn.pri{background:var(--indigo);color:white}
.mbtn.sec{background:#f1f5f9;color:var(--text)}
.mbtn.grn{background:var(--green);color:white}
.family-card{background:rgba(255,255,255,0.72);border-radius:24px;padding:16px;border:2px solid rgba(252,231,243,0.8);margin-bottom:12px}
.family-member{background:rgba(253,242,248,0.8);border-radius:14px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.tombstone-card{background:#1e293b;color:white;border-radius:28px;padding:32px 24px}
.tomb-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:15px 0}
.tomb-stat{background:rgba(255,255,255,.1);padding:10px;border-radius:12px}
.float-num{position:fixed;font-weight:900;animation:float-up 1s forwards}
@keyframes float-up{0%{opacity:1}100%{transform:translateY(-50px);opacity:0}}
.f-pos{color:#10b981}.f-neg{color:#ef4444}
.minigame-box{padding:20px;background:#f8fafc;border-radius:20px;margin-bottom:10px}
.mg-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mg-opt{padding:15px;background:white;border:2px solid #e2e8f0;border-radius:12px;font-weight:800;cursor:pointer}
</style>
</head>
<body>

<div id="start-screen" class="screen active">
  <div class="start-logo">🌱</div>
  <div class="start-title">Life Story!</div>
  <div class="start-sub">Your journey begins now.</div>
  <div class="start-card">
    <span class="form-label">Name</span>
    <input id="char-name" class="form-input" type="text" placeholder="Your name..." maxlength="15"/>
    <div class="gender-grid">
      <button class="gender-btn selected" id="btn-male" onclick="pickGender('male')">👦 Boy</button>
      <button class="gender-btn" id="btn-female" onclick="pickGender('female')">👧 Girl</button>
    </div>
    <button class="btn-start" onclick="startLife()">🚀 Begin!</button>
  </div>
  <button class="btn-continue" id="continue-btn" style="display:none" onclick="continueLife()">▶️ Continue</button>
</div>

<div id="game-screen" class="screen">
  <div class="top-bar">
    <div><div class="top-name" id="hdr-name">---</div><div id="hdr-edu" style="font-size:.7em;color:white">No edu</div></div>
    <div class="top-right">
      <div class="top-money">💰 $<span id="hdr-money">0</span></div>
      <div class="save-indicator" id="save-ind">💾</div>
      <button class="btn-new" onclick="confirmNew()">🔄</button>
    </div>
  </div>

  <div id="badge-strip" class="badge-strip"></div>

  <div class="energy-bar-wrap">
    <span style="font-size:.7em;font-weight:800">⚡ Energy</span>
    <div class="energy-track"><div class="energy-fill" id="energy-fill"></div></div>
    <span id="energy-count" style="font-size:.7em;font-weight:800">5/5</span>
  </div>

  <div class="avatar-card">
    <div class="ava-emoji" id="ava-emoji">👶</div>
    <div>
      <div class="ava-age" id="ava-age">0</div>
      <div id="ava-stage" style="font-weight:800">Newborn</div>
      <div id="ava-job" style="font-size:.8em;color:var(--indigo)">No job</div>
    </div>
  </div>

  <div class="stats-card">
    <div class="stats-grid">
      <div><div class="stat-head"><span class="stat-name">❤️ Health</span><span class="stat-val" id="sv-health">100</span></div><div class="stat-bar"><div class="stat-fill" id="sf-health"></div></div></div>
      <div><div class="stat-head"><span class="stat-name">😊 Happiness</span><span class="stat-val" id="sv-happiness">80</span></div><div class="stat-bar"><div class="stat-fill" id="sf-happiness"></div></div></div>
      <div><div class="stat-head"><span class="stat-name">🧠 Smarts</span><span class="stat-val" id="sv-smarts">50</span></div><div class="stat-bar"><div class="stat-fill" id="sf-smarts"></div></div></div>
      <div><div class="stat-head"><span class="stat-name">✨ Looks</span><span class="stat-val" id="sv-looks">50</span></div><div class="stat-bar"><div class="stat-fill" id="sf-looks"></div></div></div>
    </div>
  </div>

  <button class="age-up-top" onclick="ageUp()">🎂 Age Up (Turn <span id="next-age">1</span>)</button>

  <div class="family-card" id="family-card" style="display:none">
    <div style="font-size:.7em;font-weight:800;color:#be185d;margin-bottom:8px">👨‍👩‍👧 FAMILY</div>
    <div id="family-members"></div>
  </div>

  <div class="panel-card">
    <div class="tabs">
      <button class="tab-btn on" onclick="openTab('act', this)">🎯 Do</button>
      <button class="tab-btn" onclick="openTab('work', this)">💼 Work</button>
      <button class="tab-btn" onclick="openTab('edu', this)">📚 Learn</button>
      <button class="tab-btn" onclick="openTab('bank', this)">🏦 Money</button>
      <button class="tab-btn" onclick="openTab('fam', this)">👪 Fam</button>
    </div>
    <div id="panel-act" class="tab-content" style="display:block"></div>
    <div id="panel-work" class="tab-content" style="display:none"></div>
    <div id="panel-edu" class="tab-content" style="display:none"></div>
    <div id="panel-bank" class="tab-content" style="display:none"></div>
    <div id="panel-fam" class="tab-content" style="display:none"></div>
  </div>

  <div class="panel-card">
    <div style="font-size:.7em;font-weight:800;margin-bottom:8px">📜 LIFE LOG</div>
    <div class="log-box" id="life-log"></div>
  </div>
</div>

<div class="modal-bg" id="modal" style="display:none">
  <div class="modal-card">
    <div id="m-icon" style="font-size:4em">🎉</div>
    <div id="m-title" style="font-weight:900;font-size:1.4em">Title</div>
    <div id="m-body" style="margin:10px 0;color:#64748b">Body text</div>
    <div id="m-extra"></div>
    <div id="m-btns"></div>
  </div>
</div>

<script>
// --- CORE DATA ---
const DEFAULT = {
  name:'Player', gender:'male', age:0, health:100, happiness:80, smarts:50, looks:50,
  money:0, job:null, jobTitle:'Unemployed', salary:0, education:'none',
  energy:5, maxEnergy:5, achievements:[], log:[], family:[], investments:0, 
  inflationMult:1.0, retired:false, pension:0, peakSalary:0
};
let G = {...DEFAULT};

const JOBS = [
  {id:'cashier', title:'Cashier', salary:1200, minAge:16, minSmarts:20, minEdu:'none'},
  {id:'driver', title:'Driver', salary:2200, minAge:18, minSmarts:30, minEdu:'none'},
  {id:'teacher', title:'Teacher', salary:3500, minAge:22, minSmarts:60, minEdu:'university'},
  {id:'dev', title:'Developer', salary:5000, minAge:22, minSmarts:70, minEdu:'university'},
  {id:'doctor', title:'Doctor', salary:12000, minAge:26, minSmarts:85, minEdu:'graduate'}
];

const EDU_RANK = {none:0, highschool:1, university:2, graduate:3};

// --- LOGIC ---
function startLife() {
  const name = document.getElementById('char-name').value;
  G.name = name || 'Player';
  G.gender = document.querySelector('.gender-btn.selected').id.includes('male') ? 'male' : 'female';
  document.getElementById('start-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
  addLog("You were born! A fresh start.", "good");
  updateUI();
}

function ageUp() {
  G.age++;
  G.energy = G.maxEnergy;
  
  // Salary
  if (G.job && !G.retired) {
    applyMod({money: G.salary});
    addLog(`Earned $${G.salary.toLocaleString()} from your job.`, 'good');
  }

  // Family Aging
  if(G.family) G.family.forEach(m => m.age++);

  // Random Events
  if (G.age > 4 && Math.random() > 0.6) triggerRandomEvent();

  // Retirement
  if (G.age === 65 && !G.retired) {
    G.retired = true;
    G.pension = Math.floor((G.peakSalary || G.salary) * 0.4);
    G.job = null; G.jobTitle = "Retired"; G.salary = 0;
    addLog(`Retired! Monthly pension: $${G.pension.toLocaleString()}`, 'legend');
  }
  
  if (G.retired) applyMod({money: G.pension * 12});

  // Death checks
  if (G.health <= 0 || G.age > 100) die();

  updateUI();
  save();
}

function applyMod(m) {
  if(m.health) G.health = Math.min(100, Math.max(0, G.health + m.health));
  if(m.happiness) G.happiness = Math.min(100, Math.max(0, G.happiness + m.happiness));
  if(m.smarts) G.smarts = Math.min(100, Math.max(0, G.smarts + m.smarts));
  if(m.looks) G.looks = Math.min(100, Math.max(0, G.looks + m.looks));
  if(m.money) {
    G.money += m.money;
    if(m.money > 0 && G.salary > G.peakSalary) G.peakSalary = G.salary;
  }
  spawnFloat(m.money > 0 ? `+$${m.money}` : `-$${Math.abs(m.money)}`, m.money > 0);
}

function openTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  const panel = document.getElementById('panel-' + name);
  panel.style.display = 'block';
  renderTab(name);
}

function renderTab(name) {
  const p = document.getElementById('panel-' + name);
  p.innerHTML = '';
  
  if (name === 'act') {
    const acts = [
      {t:'Hit the Gym', cost:1, m:{health:5, looks:2, happiness:2}, e:'🏋️'},
      {t:'Read a Book', cost:1, m:{smarts:5}, e:'📖'},
      {t:'Go to Party', cost:1, m:{happiness:10, health:-5}, e:'🎉'}
    ];
    acts.forEach(a => {
      const div = document.createElement('div');
      div.className = 'act-item';
      div.innerHTML = `<span>${a.e}</span> <div><b>${a.t}</b><br><small>Cost: 1⚡</small></div>`;
      div.onclick = () => { if(useEnergy(1)) { applyMod(a.m); addLog(`You ${a.t.toLowerCase()}.`); updateUI(); }};
      p.appendChild(div);
    });
  }

  if (name === 'work') {
    if (G.age < 16) { p.innerHTML = '<p>Must be 16 to work.</p>'; return; }
    JOBS.forEach(j => {
      const can = G.smarts >= j.minSmarts && EDU_RANK[G.education] >= EDU_RANK[j.minEdu];
      const div = document.createElement('div');
      div.className = 'act-item' + (can ? '' : ' disabled');
      div.innerHTML = `<span>💼</span> <div><b>${j.title}</b><br><small>$${j.salary}/mo (Req: ${j.minSmarts} Smarts)</small></div>`;
      div.onclick = () => {
        if(!can) return;
        G.job = j.id; G.jobTitle = j.title; G.salary = j.salary;
        addLog(`Started working as a ${j.title}!`, 'good');
        updateUI();
        renderTab('work');
      };
      p.appendChild(div);
    });
  }

  if (name === 'edu') {
    const options = [
      {t:'Study Hard', cost:1, m:{smarts:3}, e:'📝'},
      {t:'University', cost:0, req:18, goal:'university', e:'🏛️'},
      {t:'Graduate School', cost:0, req:22, goal:'graduate', e:'🎓'}
    ];
    options.forEach(o => {
      const div = document.createElement('div');
      div.className = 'act-item';
      div.innerHTML = `<span>${o.e}</span> <b>${o.t}</b>`;
      div.onclick = () => {
        if(o.goal) {
          if(G.age >= o.req && G.smarts > 50) { G.education = o.goal; addLog(`Enrolled in ${o.t}!`); }
          else { addLog("Not eligible yet.", "bad"); }
        } else {
          if(useEnergy(1)) applyMod(o.m);
        }
        updateUI();
      };
      p.appendChild(div);
    });
  }
}

function useEnergy(amt) {
  if (G.energy >= amt) { G.energy -= amt; return true; }
  addLog("Too tired! Age up to rest.", "bad");
  return false;
}

function updateUI() {
  document.getElementById('hdr-name').textContent = G.name;
  document.getElementById('hdr-money').textContent = G.money.toLocaleString();
  document.getElementById('ava-age').textContent = G.age;
  document.getElementById('next-age').textContent = G.age + 1;
  document.getElementById('energy-count').textContent = `${G.energy}/${G.maxEnergy}`;
  document.getElementById('energy-fill').style.width = (G.energy/G.maxEnergy*100) + '%';
  document.getElementById('hdr-edu').textContent = G.education.toUpperCase();
  document.getElementById('ava-job').textContent = G.jobTitle;
  
  ['health','happiness','smarts','looks'].forEach(s => {
    document.getElementById('sv-'+s).textContent = G[s];
    document.getElementById('sf-'+s).style.width = G[s] + '%';
  });
  
  const log = document.getElementById('life-log');
  log.innerHTML = G.log.slice(0, 10).map(l => `<div class="log-entry log-${l.type}"><b>Age ${l.age}:</b> ${l.msg}</div>`).join('');
}

function addLog(msg, type='info') {
  G.log.unshift({age:G.age, msg, type});
}

function pickGender(g) {
  document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('btn-'+g).classList.add('selected');
}

function spawnFloat(txt, pos) {
  const el = document.createElement('div');
  el.className = 'float-num ' + (pos?'f-pos':'f-neg');
  el.textContent = txt;
  el.style.left = '50%'; el.style.top = '40%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function die() {
  const legacy = G.money > 100000 ? "Wealthy" : "Simple";
  document.getElementById('m-icon').textContent = '🪦';
  document.getElementById('m-title').textContent = G.name + ' has passed away';
  document.getElementById('m-body').innerHTML = `<div class="tombstone-card">Lived ${G.age} years.<br>Legacy: ${legacy}</div>`;
  document.getElementById('m-btns').innerHTML = `<button class="mbtn pri" onclick="location.reload()">Start New Life</button>`;
  document.getElementById('modal').style.display = 'flex';
}

function save() {
  localStorage.setItem('life_story_save', JSON.stringify(G));
}

function continueLife() {
  const saved = localStorage.getItem('life_story_save');
  if(saved) {
    G = JSON.parse(saved);
    document.getElementById('start-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');
    updateUI();
  }
}

// Check for existing save
if(localStorage.getItem('life_story_save')) document.getElementById('continue-btn').style.display = 'block';

// Initial render
renderTab('act');
</script>
</body>
</html>
