<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🌱 Life Story!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --amber:#f59e0b;--green:#10b981;--indigo:#6366f1;--red:#ef4444;--blue:#3b82f6;
  --text:#1e293b;--text2:#64748b;--border:#fde68a;--shadow:rgba(245,158,11,.15)
}
body{
  font-family:'Nunito','Comic Sans MS',sans-serif;
  background:linear-gradient(160deg,#fef9ee 0%,#ecfdf5 50%,#eff6ff 100%);
  min-height:100vh;color:var(--text);overflow-x:hidden
}

/* ── SCREENS ── */
.screen{display:none}.screen.active{display:block}
#start-screen{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px}
#start-screen.active{display:flex}

/* ── START ── */
.start-logo{font-size:5em;animation:bounce-in .6s cubic-bezier(.34,1.56,.64,1);margin-bottom:8px}
@keyframes bounce-in{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.start-title{font-size:2.4em;font-weight:900;color:var(--text);margin-bottom:4px}
.start-sub{color:var(--text2);font-size:.95em;margin-bottom:28px;text-align:center}
.start-card{width:100%;max-width:380px;background:white;border-radius:28px;padding:28px 24px;box-shadow:0 8px 40px var(--shadow);border:3px solid var(--border)}
.form-label{font-size:.75em;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);margin-bottom:6px;display:block}
.form-input{width:100%;background:#fafafa;border:2px solid #e2e8f0;border-radius:14px;padding:12px 16px;font-family:inherit;font-size:1em;font-weight:700;color:var(--text);outline:none;margin-bottom:18px;transition:border-color .2s}
.form-input:focus{border-color:var(--amber)}
.gender-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
.gender-btn{background:#f8fafc;border:2.5px solid #e2e8f0;border-radius:16px;padding:14px 10px;font-family:inherit;font-weight:800;font-size:.95em;cursor:pointer;transition:all .15s;color:var(--text2)}
.gender-btn.selected{background:#fffbeb;border-color:var(--amber);color:var(--amber)}
.btn-start{width:100%;padding:16px;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;font-family:inherit;font-weight:900;font-size:1.1em;border:none;border-radius:18px;cursor:pointer;box-shadow:0 5px 0 #b45309;transition:all .1s}
.btn-start:active{transform:translateY(4px);box-shadow:0 1px 0 #b45309}
.btn-continue{width:100%;max-width:380px;margin-top:12px;padding:13px;background:white;color:var(--indigo);font-family:inherit;font-weight:800;font-size:.95em;border:2.5px solid #c7d2fe;border-radius:16px;cursor:pointer;transition:all .15s}
.btn-continue:active{background:#eef2ff}

/* ── GAME SCREEN ── */
#game-screen{max-width:440px;margin:0 auto;padding:16px 14px 90px}

/* top bar */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.top-name{font-weight:900;font-size:1.2em;color:var(--text)}
.top-right{display:flex;align-items:center;gap:8px}
.top-money{font-weight:800;font-size:.88em;color:var(--green);background:#d1fae5;padding:4px 10px;border-radius:20px}
.save-indicator{font-size:.7em;font-weight:800;color:var(--green);background:#ecfdf5;padding:3px 8px;border-radius:10px;opacity:0;transition:opacity .4s}
.save-indicator.show{opacity:1}
.btn-new{background:white;color:var(--red);border:2px solid #fee2e2;padding:6px 10px;border-radius:12px;font-family:inherit;font-weight:800;font-size:.78em;cursor:pointer}

/* avatar card */
.avatar-card{background:white;border-radius:26px;padding:20px 22px;box-shadow:0 4px 20px rgba(0,0,0,.06);border:2.5px solid var(--border);display:flex;align-items:center;gap:18px;margin-bottom:12px;position:relative;overflow:hidden}
.avatar-card::before{content:'';position:absolute;top:0;right:0;width:120px;height:100%;opacity:.06;background:radial-gradient(circle at 80% 50%,var(--amber) 0%,transparent 70%)}
.ava-emoji{font-size:4.2em;line-height:1;animation:float 3s ease-in-out infinite;flex-shrink:0;transition:all .4s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.ava-age{font-size:3em;font-weight:900;color:var(--amber);line-height:1}
.ava-label{font-size:.75em;color:var(--text2);font-weight:700}
.ava-stage{font-size:.9em;font-weight:800;color:var(--text)}
.ava-job{font-size:.8em;color:var(--text2);font-weight:700;margin-top:2px}

/* stats card */
.stats-card{background:white;border-radius:22px;padding:18px;box-shadow:0 4px 20px rgba(0,0,0,.05);border:2.5px solid #e0f2fe;margin-bottom:12px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.stat-head{display:flex;justify-content:space-between;margin-bottom:5px}
.stat-name{font-size:.75em;font-weight:800;color:var(--text2)}
.stat-val{font-size:.75em;font-weight:900;color:var(--text);transition:all .3s}
.stat-val.pulse{animation:stat-pulse .5s}
@keyframes stat-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.35);color:var(--green)}}
.stat-val.pulse-bad{animation:stat-pulse-bad .5s}
@keyframes stat-pulse-bad{0%,100%{transform:scale(1)}50%{transform:scale(1.35);color:var(--red)}}
.stat-bar{height:10px;background:#f1f5f9;border-radius:99px;overflow:hidden}
.stat-fill{height:100%;border-radius:99px;transition:width .55s ease,background-color .55s}

/* panel card */
.panel-card{background:white;border-radius:22px;padding:18px 16px;box-shadow:0 4px 20px rgba(0,0,0,.05);border:2.5px solid #e2e8f0;margin-bottom:12px}
.tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.tab-btn{padding:7px 14px;border-radius:12px;font-family:inherit;font-weight:800;font-size:.78em;cursor:pointer;border:none;white-space:nowrap;background:#f8fafc;color:var(--text2);transition:all .15s}
.tab-btn.on{background:var(--indigo);color:white}

/* act items */
.act-item{background:#fafafa;border-radius:16px;padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;border:2px solid transparent;margin-bottom:8px;transition:all .15s}
.act-item:active{transform:scale(.97);border-color:var(--indigo);background:#eef2ff}
.act-item *{pointer-events:none}
.act-icon{font-size:1.8em;flex-shrink:0}
.act-title{font-size:.9em;font-weight:800;color:var(--text)}
.act-sub{font-size:.75em;color:var(--text2);font-weight:600}

/* log */
.log-box{max-height:200px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#e2e8f0 transparent}
.log-entry{padding:7px 12px;border-radius:12px;margin-bottom:5px;font-size:.8em;font-weight:700;line-height:1.5;animation:log-in .3s ease-out}
@keyframes log-in{from{transform:translateX(-10px);opacity:0}to{transform:translateX(0);opacity:1}}
.log-good{background:#ecfdf5;color:#065f46;border-left:3px solid #10b981}
.log-bad{background:#fef2f2;color:#991b1b;border-left:3px solid #ef4444}
.log-info{background:#eff6ff;color:#1e40af;border-left:3px solid #3b82f6}
.log-event{background:#fffbeb;color:#92400e;border-left:3px solid #f59e0b}
.log-legend{background:#fdf4ff;color:#6b21a8;border-left:3px solid #a855f7}

/* age up btn */
.age-up-btn{width:100%;padding:18px;font-family:inherit;font-weight:900;font-size:1.1em;background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;border-radius:20px;cursor:pointer;box-shadow:0 5px 0 #047857;transition:all .1s;display:flex;align-items:center;justify-content:center;gap:8px}
.age-up-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #047857}

/* achievements */
.badge-strip{display:flex;gap:8px;overflow-x:auto;padding:4px 0 8px}
.badge-pill{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #f59e0b;border-radius:20px;padding:5px 12px;font-size:.75em;font-weight:800;color:#92400e;white-space:nowrap;flex-shrink:0;animation:pop-in .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop-in{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

/* achievement gallery */
.trophy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.trophy-item{background:#f8fafc;border-radius:16px;padding:12px 8px;text-align:center;border:2px solid #e2e8f0}
.trophy-item.unlocked{background:linear-gradient(135deg,#fffbeb,#fef3c7);border-color:#f59e0b}
.trophy-emoji{font-size:2em;margin-bottom:4px;display:block}
.trophy-name{font-size:.7em;font-weight:800;color:var(--text);line-height:1.3}
.trophy-locked{filter:grayscale(1);opacity:.35}

/* floating numbers */
.float-num{position:fixed;font-size:1.4em;font-weight:900;pointer-events:none;z-index:200;animation:float-up 1s ease-out forwards}
.f-pos{color:#10b981}.f-neg{color:#ef4444}.f-gold{color:#f59e0b}
@keyframes float-up{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-80px) scale(1.2);opacity:0}}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.modal-card{background:white;border-radius:28px;padding:32px 24px;width:88%;max-width:370px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);border:3px solid var(--border);animation:modal-in .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes modal-in{from{transform:scale(.7) translateY(30px);opacity:0}to{transform:scale(1);opacity:1}}
.modal-icon{font-size:4.5em;margin-bottom:10px}
.modal-title{font-size:1.6em;font-weight:900;color:var(--text);margin-bottom:6px}
.modal-body{font-size:.9em;color:var(--text2);margin-bottom:20px;line-height:1.6;font-weight:600}
.modal-btns{display:grid;gap:8px}
.mbtn{padding:13px 16px;border:none;border-radius:16px;font-family:inherit;font-weight:800;font-size:.95em;cursor:pointer;transition:all .1s;text-align:center}
.mbtn:active{transform:scale(.97)}
.mbtn.pri{background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;box-shadow:0 4px 0 #3730a3}
.mbtn.pri:active{transform:translateY(3px);box-shadow:0 1px 0 #3730a3}
.mbtn.sec{background:#f8fafc;color:var(--text);border:2px solid #e2e8f0}
.mbtn.dan{background:#fee2e2;color:#991b1b;border:2px solid #fca5a5}
.mbtn.grn{background:linear-gradient(135deg,#10b981,#059669);color:white;box-shadow:0 4px 0 #047857}

/* mini-game modal */
.minigame-box{background:#f8fafc;border-radius:20px;padding:20px;margin-bottom:16px;border:2px solid #e2e8f0;text-align:center}
.mg-question{font-size:1.8em;font-weight:900;color:var(--text);margin-bottom:14px}
.mg-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mg-opt{padding:12px;background:white;border:2.5px solid #e2e8f0;border-radius:14px;font-family:inherit;font-weight:800;font-size:1.1em;cursor:pointer;transition:all .15s}
.mg-opt:active{transform:scale(.95)}
.mg-opt.correct{background:#ecfdf5;border-color:#10b981;animation:c-flash .4s}
.mg-opt.wrong{background:#fef2f2;border-color:#ef4444;animation:w-shake .35s}
@keyframes c-flash{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes w-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.mg-timer-bar{height:6px;background:#e2e8f0;border-radius:99px;overflow:hidden;margin-top:12px}
.mg-timer-fill{height:100%;background:var(--green);border-radius:99px;transition:width .1s linear}
.mg-feedback{font-size:.9em;font-weight:800;min-height:22px;margin-top:8px}

/* confetti */
.confetti-piece{position:fixed;width:10px;height:10px;pointer-events:none;z-index:999;border-radius:2px;animation:c-fall linear forwards}
@keyframes c-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* shake */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.shake{animation:shake .45s ease}

/* music btn */
.music-btn{position:fixed;bottom:20px;right:16px;z-index:50;background:white;border:2.5px solid var(--border);border-radius:50%;width:50px;height:50px;font-size:1.3em;cursor:pointer;box-shadow:0 4px 15px var(--shadow);display:flex;align-items:center;justify-content:center;transition:all .2s}
.music-btn:active{transform:scale(.9)}

/* word scramble */
.scramble-letters{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.letter-tile{width:36px;height:36px;background:var(--indigo);color:white;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1em;font-weight:900;cursor:pointer;transition:all .15s;user-select:none}
.letter-tile:active{transform:scale(.9)}
.answer-row{display:flex;gap:6px;justify-content:center;margin:8px 0;min-height:40px;flex-wrap:wrap}
.answer-slot{width:36px;height:36px;border:2px dashed #e2e8f0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1em;font-weight:900;background:#fafafa;cursor:pointer;transition:all .15s}
.answer-slot.filled{background:var(--amber);color:white;border-color:var(--amber)}

/* ── ENERGY BAR ── */
.energy-bar-wrap{background:white;border-radius:18px;padding:12px 16px;margin-bottom:12px;border:2.5px solid #fde68a;box-shadow:0 2px 12px rgba(245,158,11,.1);display:flex;align-items:center;gap:12px}
.energy-label{font-size:.78em;font-weight:900;color:var(--text2);white-space:nowrap;min-width:60px}
.energy-track{flex:1;height:12px;background:#f1f5f9;border-radius:99px;overflow:hidden}
.energy-fill{height:100%;border-radius:99px;transition:width .5s ease,background-color .4s}
.energy-count{font-size:.78em;font-weight:900;color:var(--amber);white-space:nowrap;min-width:36px;text-align:right}
/* greyed out act items */
.act-item.disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.5)}
.act-item.disabled:active{transform:none;border-color:transparent;background:#fafafa}
/* flash overlay */
#flash-overlay{position:fixed;inset:0;pointer-events:none;z-index:199;opacity:0;transition:opacity .12s;background:rgba(239,68,68,0)}
/* tombstone */
.tombstone-card{background:linear-gradient(160deg,#1e293b,#0f172a);border-radius:28px;padding:32px 24px;text-align:center;border:3px solid #334155}
.tomb-emoji{font-size:5em;margin-bottom:10px;display:block}
.tomb-title{font-size:1.8em;font-weight:900;color:white;margin-bottom:6px}
.tomb-sub{font-size:.95em;color:#94a3b8;margin-bottom:20px;line-height:1.6;font-weight:600}
.tomb-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.tomb-stat{background:rgba(255,255,255,.06);border-radius:14px;padding:10px 8px;text-align:center}
.tomb-stat-val{font-size:1.2em;font-weight:900;color:white}
.tomb-stat-lbl{font-size:.68em;color:#64748b;font-weight:700;margin-top:2px}
.tomb-legacy{background:linear-gradient(135deg,#f59e0b,#d97706);color:white;border-radius:16px;padding:10px 16px;font-weight:900;font-size:.95em;margin-bottom:20px}

</style>
</head>
<body>

<!-- ════════════ START SCREEN ════════════ -->
<div id="start-screen" class="screen active">
  <div class="start-logo">🌱</div>
  <div class="start-title">Life Story!</div>
  <div class="start-sub">Every choice shapes who you become.<br>What kind of life will you live?</div>
  <div class="start-card">
    <span class="form-label">Your Name</span>
    <input id="char-name" class="form-input" type="text" placeholder="Enter your name..." maxlength="20"/>
    <span class="form-label">I am a...</span>
    <div class="gender-grid">
      <button type="button" class="gender-btn selected" id="btn-male"   onclick="pickGender('male')">👦 Boy</button>
      <button type="button" class="gender-btn"          id="btn-female" onclick="pickGender('female')">👧 Girl</button>
    </div>
    <button type="button" class="btn-start" onclick="startLife()">🚀 Begin My Life!</button>
  </div>
  <button type="button" class="btn-continue" id="continue-btn" style="display:none" onclick="continueLife()">▶️ Continue My Story</button>
</div>

<!-- ════════════ GAME SCREEN ════════════ -->
<div id="game-screen" class="screen">
<div id="gs-inner">

  <div class="top-bar">
    <div>
      <div class="top-name" id="hdr-name">---</div>
      <div style="font-size:.75em;color:var(--text2);font-weight:700" id="hdr-edu">No education yet</div>
    </div>
    <div class="top-right">
      <div class="top-money">💰 $<span id="hdr-money">0</span></div>
      <div class="save-indicator" id="save-ind">💾 Saved!</div>
      <button type="button" class="btn-new" onclick="confirmNew()">🔄</button>
    </div>
  </div>

  <div id="badge-strip" class="badge-strip" style="display:none"></div>

  <!-- Energy bar -->
  <div class="energy-bar-wrap">
    <span class="energy-label">⚡ Energy</span>
    <div class="energy-track"><div class="energy-fill" id="energy-fill" style="width:100%"></div></div>
    <span class="energy-count" id="energy-count">5/5</span>
  </div>

  <!-- Avatar -->
  <div class="avatar-card">
    <div class="ava-emoji" id="ava-emoji">👶</div>
    <div>
      <div class="ava-age" id="ava-age">0</div>
      <div class="ava-label">years old</div>
      <div class="ava-stage" id="ava-stage">Newborn 👶</div>
      <div class="ava-job"   id="ava-job">💤 No job yet</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-card">
    <div style="font-size:.72em;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);margin-bottom:12px">📊 Your Stats</div>
    <div class="stats-grid">
      <div><div class="stat-head"><span class="stat-name">❤️ Health</span><span class="stat-val" id="sv-health">100</span></div><div class="stat-bar"><div class="stat-fill" id="sf-health" style="width:100%"></div></div></div>
      <div><div class="stat-head"><span class="stat-name">😊 Happiness</span><span class="stat-val" id="sv-happiness">80</span></div><div class="stat-bar"><div class="stat-fill" id="sf-happiness" style="width:80%"></div></div></div>
      <div><div class="stat-head"><span class="stat-name">🧠 Smarts</span><span class="stat-val" id="sv-smarts">50</span></div><div class="stat-bar"><div class="stat-fill" id="sf-smarts" style="width:50%"></div></div></div>
      <div><div class="stat-head"><span class="stat-name">✨ Looks</span><span class="stat-val" id="sv-looks">50</span></div><div class="stat-bar"><div class="stat-fill" id="sf-looks" style="width:50%"></div></div></div>
    </div>
  </div>

  <!-- Activity panel -->
  <div class="panel-card">
    <div class="tabs">
      <button type="button" class="tab-btn on"  id="tab-act"  onclick="openTab('act')">🎯 Do</button>
      <button type="button" class="tab-btn"     id="tab-work" onclick="openTab('work')">💼 Work</button>
      <button type="button" class="tab-btn"     id="tab-edu"  onclick="openTab('edu')">📚 Learn</button>
      <button type="button" class="tab-btn"     id="tab-bank" onclick="openTab('bank')">🏦 Money</button>
      <button type="button" class="tab-btn"     id="tab-cups" onclick="openTab('cups')">🏆 Trophies</button>
    </div>
    <div id="panel-act"></div>
    <div id="panel-work" style="display:none"></div>
    <div id="panel-edu"  style="display:none"></div>
    <div id="panel-bank" style="display:none"></div>
    <div id="panel-cups" style="display:none"></div>
  </div>

  <!-- Log -->
  <div class="panel-card">
    <div style="font-size:.72em;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);margin-bottom:10px">📜 Life Log</div>
    <div class="log-box" id="life-log"></div>
  </div>

  <!-- Age Up -->
  <button type="button" class="age-up-btn" onclick="ageUp()">
    <span>🎂</span><span>Age Up — Turn <span id="next-age">1</span></span>
  </button>

  <div style="height:80px"></div>
</div>
</div>

<!-- ════════════ MODAL ════════════ -->
<div class="modal-bg" id="modal" style="display:none">
  <div class="modal-card">
    <div class="modal-icon" id="m-icon">🎉</div>
    <div class="modal-title" id="m-title">Something happened!</div>
    <div class="modal-body"  id="m-body">Description.</div>
    <div id="m-extra"></div>
    <div class="modal-btns" id="m-btns"></div>
  </div>
</div>

<!-- Flash overlay -->
<div id="flash-overlay"></div>

<!-- Music -->
<button type="button" class="music-btn" id="music-btn" onclick="SoundManager.toggleMusic()" title="Toggle music">🎵</button>

<script>
// ══════════════════════════════════════════
// SOUND MANAGER
// ══════════════════════════════════════════
const SoundManager = (() => {
  let ctx = null, musicInterval = null, musicOn = false;
  const getCtx = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; };

  function tone(freq, type, dur, vol=0.25, delay=0) {
    try {
      const c=getCtx(), o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type=type; o.frequency.setValueAtTime(freq, c.currentTime+delay);
      g.gain.setValueAtTime(vol, c.currentTime+delay);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+delay+dur);
      o.start(c.currentTime+delay); o.stop(c.currentTime+delay+dur+0.05);
    } catch(e){}
  }

  return {
    unlock() { try{ getCtx().resume(); }catch(e){} },
    click()  { tone(600,'sine',.04,.12); },
    success(){ tone(523,'square',.06,.2); tone(659,'square',.06,.2,.08); tone(784,'square',.12,.18,.16); },
    fail()   { tone(280,'sawtooth',.1,.3); tone(200,'sawtooth',.15,.3,.1); },
    money()  { tone(880,'sine',.05,.28); tone(1047,'sine',.05,.28,.06); tone(1319,'sine',.1,.22,.12); },
    ageUp()  { tone(440,'sine',.05,.22); tone(554,'sine',.05,.22,.07); tone(659,'sine',.11,.22,.14); },
    levelUp(){ [523,659,784,1047].forEach((f,i)=>tone(f,'sine',.1,.25,i*.1)); },
    legend() { [784,988,1175,1319,1568].forEach((f,i)=>tone(f,'sine',.14,.28,i*.07)); },
    gameOver(){ tone(440,'sawtooth',.2,.38); tone(330,'sawtooth',.25,.38,.2); tone(220,'sawtooth',.4,.38,.4); },
    minigameWin(){ tone(784,'square',.05,.2); tone(988,'square',.05,.2,.06); tone(1175,'square',.12,.2,.12); },
    minigameFail(){ tone(300,'sawtooth',.08,.28); tone(250,'sawtooth',.12,.28,.09); },

    toggleMusic() {
      this.unlock();
      musicOn = !musicOn;
      document.getElementById('music-btn').textContent = musicOn ? '🔇' : '🎵';
      if (musicOn) {
        const notes = [262,294,330,392,440,392,330,294];
        let i = 0;
        musicInterval = setInterval(() => { tone(notes[i%notes.length],'sine',.28,.05); i++; }, 380);
      } else {
        clearInterval(musicInterval);
      }
    }
  };
})();

// CONFETTI
// ══════════════════════════════════════════
function burst(n=55) {
  const cols=['#f59e0b','#10b981','#6366f1','#ef4444','#3b82f6','#f472b6','#fb923c'];
  for (let i=0;i<n;i++) {
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${.8+Math.random()*1.2}s;animation-delay:${Math.random()*.5}s;transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 2100);
  }
}

      G.achievements.push(a.id);
      addLog(`🏆 Achievement: ${a.emoji} ${a.name} unlocked!`, 'legend');
      SoundManager.levelUp();
      burst(40);
      renderBadges();
    }
  });
}

function renderBadges() {
  const strip = document.getElementById('badge-strip');
  if (!G.achievements.length){ strip.style.display='none'; return; }
  strip.style.display='flex';
  strip.innerHTML = G.achievements.map(id=>{
    const a=ALL_ACHIEVEMENTS.find(x=>x.id===id);
    return a?`<div class="badge-pill">${a.emoji} ${a.name}</div>`:'';
  }).join('');
}

function evFn(name) {
  if(name==='crush'){ const ok=Math.random()>.5; addLog(ok?'💕 They said YES! ❤️':'😢 They said no... heartbroken.',ok?'good':'bad'); applyMod(ok?{happiness:20}:{happiness:-15}); }
  if(name==='move_out'){ if(G.money>=5000){applyMod({happiness:18,money:-5000});addLog('Moved into your own place! 🏠','good');}else{addLog('Not enough savings!','bad');applyMod({happiness:-5});} }
  if(name==='invest'){ if(G.money>=5000){const w=Math.random()>.4;applyMod({money:w?9000:-5000});addLog(w?'Investment paid off! +$9,000 💰':'Investment crashed... -$5,000 😭',w?'good':'bad');if(w)SoundManager.money();}else{addLog('Not enough money to invest!','bad');} }
  if(name==='start_biz'){ if(G.money>=3000){const w=Math.random()>.5;applyMod({money:w?20000:-3000,happiness:w?25:-10});addLog(w?'🚀 Business took off! +$20,000!':'📉 Business failed... -$3,000',w?'good':'bad');if(w){SoundManager.levelUp();burst(50);}}else{addLog('Need $3,000 to start a business!','bad');} }
  if(name==='_fired'){
    if(G.job){ addLog(`Lost job as ${G.jobTitle}! 😤`,'bad'); G.job=null;G.jobTitle='Unemployed';G.salary=0;G.promotionChance=0; applyMod({happiness:-15}); SoundManager.fail(); G.misfortune=Math.min((G.misfortune||0)+20,100); }
  }
}

  {q:'🚀 15 − 7 = ?',  a:8,   opts:[6,7,8,9]},
  {q:'🎈 12 × 8 = ?',  a:96,  opts:[84,90,96,100]},
  {q:'🍕 144 ÷ 12 = ?',a:12,  opts:[10,11,12,13]},
  {q:'🌈 25 + 37 = ?',  a:62,  opts:[61,62,63,64]},
  {q:'🦁 100 − 36 = ?', a:64,  opts:[54,64,74,84]},
  {q:'🎯 6 × 7 = ?',   a:42,  opts:[36,40,42,48]},

const WORDS = [

];

let mgState = {};

function startMathMiniGame(onWin, onFail) {
  const q = MATH_QS[Math.floor(Math.random()*MATH_QS.length)];
  const opts = [...q.opts].sort(()=>Math.random()-.5);

  document.getElementById('m-title').textContent = 'Quick Maths!';
  document.getElementById('m-body').textContent  = 'Solve it fast for bonus Smarts!';

  document.getElementById('m-extra').innerHTML   = `
    <div class="minigame-box">
      <div class="mg-question">${q.q}</div>
      <div class="mg-opts" id="mg-opts"></div>
      <div class="mg-feedback" id="mg-fb"></div>
      <div class="mg-timer-bar"><div class="mg-timer-fill" id="mg-timer" style="width:100%"></div></div>
    </div>`;
  document.getElementById('modal').style.display='flex';

  timerInterval = setInterval(()=>{
    timeLeft -= 2;

function startScrambleMiniGame(onWin, onFail) {
  const w = WORDS[Math.floor(Math.random()*WORDS.length)];
  const scrambled = w.word.split('').sort(()=>Math.random()-.5);
  let chosen = [];

  function render() {
    document.getElementById('m-extra').innerHTML=`
      <div class="minigame-box">
        <div style="font-size:.85em;font-weight:700;color:var(--text2);margin-bottom:6px">${w.hint}</div>
        <div class="answer-row" id="ans-row">${Array(w.word.length).fill(0).map((_,i)=>`<div class="answer-slot ${i<chosen.length?'filled':''}" data-i="${i}" onclick="removeScrambleLetter(${i})">${chosen[i]||''}</div>`).join('')}</div>
        <div class="scramble-letters" id="scr-letters">${scrambled.map((l,i)=>`<div class="letter-tile ${chosen.includes(l+'_'+i)?'opacity-40':''}" data-key="${l+'_'+i}" onclick="addScrambleLetter('${l}','${l+'_'+i}')">${l}</div>`).join('')}</div>
        <div class="mg-feedback" id="mg-fb"></div>
        <div style="margin-top:10px;display:flex;gap:8px">
          <button type="button" class="mbtn sec" style="flex:1" onclick="clearScramble()">🔄 Clear</button>
          <button type="button" class="mbtn grn" style="flex:1" onclick="submitScramble('${w.word}',${JSON.stringify(onWin)},${JSON.stringify(onFail)})">✅ Submit</button>
        </div>
      </div>`;
  }

  mgState = { scrambled, chosen, word:w.word, onWin, onFail };
  document.getElementById('m-icon').textContent  = '🔤';
  document.getElementById('m-title').textContent = 'Word Scramble!';
  document.getElementById('m-body').textContent  = 'Unscramble the letters to earn Smarts!';
  document.getElementById('m-btns').innerHTML    = '';
  document.getElementById('modal').style.display = 'flex';
  render();
  window._renderScramble = render;
}

window.addScrambleLetter = function(letter, key) {
  if (mgState.chosen.length >= mgState.word.length) return;
  if (mgState.chosen.map((_,i)=>mgState.scrambled[i]).includes(key)) return;
  mgState.chosen.push(letter);
  window._renderScramble();
};
window.removeScrambleLetter = function(i) {
  if(i<mgState.chosen.length){ mgState.chosen.splice(i,1); window._renderScramble(); }
};
window.clearScramble = function() {
  mgState.chosen=[]; window._renderScramble();
};
window.submitScramble = function(word, onWin, onFail) {
  const guess = mgState.chosen.join('');
  const fb = document.getElementById('mg-fb');
  if(guess===word){ fb.textContent='🌟 Correct! +Smarts!'; fb.style.color='var(--green)'; SoundManager.minigameWin(); setTimeout(()=>mgDone(true,onWin),700); }
  else { fb.textContent=`❌ It was: ${word}`; fb.style.color='var(--red)'; SoundManager.minigameFail(); setTimeout(()=>mgDone(false,onFail),700); }
};

function mgDone(won, cb) {
  closeModal();
  if(typeof cb==='function') cb(won);
}

function clamp(v,mn=0,mx=100){ return Math.max(mn,Math.min(mx,v)); }
function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

const prevStats = {};
function applyMod(mod, silent=false) {
  const before = { health:G.health, happiness:G.happiness, smarts:G.smarts, looks:G.looks, money:G.money };
  if(mod.health    !=null) G.health    = clamp(G.health    + mod.health);
  if(mod.happiness !=null) G.happiness = clamp(G.happiness + mod.happiness);
  if(mod.smarts    !=null) G.smarts    = clamp(G.smarts    + mod.smarts);
  if(mod.looks     !=null) G.looks     = clamp(G.looks     + mod.looks);
  if(mod.money     !=null) { G.money   = Math.max(0, G.money + mod.money); }

  if(!silent){
    // Flash red on significant stat losses
    if((mod.health&&mod.health<=-10)||(mod.happiness&&mod.happiness<=-10)) { flashRed(); shakeScreen(); }
    if(mod.health    &&mod.health!==0)    spawnFloat((mod.health>0?'+':'')+mod.health+'❤️',    mod.health>0,    false);
    if(mod.happiness &&mod.happiness!==0) spawnFloat((mod.happiness>0?'+':'')+mod.happiness+'😊', mod.happiness>0, false);
    if(mod.smarts    &&mod.smarts!==0)    spawnFloat((mod.smarts>0?'+':'')+mod.smarts+'🧠',    mod.smarts>0,    false);
    if(mod.money     &&mod.money!==0)     { spawnFloat((mod.money>0?'+$':'-$')+Math.abs(mod.money).toLocaleString(), mod.money>0, true); if(mod.money>0)SoundManager.money(); }

    // Pulse stat values in UI
    ['health','happiness','smarts','looks'].forEach(s=>{
      if(mod[s]!=null && mod[s]!==0){
        const el=document.getElementById('sv-'+s);
        if(el){ el.classList.remove('pulse','pulse-bad'); void el.offsetWidth; el.classList.add(mod[s]>0?'pulse':'pulse-bad'); }
      }
    });
  }
  updateUI();
  checkAchievements();
}

function addLog(msg, type='info') {
  G.log.unshift({msg, type, age:G.age});
  if(G.log.length>80) G.log.pop();
  renderLog();
}

function spawnFloat(text, pos, gold=false) {
  const el=document.createElement('div');
  el.className='float-num '+(gold?'f-gold':pos?'f-pos':'f-neg');
  el.textContent=text;
  el.style.left=(20+Math.random()*50)+'%';
  el.style.top=(30+Math.random()*25)+'vh';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

function shakeScreen(){ const el=document.getElementById('gs-inner'); el.classList.add('shake'); setTimeout(()=>el.classList.remove('shake'),450); }

function flashRed() {
  const f=document.getElementById('flash-overlay');
  if(!f) return;
  f.style.background='rgba(239,68,68,0.18)';
  f.style.opacity='1';
  setTimeout(()=>f.style.opacity='0', 200);
}

function useEnergy(cost=1) {
  // Returns true if action allowed, false if not enough energy
  if(G.energy < cost) {
    SoundManager.fail();
    addLog('⚡ Not enough energy! Age Up to rest and recharge.','bad');
    shakeScreen();
    return false;
  }
  G.energy -= cost;
  updateEnergyUI();
  return true;
}

function updateEnergyUI() {
  const pct = (G.energy / G.maxEnergy) * 100;
  const fill = document.getElementById('energy-fill');
  const count = document.getElementById('energy-count');
  if(fill) {
    fill.style.width = pct + '%';
    fill.style.backgroundColor = G.energy === 0 ? '#ef4444' : G.energy <= 1 ? '#f59e0b' : '#10b981';
  }
  if(count) count.textContent = G.energy + '/' + G.maxEnergy;
}

// Diminishing returns: track how many times each activity was used this year
function actCount(key) {
  if(!G.yearActCounts) G.yearActCounts = {};
  return G.yearActCounts[key] || 0;
}
function incActCount(key) {
  if(!G.yearActCounts) G.yearActCounts = {};
  G.yearActCounts[key] = (G.yearActCounts[key] || 0) + 1;
}
function scaledBonus(key, base, tiers=[1, 0.5, 0]) {
  // Returns diminished bonus based on how many times used
  const used = actCount(key);
  const mult = used < tiers.length ? tiers[used] : 0;
  return Math.round(base * mult);
}

function getAvatar(age, gender) {
  if(age<3)  return '👶';
  if(age<13) return gender==='female'?'👧':'👦';
  if(age<22) return '🧑‍🎓';
  if(age<60) return gender==='female'?'👩‍💼':'👨‍💼';
  return gender==='female'?'👵':'👴';
}
function getStage(age) {
  if(age<3)  return '👶 Newborn';
  if(age<6)  return '🧒 Toddler';
  if(age<13) return '🎒 Kid';
  if(age<18) return '🎧 Teen';
  if(age<22) return '🧑‍🎓 Young Adult';
  if(age<40) return '💼 Adult';
  if(age<60) return '🧠 Prime';
  if(age<75) return '🌟 Senior';
  return '🏆 Elder';
}
function statColor(v){ return v>=70?'#10b981':v>=40?'#f59e0b':'#ef4444'; }

function openTab(name) {
  ['act','work','edu','bank','cups'].forEach(t=>{
    document.getElementById('panel-'+t).style.display=t===name?'block':'none';
    document.getElementById('tab-'+t).classList.toggle('on',t===name);
  });

  if(name==='work') renderWork();
  if(name==='edu')  renderEdu();
  if(name==='bank') renderBank();

function actItem(emoji, title, sub, fn) {
  const d=document.createElement('div'); d.className='act-item';
  d.innerHTML=`<div class="act-icon">${emoji}</div><div class="act-info"><div class="act-title">${title}</div><div class="act-sub">${sub}</div></div>`;
  d.onclick=fn; return d;
}

function renderActivities() {
  const el=document.getElementById('panel-act'); el.innerHTML='';
  const a=G.age;
  const noEnergy = G.energy <= 0;

  // Show energy warning if depleted
  if(noEnergy) {
    const warn=document.createElement('div');
    warn.style.cssText='background:#fff7ed;border:2px solid #fed7aa;border-radius:14px;padding:10px 14px;margin-bottom:10px;font-size:.82em;font-weight:800;color:#c2410c;text-align:center';
    warn.textContent='⚡ No energy left! Click Age Up to rest and refill.';
    el.appendChild(warn);
  }

  // Energy cost display helper
  function energySub(baseSub, key) {
    const used=actCount(key);
    const dimNote=used===1?' (half bonus)':used>=2?' (no more bonus)':'';
    return baseSub + dimNote + ' · ⚡-1';
  }

  function addAct(minAge, emoji, title, subBase, key, energyCost, fn) {
    if(a < minAge) return;
    const item = actItem(emoji, title, energySub(subBase, key), () => {
      if(!useEnergy(energyCost)) return;
      fn();
      renderActivities(); // re-render to show updated diminshing returns
    });
    if(noEnergy) item.classList.add('disabled');
    el.appendChild(item);
  }

  addAct(5,  '📖','Read a Book',    '+6 Smarts, +3 Happy',    'read',     1, ()=>{
    const s=scaledBonus('read',6), h=scaledBonus('read',3);
    incActCount('read');
    if(s>0||h>0){applyMod({smarts:s,happiness:h});addLog(`Read a book 📖 +${s} Smarts, +${h} Happy`,'good');}
    else{addLog('Read a book — nothing new to learn here this year 📖','info');}
    SoundManager.success();
  });
  addAct(5,  '🎨','Draw / Paint',   '+4 Happy, +3 Looks',     'draw',     1, ()=>{
    const h=scaledBonus('draw',4), l=scaledBonus('draw',3);
    incActCount('draw');
    if(h>0||l>0){applyMod({happiness:h,looks:l});addLog('Got creative 🎨','good');}
    else{addLog('Drew a bit but inspiration ran dry this year 🎨','info');}
    SoundManager.success();
  });
  addAct(6,  '🏃','Exercise',       '+6 Health, +3 Looks',    'run',      1, ()=>{
    const h=scaledBonus('run',6), l=scaledBonus('run',3);
    incActCount('run');
    if(h>0||l>0){applyMod({health:h,looks:l});addLog('Went for a run 🏃','good');}
    else{addLog('Ran again — body needs rest, minimal benefit 🏃','info');}
    SoundManager.success();
  });
  addAct(8,  '🎵','Play Music',     '+5 Happy, +3 Smarts',    'music',    1, ()=>{
    const h=scaledBonus('music',5), s=scaledBonus('music',3);
    incActCount('music');
    if(h>0||s>0){applyMod({happiness:h,smarts:s});addLog('Played music 🎵','good');}
    else{addLog('Played music — practised but no new growth this year 🎵','info');}
    SoundManager.success();
  });
  addAct(12, '🏋️','Hit the Gym',  '+10 Health, +6 Looks',   'gym',      1, ()=>{
    const h=scaledBonus('gym',10), l=scaledBonus('gym',6);
    incActCount('gym');
    if(h>0||l>0){applyMod({health:h,looks:l});addLog('Crushed the gym 🏋️','good');}
    else{addLog('Hit the gym again — need rest for max gains 🏋️','info');}
    SoundManager.success();
  });
  addAct(12, '👥','Hang with Friends','+12 Happiness',         'social',   1, ()=>{
    const h=scaledBonus('social',12);
    incActCount('social');
    if(h>0){applyMod({happiness:h});addLog('Hung out with friends 😄','good');}
    else{addLog('Saw friends again — still fun but nothing new this year! 👥','info');}
    SoundManager.success();
  });
  addAct(16, '🧘','Meditate',       '+10 Happy, +4 Health',   'meditate', 1, ()=>{
    const h=scaledBonus('meditate',10), hp=scaledBonus('meditate',4);
    incActCount('meditate');
    if(h>0||hp>0){applyMod({happiness:h,health:hp});addLog('Meditated 🧘','good');}
    else{addLog('Meditated — already at peace this year 🧘','info');}
    SoundManager.success();
  });
  if(a>=18) {
    const item=actItem('🏥','See a Doctor','+15 Health (−$200) · no ⚡ cost',()=>{
      if(G.money>=200){applyMod({health:15,money:-200});addLog('Doctor visit 🏥 +15 Health','info');}
      else{addLog("Can't afford doctor!","bad");SoundManager.fail();}
    });
    el.appendChild(item); // doctor free — no energy cost
  }
  if(a>=21) {
    addAct(21,'🎰','Casino Night',   'Risk $500 for $1,500?',  'casino',   1, ()=>{
      const w=Math.random()>.5;
      incActCount('casino');

  const avail=JOBS.filter(j=>G.age>=j.minAge&&G.smarts>=j.minSmarts&&eduRank[G.education]>=eduRank[j.minEdu]&&j.id!==G.job);
  if(avail.length){
    const lbl=document.createElement('div');lbl.style.cssText='font-size:.72em;font-weight:900;text-transform:uppercase;color:var(--text2);margin-bottom:8px';lbl.textContent=G.job?'Other Jobs':'Apply for a Job';el.appendChild(lbl);
    avail.forEach(j=>el.appendChild(actItem(j.emoji,j.title,`$${j.salary.toLocaleString()}/mo · Age ${j.minAge}+`,()=>{
      const chance=35+G.smarts*.5;
      if(Math.random()*100<chance){G.job=j.id;G.jobTitle=j.title;G.salary=j.salary;G.promotionChance=10;addLog(`Got the job! ${j.emoji} ${j.title} $${j.salary.toLocaleString()}/mo 🎉`,'good');SoundManager.levelUp();applyMod({happiness:15});burst(40);}
      else{addLog(`Applied for ${j.title} but didn\'t get it. Try harder!`,'bad');SoundManager.fail();}
      renderWork();
    })));
  }else if(!G.job){el.innerHTML+='<p style="color:var(--text2);font-size:.85em;text-align:center;padding:8px">Study more for better jobs! 📚</p>';}
}

function renderEdu() {
  const el=document.getElementById('panel-edu'); el.innerHTML='';
  const badge={none:'None',highschool:'🎓 High School',university:'🏛️ University',graduate:'🎓 Grad School'};
  el.innerHTML=`<div style="background:#eff6ff;border-radius:18px;padding:14px;margin-bottom:10px;border:2px solid #bfdbfe"><div style="font-size:.72em;font-weight:900;text-transform:uppercase;color:#1e40af;margin-bottom:4px">Education</div><div style="font-weight:900">${badge[G.education]}</div>${G.studyingAt?`<div style="color:#3b82f6;font-size:.8em;margin-top:2px">📖 ${G.studyingAt}</div>`:''}</div>`;

  // Study mini-game button
  el.appendChild(actItem('🧮','Study Hard (Mini-game!)','Solve a question to earn Smarts!',()=>{
    SoundManager.click();
    const type=Math.random()>.5?'math':'scramble';
    if(type==='math') startMathMiniGame(won=>{if(won){applyMod({smarts:12,happiness:3});addLog('Crushed the maths challenge! +12 Smarts 🧠','good');}else{applyMod({smarts:5});addLog('Got some questions wrong... +5 Smarts anyway','info');}}, won=>{applyMod({smarts:5});addLog('+5 Smarts from studying','info');});
    else startScrambleMiniGame(won=>{if(won){applyMod({smarts:12,happiness:3});addLog('Unscrambled it! +12 Smarts 🧠','good');}else{applyMod({smarts:5});addLog('+5 Smarts from studying','info');}}, won=>{applyMod({smarts:5});addLog('+5 Smarts from studying','info');});
  }));

  if(G.age>=18&&eduRank[G.education]<2&&G.smarts>=50) el.appendChild(actItem('🏛️','Enrol University','Smarts 50+ needed. Unlocks great jobs!',()=>{if(G.money<3000&&G.money>0){addLog('Need $3,000 tuition!','bad');SoundManager.fail();return;}G.education='university';G.studyingAt='University 🏛️';applyMod({smarts:12,money:-3000,happiness:-5});addLog('Enrolled in University! 🏛️','event');SoundManager.levelUp();burst(50);renderEdu();}));
  if(G.age>=24&&G.education==='university'&&G.smarts>=75) el.appendChild(actItem('🎓','Graduate School','Smarts 75+ needed. Top jobs await!',()=>{G.education='graduate';G.studyingAt='Grad School 🎓';applyMod({smarts:18,money:-6000});addLog('Enrolled in Graduate School! 🎓','event');SoundManager.levelUp();burst(60);renderEdu();}));
}

function renderBank() {
  const el=document.getElementById('panel-bank');
  const tier=G.money>=1000000?'🤑 Millionaire!':G.money>=100000?'💎 Wealthy':G.money>=10000?'💰 Comfortable':G.money>=1000?'👍 Getting by':'😟 Struggling';
  el.innerHTML=`<div style="background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-radius:20px;padding:18px;margin-bottom:12px;border:2px solid #6ee7b7;text-align:center"><div style="font-size:2.2em;font-weight:900;color:#059669">$${G.money.toLocaleString()}</div><div style="color:#065f46;font-weight:800;font-size:.9em">${tier}</div></div><div style="background:#f8fafc;border-radius:16px;padding:14px;margin-bottom:10px;border:2px solid #e2e8f0"><div style="font-size:.72em;font-weight:900;text-transform:uppercase;color:var(--text2);margin-bottom:8px">Monthly Income</div><div style="display:flex;justify-content:space-between"><span style="font-weight:700;color:var(--text2)">Salary</span><span style="font-weight:900;color:#059669">$${G.salary.toLocaleString()}</span></div></div>`;
  if(G.money>=500) el.appendChild(actItem('🏦','Save in Bank','Earn 4% interest',()=>{const i=Math.floor(G.money*.04);applyMod({money:i});addLog(`Bank interest: +$${i} 🏦`,'good');SoundManager.money();}));
}

function renderTrophies() {
  const el=document.getElementById('panel-cups');
  el.innerHTML=`<div style="font-size:.72em;font-weight:900;text-transform:uppercase;color:var(--text2);margin-bottom:12px">🏆 ${G.achievements.length}/${ALL_ACHIEVEMENTS.length} Unlocked</div><div class="trophy-grid">${ALL_ACHIEVEMENTS.map(a=>{const unlocked=G.achievements.includes(a.id);return`<div class="trophy-item${unlocked?' unlocked':''}"><span class="trophy-emoji${unlocked?'':' trophy-locked'}">${a.emoji}</span><div class="trophy-name">${unlocked?a.name:a.desc}</div></div>`;}).join('')}</div>`;
}

// ══════════════════════════════════════════
// AGE UP
// ══════════════════════════════════════════
function ageUp() {
  SoundManager.unlock(); SoundManager.ageUp();
  G.age++;

  // ── RESET energy & diminishing returns for new year ──
  G.maxEnergy = G.age < 6 ? 3 : G.age < 13 ? 4 : G.age < 60 ? 5 : 4; // less energy when elderly
  G.energy = G.maxEnergy;
  G.yearActCounts = {};

  // ── Natural stat drift ──
  G.happiness = clamp(G.happiness - rand(1,3));
  // Age decay: accelerates after 60
  const healthDrop = G.age > 70 ? rand(2,5) : G.age > 60 ? rand(1,3) : G.age > 50 ? rand(0,2) : 1;
  G.health = clamp(G.health - healthDrop);
  if(G.age > 60) addLog(`Age ${G.age}: health declining naturally 🌿 (−${healthDrop} Health)`,'info');

  // ── Misfortune decay (slowly recovers over time) ──
  G.misfortune = Math.max(0, (G.misfortune||0) - 5);

  // ── Salary ──
  if(G.salary>0){ G.money+=G.salary; addLog(`Earned $${G.salary.toLocaleString()} salary 💰`,'good'); SoundManager.money(); }

  // ── Milestones ──
  if(G.age===5)  addLog('Started school! First day 🎒','event');
  if(G.age===13) addLog('Officially a teenager! 🎉','event');
  if(G.age===18){ addLog("You're 18! High school done! 🎓",'event'); G.education='highschool'; burst(50); SoundManager.levelUp(); }
  if(G.age===30) addLog('Turned 30! Feeling wiser 🌟','event');
  if(G.age===50) addLog('Big 50! Half a century! 🎂','event');
  if(G.age===65) addLog('Retirement age reached! 🏖️','event');

  // ── Graduation ──
  if(G.studyingAt?.includes('University')&&G.age>=22){ G.studyingAt=null; addLog('Graduated University! 🎓','event'); SoundManager.levelUp(); burst(60); }
  if(G.studyingAt?.includes('Grad')&&G.age>=28){ G.studyingAt=null; addLog('Completed Grad School! 🎓','event'); SoundManager.legend(); burst(80); }

  // ── Promotion ──
  if(G.job&&Math.random()*100<G.promotionChance){ const r=Math.floor(G.salary*.18); G.salary+=r; G.promotionChance=Math.max(0,G.promotionChance-20); addLog(`Promoted! New salary: $${G.salary.toLocaleString()} (+$${r}) 🎉`,'good'); SoundManager.levelUp(); }

  // ── IMMEDIATE DEATH on 0 health or 0 happiness ──
  if(G.health<=0 || G.happiness<=0 || G.age>=100){
    const cause = G.health<=0 ? 'Your health reached zero.' : G.happiness<=0 ? 'Your happiness hit zero — a broken spirit.' : 'A long life, well lived.';
    G.health=Math.max(G.health,0); G.happiness=Math.max(G.happiness,0);
    addLog(`Life ended at age ${G.age}. ${cause} 🕊️`,'bad');
    SoundManager.gameOver(); flashRed();
    setTimeout(showLegacyScreen, 600);
    return;
  }

  // ── EVENT SYSTEM with misfortune weighting ──
  const roll = Math.random()*100;
  const rarity = roll<1 ? 'l' : roll<12 ? 'r' : 'c';
  const misfortunePull = (G.misfortune||0) > 30; // bad luck pulls toward negative events
  const pool = EVENTS.filter(e=>G.age>=e.minAge&&G.age<=e.maxAge&&e.r===rarity);

  // Misfortune: inject a negative event override occasionally
  const negEvents = [
    {minAge:16,maxAge:99,r:'c',emoji:'🔥',title:'Fired!',body:'Your boss let you go. You're unemployed.',choices:[{l:'😤 Start fresh',fn:'_fired',style:'dan'},{l:'💔 I saw it coming',fn:'_fired',style:'sec'}]},
    {minAge:18,maxAge:99,r:'c',emoji:'🏚️',title:'Bad Luck Week',body:'Everything that could go wrong, did. Your mood crashed.',choices:[{l:'💪 Push through',m:{happiness:-15,health:-5}},{l:'😴 Rest it off',m:{happiness:-10,health:5}}]},
    {minAge:20,maxAge:80,r:'c',emoji:'💸',title:'Unexpected Bill!',body:'A huge unexpected bill just landed. Ouch!',choices:[{l:'💸 Pay it',m:{money:-2000,happiness:-10}},{l:'😰 Ignore it',m:{happiness:-20}}]},
  ];

  let ev = null;
  if(misfortunePull && Math.random()<.4 && G.age>=16){
    ev = negEvents[Math.floor(Math.random()*negEvents.length)];
    G.misfortune = Math.max(0, G.misfortune-15); // used up some bad luck
  } else if(pool.length && (rarity!=='c' || Math.random()<.38)){
    ev = pool[Math.floor(Math.random()*pool.length)];
  }

  if(ev){
    if(ev.r==='l'){ SoundManager.legend(); burst(70); }
    showModal(ev.emoji, ev.title, ev.body, ev.choices.map((c,i)=>({...c,style:c.style||(i===0?'pri':'sec')})));
  }

  // Danger warning
  if(G.health<30){ shakeScreen(); flashRed(); addLog('⚠️ Your health is critically low!','bad'); }
  else if(G.happiness<25){ shakeScreen(); flashRed(); addLog('⚠️ Your happiness is dangerously low!','bad'); }

  checkAchievements();
  save();
  updateUI();
  renderActivities();
}

// ══════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════
function showModal(icon, title, body, choices) {
  document.getElementById('m-icon').textContent  = icon;
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-body').textContent  = body;
  document.getElementById('m-extra').innerHTML   = '';
  const btns=document.getElementById('m-btns'); btns.innerHTML='';
  choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.type='button'; btn.className='mbtn '+(c.style||'sec');
    btn.textContent=c.l||c.label;
    btn.onclick=()=>{
      closeModal();
      if(c.fn==='_restart'){clear();location.reload();return;}
      if(c.fn) evFn(c.fn);
      if(c.m)  applyMod(c.m);
      if(c.m?.health<0||c.m?.money<0) SoundManager.fail(); else SoundManager.success();
    };
    btns.appendChild(btn);
  });
  document.getElementById('modal').style.display='flex';
}
function closeModal(){ document.getElementById('modal').style.display='none'; document.getElementById('m-extra').innerHTML=''; }

// ══════════════════════════════════════════
// START / CONTINUE
// ══════════════════════════════════════════
function pickGender(g) {
  chosenGender=g;
  document.getElementById('btn-male').classList.toggle('selected',g==='male');
  document.getElementById('btn-female').classList.toggle('selected',g==='female');
}

function startLife() {
  SoundManager.unlock();
  const name=(document.getElementById('char-name').value.trim())||(chosenGender==='female'?'Sofia':'Alex');
  G={...DEFAULT,name,gender:chosenGender,log:[]};
  addLog(`${name} was born! 🌱 A brand new story begins...`,'good');
  SoundManager.levelUp(); burst(40);
  save(); launchGame();
}

function continueLife() {
  SoundManager.unlock();
  const saved=load(); if(saved){G=saved;launchGame();}
}

function launchGame() {
  document.getElementById('start-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
  renderActivities(); renderBadges(); updateUI();
}

function confirmNew() {
  showModal('⚠️', 'Start Over?', 'This will erase your current life and progress forever. Are you sure?', [
    { label: '🔥 Reset Everything', fn: '_restart', style: 'dan' },
    { label: '🔙 Keep Playing', style: 'sec' }
  ]);
}

// Initialize the start screen if a save exists
window.onload = () => {
  if (load()) {
    document.getElementById('continue-btn').style.display = 'block';
  }
};
</script>
