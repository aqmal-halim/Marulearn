<head>
<meta charset="UTF-8">

<style>
/* ═══════════════════════════════════════════════
   FONTS & RESET
═══════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
–bg:       #fef3c7;
–card:     #ffffff;
–card2:    #fffbeb;
–accent:   #f59e0b;
–accent2:  #10b981;
–accent3:  #6366f1;
–accent4:  #ef4444;
–text:     #1e293b;
–text2:    #64748b;
–border:   #fde68a;
–shadow:   rgba(245,158,11,0.18);
}

body {
font-family: ‘Nunito’, ‘Comic Sans MS’, sans-serif;
background: linear-gradient(160deg, #fef9ee 0%, #ecfdf5 50%, #eff6ff 100%);
min-height: 100vh;
color: var(–text);
overflow-x: hidden;
}

/* ═══════════════════════════════════════════════
SCREENS
═══════════════════════════════════════════════ */
.screen { display:none; }
.screen.active { display:block; }

/* ═══════════════════════════════════════════════
START SCREEN
═══════════════════════════════════════════════ */
#start-screen {
min-height: 100vh;
display: none;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 24px 20px;
}
#start-screen.active { display:flex; }

.start-logo { font-size: 5em; animation: bounce-in 0.6s cubic-bezier(0.34,1.56,0.64,1); margin-bottom: 8px; }
@keyframes bounce-in { from{transform:scale(0) rotate(-20deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }

.start-title { font-size: 2.4em; font-weight: 900; color: var(–text); margin-bottom: 4px; }
.start-sub   { color: var(–text2); font-size: 0.95em; margin-bottom: 28px; text-align:center; }

.start-card {
width: 100%; max-width: 380px;
background: white;
border-radius: 28px;
padding: 28px 24px;
box-shadow: 0 8px 40px var(–shadow);
border: 3px solid var(–border);
}

.form-label { font-size: 0.75em; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(–text2); margin-bottom: 6px; display:block; }
.form-input {
width: 100%; background: #fafafa; border: 2px solid #e2e8f0; border-radius: 14px;
padding: 12px 16px; font-family: inherit; font-size: 1em; font-weight: 700; color: var(–text);
outline: none; margin-bottom: 18px; transition: border-color 0.2s;
}
.form-input:focus { border-color: var(–accent); }

.gender-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:22px; }
.gender-btn  {
background: #f8fafc; border: 2.5px solid #e2e8f0; border-radius: 16px;
padding: 14px 10px; font-family: inherit; font-weight: 800; font-size: 0.95em;
cursor: pointer; transition: all 0.15s; color: var(–text2);
}
.gender-btn.selected { background: #fffbeb; border-color: var(–accent); color: var(–accent); }

.btn-start {
width: 100%; padding: 16px; background: linear-gradient(135deg, #f59e0b, #d97706);
color: white; font-family: inherit; font-weight: 900; font-size: 1.1em;
border: none; border-radius: 18px; cursor: pointer;
box-shadow: 0 5px 0 #b45309; transition: all 0.1s;
}
.btn-start:active { transform: translateY(4px); box-shadow: 0 1px 0 #b45309; }

.btn-continue {
width: 100%; max-width: 380px; margin-top: 12px;
padding: 13px; background: white; color: var(–accent3);
font-family: inherit; font-weight: 800; font-size: 0.95em;
border: 2.5px solid #c7d2fe; border-radius: 16px; cursor: pointer;
transition: all 0.15s;
}
.btn-continue:active { background: #eef2ff; }

/* ═══════════════════════════════════════════════
GAME SCREEN
═══════════════════════════════════════════════ */
#game-screen { max-width: 440px; margin: 0 auto; padding: 16px 14px 80px; }

/* Top bar */
.top-bar {
display: flex; justify-content: space-between; align-items: center;
margin-bottom: 14px;
}
.top-name  { font-weight: 900; font-size: 1.2em; color: var(–text); }
.top-money { font-weight: 800; font-size: 0.9em; color: var(–accent2); background: #d1fae5; padding: 4px 10px; border-radius: 20px; }
.btn-new   {
background: white; color: var(–accent4); border: 2px solid #fee2e2;
padding: 6px 12px; border-radius: 12px; font-family: inherit; font-weight: 800; font-size: 0.78em;
cursor: pointer;
}

/* Avatar card */
.avatar-card {
background: white; border-radius: 26px; padding: 20px 22px;
box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 2.5px solid var(–border);

}
.avatar-card::before {
content: ‘’; position:absolute; top:0; right:0;

/* Activity panel */

.modal-btn.primary:active   { transform:translateY(3px); box-shadow:0 1px 0 #3730a3; }
.modal-btn.secondary { background:#f8fafc; color:var(–text); border:2px solid #e2e8f0; }
.modal-btn.secondary:active { background:#eef2ff; }
.modal-btn.danger    { background:#fee2e2; color:#991b1b; border:2px solid #fca5a5; }

/* ═══════════════════════════════════════════════
FLOATING +/- NUMBERS (juice!)
═══════════════════════════════════════════════ */
.float-num {

100% { transform:translateY(-80px) scale(1.2); opacity:0; }

/* Screen shake */
@keyframes shake {

/* Music toggle */

box-shadow:0 4px 15px var(–shadow); display:flex; align-items:center; justify-content:center;
transition:all 0.2s;
}
.music-btn:active { transform:scale(0.9); }
</style>

</head>

<script>
// ══════════════════════════════════════════
// SOUND ENGINE (Web Audio API)
// ══════════════════════════════════════════
let audioCtx = null;
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, type, dur, vol=0.3, delay=0) {
  try {
    const c=getAC(), o=c.createOscillator(), g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type=type; o.frequency.setValueAtTime(freq, c.currentTime+delay);
    g.gain.setValueAtTime(vol, c.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+delay+dur);
    o.start(c.currentTime+delay); o.stop(c.currentTime+delay+dur+0.05);
  } catch(e) {}
}

const SFX = {
  ageUp()   { beep(440,'sine',0.06,0.25); beep(554,'sine',0.06,0.25,0.07); beep(659,'sine',0.12,0.25,0.14); },
  good()    { beep(523,'square',0.07,0.2); beep(659,'square',0.07,0.2,0.08); beep(784,'square',0.12,0.18,0.16); },
  bad()     { beep(300,'sawtooth',0.1,0.3); beep(220,'sawtooth',0.15,0.3,0.1); },
  money()   { beep(880,'sine',0.05,0.3); beep(1047,'sine',0.05,0.3,0.06); beep(1319,'sine',0.1,0.25,0.12); },
  levelUp() { [523,659,784,1047,1319].forEach((f,i)=>beep(f,'sine',0.1,0.25,i*0.08)); },
  legend()  { [784,988,1175,1319,1568].forEach((f,i)=>beep(f,'sine',0.15,0.3,i*0.07)); },
  over()    { beep(440,'sawtooth',0.2,0.4); beep(330,'sawtooth',0.25,0.4,0.2); beep(220,'sawtooth',0.4,0.4,0.4); },
  click()   { beep(600,'sine',0.04,0.15); },
};

// ── Background music (simple generative loop) ──
let bgInterval = null, musicOn = false;
function toggleMusic() {
  try { getAC().resume(); } catch(e) {}
  musicOn = !musicOn;
  document.getElementById('music-btn').textContent = musicOn ? '🔇' : '🎵';
  if (musicOn) {
    const melody = [262,294,330,349,392,440,494,523];
    let i = 0;
    bgInterval = setInterval(() => {
      beep(melody[i % melody.length], 'sine', 0.3, 0.06);
      i++;
    }, 400);
  } else {
    clearInterval(bgInterval);
  }
}

// ══════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════
const DEFAULT = {
  name:'Player', gender:'male', age:0,
  health:100, happiness:80, smarts:50, looks:50,
  money:0, job:null, jobTitle:'Unemployed', salary:0,
  education:'none', studyingAt:null, promotionChance:0,
  achievements:[], log:[],
};
let G = { ...DEFAULT };
let chosenGender = 'male';

function save() { localStorage.setItem('lifestory_v2', JSON.stringify(G)); }
function load() { const s=localStorage.getItem('lifestory_v2'); return s?JSON.parse(s):null; }
function clear(){ localStorage.removeItem('lifestory_v2'); }

// ══════════════════════════════════════════
// ACHIEVEMENTS
// ══════════════════════════════════════════
const ACHIEVEMENTS = [
  { id:'scholar',    emoji:'🎓', label:'Scholar',      check:()=>G.smarts>=90 },
  { id:'millionaire',emoji:'💎', label:'Millionaire',  check:()=>G.money>=1000000 },
  { id:'healthy',    emoji:'💪', label:'Iron Body',    check:()=>G.health===100 && G.age>=30 },
  { id:'happy',      emoji:'😄', label:'Always Happy', check:()=>G.happiness>=95 },
  { id:'ceo',        emoji:'🏢', label:'Big Boss',     check:()=>G.job==='ceo' },
  { id:'doctor',     emoji:'👨‍⚕️', label:'Doctor',    check:()=>G.job==='doctor' },
  { id:'graduate',   emoji:'🏛️', label:'Grad School', check:()=>G.education==='graduate' },
  { id:'senior',     emoji:'👴', label:'Senior',       check:()=>G.age>=70 },
  { id:'centenarian',emoji:'🎂', label:'100 Years!',   check:()=>G.age>=100 },
  { id:'rich_kid',   emoji:'💰', label:'Rich Kid',     check:()=>G.age<18&&G.money>=10000 },
];

function checkAchievements() {
  ACHIEVEMENTS.forEach(a => {
    if (!G.achievements.includes(a.id) && a.check()) {
      G.achievements.push(a.id);
      addLog(`🏆 Achievement unlocked: ${a.emoji} ${a.label}!`, 'legend');
      SFX.levelUp();
      renderBadges();
    }
  });
}

function renderBadges() {
  const strip = document.getElementById('badge-strip');
  if (!G.achievements.length) { strip.style.display='none'; return; }
  strip.style.display = 'flex';
  strip.innerHTML = G.achievements.map(id => {
    const a = ACHIEVEMENTS.find(x=>x.id===id);
    return a ? `<div class="badge-pill">${a.emoji} ${a.label}</div>` : '';
  }).join('');
}

  }
}

// HELPERS
// ══════════════════════════════════════════
function clamp(v,mn=0,mx=100){ return Math.max(mn,Math.min(mx,v)); }
function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

function applyMod(mod, silent=false) {
  const prev = { health:G.health, happiness:G.happiness, smarts:G.smarts, looks:G.looks, money:G.money };
  if(mod.health    != null) G.health    = clamp(G.health    + mod.health);
  if(mod.happiness != null) G.happiness = clamp(G.happiness + mod.happiness);
  if(mod.smarts    != null) G.smarts    = clamp(G.smarts    + mod.smarts);
  if(mod.looks     != null) G.looks     = clamp(G.looks     + mod.looks);
  if(mod.money     != null) { G.money   = Math.max(0, G.money + mod.money); }

  if(!silent) {
    // Floating numbers for fun feedback
    if(mod.health    && mod.health    !==0) spawnFloat((mod.health   >0?'+':'')+mod.health+'❤️',   mod.health>0);
    if(mod.happiness && mod.happiness !==0) spawnFloat((mod.happiness>0?'+':'')+mod.happiness+'😊', mod.happiness>0);
    if(mod.smarts    && mod.smarts    !==0) spawnFloat((mod.smarts   >0?'+':'')+mod.smarts+'🧠',    mod.smarts>0);
    if(mod.money     && mod.money     !==0) { spawnFloat((mod.money>0?'+$':'-$')+Math.abs(mod.money).toLocaleString(), mod.money>0, true); if(mod.money>0) SFX.money(); }
  }

  updateUI();
  checkAchievements();
}

function addLog(msg, type='info') {
  G.log.unshift({ msg, type, age:G.age });
  if(G.log.length>80) G.log.pop();
  renderLog();
}

function spawnFloat(text, positive, gold=false) {
  const el = document.createElement('div');
  el.className = 'float-num ' + (gold?'float-gold':positive?'float-pos':'float-neg');
  el.textContent = text;
  el.style.left  = (30 + Math.random()*50) + '%';
  el.style.top   = (30 + Math.random()*30) + 'vh';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function shakeScreen() {
  const el = document.getElementById('gs-inner');
  el.classList.add('shake');
  setTimeout(()=>el.classList.remove('shake'), 450);
}

function getAvatar(age, gender) {
  if(age < 2)  return '👶';
  if(age < 5)  return gender==='female'?'👧':'👦';
  if(age < 13) return gender==='female'?'👧':'👦';
  if(age < 18) return gender==='female'?'👩':'🧑';
  if(age < 30) return gender==='female'?'👩':'👨';
  if(age < 50) return gender==='female'?'👩':'👨';
  if(age < 65) return gender==='female'?'🧑‍🦳':'🧑‍🦳';
  return gender==='female'?'👵':'👴';
}
function getStage(age) {
  if(age < 2)  return '👶 Newborn';
  if(age < 5)  return '🧒 Toddler';
  if(age < 13) return '🎒 Kid';
  if(age < 18) return '🎧 Teenager';
  if(age < 22) return '🎓 Young Adult';
  if(age < 40) return '💼 Adult';
  if(age < 65) return '🧠 Middle-aged';
  return '🌟 Senior';
}
function statColor(v) {
  if(v>=70) return '#10b981';
  if(v>=40) return '#f59e0b';
  return '#ef4444';
}

function updateUI() {
  document.getElementById('hdr-name').textContent  = G.name;
  document.getElementById('hdr-money').textContent = G.money.toLocaleString();
  document.getElementById('hdr-edu').textContent   = { none:'No education yet', highschool:'🎓 High School', university:'🏛️ University', graduate:'🎓 Graduate School' }[G.education];
  document.getElementById('ava-emoji').textContent = getAvatar(G.age, G.gender);
  document.getElementById('ava-age').textContent   = G.age;
  document.getElementById('ava-stage').textContent = getStage(G.age);
  document.getElementById('ava-job').textContent   = G.job ? (JOBS.find(j=>j.id===G.job)?.emoji||'') + ' ' + G.jobTitle : '💤 Unemployed';
  document.getElementById('next-age').textContent  = G.age+1;

  ['health','happiness','smarts','looks'].forEach(s => {
    const v = G[s];
    const fill = document.getElementById('sf-'+s);
    const val  = document.getElementById('sv-'+s);
    if(fill) { fill.style.width=v+'%'; fill.style.backgroundColor=statColor(v); }

  renderLog();
}

        <div style="color:var(--text2);font-size:0.78em;margin-top:4px">Promotion chance: <b>${G.promotionChance}%</b></div>
      </div>`;
    el.appendChild(actBtn('💪','Work Hard','+15% promotion, bonus pay', ()=>{ G.promotionChance=Math.min(G.promotionChance+15,85); const b=Math.floor(G.salary*0.06); applyMod({happiness:-5,money:b}); addLog(`Worked extra hard 💪 +$${b} bonus. Promo: ${G.promotionChance}%`,'good'); SFX.good(); }));
    el.appendChild(actBtn('🚪','Quit Job','Go back to job hunting', ()=>{ addLog(`Left job as ${G.jobTitle}`,'info'); G.job=null;G.jobTitle='Unemployed';G.salary=0;G.promotionChance=0;applyMod({happiness:-10}); SFX.bad(); }));
    el.innerHTML += '<div style="height:8px"></div>';
  }

  const avail = JOBS.filter(j=>G.age>=j.minAge && G.smarts>=j.minSmarts && eduRank[G.education]>=eduRank[j.minEdu] && j.id!==G.job);
  if(avail.length) {
    const lbl = document.createElement('div');
    lbl.style.cssText='font-size:0.72em;font-weight:900;text-transform:uppercase;color:var(--text2);margin-bottom:8px';
    lbl.textContent = G.job ? 'Other Jobs Available' : 'Apply for a Job';
    el.appendChild(lbl);
    avail.forEach(j=>{
      el.appendChild(actBtn(j.emoji, j.title, `$${j.salary.toLocaleString()}/mo · Min age ${j.minAge}`, ()=>{
        const chance = 35 + G.smarts*0.5;
        if(Math.random()*100<chance){ G.job=j.id;G.jobTitle=j.title;G.salary=j.salary;G.promotionChance=10;addLog(`Got the job! ${j.emoji} ${j.title} $${j.salary.toLocaleString()}/mo 🎉`,'good');SFX.levelUp();applyMod({happiness:15}); }
        else { addLog(`Applied for ${j.title} but didn\'t get it. Try harder!`,'bad'); SFX.bad(); }
        renderWork();
      }));
    });
  } else if(!G.job) {
    el.innerHTML += '<p style="color:var(--text2);font-size:0.85em;text-align:center;padding:8px">Study more to unlock better jobs! 📚</p>';
  }
}

function renderEdu() {
  const el = document.getElementById('panel-edu');
  el.innerHTML = '';
  const badge = { none:'None', highschool:'🎓 High School', university:'🏛️ University', graduate:'🎓 Graduate School' };
  el.innerHTML = `<div style="background:#eff6ff;border-radius:18px;padding:14px;margin-bottom:10px;border:2px solid #bfdbfe"><div style="font-size:0.72em;font-weight:900;text-transform:uppercase;color:#1e40af;margin-bottom:4px">Education</div><div style="font-weight:900">${badge[G.education]}</div>${G.studyingAt?`<div style="color:#3b82f6;font-size:0.8em;margin-top:2px">📖 ${G.studyingAt}</div>`:''}</div>`;

  el.appendChild(actBtn('📖','Study Hard', G.age<18?'+9 Smarts (school)':'+6 Smarts (self-study)', ()=>{ applyMod({smarts:G.age<18?9:6,happiness:-3}); addLog('Studied hard 📖 +Smarts','good'); SFX.good(); }));

  if(G.age>=18 && eduRank[G.education]<2 && G.smarts>=50) {
    el.appendChild(actBtn('🏛️','Enrol in University','Needs Smarts 50+. Opens great jobs!',()=>{ if(G.money<3000&&G.money>0){addLog('Need $3,000 for tuition!','bad');return;} G.education='university';G.studyingAt='University 🏛️';applyMod({smarts:12,money:-3000,happiness:-5});addLog('Enrolled in University! 🏛️','event');SFX.levelUp();renderEdu(); }));
  }
  if(G.age>=24 && G.education==='university' && G.smarts>=75) {
    el.appendChild(actBtn('🎓','Graduate School','Needs Smarts 75+. Unlocks top jobs!',()=>{ G.education='graduate';G.studyingAt='Graduate School 🎓';applyMod({smarts:18,money:-6000});addLog('Enrolled in Graduate School! 🎓','event');SFX.levelUp();renderEdu(); }));
  }
}

function renderBank() {
  const el = document.getElementById('panel-bank');
  const tier = G.money>=1000000?'🤑 Millionaire!':G.money>=100000?'💎 Wealthy':G.money>=10000?'💰 Comfortable':G.money>=1000?'👍 Getting by':'😟 Struggling';
  el.innerHTML = `
    <div style="background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-radius:20px;padding:18px;margin-bottom:12px;border:2px solid #6ee7b7;text-align:center">
      <div style="font-size:2.2em;font-weight:900;color:#059669">$${G.money.toLocaleString()}</div>
      <div style="color:#065f46;font-weight:800;font-size:0.9em">${tier}</div>
    </div>
    <div style="background:#f8fafc;border-radius:16px;padding:14px;margin-bottom:10px;border:2px solid #e2e8f0">
      <div style="font-size:0.72em;font-weight:900;text-transform:uppercase;color:var(--text2);margin-bottom:8px">Monthly Income</div>
      <div style="display:flex;justify-content:space-between"><span style="font-weight:700;color:var(--text2)">Salary</span><span style="font-weight:900;color:#059669">$${G.salary.toLocaleString()}</span></div>
    </div>`;
  if(G.money>=500) {
    el.appendChild(actBtn('🏦','Save in Bank','Earn 4% interest on your money',()=>{ const i=Math.floor(G.money*0.04); applyMod({money:i}); addLog(`Bank interest: +$${i} 🏦`,'good'); SFX.money(); }));
  }
}

// ══════════════════════════════════════════
// AGE UP — THE MAIN LOOP
// ══════════════════════════════════════════
function ageUp() {
  try { getAC().resume(); } catch(e) {}
  SFX.ageUp();
  G.age++;

  // Natural drift
  G.happiness = clamp(G.happiness - rand(1,3));
  G.health    = clamp(G.health    - (G.age>50 ? rand(1,3) : 1));

  // Salary collected
  if(G.salary>0) {
    G.money += G.salary;
    addLog(`Earned $${G.salary.toLocaleString()} salary this year 💰`, 'good');
    SFX.money();
  }

  // Milestones
  if(G.age===5)  addLog('Started school! First day 🎒', 'event');
  if(G.age===13) addLog('Officially a teenager! 🎉', 'event');
  if(G.age===18) { addLog('You\'re 18! High school done! 🎓', 'event'); G.education='highschool'; }
  if(G.age===30) addLog('Turned 30! Feeling wiser 🌟', 'event');
  if(G.age===50) addLog('Half a century! Big 50! 🎂', 'event');
  if(G.age===65) addLog('Retirement age reached! 🏖️', 'event');

  // Graduation
  if(G.studyingAt?.includes('University') && G.age>=22){ G.studyingAt=null; addLog('Graduated University! 🎓 New jobs unlocked!','event'); SFX.levelUp(); }
  if(G.studyingAt?.includes('Graduate') && G.age>=28){ G.studyingAt=null; addLog('Completed Grad School! 🎓 Top jobs available!','event'); SFX.legend(); }

  // Promotion
  if(G.job && Math.random()*100<G.promotionChance) {
    const raise=Math.floor(G.salary*0.18);
    G.salary+=raise; G.promotionChance=Math.max(0,G.promotionChance-20);
    addLog(`Promoted! 🎉 New salary: $${G.salary.toLocaleString()} (+$${raise})`, 'good');
    SFX.levelUp();
  }

  // Death
  if(G.age>=100||G.health<=0) {
    addLog(`A full life, ended at age ${G.age}. What a journey 🕊️`, 'bad');
    SFX.over();
    showModal('🕊️','Life Complete',
      `${G.name} lived to age ${G.age}. Final wealth: $${G.money.toLocaleString()}.`,
      [{ label:'🌱 Begin a New Life', fn:'_restart', style:'primary' }]
    );
    return;
  }

  // Random event — rarity system
  const roll = Math.random()*100;
  const rarity = roll<1?'legendary': roll<12?'rare': 'common';
  const pool = EVENTS.filter(e=>G.age>=e.minAge && G.age<=e.maxAge && e.rarity===rarity);
  if(pool.length && (rarity!=='common'||Math.random()<0.35)) {
    const ev = pool[Math.floor(Math.random()*pool.length)];
    if(ev.rarity==='legendary') SFX.legend();
    showModal(ev.emoji, ev.title, ev.body, ev.choices.map(c=>({ ...c, style:c.style||'secondary' })));
  }

  if(G.health<30||G.happiness<25) shakeScreen();

  checkAchievements();
  save();
  updateUI();
  renderActivities();
}

// ══════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════
function showModal(icon, title, body, choices) {
  document.getElementById('m-icon').textContent  = icon;
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-body').textContent  = body;
  const btns = document.getElementById('m-btns');
  btns.innerHTML='';
  choices.forEach((c,i) => {
    const btn = document.createElement('button');
    btn.type='button';
    btn.className = 'modal-btn ' + (c.style || (i===0?'primary':'secondary'));
    btn.textContent = c.label;
    btn.onclick = () => {
      closeModal();
      if(c.fn==='_restart'){ clear(); location.reload(); return; }
      if(c.fn) evFn(c.fn);
      if(c.mod) { applyMod(c.mod); }
      if(c.mod?.health<0||c.mod?.money<0) SFX.bad(); else SFX.good();
    };
    btns.appendChild(btn);
  });
  document.getElementById('modal').style.display='flex';
}
function closeModal(){ document.getElementById('modal').style.display='none'; }

// ══════════════════════════════════════════
// START / CONTINUE
// ══════════════════════════════════════════
function pickGender(g) {
  chosenGender=g;
  document.getElementById('btn-male').classList.toggle('selected',g==='male');
  document.getElementById('btn-female').classList.toggle('selected',g==='female');
}

function startLife() {
  try { getAC().resume(); } catch(e) {}
  const name = (document.getElementById('char-name').value.trim()) || (chosenGender==='female'?'Sofia':'Alex');
  G = { ...DEFAULT, name, gender:chosenGender, log:[] };
  addLog(`${name} was born! 🌱 A brand new story begins...`, 'good');
  SFX.levelUp();
  save();
  launchGame();
}

function continueLife() {
  try { getAC().resume(); } catch(e) {}
  const saved = load();
  if(saved) { G=saved; launchGame(); }
}

function launchGame() {
  document.getElementById('start-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
  renderActivities();
  renderBadges();
  updateUI();
}

function confirmNew() {
  showModal('⚠️','Start Over?','This will erase your current life. Sure?',[
    { label:'🌱 Yes, new life!', fn:'_restart', style:'danger' },
    { label:'❌ Cancel', mod:{}, style:'secondary' },
  ]);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
window.addEventListener('DOMContentLoaded',()=>{
  const saved = load();
  if(saved) document.getElementById('continue-btn').style.display='block';
});
</script>
