<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MaruQuest: Hiragana Forest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#bfe8f7;
    --sky-2:#d8f3e6;
    --meadow:#a6dd9a;
    --leaf:#5cb472;
    --leaf-deep:#3f9a5c;
    --cream:#fffaf0;
    --card:#ffffff;
    --sun:#ffce4d;
    --sun-deep:#f5b021;
    --bark:#9a6b46;
    --berry:#ff7d8c;
    --ink:#43402f;
    --soft:#7c9a86;
    --shadow:0 10px 26px rgba(60,80,50,.22);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"Zen Maru Gothic","Baloo 2",system-ui,sans-serif;
    background:linear-gradient(180deg,var(--sky) 0%,var(--sky-2) 42%,var(--meadow) 100%);
    color:var(--ink);min-height:100%;overflow-x:hidden;-webkit-text-size-adjust:100%;touch-action:manipulation;
  }
  .en{font-family:"Baloo 2",sans-serif;}
  .stage{max-width:560px;margin:0 auto;padding:16px 16px 40px;position:relative;min-height:100vh;}
  .leaves{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .leaf{position:absolute;font-size:20px;opacity:.5;animation:drift linear infinite;}
  @keyframes drift{0%{transform:translateY(-40px) rotate(0);}100%{transform:translateY(110vh) rotate(360deg);}}
  .stage>*{position:relative;z-index:1;}

  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:19px;color:var(--leaf-deep);}
  .brand .logo{font-size:26px;}
  .iconbtn{border:none;background:rgba(255,255,255,.7);color:var(--ink);width:46px;height:46px;border-radius:16px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:transform .12s;}
  .iconbtn:active{transform:scale(.9);}
  .iconbtn.off{opacity:.45;}
  .iconbtn *{pointer-events:none;}

  .card{background:var(--card);border-radius:28px;padding:22px;box-shadow:var(--shadow);}
  .screen{display:none;}
  .screen.active{display:block;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  /* HOME */
  .fox{font-size:84px;text-align:center;line-height:1;margin:4px 0 0;filter:drop-shadow(0 8px 14px rgba(0,0,0,.18));}
  .title-jp{text-align:center;font-weight:900;font-size:30px;color:var(--leaf-deep);margin:2px 0 0;}
  .title-en{text-align:center;font-weight:700;font-size:14px;color:var(--soft);margin:2px 0 16px;letter-spacing:1px;}
  .modebtn{width:100%;border:none;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;gap:16px;
    padding:18px 20px;border-radius:22px;margin-bottom:12px;color:#fff;box-shadow:var(--shadow);transition:transform .1s;}
  .modebtn *{pointer-events:none;}
  .modebtn:active{transform:translateY(3px) scale(.99);}
  .modebtn .emo{font-size:38px;}
  .modebtn .lbl{font-weight:900;font-size:22px;line-height:1.1;}
  .modebtn .sub{font-weight:600;font-size:13px;opacity:.92;}
  .m1{background:linear-gradient(135deg,#5cb472,#3f9a5c);}
  .m2{background:linear-gradient(135deg,#ffce4d,#f5a721);color:#5a3d00;}
  .m3{background:linear-gradient(135deg,#7fc4e8,#5aa6df);}

  .rows-label{font-size:13px;font-weight:800;color:var(--soft);margin:16px 4px 8px;letter-spacing:1px;}
  .rowchips{display:flex;flex-wrap:wrap;gap:8px;}
  .rowchip{border:2px solid #e3e0d2;background:#fbf8ef;color:var(--ink);font-family:inherit;font-weight:900;font-size:20px;
    width:46px;height:46px;border-radius:14px;cursor:pointer;transition:transform .1s;}
  .rowchip *{pointer-events:none;}
  .rowchip:active{transform:scale(.9);}
  .rowchip.sel{background:var(--leaf);border-color:var(--leaf-deep);color:#fff;}
  .collected{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;font-weight:800;color:var(--bark);font-size:15px;}

  /* PLAY shared */
  .playhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .back{background:rgba(255,255,255,.7);border:none;border-radius:14px;width:46px;height:46px;font-size:22px;cursor:pointer;box-shadow:var(--shadow);}
  .back *{pointer-events:none;}
  .acorns{font-weight:900;color:var(--bark);font-size:18px;}
  .progress{display:flex;gap:7px;justify-content:center;margin:6px 0 2px;}
  .pdot{width:14px;height:14px;border-radius:50%;background:#e2e8d8;}
  .pdot.done{background:var(--sun-deep);}
  .pdot.cur{background:var(--leaf);box-shadow:0 0 0 4px rgba(92,180,114,.25);}

  .foxreact{font-size:52px;text-align:center;height:58px;line-height:1;margin:6px 0 0;transition:transform .2s;}
  .foxreact.cheer{animation:bounce .5s ease;}
  @keyframes bounce{0%,100%{transform:translateY(0);}30%{transform:translateY(-16px) rotate(-8deg);}60%{transform:translateY(0) rotate(6deg);}}
  .bub{text-align:center;min-height:30px;font-weight:900;font-size:22px;color:var(--leaf-deep);margin:2px 0 6px;}
  .bub.berry{color:var(--berry);}

  .listenbtn{display:block;margin:6px auto 12px;border:none;cursor:pointer;background:linear-gradient(180deg,var(--sun),var(--sun-deep));
    color:#5a3d00;font-family:inherit;font-weight:900;font-size:22px;padding:16px 30px;border-radius:22px;box-shadow:0 7px 0 #cf8f10,var(--shadow);transition:transform .08s,box-shadow .08s;}
  .listenbtn *{pointer-events:none;}
  .listenbtn:active{transform:translateY(4px);box-shadow:0 3px 0 #cf8f10,var(--shadow);}

  .prompt-emoji{font-size:96px;text-align:center;line-height:1;margin:4px 0;}

  .opts{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:6px;}
  .opt{aspect-ratio:1;border:none;cursor:pointer;background:var(--card);border-radius:24px;box-shadow:var(--shadow);
    font-family:"Zen Maru Gothic",sans-serif;font-weight:900;font-size:64px;color:var(--ink);display:flex;align-items:center;justify-content:center;transition:transform .1s;}
  .opt *{pointer-events:none;}
  .opt:active{transform:scale(.94);}
  .opt.good{background:#d8f5dd;box-shadow:0 0 0 4px var(--leaf),var(--shadow);}
  .opt.bad{animation:shake .35s;background:#ffe3e6;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
  .opt.hint{box-shadow:0 0 0 4px var(--sun-deep),var(--shadow);}

  /* BOARD */
  .board{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:6px;}
  .bchar{aspect-ratio:1;border:none;cursor:pointer;background:var(--card);border-radius:16px;box-shadow:var(--shadow);
    font-family:"Zen Maru Gothic",sans-serif;font-weight:900;font-size:30px;color:var(--ink);display:flex;align-items:center;justify-content:center;transition:transform .1s;}
  .bchar *{pointer-events:none;}
  .bchar:active{transform:scale(.9);background:var(--sun);}
  .bchar.learned{background:#fff4d6;}
  .board-show{text-align:center;margin:10px 0 4px;min-height:96px;}
  .board-show .bc{font-size:74px;font-weight:900;line-height:1;}
  .board-show .bw{font-size:24px;font-weight:800;color:var(--bark);margin-top:2px;}

  /* SUMMARY */
  .sum-emoji{font-size:72px;text-align:center;margin:6px 0;}
  .sum-title{text-align:center;font-weight:900;font-size:28px;color:var(--leaf-deep);}
  .sum-acorns{text-align:center;font-size:30px;font-weight:900;color:var(--bark);margin:14px 0;}
  .primary{margin-top:14px;width:100%;border:none;cursor:pointer;background:linear-gradient(180deg,var(--leaf),var(--leaf-deep));
    color:#fff;font-family:inherit;font-weight:900;font-size:22px;padding:18px;border-radius:20px;box-shadow:0 7px 0 #2f7a47,var(--shadow);transition:transform .08s,box-shadow .08s;}
  .primary *{pointer-events:none;}
  .primary:active{transform:translateY(4px);box-shadow:0 3px 0 #2f7a47,var(--shadow);}
  .ghost{margin-top:10px;width:100%;border:2px solid #dfe6d6;background:transparent;color:var(--soft);font-family:inherit;font-weight:800;font-size:16px;padding:13px;border-radius:18px;cursor:pointer;}
  .ghost *{pointer-events:none;}

  .spark{position:fixed;pointer-events:none;font-size:26px;z-index:5;animation:rise 1s ease-out forwards;}
  @keyframes rise{0%{opacity:1;transform:translateY(0) scale(.6);}100%{opacity:0;transform:translateY(-100px) scale(1.3);}}
</style>
</head>
<body>
<div class="leaves" id="leaves"></div>
<div class="stage">

  <div class="topbar">
    <div class="brand"><span class="logo">🦊</span><span>Hiragana Forest</span></div>
    <button class="iconbtn" id="soundBtn" data-act="sound">🔊</button>
  </div>

  <!-- HOME -->
  <div class="screen active" id="home">
    <div class="card">
      <div class="fox">🦊</div>
      <div class="title-jp">ひらがな の もり</div>
      <div class="title-en en">Hiragana Forest</div>

      <button class="modebtn m1" data-mode="find">
        <span class="emo">👂</span>
        <span><span class="lbl">きいて さがそう</span><br><span class="sub en">Listen &amp; find the sound</span></span>
      </button>
      <button class="modebtn m2" data-mode="board">
        <span class="emo">✨</span>
        <span><span class="lbl">タッチして きこう</span><br><span class="sub en">Touch &amp; hear</span></span>
      </button>
      <button class="modebtn m3" data-mode="first">
        <span class="emo">🍎</span>
        <span><span class="lbl">さいしょの おと</span><br><span class="sub en">First sound of the word</span></span>
      </button>

      <div class="rows-label">れんしゅうする おと ✦ sounds to practice</div>
      <div class="rowchips" id="rowChips"></div>
      <div class="collected" id="collected"></div>
    </div>
  </div>

  <!-- FIND -->
  <div class="screen" id="find">
    <div class="card">
      <div class="playhead">
        <button class="back" data-act="home">⬅️</button>
        <div class="acorns" id="findAcorns">🌰 0</div>
      </div>
      <div class="progress" id="findDots"></div>
      <div class="foxreact" id="findFox">🦊</div>
      <div class="bub" id="findBub">どの おと かな？</div>
      <button class="listenbtn" data-act="repeat">🔊 もういちど</button>
      <div class="opts" id="findOpts"></div>
    </div>
  </div>

  <!-- BOARD -->
  <div class="screen" id="board">
    <div class="card">
      <div class="playhead">
        <button class="back" data-act="home">⬅️</button>
        <div class="acorns">タッチしてね 👆</div>
      </div>
      <div class="board-show" id="boardShow"><div class="bc">🦊</div><div class="bw">すきな おとを タッチ！</div></div>
      <div class="board" id="boardGrid"></div>
    </div>
  </div>

  <!-- FIRST SOUND -->
  <div class="screen" id="first">
    <div class="card">
      <div class="playhead">
        <button class="back" data-act="home">⬅️</button>
        <div class="acorns" id="firstAcorns">🌰 0</div>
      </div>
      <div class="progress" id="firstDots"></div>
      <div class="foxreact" id="firstFox">🦊</div>
      <div class="bub" id="firstBub">さいしょの おとは？</div>
      <div class="prompt-emoji" id="firstEmoji">🍎</div>
      <button class="listenbtn" data-act="repeatword">🔊 もういちど</button>
      <div class="opts" id="firstOpts"></div>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="screen" id="summary">
    <div class="card">
      <div class="sum-emoji">🎉</div>
      <div class="sum-title jp" id="sumTitle">やったー！</div>
      <div class="sum-acorns" id="sumAcorns">🌰 +0</div>
      <button class="primary" data-act="replay">もういちど あそぶ</button>
      <button class="ghost" data-act="home">おうちに もどる</button>
    </div>
  </div>

</div>

<script>
(function(){
  "use strict";

  // ---------- data ----------
  var ROWS = [
    {k:"あ", chars:["あ","い","う","え","お"]},
    {k:"か", chars:["か","き","く","け","こ"]},
    {k:"さ", chars:["さ","し","す","せ","そ"]},
    {k:"た", chars:["た","ち","つ","て","と"]},
    {k:"な", chars:["な","に","ぬ","ね","の"]},
    {k:"は", chars:["は","ひ","ふ","へ","ほ"]},
    {k:"ま", chars:["ま","み","む","め","も"]},
    {k:"や", chars:["や","ゆ","よ"]},
    {k:"ら", chars:["ら","り","る","れ","ろ"]},
    {k:"わ", chars:["わ","を","ん"]}
  ];

  // picture words: emoji, word (hiragana), first mora. First mora kept to basic gojuon.
  var WORDS = [
    {e:"🍎",w:"りんご",m:"り"},
    {e:"🐶",w:"いぬ",m:"い"},
    {e:"🐱",w:"ねこ",m:"ね"},
    {e:"🐟",w:"さかな",m:"さ"},
    {e:"🦊",w:"きつね",m:"き"},
    {e:"🐰",w:"うさぎ",m:"う"},
    {e:"🚗",w:"くるま",m:"く"},
    {e:"🌙",w:"つき",m:"つ"},
    {e:"⭐",w:"ほし",m:"ほ"},
    {e:"🐸",w:"かえる",m:"か"},
    {e:"🥚",w:"たまご",m:"た"},
    {e:"🍅",w:"とまと",m:"と"},
    {e:"🌧️",w:"あめ",m:"あ"},
    {e:"🍙",w:"おにぎり",m:"お"},
    {e:"✋",w:"て",m:"て"},
    {e:"👁️",w:"め",m:"め"},
    {e:"🐍",w:"へび",m:"へ"},
    {e:"🐮",w:"うし",m:"う"},
    {e:"🌳",w:"き",m:"き"},
    {e:"🐭",w:"ねずみ",m:"ね"}
  ];

  // ---------- storage (Safari-safe) ----------
  var STORE = "maruhira_v1";
  function load(){
    try{ var r=localStorage.getItem(STORE); if(r){ return JSON.parse(r); } }catch(e){}
    return null;
  }
  function save(){ try{ localStorage.setItem(STORE, JSON.stringify(state)); }catch(e){} }

  var state = load();
  if(!state){ state = { rows:["あ","か"], sound:true, learned:{}, acorns:0 }; }
  if(!state.rows || !state.rows.length){ state.rows=["あ","か"]; }
  if(typeof state.sound!=="boolean"){ state.sound=true; }
  if(!state.learned){ state.learned={}; }
  if(typeof state.acorns!=="number"){ state.acorns=0; }

  // ---------- helpers ----------
  var $=function(id){ return document.getElementById(id); };
  function show(id){
    var s=document.querySelectorAll(".screen");
    for(var i=0;i<s.length;i++){ s[i].className="screen"; }
    $(id).className="screen active";
  }
  function shuffle(a){
    for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
    return a;
  }
  function pickRand(a){ return a[Math.floor(Math.random()*a.length)]; }
  function activeChars(){
    var out=[];
    for(var i=0;i<ROWS.length;i++){
      if(state.rows.indexOf(ROWS[i].k)>=0){ out=out.concat(ROWS[i].chars); }
    }
    return out;
  }
  function allChars(){
    var out=[]; for(var i=0;i<ROWS.length;i++){ out=out.concat(ROWS[i].chars); } return out;
  }
  function moraWord(m){
    for(var i=0;i<WORDS.length;i++){ if(WORDS[i].m===m){ return WORDS[i]; } }
    return null;
  }

  // ---------- audio ----------
  var actx=null;
  function tone(freq,dur,type){
    if(!state.sound){ return; }
    try{
      if(!actx){ actx=new (window.AudioContext||window.webkitAudioContext)(); }
      var o=actx.createOscillator(), g=actx.createGain();
      o.type=type||"sine"; o.frequency.value=freq;
      o.connect(g); g.connect(actx.destination);
      g.gain.setValueAtTime(.0001,actx.currentTime);
      g.gain.exponentialRampToValueAtTime(.2,actx.currentTime+.02);
      g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+dur);
      o.start(); o.stop(actx.currentTime+dur);
    }catch(e){}
  }
  function happy(){ tone(660,.12,"triangle"); setTimeout(function(){ tone(880,.12,"triangle"); },90); setTimeout(function(){ tone(1180,.18,"triangle"); },180); }
  function oops(){ tone(300,.18,"sine"); }

  function say(text){
    if(!state.sound){ return; }
    try{
      if(!window.speechSynthesis){ return; }
      window.speechSynthesis.cancel();
      var u=new SpeechSynthesisUtterance(text);
      u.lang="ja-JP"; u.rate=.8; u.pitch=1.25;
      window.speechSynthesis.speak(u);
    }catch(e){}
  }

  // ---------- sparkle ----------
  function sparkle(){
    var emo=["✨","🌟","🍃","⭐","🌰"];
    for(var i=0;i<6;i++){
      (function(i){
        setTimeout(function(){
          var s=document.createElement("div");
          s.className="spark"; s.textContent=pickRand(emo);
          s.style.left=(28+Math.random()*44)+"%";
          s.style.top=(30+Math.random()*18)+"%";
          document.body.appendChild(s);
          setTimeout(function(){ if(s.parentNode){ s.parentNode.removeChild(s); } },1000);
        }, i*70);
      })(i);
    }
  }

  // ---------- home ----------
  function renderRows(){
    var box=$("rowChips"); box.innerHTML="";
    for(var i=0;i<ROWS.length;i++){
      var b=document.createElement("button");
      var on=state.rows.indexOf(ROWS[i].k)>=0;
      b.className="rowchip"+(on?" sel":"");
      b.setAttribute("data-row",ROWS[i].k);
      b.textContent=ROWS[i].k;
      box.appendChild(b);
    }
  }
  function learnedCount(){ var n=0; for(var k in state.learned){ if(state.learned[k]){ n++; } } return n; }
  function renderHome(){
    renderRows();
    $("collected").innerHTML="🌰 あつめた どんぐり "+state.acorns+"　✦　おぼえた おと "+learnedCount();
    $("soundBtn").className="iconbtn"+(state.sound?"":" off");
    $("soundBtn").textContent=state.sound?"🔊":"🔇";
  }
  function toggleRow(k){
    var i=state.rows.indexOf(k);
    if(i>=0){ if(state.rows.length>1){ state.rows.splice(i,1); } }
    else { state.rows.push(k); }
    save(); renderHome();
  }

  // ---------- mode: Listen & Find ----------
  var ROUND=6;
  var fIndex=0, fTarget="", fEarned=0;
  function renderDots(elId, idx){
    var d=$(elId); d.innerHTML="";
    for(var i=0;i<ROUND;i++){
      var c="pdot"; if(i<idx){ c="pdot done"; } else if(i===idx){ c="pdot cur"; }
      var e=document.createElement("div"); e.className=c; d.appendChild(e);
    }
  }
  function startFind(){
    fIndex=0; fEarned=0;
    $("findAcorns").textContent="🌰 "+state.acorns;
    show("find");
    nextFind();
  }
  function nextFind(){
    if(fIndex>=ROUND){ endRound(fEarned); return; }
    renderDots("findDots", fIndex);
    $("findFox").textContent="🦊"; $("findFox").className="foxreact";
    $("findBub").className="bub"; $("findBub").textContent="どの おと かな？";
    var pool=activeChars();
    fTarget=pickRand(pool);
    var opts=[fTarget];
    var others=shuffle(pool.slice());
    for(var i=0;i<others.length && opts.length<3;i++){ if(opts.indexOf(others[i])<0){ opts.push(others[i]); } }
    while(opts.length<3){ var x=pickRand(allChars()); if(opts.indexOf(x)<0){ opts.push(x); } }
    shuffle(opts);
    var box=$("findOpts"); box.innerHTML="";
    for(var j=0;j<opts.length;j++){
      var b=document.createElement("button"); b.className="opt"; b.setAttribute("data-find",opts[j]); b.textContent=opts[j];
      box.appendChild(b);
    }
    say(fTarget);
  }
  function answerFind(ch, el){
    if(findLock){ return; }
    if(ch===fTarget){
      findLock=true;
      el.className="opt good";
      state.learned[fTarget]=true; state.acorns++; fEarned++;
      $("findAcorns").textContent="🌰 "+state.acorns;
      $("findFox").textContent="🎉"; $("findFox").className="foxreact cheer";
      $("findBub").className="bub"; $("findBub").textContent="せいかい！";
      happy(); sparkle(); say(fTarget); save();
      fIndex++;
      setTimeout(function(){ findLock=false; nextFind(); }, 1100);
    }else{
      el.className="opt bad";
      $("findBub").className="bub berry"; $("findBub").textContent="もういちど きいてね 👂";
      oops(); say(fTarget);
      setTimeout(function(){ el.className="opt"; }, 500);
      // gentle hint: highlight the right one
      var opts=document.querySelectorAll("#findOpts .opt");
      for(var i=0;i<opts.length;i++){ if(opts[i].getAttribute("data-find")===fTarget){ opts[i].className="opt hint"; } }
    }
  }
  var findLock=false;

  // ---------- mode: Touch & Hear board ----------
  function startBoard(){
    var grid=$("boardGrid"); grid.innerHTML="";
    var chars=activeChars();
    for(var i=0;i<chars.length;i++){
      var b=document.createElement("button");
      b.className="bchar"+(state.learned[chars[i]]?" learned":"");
      b.setAttribute("data-board",chars[i]); b.textContent=chars[i];
      grid.appendChild(b);
    }
    $("boardShow").innerHTML='<div class="bc">🦊</div><div class="bw">すきな おとを タッチ！</div>';
    show("board");
  }
  function touchBoard(ch){
    var w=moraWord(ch);
    var html='<div class="bc">'+ch+'</div>';
    if(w){ html+='<div class="bw">'+w.e+" "+w.w+'</div>'; }
    $("boardShow").innerHTML=html;
    tone(880,.1,"triangle");
    if(w){ say(ch+"。"+w.w); } else { say(ch); }
  }

  // ---------- mode: First sound ----------
  var sIndex=0, sWord=null, sEarned=0;
  function availableWords(){
    var act=activeChars(), out=[];
    for(var i=0;i<WORDS.length;i++){ if(act.indexOf(WORDS[i].m)>=0){ out.push(WORDS[i]); } }
    return out;
  }
  function startFirst(){
    sIndex=0; sEarned=0;
    $("firstAcorns").textContent="🌰 "+state.acorns;
    show("first");
    nextFirst();
  }
  function nextFirst(){
    if(sIndex>=ROUND){ endRound(sEarned); return; }
    renderDots("firstDots", sIndex);
    $("firstFox").textContent="🦊"; $("firstFox").className="foxreact";
    $("firstBub").className="bub"; $("firstBub").textContent="さいしょの おとは？";
    var words=availableWords();
    if(!words.length){ words=WORDS.slice(); }
    sWord=pickRand(words);
    $("firstEmoji").textContent=sWord.e;
    var opts=[sWord.m];
    var pool=shuffle(activeChars().slice());
    for(var i=0;i<pool.length && opts.length<3;i++){ if(opts.indexOf(pool[i])<0){ opts.push(pool[i]); } }
    while(opts.length<3){ var x=pickRand(allChars()); if(opts.indexOf(x)<0){ opts.push(x); } }
    shuffle(opts);
    var box=$("firstOpts"); box.innerHTML="";
    for(var j=0;j<opts.length;j++){
      var b=document.createElement("button"); b.className="opt"; b.setAttribute("data-first",opts[j]); b.textContent=opts[j];
      box.appendChild(b);
    }
    say(sWord.w);
  }
  function answerFirst(ch, el){
    if(firstLock){ return; }
    if(ch===sWord.m){
      firstLock=true;
      el.className="opt good";
      state.learned[sWord.m]=true; state.acorns++; sEarned++;
      $("firstAcorns").textContent="🌰 "+state.acorns;
      $("firstFox").textContent="🎉"; $("firstFox").className="foxreact cheer";
      $("firstBub").className="bub"; $("firstBub").textContent="せいかい！ "+sWord.w;
      happy(); sparkle(); say(sWord.m+"。"+sWord.w); save();
      sIndex++;
      setTimeout(function(){ firstLock=false; nextFirst(); }, 1300);
    }else{
      el.className="opt bad";
      $("firstBub").className="bub berry"; $("firstBub").textContent="もういちど きいてね 👂";
      oops(); say(sWord.w);
      setTimeout(function(){ el.className="opt"; }, 500);
      var opts=document.querySelectorAll("#firstOpts .opt");
      for(var i=0;i<opts.length;i++){ if(opts[i].getAttribute("data-first")===sWord.m){ opts[i].className="opt hint"; } }
    }
  }
  var firstLock=false;

  // ---------- summary ----------
  var lastMode="find";
  function endRound(earned){
    $("sumAcorns").textContent="🌰 +"+earned;
    var titles=["やったー！","すごいね！","じょうず！","だいせいかい！"];
    $("sumTitle").textContent=pickRand(titles);
    happy();
    show("summary");
  }
  function replay(){
    if(lastMode==="find"){ startFind(); }
    else if(lastMode==="first"){ startFirst(); }
    else { startBoard(); }
  }

  // ---------- leaves background ----------
  (function(){
    var box=$("leaves"), emo=["🍃","🌿","🍂"];
    for(var i=0;i<10;i++){
      var s=document.createElement("div"); s.className="leaf"; s.textContent=emo[i%3];
      s.style.left=(Math.random()*100)+"%";
      s.style.animationDuration=(8+Math.random()*10)+"s";
      s.style.animationDelay=(Math.random()*10)+"s";
      box.appendChild(s);
    }
  })();

  // ---------- events ----------
  document.addEventListener("click", function(e){
    var row=e.target.closest("[data-row]");
    if(row){ toggleRow(row.getAttribute("data-row")); return; }

    var mode=e.target.closest("[data-mode]");
    if(mode){
      var m=mode.getAttribute("data-mode"); lastMode=m;
      if(m==="find"){ startFind(); }
      else if(m==="board"){ startBoard(); }
      else if(m==="first"){ startFirst(); }
      return;
    }

    var fo=e.target.closest("[data-find]");
    if(fo){ answerFind(fo.getAttribute("data-find"), fo); return; }

    var so=e.target.closest("[data-first]");
    if(so){ answerFirst(so.getAttribute("data-first"), so); return; }

    var bo=e.target.closest("[data-board]");
    if(bo){ touchBoard(bo.getAttribute("data-board")); return; }

    var act=e.target.closest("[data-act]");
    if(act){
      var a=act.getAttribute("data-act");
      if(a==="sound"){ state.sound=!state.sound; save(); renderHome(); }
      else if(a==="home"){ renderHome(); show("home"); }
      else if(a==="repeat"){ say(fTarget); }
      else if(a==="repeatword"){ if(sWord){ say(sWord.w); } }
      else if(a==="replay"){ replay(); }
      return;
    }
  });

  // ---------- init ----------
  renderHome();
})();
</script>
</body>
</html>
