<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MaruQuest: Kindergarten Japanese</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#bfe8f7;--sky-2:#d8f3e6;--meadow:#a6dd9a;
    --leaf:#5cb472;--leaf-deep:#3f9a5c;--cream:#fffaf0;--card:#ffffff;
    --sun:#ffce4d;--sun-deep:#f5b021;--bark:#9a6b46;--berry:#ff7d8c;
    --ink:#43402f;--soft:#7c9a86;--shadow:0 10px 26px rgba(60,80,50,.22);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:"Zen Maru Gothic","Baloo 2",system-ui,sans-serif;
    background:linear-gradient(180deg,var(--sky) 0%,var(--sky-2) 42%,var(--meadow) 100%);
    color:var(--ink);min-height:100%;overflow-x:hidden;-webkit-text-size-adjust:100%;touch-action:manipulation;}
  .en{font-family:"Baloo 2",sans-serif;}
  .stage{max-width:560px;margin:0 auto;padding:16px 16px 40px;position:relative;min-height:100vh;}
  .leaves{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .leaf{position:absolute;font-size:20px;opacity:.5;animation:drift linear infinite;}
  @keyframes drift{0%{transform:translateY(-40px) rotate(0);}100%{transform:translateY(110vh) rotate(360deg);}}
  .stage>*{position:relative;z-index:1;}

  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px;color:var(--leaf-deep);}
  .brand .logo{font-size:26px;}
  .iconbtn{border:none;background:rgba(255,255,255,.7);color:var(--ink);width:46px;height:46px;border-radius:16px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:transform .12s;}
  .iconbtn:active{transform:scale(.9);}
  .iconbtn.off{opacity:.45;}
  .iconbtn *{pointer-events:none;}

  .card{background:var(--card);border-radius:28px;padding:22px;box-shadow:var(--shadow);}
  .screen{display:none;}
  .screen.active{display:block;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  .fox{font-size:84px;text-align:center;line-height:1;margin:4px 0 0;filter:drop-shadow(0 8px 14px rgba(0,0,0,.18));}
  .title-jp{text-align:center;font-weight:900;font-size:28px;color:var(--leaf-deep);margin:2px 0 0;}
  .title-en{text-align:center;font-weight:700;font-size:13px;color:var(--soft);margin:2px 0 16px;letter-spacing:1px;}
  .modebtn{width:100%;border:none;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;gap:16px;
    padding:18px 20px;border-radius:22px;margin-bottom:12px;color:#fff;box-shadow:var(--shadow);transition:transform .1s;}
  .modebtn *{pointer-events:none;}
  .modebtn:active{transform:translateY(3px) scale(.99);}
  .modebtn .emo{font-size:38px;}
  .modebtn .lbl{font-weight:900;font-size:21px;line-height:1.15;}
  .modebtn .sub{font-weight:600;font-size:12px;opacity:.92;}
  .m1{background:linear-gradient(135deg,#5cb472,#3f9a5c);}
  .m2{background:linear-gradient(135deg,#ffce4d,#f5a721);color:#5a3d00;}

  .rows-label{font-size:13px;font-weight:800;color:var(--soft);margin:16px 4px 8px;letter-spacing:.5px;}
  .rowchips{display:flex;flex-wrap:wrap;gap:8px;}
  .rowchip{border:2px solid #e3e0d2;background:#fbf8ef;color:var(--ink);font-family:inherit;font-weight:800;font-size:15px;
    padding:9px 14px;border-radius:14px;cursor:pointer;transition:transform .1s;}
  .rowchip *{pointer-events:none;}
  .rowchip:active{transform:scale(.92);}
  .rowchip.sel{background:var(--leaf);border-color:var(--leaf-deep);color:#fff;}
  .collected{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;font-weight:800;color:var(--bark);font-size:14px;text-align:center;}

  .playhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .back{background:rgba(255,255,255,.7);border:none;border-radius:14px;width:46px;height:46px;font-size:22px;cursor:pointer;box-shadow:var(--shadow);}
  .back *{pointer-events:none;}
  .acorns{font-weight:900;color:var(--bark);font-size:17px;}
  .progress{display:flex;gap:7px;justify-content:center;margin:6px 0 2px;}
  .pdot{width:14px;height:14px;border-radius:50%;background:#e2e8d8;}
  .pdot.done{background:var(--sun-deep);}
  .pdot.cur{background:var(--leaf);box-shadow:0 0 0 4px rgba(92,180,114,.25);}

  .foxreact{font-size:50px;text-align:center;height:56px;line-height:1;margin:6px 0 0;transition:transform .2s;}
  .foxreact.cheer{animation:bounce .5s ease;}
  @keyframes bounce{0%,100%{transform:translateY(0);}30%{transform:translateY(-16px) rotate(-8deg);}60%{transform:translateY(0) rotate(6deg);}}
  .bub{text-align:center;min-height:30px;font-weight:900;font-size:24px;color:var(--leaf-deep);margin:2px 0 4px;}
  .bub.berry{color:var(--berry);}
  .bub-en{text-align:center;font-size:13px;font-weight:700;color:var(--soft);min-height:16px;margin-bottom:8px;}

  .listenbtn{display:block;margin:4px auto 12px;border:none;cursor:pointer;background:linear-gradient(180deg,var(--sun),var(--sun-deep));
    color:#5a3d00;font-family:inherit;font-weight:900;font-size:20px;padding:14px 28px;border-radius:20px;box-shadow:0 7px 0 #cf8f10,var(--shadow);transition:transform .08s,box-shadow .08s;}
  .listenbtn *{pointer-events:none;}
  .listenbtn:active{transform:translateY(4px);box-shadow:0 3px 0 #cf8f10,var(--shadow);}

  .opts{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:4px;}
  .opt{border:none;cursor:pointer;background:var(--card);border-radius:22px;box-shadow:var(--shadow);
    padding:14px 6px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .1s;}
  .opt *{pointer-events:none;}
  .opt:active{transform:scale(.94);}
  .opt .oe{font-size:52px;line-height:1;}
  .opt .ol{font-size:13px;font-weight:800;color:var(--soft);}
  .opt.good{background:#d8f5dd;box-shadow:0 0 0 4px var(--leaf),var(--shadow);}
  .opt.bad{animation:shake .35s;background:#ffe3e6;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
  .opt.hint{box-shadow:0 0 0 4px var(--sun-deep),var(--shadow);}

  .cat-title{font-size:14px;font-weight:900;color:var(--leaf-deep);margin:16px 2px 8px;display:flex;align-items:center;gap:7px;}
  .cat-title .ce{font-size:20px;}
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .bcard{border:none;cursor:pointer;background:var(--card);border-radius:18px;box-shadow:var(--shadow);
    padding:12px 6px 10px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:transform .1s;}
  .bcard *{pointer-events:none;}
  .bcard:active{transform:scale(.93);background:#fff6da;}
  .bcard.learned{background:#fff4d6;}
  .bcard .be{font-size:40px;line-height:1;}
  .bcard .bl{font-size:14px;font-weight:900;color:var(--ink);text-align:center;line-height:1.15;}
  .bcard .ben{font-size:10px;font-weight:700;color:var(--soft);text-align:center;}

  .sum-emoji{font-size:72px;text-align:center;margin:6px 0;}
  .sum-title{text-align:center;font-weight:900;font-size:26px;color:var(--leaf-deep);}
  .sum-acorns{text-align:center;font-size:28px;font-weight:900;color:var(--bark);margin:14px 0;}
  .primary{margin-top:14px;width:100%;border:none;cursor:pointer;background:linear-gradient(180deg,var(--leaf),var(--leaf-deep));
    color:#fff;font-family:inherit;font-weight:900;font-size:21px;padding:18px;border-radius:20px;box-shadow:0 7px 0 #2f7a47,var(--shadow);transition:transform .08s,box-shadow .08s;}
  .primary *{pointer-events:none;}
  .primary:active{transform:translateY(4px);box-shadow:0 3px 0 #2f7a47,var(--shadow);}
  .ghost{margin-top:10px;width:100%;border:2px solid #dfe6d6;background:transparent;color:var(--soft);font-family:inherit;font-weight:800;font-size:16px;padding:13px;border-radius:18px;cursor:pointer;}
  .ghost *{pointer-events:none;}

  .spark{position:fixed;pointer-events:none;font-size:26px;z-index:5;animation:rise 1s ease-out forwards;}
  @keyframes rise{0%{opacity:1;transform:translateY(0) scale(.6);}100%{opacity:0;transform:translateY(-100px) scale(1.3);}}
</style>
</head>
<body>
<div class="leaves" id="leaves"></div>
<div class="stage">

  <div class="topbar">
    <div class="brand"><span class="logo">🦊</span><span>Kindergarten Japanese</span></div>
    <button class="iconbtn" id="soundBtn" data-act="sound">🔊</button>
  </div>

  <!-- HOME -->
  <div class="screen active" id="home">
    <div class="card">
      <div class="fox">🦊</div>
      <div class="title-jp">ようちえん ことば</div>
      <div class="title-en en">Words to get by at kindergarten</div>

      <button class="modebtn m1" data-mode="listen">
        <span class="emo">👂</span>
        <span><span class="lbl">きいて タッチ</span><br><span class="sub en">Hear it &middot; tap the picture (understand the teacher)</span></span>
      </button>
      <button class="modebtn m2" data-mode="board">
        <span class="emo">💬</span>
        <span><span class="lbl">いえるかな</span><br><span class="sub en">Tap &middot; hear what to say (ask for things)</span></span>
      </button>

      <div class="rows-label">れんしゅう ✦ what to practice in the game</div>
      <div class="rowchips" id="catChips"></div>
      <div class="collected" id="collected"></div>
    </div>
  </div>

  <!-- LISTEN & TOUCH (comprehension game) -->
  <div class="screen" id="listen">
    <div class="card">
      <div class="playhead">
        <button class="back" data-act="home">⬅️</button>
        <div class="acorns" id="lAcorns">🌰 0</div>
      </div>
      <div class="progress" id="lDots"></div>
      <div class="foxreact" id="lFox">🦊</div>
      <div class="bub" id="lBub">きいてね</div>
      <div class="bub-en en" id="lBubEn">&nbsp;</div>
      <button class="listenbtn" data-act="repeat">🔊 もういちど</button>
      <div class="opts" id="lOpts"></div>
    </div>
  </div>

  <!-- BOARD (production) -->
  <div class="screen" id="board">
    <div class="card">
      <div class="playhead">
        <button class="back" data-act="home">⬅️</button>
        <div class="acorns">タッチして きこう 👆</div>
      </div>
      <div class="foxreact" id="bFox">🦊</div>
      <div class="bub" id="bBub">なにを いう？</div>
      <div class="bub-en en" id="bBubEn">Tap a picture to hear the words to say</div>
      <div id="boardBody"></div>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="screen" id="summary">
    <div class="card">
      <div class="sum-emoji">🎉</div>
      <div class="sum-title jp" id="sumTitle">やったー！</div>
      <div class="sum-acorns" id="sumAcorns">🌰 +0</div>
      <button class="primary" data-act="replay">もういちど あそぶ</button>
      <button class="ghost" data-act="home">おうちに もどる</button>
    </div>
  </div>

</div>

<script>
(function(){
  "use strict";

  // ---------- survival items ----------
  // cat: sensei (teacher command) | komatta (needs/help) | tomodachi (social) | mono (things) | aisatsu (greetings)
  // say = short cue spoken in the comprehension game
  // phrase = fuller thing to SAY (production board); falls back to say
  // depict = clear enough to use as a picture choice in the comprehension game
  var ITEMS = [
    {cat:"sensei", emo:"🪑", say:"すわって", en:"sit down", depict:true},
    {cat:"sensei", emo:"👀", say:"みて", en:"look", depict:true},
    {cat:"sensei", emo:"👂", say:"きいて", en:"listen", depict:true},
    {cat:"sensei", emo:"🛑", say:"まって", en:"wait", depict:true},
    {cat:"sensei", emo:"🧼", say:"てを あらって", en:"wash your hands", depict:true},
    {cat:"sensei", emo:"🧹", say:"おかたづけ", en:"tidy up", depict:true},
    {cat:"sensei", emo:"🤫", say:"しずかに", en:"be quiet", depict:true},
    {cat:"sensei", emo:"👟", say:"くつを はいて", en:"put your shoes on", depict:true},
    {cat:"sensei", emo:"🚶", say:"ならんで", en:"line up", depict:false},

    {cat:"komatta", emo:"🚽", say:"トイレ", phrase:"トイレ、いきたい", en:"I need the toilet", depict:true},
    {cat:"komatta", emo:"💧", say:"おみず", phrase:"おみず のみたい", en:"I want water", depict:true},
    {cat:"komatta", emo:"🤕", say:"いたい", phrase:"いたい", en:"it hurts", depict:true},
    {cat:"komatta", emo:"🙋", say:"てつだって", phrase:"せんせい、てつだって", en:"teacher, help me", depict:true},
    {cat:"komatta", emo:"😴", say:"ねむい", phrase:"ねむい", en:"I'm sleepy", depict:true},
    {cat:"komatta", emo:"🥶", say:"さむい", phrase:"さむい", en:"I'm cold", depict:true},
    {cat:"komatta", emo:"🥵", say:"あつい", phrase:"あつい", en:"I'm hot", depict:true},
    {cat:"komatta", emo:"😣", say:"できない", phrase:"できない", en:"I can't do it", depict:false},

    {cat:"tomodachi", emo:"🧸", say:"あそぼう", phrase:"いっしょに あそぼう", en:"let's play together", depict:true},
    {cat:"tomodachi", emo:"🤲", say:"かして", phrase:"かして", en:"can I borrow it?", depict:true},
    {cat:"tomodachi", emo:"👌", say:"いいよ", phrase:"いいよ", en:"sure / ok", depict:false},
    {cat:"tomodachi", emo:"🔁", say:"じゅんばん", phrase:"じゅんばん こうたい", en:"take turns", depict:false},
    {cat:"tomodachi", emo:"🙇", say:"ごめんね", phrase:"ごめんね", en:"sorry", depict:false},
    {cat:"tomodachi", emo:"🙆", say:"はい", phrase:"はい！", en:"yes (here!)", depict:false},

    {cat:"mono", emo:"🎒", say:"かばん", en:"bag", depict:true},
    {cat:"mono", emo:"🧢", say:"ぼうし", en:"hat", depict:true},
    {cat:"mono", emo:"🍱", say:"おべんとう", en:"lunchbox", depict:true},
    {cat:"mono", emo:"🥤", say:"コップ", en:"cup", depict:true},
    {cat:"mono", emo:"🍙", say:"おにぎり", en:"rice ball", depict:true},

    {cat:"aisatsu", emo:"☀️", say:"おはよう", phrase:"おはよう ございます", en:"good morning", depict:false},
    {cat:"aisatsu", emo:"👋", say:"さようなら", phrase:"さようなら", en:"goodbye", depict:false},
    {cat:"aisatsu", emo:"🙏", say:"いただきます", phrase:"いただきます", en:"before eating", depict:false},
    {cat:"aisatsu", emo:"😋", say:"ごちそうさま", phrase:"ごちそうさま", en:"after eating", depict:false},
    {cat:"aisatsu", emo:"💛", say:"ありがとう", phrase:"ありがとう", en:"thank you", depict:false}
  ];

  var CATS = [
    {k:"all", jp:"ぜんぶ", emo:"🌈"},
    {k:"sensei", jp:"せんせい", emo:"🧑‍🏫"},
    {k:"komatta", jp:"こまったとき", emo:"🆘"},
    {k:"tomodachi", jp:"おともだち", emo:"🧒"},
    {k:"mono", jp:"もちもの", emo:"🎒"},
    {k:"aisatsu", jp:"あいさつ", emo:"👋"}
  ];

  // ---------- storage (Safari-safe) ----------
  var STORE = "marukinder_v1";
  function load(){ try{ var r=localStorage.getItem(STORE); if(r){ return JSON.parse(r); } }catch(e){} return null; }
  function save(){ try{ localStorage.setItem(STORE, JSON.stringify(state)); }catch(e){} }

  var state = load();
  if(!state){ state = { cat:"all", sound:true, learned:{}, acorns:0 }; }
  if(!state.cat){ state.cat="all"; }
  if(typeof state.sound!=="boolean"){ state.sound=true; }
  if(!state.learned){ state.learned={}; }
  if(typeof state.acorns!=="number"){ state.acorns=0; }

  // ---------- helpers ----------
  var $=function(id){ return document.getElementById(id); };
  function show(id){
    var s=document.querySelectorAll(".screen");
    for(var i=0;i<s.length;i++){ s[i].className="screen"; }
    $(id).className="screen active";
  }
  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
  function pickRand(a){ return a[Math.floor(Math.random()*a.length)]; }
  function depictItems(){
    var out=[];
    for(var i=0;i<ITEMS.length;i++){ if(ITEMS[i].depict){ out.push(ITEMS[i]); } }
    return out;
  }
  function gamePool(){
    var all=depictItems();
    if(state.cat==="all"){ return all; }
    var out=[];
    for(var i=0;i<all.length;i++){ if(all[i].cat===state.cat){ out.push(all[i]); } }
    return out.length>=1 ? out : all;
  }
  function sayText(it){ return it.phrase ? it.phrase : it.say; }

  // ---------- audio ----------
  var actx=null;
  function tone(freq,dur,type){
    if(!state.sound){ return; }
    try{
      if(!actx){ actx=new (window.AudioContext||window.webkitAudioContext)(); }
      var o=actx.createOscillator(), g=actx.createGain();
      o.type=type||"sine"; o.frequency.value=freq;
      o.connect(g); g.connect(actx.destination);
      g.gain.setValueAtTime(.0001,actx.currentTime);
      g.gain.exponentialRampToValueAtTime(.2,actx.currentTime+.02);
      g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+dur);
      o.start(); o.stop(actx.currentTime+dur);
    }catch(e){}
  }
  function happy(){ tone(660,.12,"triangle"); setTimeout(function(){ tone(880,.12,"triangle"); },90); setTimeout(function(){ tone(1180,.18,"triangle"); },180); }
  function oops(){ tone(300,.18,"sine"); }
  function say(text){
    if(!state.sound){ return; }
    try{
      if(!window.speechSynthesis){ return; }
      window.speechSynthesis.cancel();
      var u=new SpeechSynthesisUtterance(text);
      u.lang="ja-JP"; u.rate=.82; u.pitch=1.2;
      window.speechSynthesis.speak(u);
    }catch(e){}
  }

  function sparkle(){
    var emo=["✨","🌟","🍃","⭐","🌰"];
    for(var i=0;i<6;i++){
      (function(i){
        setTimeout(function(){
          var s=document.createElement("div");
          s.className="spark"; s.textContent=pickRand(emo);
          s.style.left=(28+Math.random()*44)+"%"; s.style.top=(28+Math.random()*18)+"%";
          document.body.appendChild(s);
          setTimeout(function(){ if(s.parentNode){ s.parentNode.removeChild(s); } },1000);
        }, i*70);
      })(i);
    }
  }

  // ---------- home ----------
  function renderCats(){
    var box=$("catChips"); box.innerHTML="";
    for(var i=0;i<CATS.length;i++){
      var b=document.createElement("button");
      b.className="rowchip"+(state.cat===CATS[i].k?" sel":"");
      b.setAttribute("data-cat",CATS[i].k);
      b.textContent=CATS[i].emo+" "+CATS[i].jp;
      box.appendChild(b);
    }
  }
  function learnedCount(){ var n=0; for(var k in state.learned){ if(state.learned[k]){ n++; } } return n; }
  function renderHome(){
    renderCats();
    $("collected").innerHTML="🌰 どんぐり "+state.acorns+"　✦　おぼえた ことば "+learnedCount();
    $("soundBtn").className="iconbtn"+(state.sound?"":" off");
    $("soundBtn").textContent=state.sound?"🔊":"🔇";
  }

  // ---------- Listen & Touch (comprehension) ----------
  var ROUND=6;
  var lIndex=0, lTarget=null, lEarned=0, lLock=false;
  function renderDots(idx){
    var d=$("lDots"); d.innerHTML="";
    for(var i=0;i<ROUND;i++){
      var c="pdot"; if(i<idx){ c="pdot done"; } else if(i===idx){ c="pdot cur"; }
      var e=document.createElement("div"); e.className=c; d.appendChild(e);
    }
  }
  function startListen(){
    lIndex=0; lEarned=0; lLock=false;
    $("lAcorns").textContent="🌰 "+state.acorns;
    show("listen"); nextListen();
  }
  function nextListen(){
    if(lIndex>=ROUND){ endRound(lEarned); return; }
    renderDots(lIndex);
    $("lFox").textContent="🦊"; $("lFox").className="foxreact";
    $("lBub").className="bub"; $("lBub").textContent="きいてね 👂";
    $("lBubEn").textContent="\u00a0";
    var pool=gamePool();
    lTarget=pickRand(pool);
    var opts=[lTarget];
    var distract=shuffle(depictItems().slice());
    for(var i=0;i<distract.length && opts.length<3;i++){ if(opts.indexOf(distract[i])<0){ opts.push(distract[i]); } }
    shuffle(opts);
    var box=$("lOpts"); box.innerHTML="";
    for(var j=0;j<opts.length;j++){
      var b=document.createElement("button"); b.className="opt"; b.setAttribute("data-pick",opts[j].say);
      var e=document.createElement("div"); e.className="oe"; e.textContent=opts[j].emo;
      var l=document.createElement("div"); l.className="ol"; l.textContent=opts[j].say;
      b.appendChild(e); b.appendChild(l); box.appendChild(b);
    }
    say(lTarget.say);
  }
  function answerListen(saytext, el){
    if(lLock){ return; }
    if(saytext===lTarget.say){
      lLock=true; el.className="opt good";
      state.learned[lTarget.say]=true; state.acorns++; lEarned++;
      $("lAcorns").textContent="🌰 "+state.acorns;
      $("lFox").textContent="🎉"; $("lFox").className="foxreact cheer";
      $("lBub").className="bub"; $("lBub").textContent="せいかい！";
      $("lBubEn").textContent=lTarget.en;
      happy(); sparkle(); say(lTarget.say); save();
      lIndex++;
      setTimeout(function(){ lLock=false; nextListen(); }, 1200);
    }else{
      el.className="opt bad";
      $("lBub").className="bub berry"; $("lBub").textContent="もういちど きいてね 👂";
      oops(); say(lTarget.say);
      setTimeout(function(){ el.className="opt"; }, 500);
      var opts=document.querySelectorAll("#lOpts .opt");
      for(var i=0;i<opts.length;i++){ if(opts[i].getAttribute("data-pick")===lTarget.say){ opts[i].className="opt hint"; } }
    }
  }

  // ---------- Board (production) ----------
  function startBoard(){
    var body=$("boardBody"); body.innerHTML="";
    for(var c=0;c<CATS.length;c++){
      if(CATS[c].k==="all"){ continue; }
      var items=[];
      for(var i=0;i<ITEMS.length;i++){ if(ITEMS[i].cat===CATS[c].k){ items.push(ITEMS[i]); } }
      if(!items.length){ continue; }
      var h=document.createElement("div"); h.className="cat-title";
      h.innerHTML='<span class="ce">'+CATS[c].emo+'</span><span>'+CATS[c].jp+'</span>';
      body.appendChild(h);
      var grid=document.createElement("div"); grid.className="board";
      for(var j=0;j<items.length;j++){
        var it=items[j];
        var b=document.createElement("button"); b.className="bcard"+(state.learned[it.say]?" learned":"");
        b.setAttribute("data-say",it.say);
        var e=document.createElement("div"); e.className="be"; e.textContent=it.emo;
        var l=document.createElement("div"); l.className="bl"; l.textContent=it.say;
        var en=document.createElement("div"); en.className="ben en"; en.textContent=it.en;
        b.appendChild(e); b.appendChild(l); b.appendChild(en); grid.appendChild(b);
      }
      body.appendChild(grid);
    }
    $("bFox").textContent="🦊"; $("bFox").className="foxreact";
    $("bBub").className="bub"; $("bBub").textContent="なにを いう？";
    $("bBubEn").textContent="Tap a picture to hear the words to say";
    show("board");
  }
  function touchBoard(saytext){
    var it=null;
    for(var i=0;i<ITEMS.length;i++){ if(ITEMS[i].say===saytext){ it=ITEMS[i]; break; } }
    if(!it){ return; }
    state.learned[it.say]=true; save();
    $("bFox").textContent="🦊"; $("bFox").className="foxreact cheer";
    $("bBub").className="bub"; $("bBub").textContent=sayText(it);
    $("bBubEn").textContent=it.en;
    tone(880,.1,"triangle");
    say(sayText(it));
  }

  // ---------- summary ----------
  var lastMode="listen";
  function endRound(earned){
    $("sumAcorns").textContent="🌰 +"+earned;
    var titles=["やったー！","すごいね！","じょうず！","だいせいかい！"];
    $("sumTitle").textContent=pickRand(titles);
    happy(); show("summary");
  }
  function replay(){ if(lastMode==="board"){ startBoard(); } else { startListen(); } }

  // ---------- leaves ----------
  (function(){
    var box=$("leaves"), emo=["🍃","🌿","🍂"];
    for(var i=0;i<10;i++){
      var s=document.createElement("div"); s.className="leaf"; s.textContent=emo[i%3];
      s.style.left=(Math.random()*100)+"%"; s.style.animationDuration=(8+Math.random()*10)+"s"; s.style.animationDelay=(Math.random()*10)+"s";
      box.appendChild(s);
    }
  })();

  // ---------- events ----------
  document.addEventListener("click", function(e){
    var cat=e.target.closest("[data-cat]");
    if(cat){ state.cat=cat.getAttribute("data-cat"); save(); renderHome(); return; }

    var mode=e.target.closest("[data-mode]");
    if(mode){
      var m=mode.getAttribute("data-mode"); lastMode=m;
      if(m==="board"){ startBoard(); } else { startListen(); }
      return;
    }

    var pk=e.target.closest("[data-pick]");
    if(pk){ answerListen(pk.getAttribute("data-pick"), pk); return; }

    var sy=e.target.closest("[data-say]");
    if(sy){ touchBoard(sy.getAttribute("data-say")); return; }

    var act=e.target.closest("[data-act]");
    if(act){
      var a=act.getAttribute("data-act");
      if(a==="sound"){ state.sound=!state.sound; save(); renderHome(); }
      else if(a==="home"){ renderHome(); show("home"); }
      else if(a==="repeat"){ if(lTarget){ say(lTarget.say); } }
      else if(a==="replay"){ replay(); }
      return;
    }
  });

  renderHome();
})();
</script>
</body>
</html>
