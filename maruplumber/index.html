<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydro Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface-2: #1a2235;
            --surface-3: #1e2d40;
            --border: rgba(99,179,237,0.15);
            --border-bright: rgba(99,179,237,0.35);
            --water: #38bdf8;
            --water-dark: #0ea5e9;
            --water-glow: rgba(56,189,248,0.4);
            --pipe: #2d3a4f;
            --pipe-light: #3d5068;
            --pipe-rim: #4a6080;
            --accent: #f59e0b;
            --accent-glow: rgba(245,158,11,0.4);
            --green: #34d399;
            --green-glow: rgba(52,211,153,0.4);
            --red: #f87171;
            --text: #e2e8f0;
            --text-muted: #64748b;
            --text-dim: #94a3b8;
            --radius: 16px;
            --tile-size: 72px;
            --gap: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }

        body {
            background: var(--bg);
            font-family: 'Nunito', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            position: relative;
        }

        .bg-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .bg-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.07; animation: blobDrift 20s ease-in-out infinite alternate; }
        .bg-blob:nth-child(1) { width: 400px; height: 400px; background: var(--water); top: -100px; left: -100px; }
        .bg-blob:nth-child(2) { width: 300px; height: 300px; background: var(--accent); bottom: -80px; right: -80px; animation-delay: -5s; }
        .bg-grid { position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px); background-size: 40px 40px; }

        @keyframes blobDrift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px,30px) scale(1.15); } }

        #app { position: relative; z-index: 1; width: 100%; max-width: 440px; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        
        /* Header & Navigation Fixes */
        .header { width: 100%; display: flex; align-items: center; justify-content: space-between; }
        .logo-group { display: flex; align-items: center; gap: 12px; }
        .home-link { 
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 10px;
            background: var(--surface-2); border: 1px solid var(--border);
            color: var(--text-dim); text-decoration: none; font-size: 1.2rem;
            transition: all 0.2s;
        }
        .home-link:hover { border-color: var(--water); color: var(--water); }
        .logo { font-size: 1.4rem; font-weight: 900; background: linear-gradient(135deg, var(--water), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo span { -webkit-text-fill-color: var(--text); }
        
        .badge { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 6px 14px; font-size: 0.8rem; font-family: 'Space Mono', monospace; }
        .badge.highlight { border-color: var(--border-bright); color: var(--water); }

        .stats-bar { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; display: flex; justify-content: space-between; align-items: center; }
        .stat-item { text-align: center; flex: 1; }
        .stat-label { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .stat-value { font-size: 1.1rem; font-weight: 900; font-family: 'Space Mono', monospace; }
        .stat-value.water { color: var(--water); }
        .stat-divider { width: 1px; height: 30px; background: var(--border); }

        .diff-row { display: flex; gap: 6px; width: 100%; }
        .diff-btn { flex: 1; padding: 8px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; font-size: 0.75rem; }
        .diff-btn.active { border-color: var(--water); color: var(--water); background: var(--surface-3); }

        .grid-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 16px; box-shadow: 0 0 40px rgba(0,0,0,0.4); }
        #grid { display: grid; gap: var(--gap); aspect-ratio: 1; }

        .tile { position: relative; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: transform 0.1s; overflow: hidden; }
        .tile:active { transform: scale(0.92); }
        .tile.locked { cursor: default; }
        .tile.flowing { border-color: var(--water); box-shadow: 0 0 15px var(--water-glow); }
        .tile.is-end.flowing { border-color: var(--green); box-shadow: 0 0 20px var(--green-glow); }

        .pipe-svg { width: 100%; height: 100%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .p-tube { fill: none; stroke: var(--pipe); stroke-width: 14; stroke-linecap: round; }
        .p-water { fill: none; stroke: var(--water); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 100; stroke-dashoffset: 100; transition: stroke-dashoffset 0.4s; }
        .tile.flowing .p-water { stroke-dashoffset: 0; }

        .controls { display: flex; gap: 10px; width: 100%; }
        .btn { flex: 1; padding: 14px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; transition: opacity 0.2s; }
        .btn-primary { background: var(--water); color: var(--bg); }
        .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; display: none; align-items: center; justify-content: center; }
        .modal-backdrop.active { display: flex; }
        .modal { background: var(--surface); padding: 30px; border-radius: 24px; text-align: center; border: 1px solid var(--water); max-width: 300px; }
    </style>
</head>
<body>

<div class="bg-layer"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="bg-grid"></div>

<div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
        <h2 id="modal-title">Flow Complete!</h2>
        <p style="margin: 15px 0; color: var(--text-dim)">Excellent work, Engineer!</p>
        <button class="btn btn-primary" onclick="Game.init()" style="width: 100%">Next Level</button>
    </div>
</div>

<div id="app">
    <div class="header">
        <div class="logo-group">
            <a href="https://aqmal-halim.github.io/Marulearn/" class="home-link">🏠</a>
            <div class="logo">Hydro<span>Quest</span></div>
        </div>
        <div class="header-right">
            <div class="badge highlight" id="level-badge">LVL 1</div>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-label">Moves</div>
            <div class="stat-value water" id="stat-moves">0</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-label">Time</div>
            <div class="stat-value" id="stat-time">0:00</div>
        </div>
    </div>

    <div class="diff-row" id="diff-row"></div>

    <div class="grid-wrap">
        <div id="grid"></div>
    </div>

    <div class="controls">
        <button class="btn btn-secondary" onclick="Game.init()">⟳ Shuffle</button>
        <button class="btn btn-primary" id="btn-flow" onclick="Game.startFlow()">▶ Flow</button>
    </div>
</div>

<script>
const PIPES = {
    straight: { conns: [1,0,1,0], svg: `<svg viewBox="0 0 100 100" class="pipe-svg"><path class="p-tube" d="M 50 0 L 50 100"/><path class="p-water" d="M 50 0 L 50 100"/></svg>` },
    elbow: { conns: [1,1,0,0], svg: `<svg viewBox="0 0 100 100" class="pipe-svg"><path class="p-tube" d="M 50 0 Q 50 50 100 50"/><path class="p-water" d="M 50 0 Q 50 50 100 50"/></svg>` },
    start: { conns: [0,1,0,0], svg: `<svg viewBox="0 0 100 100" class="pipe-svg"><circle cx="25" cy="50" r="12" fill="#f59e0b"/><path class="p-tube" d="M 25 50 L 100 50"/><path class="p-water" d="M 25 50 L 100 50"/></svg>` },
    end: { conns: [0,0,0,1], svg: `<svg viewBox="0 0 100 100" class="pipe-svg"><circle cx="75" cy="50" r="12" fill="#34d399"/><path class="p-tube" d="M 0 50 L 75 50"/><path class="p-water" d="M 0 50 L 75 50"/></svg>` }
};

const DIFFICULTIES = [{ name: 'Easy', size: 3 }, { name: 'Medium', size: 4 }, { name: 'Hard', size: 5 }];

const Game = (() => {
    let state = { diffIdx: 0, tiles: [], moves: 0, isFlowing: false, startTime: null };

    const init = (idx = state.diffIdx) => {
        state.diffIdx = idx;
        state.moves = 0;
        state.isFlowing = false;
        state.startTime = Date.now();
        document.getElementById('modal-backdrop').classList.remove('active');
        document.getElementById('btn-flow').disabled = false;
        renderDiffs();
        generateLevel();
    };

    const generateLevel = () => {
        const size = DIFFICULTIES[state.diffIdx].size;
        const total = size * size;
        const startIdx = 0;
        const endIdx = total - 1;

        // Create Path using BFS to ensure solvability
        let path = findValidPath(startIdx, endIdx, size);
        
        state.tiles = new Array(total).fill(null).map((_, i) => {
            let type = Math.random() > 0.5 ? 'straight' : 'elbow';
            if (i === startIdx) return { type: 'start', rotation: 0, isLocked: true };
            if (i === endIdx) return { type: 'end', rotation: 0, isLocked: true };
            return { type, rotation: Math.floor(Math.random() * 4), isLocked: false };
        });

        // Force tiles on the solution path to be the correct shapes
        for (let i = 1; i < path.length - 1; i++) {
            const prev = path[i-1], curr = path[i], next = path[i+1];
            const d1 = getDir(prev, curr, size), d2 = getDir(curr, next, size);
            state.tiles[curr].type = (d1 % 2 === d2 % 2) ? 'straight' : 'elbow';
        }

        renderTiles();
    };

    const findValidPath = (start, end, size) => {
        let q = [[start]];
        let visited = new Set([start]);
        while(q.length) {
            let path = q.shift();
            let curr = path[path.length-1];
            if (curr === end) return path;
            
            let neighbors = [];
            let r = Math.floor(curr / size), c = curr % size;
            if (r > 0) neighbors.push(curr - size);
            if (r < size - 1) neighbors.push(curr + size);
            if (c > 0) neighbors.push(curr - 1);
            if (c < size - 1) neighbors.push(curr + 1);
            
            for (let n of neighbors.sort(() => Math.random() - 0.5)) {
                if (!visited.has(n)) {
                    visited.add(n);
                    q.push([...path, n]);
                }
            }
        }
    };

    const getDir = (from, to, size) => {
        if (to === from - size) return 0; // Up
        if (to === from + 1) return 1;    // Right
        if (to === from + size) return 2; // Down
        return 3;                         // Left
    };

    const renderTiles = () => {
        const grid = document.getElementById('grid');
        grid.style.gridTemplateColumns = `repeat(${DIFFICULTIES[state.diffIdx].size}, 1fr)`;
        grid.innerHTML = '';
        state.tiles.forEach((tile, i) => {
            const div = document.createElement('div');
            div.className = `tile ${tile.isLocked ? 'locked' : ''} ${tile.type === 'end' ? 'is-end' : ''}`;
            div.innerHTML = PIPES[tile.type].svg;
            div.querySelector('.pipe-svg').style.transform = `rotate(${tile.rotation * 90}deg)`;
            if (!tile.isLocked) div.onclick = () => rotateTile(i);
            grid.appendChild(div);
        });
        updateUI();
    };

    const rotateTile = (i) => {
        if (state.isFlowing) return;
        state.tiles[i].rotation = (state.tiles[i].rotation + 1) % 4;
        state.moves++;
        renderTiles();
    };

    const startFlow = async () => {
        state.isFlowing = true;
        document.getElementById('btn-flow').disabled = true;
        const size = DIFFICULTIES[state.diffIdx].size;
        let curr = 0;
        let fromDir = 3; // Start coming from the left wall
        const path = [];

        while (true) {
            const tile = state.tiles[curr];
            const div = document.getElementById('grid').children[curr];
            
            const baseConns = PIPES[tile.type].conns;
            const conns = [...baseConns];
            for(let r=0; r<tile.rotation; r++) conns.unshift(conns.pop());

            // Check if current pipe connects to the incoming flow
            if (conns[(fromDir + 2) % 4] !== 1) break; 

            path.push(curr);
            div.classList.add('flowing');
            await new Promise(r => setTimeout(r, 250));

            if (tile.type === 'end') {
                document.getElementById('modal-backdrop').classList.add('active');
                return;
            }

            let nextDir = -1;
            for(let d=0; d<4; d++) {
                if (conns[d] === 1 && d !== (fromDir + 2) % 4) { nextDir = d; break; }
            }

            let r = Math.floor(curr / size), c = curr % size;
            if (nextDir === 0 && r > 0) { curr -= size; fromDir = 0; }
            else if (nextDir === 1 && c < size - 1) { curr += 1; fromDir = 1; }
            else if (nextDir === 2 && r < size - 1) { curr += size; fromDir = 2; }
            else if (nextDir === 3 && c > 0) { curr -= 1; fromDir = 3; }
            else break;
        }

        setTimeout(() => {
            path.forEach(idx => document.getElementById('grid').children[idx].classList.remove('flowing'));
            state.isFlowing = false;
            document.getElementById('btn-flow').disabled = false;
        }, 600);
    };

    const renderDiffs = () => {
        const row = document.getElementById('diff-row');
        row.innerHTML = '';
        DIFFICULTIES.forEach((d, i) => {
            const btn = document.createElement('button');
            btn.className = `diff-btn ${i === state.diffIdx ? 'active' : ''}`;
            btn.innerText = d.name;
            btn.onclick = () => init(i);
            row.appendChild(btn);
        });
    };

    const updateUI = () => {
        document.getElementById('stat-moves').innerText = state.moves;
        document.getElementById('level-badge').innerText = `LVL ${state.diffIdx + 1}`;
    };

    setInterval(() => {
        if (!state.isFlowing && state.startTime) {
            const sec = Math.floor((Date.now() - state.startTime) / 1000);
            document.getElementById('stat-time').innerText = `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`;
        }
    }, 1000);

    return { init, startFlow };
})();

window.onload = () => Game.init(0);
</script>
</body>
</html>
