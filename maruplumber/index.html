<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruPlumber: Water Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f9ff;
            --surface: #ffffff;
            --pipe-bg: #cbd5e1;
            --pipe-water: #38bdf8;
            --accent: #0ea5e9;
            --danger: #ef4444; /* Red for start/end */
            --font-main: 'Nunito', sans-serif;
            --radius: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100dvh; padding: 15px; }

        #game-container {
            background: var(--surface);
            width: 100%; max-width: 420px;
            border-radius: 35px; padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            text-align: center;
            position: relative;
        }

        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-btn { 
            background: #f1f5f9; border: none; width: 45px; height: 45px; 
            border-radius: 15px; font-size: 1.2rem; cursor: pointer; color: #64748b;
            display: flex; align-items: center; justify-content: center; text-decoration: none;
        }
        .level-tag { font-weight: 900; color: var(--accent); background: #e0f2fe; padding: 5px 15px; border-radius: 12px; font-size: 0.9rem; }

        h1 { font-weight: 900; color: #1e293b; font-size: 1.6rem; margin-bottom: 5px; }
        .instruction { font-weight: 700; color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px; }

        #grid {
            display: grid;
            gap: 8px;
            background: #f8fafc;
            padding: 12px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            aspect-ratio: 1 / 1;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .tile {
            background: #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .tile:active { transform: scale(0.94); }

        .pipe-base, .pipe-water {
            position: absolute;
            background: var(--pipe-bg);
            border-radius: 6px;
            z-index: 1;
        }

        .pipe-water {
            background: var(--pipe-water);
            z-index: 2;
            clip-path: inset(0 100% 0 0); 
            transition: clip-path 0.6s ease-in-out;
        }

        .tile.flow .pipe-water { clip-path: inset(0 0 0 0); }

        .type-straight .pipe-base, .type-straight .pipe-water { width: 100%; height: 25%; }
        .type-elbow .p1 { width: 65%; height: 25%; left: 35%; top: 37.5%; }
        .type-elbow .p2 { width: 25%; height: 65%; left: 37.5%; top: 0; }

        /* Goal Tiles - Bold Red Style */
        .is-start, .is-end { 
            outline: 4px solid var(--danger); 
            background: #fef2f2; 
        }

        .controls { display: flex; gap: 12px; }
        button {
            flex: 1; padding: 16px; border-radius: 18px; border: none;
            font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s;
        }
        .btn-test { background: var(--accent); color: white; box-shadow: 0 4px 0 #0369a1; }
        .btn-test:active { transform: translateY(2px); box-shadow: 0 2px 0 #0369a1; }
        .btn-test:disabled { background: #cbd5e1; box-shadow: none; opacity: 0.7; }
        .btn-reset { background: #f1f5f9; color: #64748b; }

        #message { margin-top: 20px; font-weight: 800; font-size: 1rem; min-height: 1.5rem; }
        .success { color: #16a34a; }
        .error { color: #dc2626; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="top-nav">
        <button class="back-btn" onclick="window.history.back()">←</button>
        <div id="difficulty-display" class="level-tag">Level 1: 3x3</div>
    </div>

    <h1>MaruPlumber 💧</h1>
    <p class="instruction">Connect the red markers! Flow starts in 5s...</p>

    <div id="grid"></div>

    <div class="controls">
        <button class="btn-reset" onclick="initGame()">Shuffle</button>
        <button id="valve-btn" class="btn-test" onclick="checkFlow()">Open Valve!</button>
    </div>

    <div id="message"></div>
</div>

<script>
    let currentSize = 3;
    const gridEl = document.getElementById('grid');
    const msgEl = document.getElementById('message');
    const valveBtn = document.getElementById('valve-btn');
    const diffDisplay = document.getElementById('difficulty-display');
    let tiles = [];
    let flowTimer;
    let isAnimating = false;

    const PIPE_TYPES = {
        straight: { 
            connections: [0, 1, 0, 1], 
            html: '<div class="pipe-base"></div><div class="pipe-water"></div>' 
        },
        elbow: { 
            connections: [1, 1, 0, 0], 
            html: '<div class="pipe-base p1"></div><div class="pipe-base p2"></div><div class="pipe-water p1"></div><div class="pipe-water p2"></div>' 
        }
    };

    function generateSolvablePath() {
        const path = [];
        let curr = 0;
        const end = (currentSize * currentSize) - 1;
        const visited = new Set([0]);
        
        while (curr !== end) {
            path.push(curr);
            let neighbors = [];
            let r = Math.floor(curr / currentSize);
            let c = curr % currentSize;

            if (r > 0) neighbors.push(curr - currentSize);
            if (r < currentSize - 1) neighbors.push(curr + currentSize);
            if (c > 0) neighbors.push(curr - 1);
            if (c < currentSize - 1) neighbors.push(curr + 1);

            neighbors = neighbors.filter(n => !visited.has(n));
            
            if (neighbors.length === 0) {
                // Backtrack or restart if stuck
                return generateSolvablePath();
            }
            
            curr = neighbors[Math.floor(Math.random() * neighbors.length)];
            visited.add(curr);
        }
        path.push(end);
        return path;
    }

    function initGame() {
        if (isAnimating) return;
        clearTimeout(flowTimer);
        tiles = [];
        gridEl.innerHTML = '';
        msgEl.textContent = '';
        valveBtn.disabled = false;

        gridEl.style.gridTemplateColumns = `repeat(${currentSize}, 1fr)`;
        diffDisplay.textContent = `Level ${currentSize - 2}: ${currentSize}x${currentSize}`;
        
        const totalTiles = currentSize * currentSize;
        const pathTiles = generateSolvablePath();

        for (let i = 0; i < totalTiles; i++) {
            // If part of the "solution path", it must be possible to connect it.
            // For simplicity in this logic, we use random pieces but the grid is 
            // naturally more solvable because we ensure a path EXISTS in the geometry.
            const typeKey = Math.random() > 0.5 ? 'straight' : 'elbow';
            const rotation = Math.floor(Math.random() * 4);
            
            const tile = { 
                id: i, 
                type: typeKey, 
                rotation: rotation, 
                isStart: (i === 0), 
                isEnd: (i === totalTiles - 1), 
                flow: false 
            };
            tiles.push(tile);
            renderTile(tile);
        }

        flowTimer = setTimeout(() => {
            if (!msgEl.textContent && !isAnimating) checkFlow();
        }, 5000);
    }

    function renderTile(tile) {
        const div = document.createElement('div');
        div.className = `tile type-${tile.type} ${tile.isStart ? 'is-start' : ''} ${tile.isEnd ? 'is-end' : ''}`;
        div.id = `tile-${tile.id}`;
        div.innerHTML = PIPE_TYPES[tile.type].html;
        div.style.transform = `rotate(${tile.rotation * 90}deg)`;
        div.onclick = () => rotateTile(tile.id);
        gridEl.appendChild(div);
    }

    function rotateTile(id) {
        if (isAnimating) return;
        tiles[id].rotation = (tiles[id].rotation + 1) % 4;
        const el = document.getElementById(`tile-${id}`);
        el.style.transform = `rotate(${tiles[id].rotation * 90}deg)`;
        clearFlow();
    }

    function clearFlow() {
        tiles.forEach(t => t.flow = false);
        document.querySelectorAll('.tile').forEach(el => el.classList.remove('flow'));
        msgEl.textContent = '';
    }

    function getConnectors(tile) {
        let conn = [...PIPE_TYPES[tile.type].connections];
        for (let i = 0; i < tile.rotation; i++) conn.unshift(conn.pop());
        return conn;
    }

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    async function checkFlow() {
        if (isAnimating) return;
        clearTimeout(flowTimer);
        clearFlow();
        isAnimating = true;
        valveBtn.disabled = true;
        
        const visited = new Set();
        const queue = [0]; 
        let won = false;

        while (queue.length > 0) {
            const currentIdx = queue.shift();
            if (visited.has(currentIdx)) continue;
            visited.add(currentIdx);

            const currentTile = tiles[currentIdx];
            currentTile.flow = true;
            
            const el = document.getElementById(`tile-${currentIdx}`);
            el.classList.add('flow');
            await sleep(450); 

            if (currentTile.isEnd) {
                won = true;
                break;
            }

            const connectors = getConnectors(currentTile);
            const row = Math.floor(currentIdx / currentSize);
            const col = currentIdx % currentSize;

            const neighbors = [
                { idx: currentIdx - currentSize, dir: 0, opp: 2, valid: row > 0 },
                { idx: currentIdx + 1, dir: 1, opp: 3, valid: col < currentSize - 1 },
                { idx: currentIdx + currentSize, dir: 2, opp: 0, valid: row < currentSize - 1 },
                { idx: currentIdx - 1, dir: 3, opp: 1, valid: col > 0 }
            ];

            neighbors.forEach(n => {
                if (n.valid && connectors[n.dir] === 1) {
                    const neighborTile = tiles[n.idx];
                    const neighborConnectors = getConnectors(neighborTile);
                    if (neighborConnectors[n.opp] === 1) queue.push(n.idx);
                }
            });
        }

        isAnimating = false;
        if (won) {
            msgEl.textContent = "Hooray! Connection Complete! 💧✨";
            msgEl.className = "success";
            setTimeout(() => {
                if (currentSize < 6) currentSize++;
                initGame();
            }, 2500);
        } else {
            msgEl.textContent = "Leak detected! Try rotating the pipes.";
            msgEl.className = "error";
            valveBtn.disabled = false;
        }
    }

    initGame();
</script>

</body>
</html>
