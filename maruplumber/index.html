<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydro Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface-2: #1a2235;
            --surface-3: #1e2d40;
            --border: rgba(99,179,237,0.15);
            --border-bright: rgba(99,179,237,0.35);
            --water: #38bdf8;
            --water-dark: #0ea5e9;
            --water-glow: rgba(56,189,248,0.4);
            --pipe: #2d3a4f;
            --pipe-light: #3d5068;
            --pipe-rim: #4a6080;
            --accent: #f59e0b;
            --accent-glow: rgba(245,158,11,0.4);
            --green: #34d399;
            --green-glow: rgba(52,211,153,0.4);
            --red: #f87171;
            --text: #e2e8f0;
            --text-muted: #64748b;
            --text-dim: #94a3b8;
            --radius: 16px;
            --tile-size: 72px;
            --gap: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }

        body {
            background: var(--bg);
            font-family: 'Nunito', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            position: relative;
        }

        .bg-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .bg-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.07; animation: blobDrift 20s ease-in-out infinite alternate; }
        .bg-blob:nth-child(1) { width: 400px; height: 400px; background: var(--water); top: -100px; left: -100px; animation-duration: 18s; }
        .bg-blob:nth-child(2) { width: 300px; height: 300px; background: var(--accent); bottom: -80px; right: -80px; animation-duration: 22s; animation-delay: -5s; }
        .bg-blob:nth-child(3) { width: 250px; height: 250px; background: var(--green); top: 40%; left: 60%; animation-duration: 25s; animation-delay: -10s; }
        @keyframes blobDrift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px,30px) scale(1.15); } }
        .bg-grid { position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px); background-size: 40px 40px; }

        #app { position: relative; z-index: 1; width: 100%; max-width: 440px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .header { width: 100%; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--water), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .logo span { -webkit-text-fill-color: var(--text); }
        .header-right { display: flex; gap: 10px; align-items: center; }
        .badge { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 6px 14px; font-size: 0.8rem; font-weight: 700; color: var(--text-dim); font-family: 'Space Mono', monospace; }
        .badge.highlight { border-color: var(--border-bright); color: var(--water); }

        .stats-bar { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 2px; }
        .stat-value { font-size: 1.2rem; font-weight: 900; font-family: 'Space Mono', monospace; }
        .stat-value.water { color: var(--water); }
        .stat-value.gold { color: var(--accent); }
        .stat-value.green { color: var(--green); }
        .stat-divider { width: 1px; height: 36px; background: var(--border); }

        .diff-row { display: flex; gap: 6px; width: 100%; }
        .diff-btn { flex: 1; padding: 9px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'Nunito', sans-serif; }
        .diff-btn.active { background: var(--surface-3); border-color: var(--water); color: var(--water); box-shadow: 0 0 12px var(--water-glow); }

        .grid-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 16px; width: 100%; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.4); }
        #grid { display: grid; gap: var(--gap); width: 100%; aspect-ratio: 1; }

        .tile { position: relative; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1), border-color 0.2s, background 0.2s; display: flex; align-items: center; justify-content: center; overflow: hidden; user-select: none; }
        .tile:hover { border-color: var(--border-bright); background: var(--surface-3); }
        .tile:active { transform: scale(0.92); }
        .tile.is-start { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.4); }
        .tile.is-end { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.4); }
        .tile.flowing { border-color: rgba(56,189,248,0.5); box-shadow: 0 0 14px var(--water-glow); }
        .tile.is-end.flowing { border-color: var(--green); box-shadow: 0 0 18px var(--green-glow); }

        .tile-inner { width: 100%; height: 100%; position: relative; }
        .pipe-svg { width: 100%; height: 100%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .p-bg { fill: none; stroke: var(--pipe-rim); stroke-width: 14; stroke-linecap: round; opacity: 0.5; }
        .p-tube { fill: none; stroke: var(--pipe); stroke-width: 12; stroke-linecap: round; }
        .p-inner { fill: none; stroke: var(--pipe-light); stroke-width: 6; stroke-linecap: round; }
        .p-water { fill: none; stroke: var(--water); stroke-width: 6; stroke-linecap: round; stroke-dasharray: 100; stroke-dashoffset: 100; filter: drop-shadow(0 0 4px var(--water)); transition: stroke-dashoffset 0.45s ease-out; }
        .tile.flowing .p-water { stroke-dashoffset: 0; }
        .tile.flowing .p-water.end-glow { stroke: var(--green); }

        .controls { display: flex; gap: 10px; width: 100%; }
        .btn { flex: 1; padding: 14px 0; border-radius: 14px; border: none; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.95rem; transition: all 0.18s; }
        .btn-primary { background: linear-gradient(135deg, var(--water-dark), var(--water)); color: #0a0e1a; box-shadow: 0 4px 20px var(--water-glow); }
        .btn-secondary { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .flow-progress { width: 100%; height: 4px; background: var(--surface-2); border-radius: 2px; overflow: hidden; margin-top: 12px; }
        .flow-bar { height: 100%; width: 0%; background: var(--water); transition: width 0.3s; }

        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center; }
        .modal-backdrop.active { display: flex; }
        .modal { background: var(--surface); border: 1px solid var(--border-bright); border-radius: 24px; padding: 32px; width: 90%; max-width: 360px; text-align: center; }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--surface-2); padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="bg-layer"><div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="bg-grid"></div>
<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
        <h2 id="modal-title" style="margin-bottom:10px">Flow Complete!</h2>
        <div id="modal-stats" style="margin-bottom:20px; color: var(--text-dim)"></div>
        <button class="btn btn-primary" onclick="Game.init()">Play Again</button>
    </div>
</div>

<div id="app">
    <div class="header">
        <div class="logo">Hydro<span>Quest</span></div>
        <div class="header-right"><div class="badge highlight" id="level-badge">LVL 1</div></div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><div class="stat-label">Moves</div><div class="stat-value water" id="stat-moves">0</div></div>
        <div class="stat-divider"></div>
        <div class="stat-item"><div class="stat-label">Score</div><div class="stat-value green" id="stat-score">0</div></div>
    </div>

    <div class="diff-row" id="diff-row"></div>

    <div class="grid-wrap">
        <div id="grid"></div>
        <div class="flow-progress"><div class="flow-bar" id="flow-bar"></div></div>
    </div>

    <div class="controls">
        <button class="btn btn-secondary" onclick="Game.init()">⟳ Reset</button>
        <button class="btn btn-primary" id="btn-flow" onclick="Game.startFlow()">▶ Flow</button>
    </div>
</div>

<script>
const PIPES = {
    straight: { conns: [0,1,0,1], svg: (s) => `<svg viewBox="0 0 100 100" class="pipe-svg"><path class="p-bg" d="M 0 50 L 100 50"/><path class="p-tube" d="M 0 50 L 100 50"/><path class="p-water" d="M 0 50 L 100 50"/></svg>` },
    elbow: { conns: [1,1,0,0], svg: (s) => `<svg viewBox="0 0 100 100" class="pipe-svg"><path class="p-bg" d="M 50 0 Q 50 50 100 50"/><path class="p-tube" d="M 50 0 Q 50 50 100 50"/><path class="p-water" d="M 50 0 Q 50 50 100 50"/></svg>` },
    start: { conns: [0,1,0,0], svg: (s) => `<svg viewBox="0 0 100 100" class="pipe-svg"><circle cx="30" cy="50" r="15" fill="#f59e0b"/><path class="p-bg" d="M 30 50 L 100 50"/><path class="p-tube" d="M 30 50 L 100 50"/><path class="p-water" d="M 30 50 L 100 50"/></svg>` },
    end: { conns: [0,0,0,1], svg: (s) => `<svg viewBox="0 0 100 100" class="pipe-svg"><circle cx="70" cy="50" r="15" fill="#34d399"/><path class="p-bg" d="M 0 50 L 70 50"/><path class="p-tube" d="M 0 50 L 70 50"/><path class="p-water end-w" d="M 0 50 L 70 50"/></svg>` }
};

const Game = (() => {
    let state = { size: 4, tiles: [], moves: 0, score: 0, isFlowing: false, diffIdx: 1 };
    const Diffs = [{n:'Easy',s:3}, {n:'Med',s:4}, {n:'Hard',s:5}];

    const init = (idx = state.diffIdx) => {
        state.diffIdx = idx; state.size = Diffs[idx].s; state.moves = 0; state.isFlowing = false;
        document.getElementById('modal-backdrop').classList.remove('active');
        document.getElementById('btn-flow').disabled = false;
        document.getElementById('flow-bar').style.width = '0%';
        generateLevel();
        render();
        updateUI();
    };

    const generateLevel = () => {
        const s = state.size;
        const total = s * s;
        // 1. Pathfinding (DFS) to guarantee a route
        let path = [];
        const findPath = (curr, visited) => {
            path.push(curr);
            if (curr === total - 1) return true;
            visited.add(curr);
            let neighbors = [];
            if (curr % s < s - 1) neighbors.push(curr + 1);
            if (curr < total - s) neighbors.push(curr + s);
            if (curr % s > 0) neighbors.push(curr - 1);
            if (curr >= s) neighbors.push(curr - s);
            neighbors = neighbors.filter(n => !visited.has(n)).sort(() => Math.random() - 0.5);
            for (let n of neighbors) if (findPath(n, visited)) return true;
            path.pop();
            return false;
        };
        findPath(0, new Set());

        // 2. Map path to pipe types
        state.tiles = Array(total).fill(null).map((_, i) => ({ id: i, type: Math.random() > 0.5 ? 'straight' : 'elbow', rotation: Math.floor(Math.random() * 4) }));
        
        path.forEach((curr, idx) => {
            if (idx === 0) state.tiles[curr].type = 'start';
            else if (idx === path.length - 1) state.tiles[curr].type = 'end';
            else {
                const prev = path[idx-1], next = path[idx+1];
                const d1 = getDir(prev, curr), d2 = getDir(curr, next);
                state.tiles[curr].type = (d1 % 2 === d2 % 2) ? 'straight' : 'elbow';
            }
        });
    };

    const getDir = (f, t) => {
        if (t === f + 1) return 1; if (t === f - 1) return 3;
        if (t === f + state.size) return 2; return 0;
    };

    const render = () => {
        const g = document.getElementById('grid');
        g.style.gridTemplateColumns = `repeat(${state.size}, 1fr)`;
        g.innerHTML = '';
        state.tiles.forEach((t, i) => {
            const d = document.createElement('div');
            d.className = `tile ${t.type === 'start' ? 'is-start' : t.type === 'end' ? 'is-end' : ''}`;
            d.innerHTML = `<div class="tile-inner">${PIPES[t.type].svg()}</div>`;
            d.querySelector('.pipe-svg').style.transform = `rotate(${t.rotation * 90}deg)`;
            d.onclick = () => rotate(i);
            g.appendChild(d);
        });

        const dr = document.getElementById('diff-row');
        dr.innerHTML = Diffs.map((d,i) => `<button class="diff-btn ${i===state.diffIdx?'active':''}" onclick="Game.init(${i})">${d.n}</button>`).join('');
    };

    const rotate = (i) => {
        if (state.isFlowing) return;
        state.tiles[i].rotation = (state.tiles[i].rotation + 1) % 4;
        state.moves++;
        const svg = document.getElementById('grid').children[i].querySelector('.pipe-svg');
        svg.style.transform = `rotate(${state.tiles[i].rotation * 90}deg)`;
        updateUI();
    };

    const startFlow = async () => {
        state.isFlowing = true;
        document.getElementById('btn-flow').disabled = true;
        let curr = 0, visited = new Set(), flowOrder = [];
        let connected = true;

        // BFS flow check
        let q = [0];
        while(q.length > 0) {
            let node = q.shift();
            if (visited.has(node)) continue;
            visited.add(node);
            flowOrder.push(node);
            if (state.tiles[node].type === 'end') break;

            const tile = state.tiles[node];
            const conns = rotateArr(PIPES[tile.type].conns, tile.rotation);
            
            [[0,-state.size,2],[1,1,3],[2,state.size,0],[3,-1,1]].forEach(([dir, step, opp]) => {
                const next = node + step;
                if (conns[dir] && next >= 0 && next < state.tiles.length) {
                    if (dir === 1 && node % state.size === state.size - 1) return;
                    if (dir === 3 && node % state.size === 0) return;
                    const nextTile = state.tiles[next];
                    if (rotateArr(PIPES[nextTile.type].conns, nextTile.rotation)[opp]) q.push(next);
                }
            });
        }

        for (let idx of flowOrder) {
            document.getElementById('grid').children[idx].classList.add('flowing');
            document.getElementById('flow-bar').style.width = `${(flowOrder.indexOf(idx)+1)/flowOrder.length * 100}%`;
            await new Promise(r => setTimeout(r, 200));
        }

        if (state.tiles[flowOrder[flowOrder.length-1]].type === 'end') {
            document.getElementById('modal-stats').textContent = `Moves: ${state.moves}`;
            document.getElementById('modal-backdrop').classList.add('active');
        } else {
            showToast("Circuit Incomplete!");
            await new Promise(r => setTimeout(r, 1000));
            flowOrder.forEach(idx => document.getElementById('grid').children[idx].classList.remove('flowing'));
            state.isFlowing = false;
            document.getElementById('btn-flow').disabled = false;
        }
    };

    const rotateArr = (a, r) => { let res = [...a]; for(let i=0; i<r; i++) res.unshift(res.pop()); return res; };
    const updateUI = () => { document.getElementById('stat-moves').textContent = state.moves; };
    const showToast = (m) => { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); };

    return { init, startFlow };
})();

window.onload = () => Game.init(1);
</script>
</body>
</html>
