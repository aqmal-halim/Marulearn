<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruPlumber: Water Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f9ff;
            --surface: #ffffff;
            --pipe-bg: #e2e8f0;
            --pipe-active: #38bdf8;
            --accent: #0ea5e9;
            --text: #1e293b;
            --font-main: 'Nunito', sans-serif;
            --radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100dvh; padding: 10px; }

        #game-container {
            background: var(--surface);
            width: 100%; max-width: 400px;
            border-radius: 30px; padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 { font-weight: 900; color: var(--accent); margin-bottom: 5px; }
        p { font-weight: 700; color: #64748b; font-size: 0.9rem; margin-bottom: 20px; }

        /* The Grid */
        #grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: #f1f5f9;
            padding: 10px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            aspect-ratio: 1 / 1;
        }

        .tile {
            background: var(--pipe-bg);
            border-radius: 12px;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
        }

        .tile:active { transform: scale(0.9); }

        /* Pipe Visuals */
        .pipe-line {
            position: absolute;
            background: #94a3b8;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .tile.flow .pipe-line { background: var(--pipe-active); box-shadow: 0 0 10px var(--pipe-active); }

        /* Straight Pipe */
        .type-straight .pipe-line { width: 100%; height: 25%; }
        
        /* Elbow Pipe */
        .type-elbow .pipe-1 { width: 62.5%; height: 25%; left: 50%; top: 37.5%; }
        .type-elbow .pipe-2 { width: 25%; height: 62.5%; left: 37.5%; top: 0; }

        /* Start and End Indicators */
        .is-start { border: 4px solid #4ade80 !important; background: #dcfce7; }
        .is-end { border: 4px solid #fb7185 !important; background: #ffe4e6; }

        .controls { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 15px; border-radius: 15px; border: none;
            font-weight: 800; font-size: 1rem; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-test { background: var(--accent); color: white; box-shadow: 0 4px 0 #0369a1; }
        .btn-test:active { transform: translateY(2px); box-shadow: 0 2px 0 #0369a1; }
        .btn-reset { background: #e2e8f0; color: #475569; }

        #message { margin-top: 15px; font-weight: 800; min-height: 1.2rem; }
        .success { color: #16a34a; }
        .error { color: #dc2626; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>MaruPlumber 💧</h1>
    <p>Rotate the pipes to connect the source to the drain!</p>

    <div id="grid"></div>

    <div class="controls">
        <button class="btn-reset" onclick="initGame()">Shuffle</button>
        <button class="btn-test" onclick="checkFlow()">Open Valve!</button>
    </div>

    <div id="message"></div>
</div>

<script>
    const GRID_SIZE = 5;
    const gridEl = document.getElementById('grid');
    const msgEl = document.getElementById('message');
    let tiles = [];

    // Connections: [Top, Right, Bottom, Left]
    const PIPE_TYPES = {
        straight: { connections: [0, 1, 0, 1], html: '<div class="pipe-line"></div>' },
        elbow: { connections: [1, 1, 0, 0], html: '<div class="pipe-line pipe-1"></div><div class="pipe-line pipe-2"></div>' }
    };

    function initGame() {
        tiles = [];
        gridEl.innerHTML = '';
        msgEl.textContent = '';
        
        for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
            const typeKey = Math.random() > 0.5 ? 'straight' : 'elbow';
            const rotation = Math.floor(Math.random() * 4);
            const isStart = (i === 0);
            const isEnd = (i === GRID_SIZE * GRID_SIZE - 1);
            
            const tile = {
                id: i,
                type: typeKey,
                rotation: rotation,
                isStart: isStart,
                isEnd: isEnd,
                flow: false
            };
            
            tiles.push(tile);
            renderTile(tile);
        }
    }

    function renderTile(tile) {
        const div = document.createElement('div');
        div.className = `tile type-${tile.type} ${tile.isStart ? 'is-start' : ''} ${tile.isEnd ? 'is-end' : ''}`;
        div.id = `tile-${tile.id}`;
        div.innerHTML = PIPE_TYPES[tile.type].html;
        div.style.transform = `rotate(${tile.rotation * 90}deg)`;
        
        div.onclick = () => rotateTile(tile.id);
        gridEl.appendChild(div);
    }

    function rotateTile(id) {
        tiles[id].rotation = (tiles[id].rotation + 1) % 4;
        const el = document.getElementById(`tile-${id}`);
        el.style.transform = `rotate(${tiles[id].rotation * 90}deg)`;
        clearFlow();
    }

    function clearFlow() {
        tiles.forEach(t => t.flow = false);
        document.querySelectorAll('.tile').forEach(el => el.classList.remove('flow'));
        msgEl.textContent = '';
    }

    function getConnectors(tile) {
        let conn = [...PIPE_TYPES[tile.type].connections];
        // Rotate the connection array based on current rotation
        for (let i = 0; i < tile.rotation; i++) {
            conn.unshift(conn.pop());
        }
        return conn;
    }

    function checkFlow() {
        clearFlow();
        const visited = new Set();
        const queue = [0]; // Start at tile 0
        let won = false;

        while (queue.length > 0) {
            const currentIdx = queue.shift();
            if (visited.has(currentIdx)) continue;
            visited.add(currentIdx);

            const currentTile = tiles[currentIdx];
            currentTile.flow = true;
            document.getElementById(`tile-${currentIdx}`).classList.add('flow');

            if (currentTile.isEnd) {
                won = true;
                break;
            }

            const connectors = getConnectors(currentTile);
            const row = Math.floor(currentIdx / GRID_SIZE);
            const col = currentIdx % GRID_SIZE;

            // Check neighbors: Top, Right, Bottom, Left
            const neighbors = [
                { idx: currentIdx - GRID_SIZE, dir: 0, opposite: 2, valid: row > 0 },
                { idx: currentIdx + 1, dir: 1, opposite: 3, valid: col < GRID_SIZE - 1 },
                { idx: currentIdx + GRID_SIZE, dir: 2, opposite: 0, valid: row < GRID_SIZE - 1 },
                { idx: currentIdx - 1, dir: 3, opposite: 1, valid: col > 0 }
            ];

            neighbors.forEach(n => {
                if (n.valid && connectors[n.dir] === 1) {
                    const neighborTile = tiles[n.idx];
                    const neighborConnectors = getConnectors(neighborTile);
                    if (neighborConnectors[n.opposite] === 1) {
                        queue.push(n.idx);
                    }
                }
            });
        }

        if (won) {
            msgEl.textContent = "Hooray! The water is flowing! 💧✨";
            msgEl.className = "success";
        } else {
            msgEl.textContent = "Oops! There is a leak somewhere.";
            msgEl.className = "error";
        }
    }

    initGame();
</script>

</body>
</html>
