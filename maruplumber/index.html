<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydro Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface-2: #1a2235;
            --surface-3: #1e2d40;
            --border: rgba(99,179,237,0.15);
            --border-bright: rgba(99,179,237,0.35);
            --water: #38bdf8;
            --water-dark: #0ea5e9;
            --water-glow: rgba(56,189,248,0.4);
            --pipe: #2d3a4f;
            --pipe-light: #3d5068;
            --pipe-rim: #4a6080;
            --accent: #f59e0b;
            --accent-glow: rgba(245,158,11,0.4);
            --green: #34d399;
            --green-glow: rgba(52,211,153,0.4);
            --red: #f87171;
            --text: #e2e8f0;
            --text-muted: #64748b;
            --text-dim: #94a3b8;
            --radius: 16px;
            --tile-size: 72px;
            --gap: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }

        body {
            background: var(--bg);
            font-family: 'Nunito', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            position: relative;
        }

        .bg-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .bg-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.07; animation: blobDrift 20s ease-in-out infinite alternate; }
        .bg-blob:nth-child(1) { width: 400px; height: 400px; background: var(--water); top: -100px; left: -100px; animation-duration: 18s; }
        .bg-blob:nth-child(2) { width: 300px; height: 300px; background: var(--accent); bottom: -80px; right: -80px; animation-duration: 22s; animation-delay: -5s; }
        .bg-blob:nth-child(3) { width: 250px; height: 250px; background: var(--green); top: 40%; left: 60%; animation-duration: 25s; animation-delay: -10s; }
        @keyframes blobDrift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px,30px) scale(1.15); } }
        
        .bg-grid { position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px); background-size: 40px 40px; }

        #app { position: relative; z-index: 1; width: 100%; max-width: 440px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 16px; }

        .header { width: 100%; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--water), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .logo span { -webkit-text-fill-color: var(--text); }
        .header-right { display: flex; gap: 10px; align-items: center; }

        .btn-back { padding: 6px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; color: var(--text-dim); text-decoration: none; font-size: 0.75rem; font-weight: 700; transition: all 0.2s; }
        .btn-back:hover { background: var(--surface-3); border-color: var(--water); color: var(--text); }

        .badge { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 6px 14px; font-size: 0.8rem; font-weight: 700; color: var(--text-dim); font-family: 'Space Mono', monospace; }
        .badge.highlight { border-color: var(--border-bright); color: var(--water); }

        .stats-bar { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 2px; }
        .stat-value { font-size: 1.2rem; font-weight: 900; font-family: 'Space Mono', monospace; }
        .stat-value.water { color: var(--water); }
        .stat-value.gold { color: var(--accent); }
        .stat-value.green { color: var(--green); }
        .stat-divider { width: 1px; height: 36px; background: var(--border); }

        .diff-row { display: flex; gap: 6px; width: 100%; }
        .diff-btn { flex: 1; padding: 9px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'Nunito', sans-serif; }
        .diff-btn:hover { border-color: var(--border-bright); color: var(--text); }
        .diff-btn.active { background: var(--surface-3); border-color: var(--water); color: var(--water); box-shadow: 0 0 12px var(--water-glow), inset 0 0 8px rgba(56,189,248,0.05); }

        .grid-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 16px; width: 100%; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.4); }
        #grid { display: grid; gap: var(--gap); width: 100%; aspect-ratio: 1; }

        .tile { position: relative; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1), border-color 0.2s, background 0.2s, box-shadow 0.2s; display: flex; align-items: center; justify-content: center; overflow: hidden; user-select: none; }
        .tile:hover { border-color: var(--border-bright); background: var(--surface-3); }
        .tile:active { transform: scale(0.87); }
        .tile.is-start { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.4); }
        .tile.is-end { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.4); }
        .tile.flowing { border-color: rgba(56,189,248,0.5); box-shadow: 0 0 14px var(--water-glow), inset 0 0 10px rgba(56,189,248,0.06); }
        .tile.is-end.flowing { border-color: var(--green); box-shadow: 0 0 18px var(--green-glow), inset 0 0 12px rgba(52,211,153,0.08); }
        .tile.wrong-flash { animation: wrongFlash 0.4s ease; }
        @keyframes wrongFlash { 0%, 100% { background: var(--surface-2); } 50% { background: rgba(248,113,113,0.2); border-color: rgba(248,113,113,0.6); } }

        .tile-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .pipe-svg { width: 100%; height: 100%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: absolute; inset: 0; }
        .rot-hint { position: absolute; bottom: 3px; right: 4px; font-size: 8px; color: var(--text-muted); opacity: 0; transition: opacity 0.2s; pointer-events: none; font-family: 'Space Mono', monospace; }
        .tile:hover .rot-hint { opacity: 0.7; }

        .controls { display: flex; gap: 10px; width: 100%; }
        .btn { flex: 1; padding: 14px 0; border-radius: 14px; border: none; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.95rem; transition: all 0.18s; position: relative; overflow: hidden; }
        .btn::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0); transition: background 0.18s; }
        .btn:hover::after { background: rgba(255,255,255,0.05); }
        .btn:active { transform: translateY(2px); }
        .btn-primary { background: linear-gradient(135deg, var(--water-dark), var(--water)); color: #0a0e1a; box-shadow: 0 4px 20px var(--water-glow); }
        .btn-primary:disabled { background: var(--surface-2); color: var(--text-muted); box-shadow: none; cursor: not-allowed; }
        .btn-secondary { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--border-bright); color: var(--text); }

        .hint-bar { width: 100%; text-align: center; font-size: 0.78rem; color: var(--text-muted); min-height: 1.2em; transition: opacity 0.3s; }
        .hint-bar.visible { color: var(--water); }
        .flow-progress { width: 100%; height: 4px; background: var(--surface-2); border-radius: 2px; overflow: hidden; }
        .flow-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--water-dark), var(--water)); border-radius: 2px; transition: width 0.3s ease; box-shadow: 0 0 8px var(--water-glow); }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; font-size: 0.85rem; font-weight: 700; color: var(--text); z-index: 200; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s; opacity: 0; pointer-events: none; white-space: nowrap; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-color: rgba(52,211,153,0.5); color: var(--green); }
        .toast.error { border-color: rgba(248,113,113,0.5); color: var(--red); }
        .toast.info { border-color: var(--border-bright); color: var(--water); }

        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal-backdrop.active { opacity: 1; pointer-events: all; }
        .modal { background: var(--surface); border: 1px solid var(--border-bright); border-radius: 24px; padding: 32px 28px; width: 88%; max-width: 360px; text-align: center; transform: scale(0.85) translateY(20px); transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 0 60px rgba(56,189,248,0.15), 0 20px 60px rgba(0,0,0,0.5); }
        .modal-backdrop.active .modal { transform: scale(1) translateY(0); }
        .modal-icon { font-size: 3rem; margin-bottom: 12px; animation: iconBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s both; }
        @keyframes iconBounce { from { transform: scale(0) rotate(-20deg); } to { transform: scale(1) rotate(0deg); } }
        .modal h2 { font-size: 1.8rem; font-weight: 900; margin-bottom: 6px; background: linear-gradient(135deg, var(--water), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .modal p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 24px; }
        .result-item { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 8px; }
        .result-item .r-val { font-size: 1.3rem; font-weight: 900; font-family: 'Space Mono', monospace; color: var(--text); }
        .result-item .r-lbl { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-top: 2px; }
        .modal-btn-row { display: flex; gap: 10px; }

        .ripple { position: absolute; border-radius: 50%; background: rgba(56,189,248,0.3); transform: scale(0); animation: rippleAnim 0.5s ease-out forwards; pointer-events: none; }
        @keyframes rippleAnim { to { transform: scale(3); opacity: 0; } }
        .particle { position: fixed; pointer-events: none; z-index: 150; border-radius: 50%; animation: particleBurst 0.8s ease-out forwards; }
        @keyframes particleBurst { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }

        .p-bg { fill: none; stroke: var(--pipe-rim); stroke-width: 14; stroke-linecap: round; opacity: 0.5; }
        .p-tube { fill: none; stroke: var(--pipe); stroke-width: 12; stroke-linecap: round; }
        .p-inner { fill: none; stroke: var(--pipe-light); stroke-width: 6; stroke-linecap: round; }
        .p-water { fill: none; stroke: var(--water); stroke-width: 6; stroke-linecap: round; stroke-dasharray: 100; stroke-dashoffset: 100; filter: drop-shadow(0 0 4px var(--water)); transition: stroke-dashoffset 0.45s ease-out; }
        .tile.flowing .p-water { stroke-dashoffset: 0; }
        .tile.flowing .p-water.end-glow { stroke: var(--green); filter: drop-shadow(0 0 6px var(--green)); }

        @media (max-height: 700px) { #app { gap: 10px; } .stats-bar { padding: 10px 14px; } .stat-value { font-size: 1rem; } .diff-btn { padding: 7px 0; font-size: 0.72rem; } .grid-wrap { padding: 12px; } .btn { padding: 12px 0; font-size: 0.88rem; } }
        @media (max-height: 600px) { .header { display: none; } .diff-row { display: none; } }
        @media (min-width: 440px) { :root { --tile-size: 80px; } }

        .btn-undo { position: relative; }
        .btn-undo .undo-count { position: absolute; top: 6px; right: 8px; background: var(--accent); color: #0a0e1a; width: 16px; height: 16px; border-radius: 50%; font-size: 0.6rem; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .difficulty-label { position: absolute; top: -10px; left: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="bg-layer">
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
</div>
<div class="bg-grid"></div>

<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
        <div class="modal-icon" id="modal-icon">💧</div>
        <h2 id="modal-title">Flow Complete!</h2>
        <p id="modal-sub">The garden is watered perfectly!</p>
        <div class="result-grid">
            <div class="result-item">
                <div class="r-val" id="res-moves">0</div>
                <div class="r-lbl">Moves</div>
            </div>
            <div class="result-item">
                <div class="r-val" id="res-time">0s</div>
                <div class="r-lbl">Time</div>
            </div>
            <div class="result-item">
                <div class="r-val" id="res-score">0</div>
                <div class="r-lbl" id="res-score-lbl">Score</div>
            </div>
        </div>
        <div class="modal-btn-row">
            <button class="btn btn-secondary" onclick="Game.replay()">↺ Retry</button>
            <button class="btn btn-primary" onclick="Game.nextLevel()" id="next-btn">Next ›</button>
        </div>
    </div>
</div>

<div id="app">
    <div class="header">
        <div class="logo">Hydro<span>Quest</span></div>
        <div class="header-right">
            <a href="https://aqmal-halim.github.io/Marulearn/" class="btn-back">← Back to Hub</a>
            <div class="badge highlight" id="level-badge">LVL 1</div>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-label">Moves</div>
            <div class="stat-value water" id="stat-moves">0</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-label">Time</div>
            <div class="stat-value gold" id="stat-time">0:00</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-label">Best</div>
            <div class="stat-value green" id="stat-best">0</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-label">Streak</div>
            <div class="stat-value gold" id="stat-streak">0</div>
        </div>
    </div>

    <div class="diff-row" id="diff-row"></div>

    <div class="grid-wrap" id="grid-wrap">
        <div class="difficulty-label" id="diff-label">3×3</div>
        <div id="grid"></div>
        <div class="flow-progress" style="margin-top:12px">
            <div class="flow-bar" id="flow-bar"></div>
        </div>
    </div>

    <div class="hint-bar" id="hint-bar">Tap tiles to rotate · Connect source 🟡 to target 🟢</div>

    <div class="controls">
        <button class="btn btn-secondary btn-undo" id="btn-undo" onclick="Game.undo()">
            ↩ Undo
            <span class="undo-count" id="undo-count" style="display:none">3</span>
        </button>
        <button class="btn btn-secondary" onclick="Game.shuffle()">⟳ Shuffle</button>
        <button class="btn btn-primary" id="btn-flow" onclick="Game.startFlow()">▶ Flow</button>
    </div>
</div>

<script>
const Audio = (() => {
    let ctx = null;
    const init = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); };
    const tone = (freq, type, dur, vol = 0.08, startFreq = null, endFreq = null) => {
        try { init(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.type = type; osc.frequency.value = startFreq || freq; if (startFreq && endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, ctx.currentTime + dur); gain.gain.setValueAtTime(vol, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur); osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + dur); } catch(e) {}
    };
    return {
        click: () => tone(800, 'sine', 0.08, 0.06, 800, 400),
        rotate: () => tone(600, 'triangle', 0.12, 0.05, 600, 300),
        flow: () => tone(300, 'sine', 0.25, 0.07, 200, 500),
        win: () => { [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => setTimeout(() => tone(f, 'sine', 0.5, 0.08), i * 100)); },
        fail: () => tone(150, 'sawtooth', 0.4, 0.1, 150, 50),
        undo: () => tone(400, 'triangle', 0.15, 0.05, 500, 300),
        shuffle: () => tone(700, 'square', 0.1, 0.04, 700, 200),
        tick: () => tone(1200, 'sine', 0.05, 0.03),
    };
})();

const PIPES = {
    straight: { conns: [0,1,0,1], svg: (size) => `<svg viewBox="0 0 ${size} ${size}" class="pipe-svg"><rect x="0" y="${size*0.3}" width="${size}" height="${size*0.4}" rx="4" fill="${getVar('--pipe')}" opacity="0.6"/><path class="p-bg" d="M 0 ${size/2} L ${size} ${size/2}" stroke-width="${size*0.18}"/><path class="p-tube" d="M 0 ${size/2} L ${size} ${size/2}" stroke-width="${size*0.15}"/><path class="p-inner" d="M 0 ${size/2} L ${size} ${size/2}" stroke-width="${size*0.07}"/><path class="p-water" d="M 0 ${size/2} L ${size} ${size/2}" stroke-width="${size*0.07}"/></svg>` },
    elbow: { conns: [1,1,0,0], svg: (size) => `<svg viewBox="0 0 ${size} ${size}" class="pipe-svg"><path class="p-bg" d="M ${size/2} 0 Q ${size/2} ${size/2} ${size} ${size/2}" stroke-width="${size*0.18}"/><path class="p-tube" d="M ${size/2} 0 Q ${size/2} ${size/2} ${size} ${size/2}" stroke-width="${size*0.15}"/><path class="p-inner" d="M ${size/2} 0 Q ${size/2} ${size/2} ${size} ${size/2}" stroke-width="${size*0.07}"/><path class="p-water" d="M ${size/2} 0 Q ${size/2} ${size/2} ${size} ${size/2}" stroke-width="${size*0.07}"/></svg>` },
    tee: { conns: [0,1,1,1], svg: (size) => `<svg viewBox="0 0 ${size} ${size}" class="pipe-svg"><path class="p-bg" d="M 0 ${size/2} L ${size} ${size/2} M ${size/2} ${size/2} L ${size/2} ${size}" stroke-width="${size*0.18}"/><path class="p-tube" d="M 0 ${size/2} L ${size} ${size/2} M ${size/2} ${size/2} L ${size/2} ${size}" stroke-width="${size*0.15}"/><path class="p-inner" d="M 0 ${size/2} L ${size} ${size/2} M ${size/2} ${size/2} L ${size/2} ${size}" stroke-width="${size*0.07}"/><path class="p-water" d="M 0 ${size/2} L ${size} ${size/2}" stroke-width="${size*0.07}"/></svg>` },
    start: { conns: [0,1,0,0], svg: (size) => `<svg viewBox="0 0 ${size} ${size}" class="pipe-svg"><circle cx="${size*0.28}" cy="${size/2}" r="${size*0.2}" fill="${getVar('--accent')}" opacity="0.25"/><circle cx="${size*0.28}" cy="${size/2}" r="${size*0.13}" fill="${getVar('--accent')}"/><circle cx="${size*0.28}" cy="${size/2}" r="${size*0.06}" fill="${getVar('--bg')}"/><path class="p-bg" d="M ${size*0.28} ${size/2} L ${size} ${size/2}" stroke-width="${size*0.18}"/><path class="p-tube" d="M ${size*0.28} ${size/2} L ${size} ${size/2}" stroke-width="${size*0.15}"/><path class="p-inner" d="M ${size*0.28} ${size/2} L ${size} ${size/2}" stroke-width="${size*0.07}"/><path class="p-water" d="M ${size*0.28} ${size/2} L ${size} ${size/2}" stroke-width="${size*0.07}"/></svg>` },
    end: { conns: [0,0,0,1], svg: (size) => `<svg viewBox="0 0 ${size} ${size}" class="pipe-svg"><path class="p-bg" d="M 0 ${size/2} L ${size*0.72} ${size/2}" stroke-width="${size*0.18}"/><path class="p-tube" d="M 0 ${size/2} L ${size*0.72} ${size/2}" stroke-width="${size*0.15}"/><path class="p-inner" d="M 0 ${size/2} L ${size*0.72} ${size/2}" stroke-width="${size*0.07}"/><path class="p-water end-w" d="M 0 ${size/2} L ${size*0.72} ${size/2}" stroke-width="${size*0.07}"/><circle cx="${size*0.72}" cy="${size/2}" r="${size*0.2}" fill="${getVar('--green')}" opacity="0.25"/><circle cx="${size*0.72}" cy="${size/2}" r="${size*0.13}" fill="${getVar('--green')}"/><circle cx="${size*0.72}" cy="${size/2}" r="${size*0.06}" fill="${getVar('--bg')}"/></svg>` }
};

function getVar(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

const DIFFICULTIES = [
    { name: 'Easy', size: 3, label: '3×3', teeChance: 0, undos: 5, parMoves: 4 },
    { name: 'Medium', size: 4, label: '4×4', teeChance: 0.1, undos: 4, parMoves: 8 },
    { name: 'Hard', size: 5, label: '5×5', teeChance: 0.2, undos: 3, parMoves: 14 },
    { name: 'Expert', size: 6, label: '6×6', teeChance: 0.3, undos: 2, parMoves: 22 },
    { name: 'Master', size: 7, label: '7×7', teeChance: 0.35, undos: 1, parMoves: 35 },
];

const Game = (() => {
    let state = { diffIdx: 0, size: 3, tiles: [], path: [], moves: 0, score: 0, streak: 0, undosLeft: 5, isFlowing: false, startTime: null, timerID: null, history: [], bestScores: {}, flowStep: 0, flowTotal: 0 };
    
    const loadBest = () => { try { return JSON.parse(localStorage.getItem('hq_best') || '{}'); } catch { return {}; } };
    const saveBest = (idx, score) => { 
        let bests = loadBest();
        if (!bests[idx] || score > bests[idx]) {
            bests[idx] = score;
            localStorage.setItem('hq_best', JSON.stringify(bests));
            return true; 
        }
        return false;
    };

    const $ = id => document.getElementById(id);
    const rng = (n) => Math.floor(Math.random() * n);
    const rotateConns = (conns, r) => { let c = [...conns]; for (let i = 0; i < r; i++) c.unshift(c.pop()); return c; };

    const generatePath = (size) => {
        const total = size * size;
        const attempt = () => {
            const path = [0]; const visited = new Set([0]);
            while (true) {
                const curr = path[path.length - 1]; if (curr === total - 1) return path;
                const r = Math.floor(curr / size), c = curr % size;
                const neighbors = [];
                if (r > 0) neighbors.push(curr - size); if (r < size - 1) neighbors.push(curr + size);
                if (c > 0) neighbors.push(curr - 1); if (c < size - 1) neighbors.push(curr + 1);
                const valid = neighbors.filter(n => !visited.has(n));
                if (valid.length === 0) return null;
                const next = valid[rng(valid.length)]; path.push(next); visited.add(next);
            }
        };
        for (let i = 0; i < 200; i++) { const p = attempt(); if (p) return p; }
        const p = []; for (let i = 0; i < total; i++) p.push(i); return p;
    };

    const getDirection = (from, to, size) => { const diff = to - from; if (diff === -size) return 0; if (diff === 1) return 1; if (diff === size) return 2; if (diff === -1) return 3; return -1; };
    const opposite = (d) => (d + 2) % 4;
    const getCorrectRotation = (type, fromDir, toDir) => { const base = PIPES[type].conns; for (let r = 0; r < 4; r++) { const rc = rotateConns(base, r); if (fromDir !== undefined && rc[fromDir] !== 1) continue; if (toDir !== undefined && rc[toDir] !== 1) continue; return r; } return 0; };

    const init = (diffIdx = state.diffIdx, preserveStreak = false) => {
        clearInterval(state.timerID);
        state.bestScores = loadBest();
        const diff = DIFFICULTIES[diffIdx]; const size = diff.size;
        state.diffIdx = diffIdx; state.size = size; state.moves = 0; state.score = 0; state.isFlowing = false; state.startTime = null; state.history = []; state.undosLeft = diff.undos; state.flowStep = 0; state.flowTotal = 0;
        if (!preserveStreak) state.streak = 0;
        const path = generatePath(size); state.path = path;
        const tiles = [];
        for (let i = 0; i < size * size; i++) {
            const isStart = i === 0; const isEnd = i === size * size - 1; const pathIdx = path.indexOf(i);
            let type, correctRot, rotation;
            if (isStart) {
                type = 'start'; const nextIdx = path[1]; const dir = getDirection(0, nextIdx, size);
                correctRot = ((dir - 1) + 4) % 4; rotation = (correctRot + 1 + rng(3)) % 4;
            } else if (isEnd) {
                type = 'end'; const prevIdx = path[path.length - 2]; const dir = getDirection(prevIdx, i, size);
                correctRot = ((dir - 3) + 4) % 4; rotation = (correctRot + 1 + rng(3)) % 4;
            } else if (pathIdx !== -1) {
                const prev = path[pathIdx - 1], next = path[pathIdx + 1];
                const fromDir = getDirection(prev, i, size), toDir = getDirection(i, next, size);
                type = (opposite(fromDir) === toDir) ? 'straight' : (Math.random() < diff.teeChance ? 'tee' : 'elbow');
                correctRot = getCorrectRotation(type, fromDir, toDir); rotation = (correctRot + 1 + rng(3)) % 4;
            } else {
                type = Math.random() < 0.4 ? 'straight' : 'elbow'; correctRot = 0; rotation = rng(4);
            }
            tiles.push({ id: i, type, rotation, correctRot, isStart, isEnd });
        }
        state.tiles = tiles; updateUI(); renderGrid(); updateUndoBtn(); updateFlowBar(0);
        $('hint-bar').textContent = 'Tap tiles to rotate · Connect source 🟡 to target 🟢';
        $('hint-bar').className = 'hint-bar';
        $('btn-flow').disabled = false;
    };

    const renderGrid = () => {
        const grid = $('grid'); const diff = DIFFICULTIES[state.diffIdx];
        grid.innerHTML = ''; grid.style.gridTemplateColumns = `repeat(${state.size}, 1fr)`;
        $('diff-label').textContent = diff.label;
        const gridWrap = $('grid-wrap'); const available = gridWrap.offsetWidth - 32 - (state.size - 1) * 8;
        const tileSize = Math.floor(available / state.size);
        state.tiles.forEach((tile, i) => {
            const div = document.createElement('div'); div.className = `tile${tile.isStart ? ' is-start' : ''}${tile.isEnd ? ' is-end' : ''}`;
            const inner = document.createElement('div'); inner.className = 'tile-inner';
            inner.innerHTML = PIPES[tile.type].svg(tileSize);
            const svg = inner.querySelector('.pipe-svg'); svg.style.transform = `rotate(${tile.rotation * 90}deg)`;
            const hint = document.createElement('div'); hint.className = 'rot-hint'; hint.textContent = `${tile.rotation * 90}°`;
            inner.appendChild(hint);
            div.appendChild(inner);
            div.addEventListener('click', (e) => handleTileClick(i, e));
            grid.appendChild(div);
        });
    };

    const handleTileClick = (i, e) => {
        if (state.isFlowing) return;
        const tile = state.tiles[i]; if (!state.startTime) startTimer();
        state.history.push({ id: i, rotation: tile.rotation });
        tile.rotation = (tile.rotation + 1) % 4; state.moves++;
        const div = $('grid').children[i]; const svg = div.querySelector('.pipe-svg');
        svg.style.transform = `rotate(${tile.rotation * 90}deg)`;
        const hint = div.querySelector('.rot-hint'); if (hint) hint.textContent = `${tile.rotation * 90}°`;
        const rect = div.getBoundingClientRect(); const r = document.createElement('div');
        r.className = 'ripple'; r.style.cssText = `width:${rect.width}px;height:${rect.height}px;left:0;top:0;`;
        div.appendChild(r); r.addEventListener('animationend', () => r.remove());
        Audio.rotate(); updateUI(); updateUndoBtn();
    };

    const undo = () => {
        if (state.isFlowing || state.history.length === 0 || state.undosLeft <= 0) return;
        const last = state.history.pop(); const tile = state.tiles[last.id]; tile.rotation = last.rotation;
        state.undosLeft = Math.max(0, state.undosLeft - 1); if (state.moves > 0) state.moves--;
        const div = $('grid').children[last.id]; const svg = div.querySelector('.pipe-svg');
        svg.style.transform = `rotate(${tile.rotation * 90}deg)`;
        const hint = div.querySelector('.rot-hint'); if (hint) hint.textContent = `${tile.rotation * 90}°`;
        Audio.undo(); updateUI(); updateUndoBtn();
    };

    const updateUndoBtn = () => { const btn = $('btn-undo'); const cnt = $('undo-count'); if (state.undosLeft > 0) { cnt.textContent = state.undosLeft; cnt.style.display = 'flex'; btn.disabled = false; } else { cnt.style.display = 'none'; btn.disabled = true; } };
    const shuffle = () => { if (state.isFlowing) return; init(state.diffIdx, true); Audio.shuffle(); };
    const replay = () => { $('modal-backdrop').classList.remove('active'); init(state.diffIdx, false); };
    const nextLevel = () => { $('modal-backdrop').classList.remove('active'); init(Math.min(state.diffIdx + 1, DIFFICULTIES.length - 1), true); };
    const startTimer = () => { state.startTime = Date.now(); state.timerID = setInterval(() => updateTimerDisplay(), 1000); };
    const updateTimerDisplay = () => { if (!state.startTime) return; const sec = Math.floor((Date.now() - state.startTime) / 1000); $('stat-time').textContent = `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`; };
    
    const calcScore = (m, t, s, p) => Math.max(50, (s*s*100) - (Math.max(0, m-p)*15) - (Math.max(0, t-p*5)*2) + (state.streak*50));

    const startFlow = async () => {
        if (state.isFlowing) return; state.isFlowing = true; $('btn-flow').disabled = true; if (!state.startTime) startTimer();
        const size = state.size; const tiles = state.tiles; const queue = [0]; const visited = new Set(); const flowOrder = [];
        while (queue.length > 0) {
            const curr = queue.shift(); if (visited.has(curr)) continue; visited.add(curr); flowOrder.push(curr); if (tiles[curr].isEnd) break;
            const conns = rotateConns(PIPES[tiles[curr].type].conns, tiles[curr].rotation);
            const r = Math.floor(curr / size), c = curr % size;
            const neighbors = [{ idx: curr - size, dir: 0, opp: 2, ok: r > 0 }, { idx: curr + 1, dir: 1, opp: 3, ok: c < size - 1 }, { idx: curr + size, dir: 2, opp: 0, ok: r < size - 1 }, { idx: curr - 1, dir: 3, opp: 1, ok: c > 0 }];
            neighbors.forEach(n => { if (n.ok && conns[n.dir] === 1) { const nextConns = rotateConns(PIPES[tiles[n.idx].type].conns, tiles[n.idx].rotation); if (nextConns[n.opp] === 1 && !visited.has(n.idx)) queue.push(n.idx); } });
        }
        for (let i = 0; i < flowOrder.length; i++) {
            const idx = flowOrder[i]; const div = $('grid').children[idx]; div.classList.add('flowing');
            if (tiles[idx].isEnd) { 
                div.querySelector('.end-w')?.classList.add('end-glow'); 
                updateFlowBar(1); 
                clearInterval(state.timerID); 
                const elapsed = Math.floor((Date.now()-state.startTime)/1000); 
                const score = calcScore(state.moves, elapsed, state.size, DIFFICULTIES[state.diffIdx].parMoves); 
                const isNewBest = saveBest(state.diffIdx, score);
                state.score = score; state.streak++; 
                updateUI(); Audio.win(); spawnParticles(); 
                showWinModal(elapsed, score, isNewBest); 
                return; 
            }
            updateFlowBar((i+1)/Math.max(state.path.length, flowOrder.length)); Audio.flow(); await new Promise(r => setTimeout(r, 300));
        }
        clearInterval(state.timerID); Audio.fail();
        for (let i = 0; i < tiles.length; i++) if (!visited.has(i)) { $('grid').children[i].classList.add('wrong-flash'); setTimeout(() => $('grid').children[i].classList.remove('wrong-flash'), 500); }
        await new Promise(r => setTimeout(r, 600)); flowOrder.forEach(i => $('grid').children[i].classList.remove('flowing'));
        updateFlowBar(0); state.isFlowing = false; $('btn-flow').disabled = false;
    };

    const updateFlowBar = (pct) => { $('flow-bar').style.width = `${Math.round(pct * 100)}%`; };
    
    const showWinModal = (elapsed, score, isNewBest) => { 
        const m = Math.floor(elapsed/60), s = elapsed%60; 
        $('res-moves').textContent = state.moves; 
        $('res-time').textContent = `${m}:${s.toString().padStart(2,'0')}`; 
        $('res-score').textContent = score.toLocaleString();
        $('res-score-lbl').textContent = isNewBest ? "New Best!" : "Score";
        $('res-score-lbl').style.color = isNewBest ? "var(--green)" : "var(--text-muted)";
        $('modal-backdrop').classList.add('active'); 
    };

    const updateUI = () => { 
        const best = state.bestScores[state.diffIdx] || 0;
        $('level-badge').textContent = `LVL ${state.diffIdx + 1}`; 
        $('stat-moves').textContent = state.moves; 
        $('stat-best').textContent = best.toLocaleString(); 
        $('stat-streak').textContent = state.streak; 
        updateTimerDisplay(); 
        const diffRow = $('diff-row'); 
        diffRow.innerHTML = ''; 
        DIFFICULTIES.forEach((d, i) => { 
            const btn = document.createElement('button'); 
            btn.className = `diff-btn${i === state.diffIdx ? ' active' : ''}`; 
            btn.textContent = d.name; 
            btn.onclick = () => { if (!state.isFlowing) init(i); }; 
            diffRow.appendChild(btn); 
        }); 
    };

    const spawnParticles = () => { for (let i = 0; i < 20; i++) { const p = document.createElement('div'); p.className = 'particle'; const angle = Math.random() * Math.PI * 2; const dist = 100 + Math.random() * 150; p.style.cssText = `width:6px;height:6px;background:var(--water);left:50%;top:50%;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;animation-duration:0.8s;`; document.body.appendChild(p); p.addEventListener('animationend', () => p.remove()); } };

    return { init, undo, shuffle, replay, nextLevel, startFlow };
})();

window.addEventListener('load', () => Game.init(0));
</script>
</body>
</html>
