    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }

    body {
        background: var(--bg);
        font-family: 'Nunito', sans-serif;
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        position: relative;
    }

    /* ─── Animated Background ─── */
    .bg-layer {
        position: fixed; inset: 0; pointer-events: none; z-index: 0;
        overflow: hidden;
    }
    .bg-blob {
        position: absolute; border-radius: 50%;
        filter: blur(80px); opacity: 0.07;
        animation: blobDrift 20s ease-in-out infinite alternate;
    }
    .bg-blob:nth-child(1) { width: 400px; height: 400px; background: var(--water); top: -100px; left: -100px; animation-duration: 18s; }
    .bg-blob:nth-child(2) { width: 300px; height: 300px; background: var(--accent); bottom: -80px; right: -80px; animation-duration: 22s; animation-delay: -5s; }
    .bg-blob:nth-child(3) { width: 250px; height: 250px; background: var(--green); top: 40%; left: 60%; animation-duration: 25s; animation-delay: -10s; }
    @keyframes blobDrift {
        0% { transform: translate(0,0) scale(1); }
        100% { transform: translate(40px,30px) scale(1.15); }
    }
    
    /* Grid lines */
    .bg-grid {
        position: fixed; inset: 0; pointer-events: none; z-index: 0;
        background-image: 
            linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
    }

    /* ─── Game Container ─── */
    #app {
        position: relative; z-index: 1;
        width: 100%; max-width: 440px;
        padding: 16px;
        display: flex; flex-direction: column;
        align-items: center; gap: 16px;
    }

    /* ─── Header ─── */
    .header {
        width: 100%;
        display: flex; align-items: center; justify-content: space-between;
    }

    .logo {
        font-size: 1.4rem; font-weight: 900;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, var(--water), var(--green));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .logo span { -webkit-text-fill-color: var(--text); }

    .header-right { display: flex; gap: 10px; align-items: center; }

    .badge {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 6px 14px;
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--text-dim);
        font-family: 'Space Mono', monospace;
    }
    .badge.highlight { border-color: var(--border-bright); color: var(--water); }

    /* ─── Stats Bar ─── */
    .stats-bar {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 18px;
        display: flex; align-items: center; justify-content: space-between;
    }

    .stat-item { text-align: center; }
    .stat-label {
        font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
        letter-spacing: 1px; color: var(--text-muted); margin-bottom: 2px;
    }
    .stat-value {
        font-size: 1.2rem; font-weight: 900;
        font-family: 'Space Mono', monospace;
    }
    .stat-value.water { color: var(--water); }
    .stat-value.gold { color: var(--accent); }
    .stat-value.green { color: var(--green); }

    .stat-divider {
        width: 1px; height: 36px;
        background: var(--border);
    }

    /* ─── Difficulty Selector ─── */
    .diff-row {
        display: flex; gap: 6px; width: 100%;
    }
    .diff-btn {
        flex: 1; padding: 9px 0; border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted); font-size: 0.78rem; font-weight: 700;
        cursor: pointer; transition: all 0.2s;
        font-family: 'Nunito', sans-serif;
    }
    .diff-btn:hover { border-color: var(--border-bright); color: var(--text); }
    .diff-btn.active {
        background: var(--surface-3);
        border-color: var(--water);
        color: var(--water);
        box-shadow: 0 0 12px var(--water-glow), inset 0 0 8px rgba(56,189,248,0.05);
    }

    /* ─── Grid Wrapper ─── */
    .grid-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 16px;
        width: 100%;
        position: relative;
        box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    #grid {
        display: grid;
        gap: var(--gap);
        width: 100%;
        aspect-ratio: 1;
    }

    /* ─── Tiles ─── */
    .tile {
        position: relative;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 12px;
        cursor: pointer;
        transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1), 
                    border-color 0.2s, background 0.2s, box-shadow 0.2s;
        display: flex; align-items: center; justify-content: center;
        overflow: hidden;
        user-select: none;
    }
    .tile:hover { border-color: var(--border-bright); background: var(--surface-3); }
    .tile:active { transform: scale(0.87); }
    .tile.locked { cursor: default; }
    .tile.locked:hover { border-color: var(--border); background: var(--surface-2); }
    .tile.locked:active { transform: none; }

    .tile.is-start {
        background: rgba(245,158,11,0.08);
        border-color: rgba(245,158,11,0.4);
    }
    .tile.is-end {
        background: rgba(52,211,153,0.08);
        border-color: rgba(52,211,153,0.4);
    }

    .tile.flowing {
        border-color: rgba(56,189,248,0.5);
        box-shadow: 0 0 14px var(--water-glow), inset 0 0 10px rgba(56,189,248,0.06);
    }
    .tile.is-end.flowing {
        border-color: var(--green);
        box-shadow: 0 0 18px var(--green-glow), inset 0 0 12px rgba(52,211,153,0.08);
    }
    .tile.wrong-flash {
        animation: wrongFlash 0.4s ease;
    }
    @keyframes wrongFlash {
        0%, 100% { background: var(--surface-2); }
        50% { background: rgba(248,113,113,0.2); border-color: rgba(248,113,113,0.6); }
    }

    /* Tile inner content */
    .tile-inner {
        width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        position: relative;
    }

    .pipe-svg {
        width: 100%; height: 100%;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: absolute; inset: 0;
    }

    /* Rotation indicator */
    .rot-hint {
        position: absolute; bottom: 3px; right: 4px;
        font-size: 8px; color: var(--text-muted); opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
        font-family: 'Space Mono', monospace;
    }
    .tile:not(.locked):hover .rot-hint { opacity: 0.7; }

    /* ─── Controls ─── */
    .controls {
        display: flex; gap: 10px; width: 100%;
    }

    .btn {
        flex: 1; padding: 14px 0; border-radius: 14px;
        border: none; cursor: pointer;
        font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.95rem;
        transition: all 0.18s; position: relative; overflow: hidden;
    }
    .btn::after {
        content: ''; position: absolute; inset: 0;
        background: rgba(255,255,255,0); transition: background 0.18s;
    }
    .btn:hover::after { background: rgba(255,255,255,0.05); }
    .btn:active { transform: translateY(2px); }

    .btn-primary {
        background: linear-gradient(135deg, var(--water-dark), var(--water));
        color: #0a0e1a;
        box-shadow: 0 4px 20px var(--water-glow);
    }
    .btn-primary:disabled {
        background: var(--surface-2);
        color: var(--text-muted);
        box-shadow: none;
        cursor: not-allowed;
    }
    .btn-secondary {
        background: var(--surface-2);
        color: var(--text-dim);
        border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--border-bright); color: var(--text); }

    /* ─── Hint overlay ─── */
    .hint-bar {
        width: 100%; text-align: center;
        font-size: 0.78rem; color: var(--text-muted);
        min-height: 1.2em;
        transition: opacity 0.3s;
    }
    .hint-bar.visible { color: var(--water); }

    /* ─── Flow progress bar ─── */
    .flow-progress {
        width: 100%;
        height: 4px;
        background: var(--surface-2);
        border-radius: 2px;
        overflow: hidden;
    }
    .flow-bar {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, var(--water-dark), var(--water));
        border-radius: 2px;
        transition: width 0.3s ease;
        box-shadow: 0 0 8px var(--water-glow);
    }

    /* ─── Toast Notification ─── */
    .toast {
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
        background: var(--surface-2); border: 1px solid var(--border);
        border-radius: 12px; padding: 12px 20px;
        font-size: 0.85rem; font-weight: 700; color: var(--text);
        z-index: 200; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
        opacity: 0; pointer-events: none; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(52,211,153,0.5); color: var(--green); }
    .toast.error { border-color: rgba(248,113,113,0.5); color: var(--red); }
    .toast.info { border-color: var(--border-bright); color: var(--water); }

    /* ─── Win Modal ─── */
    .modal-backdrop {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.75);
        backdrop-filter: blur(12px);
        z-index: 100; display: flex;
        align-items: center; justify-content: center;
        opacity: 0; pointer-events: none;
        transition: opacity 0.3s;

    .modal-backdrop.active { opacity: 1; pointer-events: all; }

    .modal {
        background: var(--surface);

        border-radius: 24px;

    .modal-backdrop.active .modal { transform: scale(1) translateY(0); }

    .modal h2 {

    .modal p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; }

    .modal-btn-row { display: flex; gap: 10px; }
    .modal-btn-row .btn { padding: 14px 0; font-size: 0.9rem; }

    .ripple {
        position: absolute; border-radius: 50%;

<script>
// ══════════════════════════════════════════════════════
//  AUDIO ENGINE
// ══════════════════════════════════════════════════════
const Audio = (() => {
    let ctx = null;
    const init = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); };

    const tone = (freq, type, dur, vol = 0.08, startFreq = null, endFreq = null) => {
        try {
            init();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            const reverb = ctx.createGain();
            osc.type = type;
            osc.frequency.value = startFreq || freq;
            if (startFreq && endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, ctx.currentTime + dur);
            gain.gain.setValueAtTime(vol, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + dur);
        } catch(e) {}
    };

    return {
        click: () => tone(800, 'sine', 0.08, 0.06, 800, 400),
        rotate: () => tone(600, 'triangle', 0.12, 0.05, 600, 300),
        flow: () => tone(300, 'sine', 0.25, 0.07, 200, 500),
        win: () => {
            [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => 
                setTimeout(() => tone(f, 'sine', 0.5, 0.08), i * 100));
        },
        fail: () => tone(150, 'sawtooth', 0.4, 0.1, 150, 50),
        undo: () => tone(400, 'triangle', 0.15, 0.05, 500, 300),
        shuffle: () => tone(700, 'square', 0.1, 0.04, 700, 200),
        tick: () => tone(1200, 'sine', 0.05, 0.03),
    };
})();

  <path class="p-bg" d="M 0 ${size/2} L ${size} ${size/2}" stroke-width="${size*0.18}"/>
  <path class="p-tube" d="M 0 ${size/2} L ${size} ${size/2}" stroke-width="${size*0.15}"/>
  <path class="p-inner" d="M 0 ${size/2} L ${size} ${size/2}" stroke-width="${size*0.07}"/>
  <path class="p-water" d="M 0 ${size/2} L ${size} ${size/2}" stroke-width="${size*0.07}"/>
</svg>`
    },
    elbow: {
        conns: [1,1,0,0],
        svg: (size) => `
<svg viewBox="0 0 ${size} ${size}" class="pipe-svg">
  <path class="p-bg" d="M ${size/2} 0 Q ${size/2} ${size/2} ${size} ${size/2}" stroke-width="${size*0.18}"/>
  <path class="p-tube" d="M ${size/2} 0 Q ${size/2} ${size/2} ${size} ${size/2}" stroke-width="${size*0.15}"/>
  <path class="p-inner" d="M ${size/2} 0 Q ${size/2} ${size/2} ${size} ${size/2}" stroke-width="${size*0.07}"/>
  <path class="p-water" d="M ${size/2} 0 Q ${size/2} ${size/2} ${size} ${size/2}" stroke-width="${size*0.07}"/>
</svg>`
    },
    tee: {
        conns: [0,1,1,1],
        svg: (size) => `
<svg viewBox="0 0 ${size} ${size}" class="pipe-svg">
  <path class="p-bg" d="M 0 ${size/2} L ${size} ${size/2} M ${size/2} ${size/2} L ${size/2} ${size}" stroke-width="${size*0.18}"/>
  <path class="p-tube" d="M 0 ${size/2} L ${size} ${size/2} M ${size/2} ${size/2} L ${size/2} ${size}" stroke-width="${size*0.15}"/>
  <path class="p-inner" d="M 0 ${size/2} L ${size} ${size/2} M ${size/2} ${size/2} L ${size/2} ${size}" stroke-width="${size*0.07}"/>
  <path class="p-water" d="M 0 ${size/2} L ${size} ${size/2}" stroke-width="${size*0.07}"/>
</svg>`
    },
    start: {
        conns: [0,1,0,0],
        svg: (size) => `
<svg viewBox="0 0 ${size} ${size}" class="pipe-svg">
  <circle cx="${size*0.28}" cy="${size/2}" r="${size*0.2}" fill="${getVar('--accent')}" opacity="0.25"/>
  <circle cx="${size*0.28}" cy="${size/2}" r="${size*0.13}" fill="${getVar('--accent')}"/>
  <circle cx="${size*0.28}" cy="${size/2}" r="${size*0.06}" fill="${getVar('--bg')}"/>
  <path class="p-bg" d="M ${size*0.28} ${size/2} L ${size} ${size/2}" stroke-width="${size*0.18}"/>
  <path class="p-tube" d="M ${size*0.28} ${size/2} L ${size} ${size/2}" stroke-width="${size*0.15}"/>
  <path class="p-inner" d="M ${size*0.28} ${size/2} L ${size} ${size/2}" stroke-width="${size*0.07}"/>
  <path class="p-water" d="M ${size*0.28} ${size/2} L ${size} ${size/2}" stroke-width="${size*0.07}"/>
</svg>`
    },
    end: {
        conns: [0,0,0,1],
        svg: (size) => `
<svg viewBox="0 0 ${size} ${size}" class="pipe-svg">
  <path class="p-bg" d="M 0 ${size/2} L ${size*0.72} ${size/2}" stroke-width="${size*0.18}"/>
  <path class="p-tube" d="M 0 ${size/2} L ${size*0.72} ${size/2}" stroke-width="${size*0.15}"/>
  <path class="p-inner" d="M 0 ${size/2} L ${size*0.72} ${size/2}" stroke-width="${size*0.07}"/>
  <path class="p-water end-w" d="M 0 ${size/2} L ${size*0.72} ${size/2}" stroke-width="${size*0.07}"/>
  <circle cx="${size*0.72}" cy="${size/2}" r="${size*0.2}" fill="${getVar('--green')}" opacity="0.25"/>
  <circle cx="${size*0.72}" cy="${size/2}" r="${size*0.13}" fill="${getVar('--green')}"/>
  <circle cx="${size*0.72}" cy="${size/2}" r="${size*0.06}" fill="${getVar('--bg')}"/>

};

function getVar(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

// ══════════════════════════════════════════════════════
//  DIFFICULTY CONFIG
// ══════════════════════════════════════════════════════
const DIFFICULTIES = [
    { name: 'Easy',    size: 3, label: '3×3', teeChance: 0,   undos: 5, parMoves: 4 },
    { name: 'Medium',  size: 4, label: '4×4', teeChance: 0.1, undos: 4, parMoves: 8 },
    { name: 'Hard',    size: 5, label: '5×5', teeChance: 0.2, undos: 3, parMoves: 14 },
    { name: 'Expert',  size: 6, label: '6×6', teeChance: 0.3, undos: 2, parMoves: 22 },
    { name: 'Master',  size: 7, label: '7×7', teeChance: 0.35, undos: 1, parMoves: 35 },
];

// ══════════════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════════════
const Game = (() => {
    let state = {
        diffIdx: 0,
        size: 3,
        tiles: [],
        path: [],
        moves: 0,
        score: 0,
        streak: 0,
        undosLeft: 5,
        isFlowing: false,
        startTime: null,
        timerID: null,
        history: [],   // for undo: array of {tileId, rotation}
        best: {},      // persisted best scores per diff
        flowStep: 0,
        flowTotal: 0,
    };

    // ── LocalStorage helpers ──
    const loadBest = () => {
        try { return JSON.parse(localStorage.getItem('hq_best') || '{}'); } catch { return {}; }
    };
    const saveBest = (b) => {
        try { localStorage.setItem('hq_best', JSON.stringify(b)); } catch {}
    };

    // ── DOM refs ──
    const $ = id => document.getElementById(id);

    // ── Utility ──
    const rng = (n) => Math.floor(Math.random() * n);
    const rotateConns = (conns, r) => {
        let c = [...conns];
        for (let i = 0; i < r; i++) c.unshift(c.pop());
        return c;
    };

    // ── Path generation (DFS with backtracking, guaranteed single path) ──
    const generatePath = (size) => {
        const total = size * size;
        const attempt = () => {
            const path = [0];
            const visited = new Set([0]);
            while (true) {
                const curr = path[path.length - 1];
                if (curr === total - 1) return path;
                const r = Math.floor(curr / size), c = curr % size;
                const neighbors = [];
                if (r > 0) neighbors.push(curr - size);
                if (r < size - 1) neighbors.push(curr + size);
                if (c > 0) neighbors.push(curr - 1);
                if (c < size - 1) neighbors.push(curr + 1);
                const valid = neighbors.filter(n => !visited.has(n));
                if (valid.length === 0) return null; // dead end, retry
                const next = valid[rng(valid.length)];
                path.push(next);
                visited.add(next);
            }
        };
        for (let i = 0; i < 200; i++) {
            const p = attempt();
            if (p) return p;
        }
        // Fallback: simple zigzag
        const p = [];
        for (let i = 0; i < total; i++) p.push(i);
        return p;
    };

    // ── Determine pipe type from path positions ──
    const getPipeType = (idx, path, size, diff) => {
        const pathIdx = path.indexOf(idx);
        if (pathIdx === -1) {
            // Off-path: random pipe
            return Math.random() > diff.teeChance ? 
                (Math.random() > 0.5 ? 'straight' : 'elbow') :
                (Math.random() > 0.5 ? 'straight' : (Math.random() > 0.5 ? 'elbow' : 'tee'));
        }
        const prev = path[pathIdx - 1];
        const next = path[pathIdx + 1];
        if (prev === undefined || next === undefined) return 'elbow';
        // Determine direction changes
        const prevDir = getDirection(prev, idx, size);
        const nextDir = getDirection(idx, next, size);
        if (prevDir === opposite(nextDir)) return 'straight';
        return Math.random() < diff.teeChance ? 'tee' : 'elbow';
    };

    const getDirection = (from, to, size) => {
        const diff = to - from;
        if (diff === -size) return 0; // up
        if (diff === 1) return 1; // right
        if (diff === size) return 2; // down
        if (diff === -1) return 3; // left
        return -1;
    };
    const opposite = (d) => (d + 2) % 4;

    // ── Correct rotation for path pipes ──
    const getCorrectRotation = (type, fromDir, toDir) => {
        // Find rotation such that rotated conns match from/to dirs
        const base = PIPES[type].conns;
        for (let r = 0; r < 4; r++) {
            const rc = rotateConns(base, r);
            if (fromDir !== undefined && rc[fromDir] !== 1) continue;
            if (toDir !== undefined && rc[toDir] !== 1) continue;
            return r;
        }
        return 0;
    };

    // ── Init game ──
    const init = (diffIdx = state.diffIdx, preserveStreak = false) => {
        clearInterval(state.timerID);
        state.best = loadBest();
        const diff = DIFFICULTIES[diffIdx];
        const size = diff.size;
        state.diffIdx = diffIdx;
        state.size = size;
        state.moves = 0;
        state.score = 0;
        state.isFlowing = false;
        state.startTime = null;
        state.history = [];
        state.undosLeft = diff.undos;
        state.flowStep = 0;
        state.flowTotal = 0;
        if (!preserveStreak) state.streak = 0;

        const path = generatePath(size);
        state.path = path;
        const total = size * size;

        const tiles = [];
        for (let i = 0; i < total; i++) {
            const isStart = i === 0;
            const isEnd = i === total - 1;
            const pathIdx = path.indexOf(i);

            let type, correctRot, rotation;

            if (isStart) {
                type = 'start';
                // start points right by default (conn[1]=1), rotation 0
                correctRot = 0;
                const nextIdx = path[1];
                const dir = getDirection(0, nextIdx, size);
                // rotate so the output faces dir 1 (right side of start svg)
                correctRot = ((dir - 1) + 4) % 4;
                rotation = correctRot;
            } else if (isEnd) {
                type = 'end';
                const prevIdx = path[path.length - 2];
                const dir = getDirection(prevIdx, total - 1, size);
                // end receives from left (conn[3]=1), rotate so input=dir
                // end base conn: [0,0,0,1] => input from left
                correctRot = ((dir - 3) + 4) % 4;
                rotation = correctRot;
            } else if (pathIdx !== -1) {
                const prev = path[pathIdx - 1];
                const next = path[pathIdx + 1];
                const fromDir = getDirection(prev, i, size);
                const toDir = getDirection(i, next, size);
                const straightCheck = opposite(fromDir) === toDir;
                type = straightCheck ? 'straight' : (Math.random() < diff.teeChance ? 'tee' : 'elbow');
                correctRot = getCorrectRotation(type, fromDir, toDir);
                // Scramble rotation (not correct)
                rotation = (correctRot + 1 + rng(3)) % 4;
            } else {
                // Off-path filler
                type = Math.random() < 0.4 ? 'straight' : (Math.random() < 0.5 ? 'elbow' : (diff.teeChance > 0 ? 'tee' : 'elbow'));
                correctRot = 0;
                rotation = rng(4);
            }

            tiles.push({ id: i, type, rotation, correctRot, isStart, isEnd, onPath: pathIdx !== -1 });
        }

        state.tiles = tiles;
        updateUI();
        renderGrid();
        updateUndoBtn();
        updateFlowBar(0);
        $('hint-bar').textContent = 'Tap tiles to rotate · Connect 🟡 source to 🟢 target';
        $('hint-bar').className = 'hint-bar';
        $('btn-flow').disabled = false;
        $('btn-flow').textContent = '▶ Flow';
    };

    // ── Render ──
    const renderGrid = () => {
        const grid = $('grid');
        const diff = DIFFICULTIES[state.diffIdx];
        grid.innerHTML = '';
        grid.style.gridTemplateColumns = `repeat(${state.size}, 1fr)`;
        $('diff-label').textContent = diff.label;

        // Compute tile size for SVG
        const gridWrap = $('grid-wrap');
        const available = gridWrap.offsetWidth - 32 - (state.size - 1) * 8;
        const tileSize = Math.floor(available / state.size);

        state.tiles.forEach((tile, i) => {
            const div = document.createElement('div');
            div.className = `tile${tile.isStart ? ' is-start locked' : ''}${tile.isEnd ? ' is-end locked' : ''}`;
            div.dataset.id = i;

            const inner = document.createElement('div');
            inner.className = 'tile-inner';

            inner.innerHTML = PIPES[tile.type].svg(tileSize);

            const svg = inner.querySelector('.pipe-svg');
            svg.style.transform = `rotate(${tile.rotation * 90}deg)`;

            if (!tile.isStart && !tile.isEnd) {
                const hint = document.createElement('div');
                hint.className = 'rot-hint';
                hint.textContent = `${tile.rotation * 90}°`;
                inner.appendChild(hint);
            }
            if (tile.isStart || tile.isEnd) {
                const lockIcon = document.createElement('div');
                lockIcon.className = 'lock-icon';
                lockIcon.textContent = tile.isStart ? '🔒' : '🔒';
                lockIcon.style.opacity = '0.2';
                inner.appendChild(lockIcon);
            }

            div.appendChild(inner);
            div.addEventListener('click', (e) => handleTileClick(i, e));
            div.addEventListener('contextmenu', (e) => { e.preventDefault(); handleTileRightClick(i, e); });
            grid.appendChild(div);
        });
    };

    const handleTileClick = (i, e) => {
        if (state.isFlowing) return;
        const tile = state.tiles[i];
        if (tile.isStart || tile.isEnd) return;

        // Start timer on first move
        if (!state.startTime) startTimer();

        // Save history for undo
        state.history.push({ id: i, rotation: tile.rotation });
        if (state.history.length > 20) state.history.shift();

        // Rotate +90
        tile.rotation = (tile.rotation + 1) % 4;
        state.moves++;

        const div = $('grid').children[i];
        const svg = div.querySelector('.pipe-svg');
        svg.style.transform = `rotate(${tile.rotation * 90}deg)`;
        const hint = div.querySelector('.rot-hint');
        if (hint) hint.textContent = `${tile.rotation * 90}°`;

        // Ripple
        const rect = div.getBoundingClientRect();
        const r = document.createElement('div');
        r.className = 'ripple';
        r.style.cssText = `width:${rect.width}px;height:${rect.height}px;left:0;top:0;`;
        div.appendChild(r);
        r.addEventListener('animationend', () => r.remove());

        Audio.rotate();
        updateUI();
        updateUndoBtn();
        $('hint-bar').textContent = 'Looking good! Hit ▶ Flow when ready.';
        $('hint-bar').className = 'hint-bar visible';
    };

    const handleTileRightClick = (i, e) => {
        // Right-click = rotate backwards
        if (state.isFlowing) return;
        const tile = state.tiles[i];
        if (tile.isStart || tile.isEnd) return;
        if (!state.startTime) startTimer();
        state.history.push({ id: i, rotation: tile.rotation });
        tile.rotation = (tile.rotation + 3) % 4;
        state.moves++;
        const div = $('grid').children[i];
        const svg = div.querySelector('.pipe-svg');
        svg.style.transform = `rotate(${tile.rotation * 90}deg)`;
        const hint = div.querySelector('.rot-hint');
        if (hint) hint.textContent = `${tile.rotation * 90}°`;
        Audio.rotate();
        updateUI();
        updateUndoBtn();
    };

    // ── Undo ──
    const undo = () => {
        if (state.isFlowing || state.history.length === 0 || state.undosLeft <= 0) return;
        const last = state.history.pop();
        const tile = state.tiles[last.id];
        tile.rotation = last.rotation;
        state.undosLeft = Math.max(0, state.undosLeft - 1);
        if (state.moves > 0) state.moves--;
        const div = $('grid').children[last.id];
        const svg = div.querySelector('.pipe-svg');
        svg.style.transform = `rotate(${tile.rotation * 90}deg)`;
        const hint = div.querySelector('.rot-hint');
        if (hint) hint.textContent = `${tile.rotation * 90}°`;
        Audio.undo();
        updateUI();
        updateUndoBtn();
        showToast('Undone!', 'info');
    };

    const updateUndoBtn = () => {
        const btn = $('btn-undo');
        const cnt = $('undo-count');
        if (state.undosLeft > 0) {
            cnt.textContent = state.undosLeft;
            cnt.style.display = 'flex';
            btn.disabled = false;
        } else {
            cnt.style.display = 'none';
            btn.disabled = true;
        }
    };

    // ── Shuffle ──
    const shuffle = () => {
        if (state.isFlowing) return;
        clearInterval(state.timerID);
        state.startTime = null;
        state.timerID = null;
        Audio.shuffle();
        init(state.diffIdx, true);
        showToast('Grid shuffled!', 'info');
    };

    const replay = () => {
        $('modal-backdrop').classList.remove('active');
        init(state.diffIdx, false);
    };

    const nextLevel = () => {
        $('modal-backdrop').classList.remove('active');
        const next = Math.min(state.diffIdx + 1, DIFFICULTIES.length - 1);
        init(next, true);
    };

    // ── Timer ──
    const startTimer = () => {
        state.startTime = Date.now();
        state.timerID = setInterval(() => {
            updateTimerDisplay();
        }, 1000);
    };

    const updateTimerDisplay = () => {
        if (!state.startTime) return;
        const sec = Math.floor((Date.now() - state.startTime) / 1000);
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        $('stat-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    };

    const getElapsed = () => state.startTime ? Math.floor((Date.now() - state.startTime) / 1000) : 0;

    // ── Score calculation ──
    const calcScore = (moves, time, size, parMoves) => {
        const base = size * size * 100;
        const movePen = Math.max(0, moves - parMoves) * 15;
        const timePen = Math.max(0, time - parMoves * 5) * 2;
        const streakBonus = state.streak * 50;
        return Math.max(50, base - movePen - timePen + streakBonus);
    };

    // ── Flow ──
    const startFlow = async () => {
        if (state.isFlowing) return;
        state.isFlowing = true;
        $('btn-flow').disabled = true;
        if (!state.startTime) startTimer();

        // BFS from start
        const size = state.size;
        const tiles = state.tiles;
        const queue = [0];
        const visited = new Set();
        const flowOrder = [];

        while (queue.length > 0) {
            const curr = queue.shift();
            if (visited.has(curr)) continue;
            visited.add(curr);
            flowOrder.push(curr);
            if (tiles[curr].isEnd) break;

            const conns = rotateConns(PIPES[tiles[curr].type].conns, tiles[curr].rotation);
            const r = Math.floor(curr / size), c = curr % size;
            const neighbors = [
                { idx: curr - size, dir: 0, opp: 2, ok: r > 0 },
                { idx: curr + 1,    dir: 1, opp: 3, ok: c < size - 1 },
                { idx: curr + size, dir: 2, opp: 0, ok: r < size - 1 },
                { idx: curr - 1,    dir: 3, opp: 1, ok: c > 0 },
            ];
            neighbors.forEach(n => {
                if (n.ok && conns[n.dir] === 1) {
                    const nextConns = rotateConns(PIPES[tiles[n.idx].type].conns, tiles[n.idx].rotation);
                    if (nextConns[n.opp] === 1 && !visited.has(n.idx)) queue.push(n.idx);
                }
            });
        }

        const totalPath = state.path.length;
        state.flowTotal = flowOrder.length;

        // Animate flow
        for (let i = 0; i < flowOrder.length; i++) {
            const idx = flowOrder[i];
            const div = $('grid').children[idx];
            div.classList.add('flowing');
            if (tiles[idx].isEnd) {
                const endW = div.querySelector('.end-w');
                if (endW) endW.classList.add('end-glow');
            }
            state.flowStep = i + 1;
            updateFlowBar(state.flowStep / Math.max(totalPath, flowOrder.length));
            Audio.flow();
            await sleep(tiles[idx].isEnd ? 200 : 350);

            if (tiles[idx].isEnd) {
                // WIN
                clearInterval(state.timerID);
                const elapsed = getElapsed();
                const diff = DIFFICULTIES[state.diffIdx];
                const score = calcScore(state.moves, elapsed, state.size, diff.parMoves);
                state.score = score;
                state.streak++;

                // Save best
                const key = `d${state.diffIdx}`;
                if (!state.best[key] || score > state.best[key]) {
                    state.best[key] = score;
                    saveBest(state.best);
                }

                updateUI();
                Audio.win();
                spawnParticles();
                showWinModal(elapsed, score);
                return;
            }
        }

        // FAIL — flow stopped
        clearInterval(state.timerID);
        Audio.fail();
        $('hint-bar').textContent = '💧 Pipes disconnected! Rearrange and try again.';
        $('hint-bar').className = 'hint-bar';

        // Flash wrong tiles
        const grid = $('grid');
        for (let i = 0; i < state.tiles.length; i++) {
            if (!visited.has(i)) {
                grid.children[i].classList.add('wrong-flash');
                setTimeout(() => grid.children[i].classList.remove('wrong-flash'), 500);
            }
        }

        showToast('Disconnected! Keep rotating 🔧', 'error');

        // Reset flow after delay
        await sleep(600);
        for (const i of flowOrder) {
            $('grid').children[i].classList.remove('flowing');
        }
        updateFlowBar(0);
        state.isFlowing = false;
        $('btn-flow').disabled = false;
    };

    const updateFlowBar = (pct) => {
        $('flow-bar').style.width = `${Math.round(pct * 100)}%`;
    };

    const showWinModal = (elapsed, score) => {
        const m = Math.floor(elapsed / 60), s = elapsed % 60;
        $('res-moves').textContent = state.moves;
        $('res-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
        $('res-score').textContent = score.toLocaleString();

        const diff = DIFFICULTIES[state.diffIdx];
        const isPerfect = state.moves <= diff.parMoves;
        $('modal-icon').textContent = isPerfect ? '⭐' : '💧';
        $('modal-title').textContent = isPerfect ? 'Perfect Flow!' : 'Water Delivered!';
        $('modal-sub').textContent = isPerfect
            ? `Flawless! Under par by ${diff.parMoves - state.moves + diff.parMoves - state.moves} moves!`
            : `Streak: ${state.streak} · Keep flowing!`;

        $('next-btn').textContent = state.diffIdx < DIFFICULTIES.length - 1
            ? `Next: ${DIFFICULTIES[state.diffIdx + 1].name} ›`
            : '🏆 Mastered!';
        $('next-btn').disabled = state.diffIdx >= DIFFICULTIES.length - 1;

        $('modal-backdrop').classList.add('active');
    };

    const updateUI = () => {
        const diff = DIFFICULTIES[state.diffIdx];
        $('level-badge').textContent = `LVL ${state.diffIdx + 1}`;
        $('stat-moves').textContent = state.moves;
        $('stat-score').textContent = state.score.toLocaleString();
        $('stat-streak').textContent = state.streak;
        updateTimerDisplay();

        // Best score
        const key = `d${state.diffIdx}`;
        const best = state.best[key];
        $('best-badge').textContent = best ? `BEST ${best.toLocaleString()}` : 'BEST —';

        // Difficulty buttons
        const diffRow = $('diff-row');
        diffRow.innerHTML = '';
        DIFFICULTIES.forEach((d, i) => {
            const btn = document.createElement('button');
            btn.className = `diff-btn${i === state.diffIdx ? ' active' : ''}`;
            btn.textContent = d.name;
            btn.onclick = () => { if (!state.isFlowing) init(i); };
            diffRow.appendChild(btn);
        });
    };

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    // ── Particles ──
    const spawnParticles = () => {
        const colors = ['#38bdf8','#34d399','#f59e0b','#a78bfa','#fb7185'];
        for (let i = 0; i < 28; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = 4 + Math.random() * 8;
            const angle = Math.random() * Math.PI * 2;
            const dist = 80 + Math.random() * 200;
            p.style.cssText = `
                width:${size}px; height:${size}px;
                background:${colors[Math.floor(Math.random()*colors.length)]};
                left:${window.innerWidth/2}px; top:${window.innerHeight/2}px;
                --tx:${Math.cos(angle)*dist}px; --ty:${Math.sin(angle)*dist}px;
                animation-duration:${0.6+Math.random()*0.6}s;
                animation-delay:${Math.random()*0.2}s;
            `;
            document.body.appendChild(p);
            p.addEventListener('animationend', () => p.remove());
        }
    };

    // ── Toast ──
    let toastTimer = null;
    const showToast = (msg, type = '') => {
        const t = $('toast');
        t.textContent = msg;
        t.className = `toast${type ? ' '+type : ''} show`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    };

    // ── Public API ──
    return { init, undo, shuffle, replay, nextLevel, startFlow };
})();

// ══════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════
window.addEventListener('load', () => {
    Game.init(0);
});

// Keyboard support
window.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); Game.startFlow(); }
    if (e.key === 'z' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); Game.undo(); }
    if (e.key === 'r') Game.shuffle();
});
</script>
