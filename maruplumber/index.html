<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydro Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface-2: #1a2235;
            --surface-3: #1e2d40;
            --border: rgba(99,179,237,0.15);
            --border-bright: rgba(99,179,237,0.35);
            --water: #38bdf8;
            --water-dark: #0ea5e9;
            --water-glow: rgba(56,189,248,0.4);
            --pipe: #2d3a4f;
            --pipe-light: #3d5068;
            --pipe-rim: #4a6080;
            --accent: #f59e0b;
            --accent-glow: rgba(245,158,11,0.4);
            --green: #34d399;
            --green-glow: rgba(52,211,153,0.4);
            --red: #f87171;
            --text: #e2e8f0;
            --text-muted: #64748b;
            --text-dim: #94a3b8;
            --radius: 16px;
            --gap: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }

        body {
            background: var(--bg);
            font-family: 'Nunito', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            position: relative;
        }

        .bg-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .bg-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.07; animation: blobDrift 20s ease-in-out infinite alternate; }
        .bg-blob:nth-child(1) { width: 400px; height: 400px; background: var(--water); top: -100px; left: -100px; }
        .bg-blob:nth-child(2) { width: 300px; height: 300px; background: var(--accent); bottom: -80px; right: -80px; }
        @keyframes blobDrift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px,30px) scale(1.15); } }
        
        .bg-grid { position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px); background-size: 40px 40px; }

        #app { position: relative; z-index: 1; width: 100%; max-width: 440px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 16px; }

        .header { width: 100%; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--water), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .logo span { -webkit-text-fill-color: var(--text); }
        
        .back-btn { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 6px 12px; font-size: 0.8rem; font-weight: 700; color: var(--text-dim); text-decoration: none; transition: 0.2s; }
        .badge { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 6px 14px; font-size: 0.8rem; font-weight: 700; color: var(--text-dim); font-family: 'Space Mono', monospace; }
        .badge.highlight { border-color: var(--border-bright); color: var(--water); }

        .stats-bar { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
        .stat-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px; }
        .stat-value { font-size: 1.2rem; font-weight: 900; font-family: 'Space Mono', monospace; }
        .stat-value.water { color: var(--water); }
        .stat-value.gold { color: var(--accent); }
        .stat-divider { width: 1px; height: 30px; background: var(--border); }

        .diff-row { display: flex; gap: 6px; width: 100%; }
        .diff-btn { flex: 1; padding: 9px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 0.78rem; font-weight: 700; cursor: pointer; }
        .diff-btn.active { background: var(--surface-3); border-color: var(--water); color: var(--water); }

        .grid-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 16px; width: 100%; position: relative; }
        #grid { display: grid; gap: var(--gap); width: 100%; aspect-ratio: 1; }

        .tile { position: relative; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: transform 0.1s, border-color 0.2s; overflow: hidden; }
        .tile:active { transform: scale(0.92); }
        .tile.locked { cursor: default; }
        .tile.is-start { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.4); }
        .tile.is-end { background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.4); }
        .tile.flowing { border-color: var(--water); box-shadow: 0 0 15px var(--water-glow); }

        .pipe-svg { width: 100%; height: 100%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .p-bg { fill: none; stroke: var(--pipe-rim); stroke-linecap: round; opacity: 0.5; }
        .p-tube { fill: none; stroke: var(--pipe); stroke-linecap: round; }
        .p-inner { fill: none; stroke: var(--pipe-light); stroke-linecap: round; }
        .p-water { fill: none; stroke: var(--water); stroke-linecap: round; stroke-dasharray: 100; stroke-dashoffset: 100; transition: stroke-dashoffset 0.4s ease-out; }
        .tile.flowing .p-water { stroke-dashoffset: 0; }

        .controls { display: flex; gap: 10px; width: 100%; }
        .btn { flex: 1; padding: 14px 0; border-radius: 14px; border: none; cursor: pointer; font-weight: 800; font-size: 0.95rem; }
        .btn-primary { background: linear-gradient(135deg, var(--water-dark), var(--water)); color: #0a0e1a; }
        .btn-secondary { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }

        .flow-progress { width: 100%; height: 4px; background: var(--surface-2); border-radius: 2px; margin-top: 12px; overflow: hidden; }
        .flow-bar { height: 100%; width: 0%; background: var(--water); transition: width 0.3s; }

        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center; }
        .modal-backdrop.active { display: flex; }
        .modal { background: var(--surface); border: 1px solid var(--water); border-radius: 24px; padding: 30px; text-align: center; max-width: 300px; }
    </style>
</head>
<body>

<div class="bg-layer"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="bg-grid"></div>

<div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
        <h2 style="color: var(--water); margin-bottom: 10px;">Goal Reached!</h2>
        <p style="margin-bottom: 20px;">The flow is perfect.</p>
        <button class="btn btn-primary" style="width: 100%" onclick="Game.init()">Play Again</button>
    </div>
</div>

<div id="app">
    <div class="header">
        <div class="logo">Hydro<span>Quest</span></div>
        <div class="badge highlight" id="level-badge">LVL 1</div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><div class="stat-label">Moves</div><div class="stat-value water" id="stat-moves">0</div></div>
        <div class="stat-divider"></div>
        <div class="stat-item"><div class="stat-label">Streak</div><div class="stat-value gold" id="stat-streak">0</div></div>
    </div>

    <div class="diff-row" id="diff-row"></div>

    <div class="grid-wrap">
        <div id="grid"></div>
        <div class="flow-progress"><div class="flow-bar" id="flow-bar"></div></div>
    </div>

    <div class="controls">
        <button class="btn btn-secondary" onclick="Game.init()">⟳ Shuffle</button>
        <button class="btn btn-primary" id="btn-flow" onclick="Game.startFlow()">▶ Flow</button>
    </div>
</div>

<script>
const PIPES = {
    straight: { conns: [0, 1, 0, 1], svg: (s) => `<svg viewBox="0 0 100 100" class="pipe-svg"><path class="p-bg" d="M 0 50 L 100 50" stroke-width="18"/><path class="p-tube" d="M 0 50 L 100 50" stroke-width="14"/><path class="p-water" d="M 0 50 L 100 50" stroke-width="8"/></svg>` },
    elbow: { conns: [1, 1, 0, 0], svg: (s) => `<svg viewBox="0 0 100 100" class="pipe-svg"><path class="p-bg" d="M 50 0 Q 50 50 100 50" stroke-width="18"/><path class="p-tube" d="M 50 0 Q 50 50 100 50" stroke-width="14"/><path class="p-water" d="M 50 0 Q 50 50 100 50" stroke-width="8"/></svg>` },
    start: { conns: [0, 1, 0, 0], svg: (s) => `<svg viewBox="0 0 100 100" class="pipe-svg"><circle cx="30" cy="50" r="12" fill="#f59e0b"/><path class="p-bg" d="M 30 50 L 100 50" stroke-width="18"/><path class="p-tube" d="M 30 50 L 100 50" stroke-width="14"/><path class="p-water" d="M 30 50 L 100 50" stroke-width="8"/></svg>` },
    end: { conns: [0, 0, 0, 1], svg: (s) => `<svg viewBox="0 0 100 100" class="pipe-svg"><path class="p-bg" d="M 0 50 L 70 50" stroke-width="18"/><path class="p-tube" d="M 0 50 L 70 50" stroke-width="14"/><path class="p-water" d="M 0 50 L 70 50" stroke-width="8"/><circle cx="70" cy="50" r="12" fill="#34d399"/></svg>` }
};

const Game = (() => {
    let state = { size: 3, tiles: [], moves: 0, streak: 0, isFlowing: false, startIdx: 0, endIdx: 0 };
    const rotateConns = (c, r) => { let a = [...c]; for(let i=0; i<r; i++) a.unshift(a.pop()); return a; };

    const init = (sz = state.size) => {
        state.size = sz; state.moves = 0; state.isFlowing = false;
        document.getElementById('modal-backdrop').classList.remove('active');
        document.getElementById('flow-bar').style.width = '0%';
        
        // 1. Force a path from top-left area to bottom-right area
        state.startIdx = 0;
        state.endIdx = (sz * sz) - 1;
        
        // Simple snake-like path generation for guaranteed solvability
        const path = [];
        for(let r=0; r<sz; r++) {
            if(r % 2 === 0) for(let c=0; c<sz; c++) path.push(r*sz + c);
            else for(let c=sz-1; c>=0; c--) path.push(r*sz + c);
        }
        
        state.tiles = Array.from({length: sz*sz}, (_, i) => {
            const pIdx = path.indexOf(i);
            const isStart = i === state.startIdx, isEnd = i === state.endIdx;
            let type = 'straight', rotation = 0;

            if(isStart) {
                type = 'start';
                rotation = (path[1] === i+1) ? 0 : 1; // Point right or down
            } else if(isEnd) {
                type = 'end';
                const prev = path[pIdx-1];
                rotation = (prev === i-1) ? 0 : 3; // Receive from left or up
            } else {
                const prev = path[pIdx-1], next = path[pIdx+1];
                const d1 = getDir(i, prev), d2 = getDir(i, next);
                type = (Math.abs(d1-d2) === 2) ? 'straight' : 'elbow';
                // Find correct rotation to satisfy the path
                for(let r=0; r<4; r++) {
                    const c = rotateConns(PIPES[type].conns, r);
                    if(c[d1] && c[d2]) { rotation = (r + Math.floor(Math.random()*3)+1)%4; break; }
                }
            }
            return { type, rotation, isStart, isEnd };
        });
        render();
    };

    const getDir = (from, to) => {
        const d = to - from;
        if(d === -state.size) return 0; // Up
        if(d === 1) return 1;          // Right
        if(d === state.size) return 2; // Down
        if(d === -1) return 3;         // Left
        return 0;
    };

    const render = () => {
        const g = document.getElementById('grid'); g.innerHTML = '';
        g.style.gridTemplateColumns = `repeat(${state.size}, 1fr)`;
        state.tiles.forEach((t, i) => {
            const d = document.createElement('div');
            d.className = `tile ${t.isStart || t.isEnd ? 'locked' : ''} ${t.isStart ? 'is-start' : ''} ${t.isEnd ? 'is-end' : ''}`;
            d.innerHTML = PIPES[t.type].svg();
            d.querySelector('.pipe-svg').style.transform = `rotate(${t.rotation * 90}deg)`;
            d.onclick = () => {
                if(state.isFlowing || t.isStart || t.isEnd) return;
                t.rotation = (t.rotation + 1) % 4;
                state.moves++;
                document.getElementById('stat-moves').textContent = state.moves;
                d.querySelector('.pipe-svg').style.transform = `rotate(${t.rotation * 90}deg)`;
            };
            g.appendChild(d);
        });
        document.getElementById('stat-streak').textContent = state.streak;
    };

    const startFlow = async () => {
        if(state.isFlowing) return;
        state.isFlowing = true;
        const visited = new Set(), flowOrder = [], queue = [state.startIdx];
        
        while(queue.length > 0) {
            const curr = queue.shift();
            if(visited.has(curr)) continue;
            visited.add(curr); flowOrder.push(curr);
            if(curr === state.endIdx) break;

            const conns = rotateConns(PIPES[state.tiles[curr].type].conns, state.tiles[curr].rotation);
            const r = Math.floor(curr/state.size), c = curr%state.size;
            
            [[curr-state.size,0,2,r>0],[curr+1,1,3,c<state.size-1],[curr+state.size,2,0,r<state.size-1],[curr-1,3,1,c>0]].forEach(([n,d,o,ok]) => {
                if(ok && conns[d] && rotateConns(PIPES[state.tiles[n].type].conns, state.tiles[n].rotation)[o]) queue.push(n);
            });
        }

        for(let i=0; i<flowOrder.length; i++) {
            const idx = flowOrder[i];
            document.getElementById('grid').children[idx].classList.add('flowing');
            document.getElementById('flow-bar').style.width = `${((i+1)/flowOrder.length)*100}%`;
            await new Promise(r => setTimeout(r, 250));
            if(idx === state.endIdx) {
                state.streak++;
                document.getElementById('modal-backdrop').classList.add('active');
                return;
            }
        }
        
        setTimeout(() => {
            flowOrder.forEach(i => document.getElementById('grid').children[i].classList.remove('flowing'));
            document.getElementById('flow-bar').style.width = '0%';
            state.isFlowing = false;
        }, 800);
    };

    return { init, startFlow };
})();

window.onload = () => Game.init(3);
</script>
</body>
</html>
