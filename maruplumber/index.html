<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruPlumber: Hydro Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00a8ff;
            --primary-dark: #0097e6;
            --accent: #fbc531;
            --bg-gradient: linear-gradient(135deg, #74b9ff, #a29bfe);
            --tile-bg: rgba(255, 255, 255, 0.8);
            --pipe-metal: #dcdde1;
            --water: #00d2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Fredoka', sans-serif; }
        body { background: var(--bg-gradient); height: 100dvh; display: flex; justify-content: center; align-items: center; overflow: hidden; padding: 10px; }

        #game-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 40px; width: 100%; max-width: 400px; padding: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; }
        #grid { display: grid; gap: 10px; margin-bottom: 25px; aspect-ratio: 1; }

        .tile { background: var(--tile-bg); border-radius: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; transition: 0.2s; }
        .tile.is-start { border: 3px solid var(--accent); }
        .tile.is-end { border: 3px solid #4cd137; }

        svg.pipe { width: 85%; height: 85%; }
        .pipe-path { fill: none; stroke: var(--pipe-metal); stroke-width: 20; stroke-linecap: round; }
        .water-path { fill: none; stroke: var(--water); stroke-width: 12; stroke-linecap: round; stroke-dasharray: 120; stroke-dashoffset: 120; transition: stroke-dashoffset 0.5s linear; }
        .flow .water-path { stroke-dashoffset: 0; }

        .controls { display: flex; gap: 15px; }
        button { flex: 1; padding: 15px; border-radius: 20px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; box-shadow: 0 6px 0 var(--primary-dark); }
        .btn-sec { background: #f5f6fa; color: #7f8fa6; }

        #celebration { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(8px); }
        #celebration.active { display: flex; }
        .modal { background: white; padding: 35px; border-radius: 35px; width: 85%; max-width: 340px; }
    </style>
</head>
<body>

<div id="celebration">
    <div class="modal">
        <h2>Splashtastic! 💦</h2>
        <div style="margin: 20px 0;">
            <button class="btn-main" onclick="nextLevel()">Next Level</button>
        </div>
    </div>
</div>

<div id="game-card">
    <h1 style="margin-bottom: 15px;">Hydro Quest 💧</h1>
    <div id="grid"></div>
    <div class="controls">
        <button class="btn-sec" onclick="initGame()">Shuffle</button>
        <button class="btn-main" onclick="startFlow()">Open Valve!</button>
    </div>
</div>

<script>
    // Audio Engine same as before
    const AudioEngine = {
        ctx: null, init() { if(!this.ctx) this.ctx = new AudioContext(); },
        playBubble() { this.init(); const o = this.ctx.createOscillator(), g = this.ctx.createGain(); o.type='sine'; o.frequency.setValueAtTime(300, this.ctx.currentTime); o.frequency.exponentialRampToValueAtTime(600, this.ctx.currentTime+0.2); g.gain.setValueAtTime(0.1, this.ctx.currentTime); o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime+0.2); }
    };

    let size = 3;
    let tiles = [];
    let isFlowing = false;

    // Define Paths for each direction [Top, Right, Bottom, Left]
    const PATHS = {
        "0-2": "M 50 0 L 50 100", // T to B
        "2-0": "M 50 100 L 50 0", // B to T
        "1-3": "M 100 50 L 0 50", // R to L
        "3-1": "M 0 50 L 100 50", // L to R
        "0-1": "M 50 0 Q 50 50 100 50", // T to R
        "1-0": "M 100 50 Q 50 50 50 0", // R to T
        "1-2": "M 100 50 Q 50 50 50 100", // R to B
        "2-1": "M 50 100 Q 50 50 100 50", // B to R
        "2-3": "M 50 100 Q 50 50 0 50", // B to L
        "3-2": "M 0 50 Q 50 50 50 100", // L to B
        "3-0": "M 0 50 Q 50 50 50 0", // L to T
        "0-3": "M 50 0 Q 50 50 0 50", // T to L
        "start": "M 30 50 L 100 50",
        "end": "M 0 50 L 70 50"
    };

    function initGame() {
        isFlowing = false;
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
        document.getElementById('celebration').classList.remove('active');
        
        tiles = [];
        for(let i=0; i<size*size; i++) {
            let type = Math.random() > 0.5 ? 'straight' : 'elbow';
            if(i === 0) type = 'start';
            if(i === size*size-1) type = 'end';
            
            tiles.push({ id: i, type, rotation: Math.floor(Math.random()*4), isStart: i===0, isEnd: i===size*size-1 });
            renderTile(tiles[i]);
        }
    }

    function renderTile(tile) {
        const div = document.createElement('div');
        div.className = `tile ${tile.isStart?'is-start':''} ${tile.isEnd?'is-end':''}`;
        div.id = `tile-${tile.id}`;
        
        // Base SVG structure
        div.innerHTML = `<svg viewBox="0 0 100 100" class="pipe">
            <path class="pipe-path" d=""/>
            <path class="water-path" d=""/>
            ${tile.isStart ? '<circle cx="30" cy="50" r="15" fill="#718093"/>' : ''}
            ${tile.isEnd ? '<circle cx="70" cy="50" r="15" fill="#718093"/>' : ''}
        </svg>`;
        
        updateTileGraphics(tile, div);
        div.onclick = () => { if(isFlowing) return; tile.rotation = (tile.rotation + 1) % 4; updateTileGraphics(tile, div); };
        document.getElementById('grid').appendChild(div);
    }

    function updateTileGraphics(tile, el) {
        const conns = getConnectors(tile);
        const pipePath = el.querySelector('.pipe-path');
        const svg = el.querySelector('svg');
        
        // We still rotate the visual container, but we'll manually set the water path later
        svg.style.transform = `rotate(${tile.rotation * 90}deg)`;
        
        // Draw the static grey pipe
        if(tile.type === 'start') pipePath.setAttribute('d', PATHS['start']);
        else if(tile.type === 'end') pipePath.setAttribute('d', PATHS['end']);
        else if(tile.type === 'straight') pipePath.setAttribute('d', "M 0 50 L 100 50");
        else pipePath.setAttribute('d', "M 50 0 Q 50 50 100 50");
    }

    function getConnectors(tile) {
        let base = (tile.type === 'straight') ? [0,1,0,1] : (tile.type === 'elbow') ? [1,1,0,0] : (tile.type === 'start') ? [0,1,0,0] : [0,0,0,1];
        for(let i=0; i<tile.rotation; i++) base.unshift(base.pop());
        return base;
    }

    async function startFlow() {
        if(isFlowing) return;
        isFlowing = true;
        let queue = [{idx: 0, fromDir: -1}]; // -1 means source
        let visited = new Set();

        while(queue.length > 0) {
            let {idx, fromDir} = queue.shift();
            const tile = tiles[idx];
            const el = document.getElementById(`tile-${idx}`);
            const conns = getConnectors(tile);
            
            // DYNAMIC WATER PATH LOGIC
            const waterPath = el.querySelector('.water-path');
            let toDir = conns.findIndex((c, i) => c === 1 && i !== fromDir);
            
            let pathKey = tile.isStart ? 'start' : tile.isEnd ? 'end' : `${fromDir}-${toDir}`;
            
            // To make PATHS work with CSS rotation, we calculate the "local" relative path
            // but the easiest way is to just set the path based on absolute directions
            // and TEMPORARILY reset SVG rotation to 0 during flow for that tile.
            el.querySelector('svg').style.transform = 'none';
            waterPath.setAttribute('d', PATHS[pathKey] || PATHS['start']);
            el.querySelector('.pipe-path').setAttribute('d', PATHS[pathKey] || PATHS['start']);

            el.classList.add('flow');
            AudioEngine.playBubble();
            await new Promise(r => setTimeout(r, 400));
            visited.add(idx);

            if(tile.isEnd) { document.getElementById('celebration').classList.add('active'); return; }

            const neighbors = [
                {i: idx-size, d: 0, opp: 2, ok: Math.floor(idx/size) > 0},
                {i: idx+1, d: 1, opp: 3, ok: idx % size < size - 1},
                {i: idx+size, d: 2, opp: 0, ok: Math.floor(idx/size) < size - 1},
                {i: idx-1, d: 3, opp: 1, ok: idx % size > 0}
            ];

            neighbors.forEach(n => {
                if(n.ok && conns[n.d] === 1 && n.d !== fromDir) {
                    if(getConnectors(tiles[n.i])[n.opp] === 1) queue.push({idx: n.i, fromDir: n.opp});
                }
            });
        }
        
        isFlowing = false;
        setTimeout(initGame, 1000);
    }

    function nextLevel() { size = Math.min(size+1, 5); initGame(); }
    initGame();
</script>
</body>
</html>
