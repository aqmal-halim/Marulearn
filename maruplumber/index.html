<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaruPlumber: Hydro Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00a8ff;
            --primary-dark: #0097e6;
            --accent: #fbc531;
            --bg-gradient: linear-gradient(135deg, #74b9ff, #a29bfe);
            --tile-bg: rgba(255, 255, 255, 0.8);
            --pipe-metal: #dcdde1;
            --pipe-shadow: #718093;
            --water: #00d2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Fredoka', sans-serif; }
        
        body {
            background: var(--bg-gradient);
            height: 100dvh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; padding: 10px;
        }

        #game-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            width: 100%;
            max-width: 400px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2), inset 0 0 0 2px rgba(255,255,255,0.5);
            text-align: center;
            position: relative;
        }

        .header { margin-bottom: 15px; position: relative; }
        .back-btn {
            position: absolute; left: 0; top: 0;
            background: none; border: none; font-size: 1.5rem;
            cursor: pointer; padding: 5px; color: #7f8fa6;
        }

        h1 { color: #2f3640; font-size: 1.8rem; font-weight: 700; margin-top: 35px; margin-bottom: 5px; }
        
        .stats { display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        .level-pill {
            background: var(--primary);
            color: white; padding: 5px 20px;
            border-radius: 20px; font-weight: 600;
            box-shadow: 0 4px 0 var(--primary-dark);
        }

        #grid {
            display: grid; gap: 10px;
            margin-bottom: 25px;
            aspect-ratio: 1;
        }

        .tile {
            background: var(--tile-bg);
            border-radius: 18px;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center;
        }
        .tile:active { transform: scale(0.9) rotate(10deg); }
        .tile.is-start { background: #fff1c1; border: 3px solid var(--accent); cursor: default; }
        .tile.is-end { background: #c1ffcf; border: 3px solid #4cd137; }

        svg.pipe { width: 80%; height: 80%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .pipe-path { fill: none; stroke: var(--pipe-metal); stroke-width: 20; stroke-linecap: round; }
        
        .water-path {
            fill: none; stroke: var(--water); stroke-width: 12;
            stroke-linecap: round; stroke-dasharray: 100;
            stroke-dashoffset: 100; transition: stroke-dashoffset 0.5s ease-in-out;
        }
        .tile.flow .water-path { stroke-dashoffset: 0; }

        .controls { display: flex; gap: 15px; }
        button {
            flex: 1; padding: 15px; border-radius: 20px;
            border: none; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: 0.2s;
        }
        .btn-main { background: var(--primary); color: white; box-shadow: 0 6px 0 var(--primary-dark); }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--primary-dark); }
        .btn-sec { background: #f5f6fa; color: #7f8fa6; }

        #celebration {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: white; backdrop-filter: blur(8px);
        }
        #celebration.active { display: flex; }
        .modal { 
            background: white; padding: 35px; border-radius: 35px; 
            color: #2f3640; text-align: center; transform: scale(0);
            animation: popIn 0.5s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 85%; max-width: 340px;
        }
        @keyframes popIn { to { transform: scale(1); } }
        .modal-btns { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="celebration">
    <div class="modal">
        <h2 style="font-size: 2.2rem;">Splashtastic! 💦</h2>
        <p style="margin: 10px 0 10px; color: #7f8fa6;">The garden is perfectly watered!</p>
        <div class="modal-btns">
            <button class="btn-main" onclick="nextLevel()">Next Difficulty</button>
            <button class="btn-sec" onclick="initGame()">Retry Level</button>
        </div>
    </div>
</div>

<div id="game-card">
    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">🏠</button>
        <h1>Hydro Quest 💧</h1>
        <div class="stats">
            <span class="level-pill" id="level-txt">Level 1</span>
        </div>
    </div>
    <div id="grid"></div>
    <div class="controls">
        <button class="btn-sec" onclick="initGame()">Shuffle</button>
        <button class="btn-main" id="valve-btn" onclick="startFlow()">Open Valve!</button>
    </div>
</div>

<script>
    const AudioEngine = {
        ctx: null,
        init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        playClick() {
            this.init();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.1);
        },
        playBubble() {
            this.init();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(200, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, this.ctx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.2);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.2);
        },
        playWin() {
            this.init();
            [440, 554.37, 659.25, 880].forEach((f, i) => {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.frequency.value = f;
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime + i*0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + i*0.1 + 0.5);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(this.ctx.currentTime + i*0.1); osc.stop(this.ctx.currentTime + i*0.1 + 0.5);
            });
        },
        playFail() {
            this.init();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.frequency.setValueAtTime(150, this.ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(50, this.ctx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.4);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.4);
        }
    };

    let size = 3;
    let tiles = [];
    let isFlowing = false;
    const gridEl = document.getElementById('grid');

    const SVG_PIPES = {
        straight: `<svg viewBox="0 0 100 100" class="pipe"><path class="pipe-path" d="M 0 50 L 100 50"/><path class="water-path" d="M 0 50 L 100 50"/></svg>`,
        elbow: `<svg viewBox="0 0 100 100" class="pipe"><path class="pipe-path" d="M 50 0 Q 50 50 100 50"/><path class="water-path" d="M 50 0 Q 50 50 100 50"/></svg>`,
        start: `<svg viewBox="0 0 100 100" class="pipe"><circle cx="30" cy="50" r="15" fill="#718093" /><path class="pipe-path" d="M 30 50 L 100 50"/><path class="water-path" d="M 30 50 L 100 50"/></svg>`
    };

    function generatePath() {
        const total = size * size;
        let path = []; let curr = 0; let visited = new Set([0]);
        while(curr !== total - 1) {
            path.push(curr);
            let neighbors = [];
            let r = Math.floor(curr/size), c = curr%size;
            if(r > 0) neighbors.push(curr-size);
            if(r < size-1) neighbors.push(curr+size);
            if(c > 0) neighbors.push(curr-1);
            if(c < size-1) neighbors.push(curr+1);
            neighbors = neighbors.filter(n => !visited.has(n));
            if(neighbors.length === 0) return generatePath(); 
            curr = neighbors[Math.floor(Math.random() * neighbors.length)];
            visited.add(curr);
        }
        path.push(total-1);
        return path;
    }

    function initGame() {
        isFlowing = false;
        document.getElementById('level-txt').innerText = `Level ${size-2}`;
        document.getElementById('celebration').classList.remove('active');
        gridEl.innerHTML = '';
        gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
        const path = generatePath();
        tiles = [];
        for(let i=0; i<size*size; i++) {
            const isPath = path.includes(i);
            let type = Math.random() > 0.5 ? 'straight' : 'elbow';
            if(i === 0) type = 'start';
            else if(isPath && i !== size*size-1) {
                const idx = path.indexOf(i);
                const prev = path[idx-1], next = path[idx+1];
                const diff = Math.abs(prev - next);
                type = (diff === 2 || diff === size*2) ? 'straight' : 'elbow';
            }
            const tile = { id: i, type: type, rotation: Math.floor(Math.random() * 4), isStart: i === 0, isEnd: i === size*size-1 };
            tiles.push(tile);
            renderTile(tile);
        }
    }

    function renderTile(tile) {
        const div = document.createElement('div');
        div.className = `tile ${tile.isStart?'is-start':''} ${tile.isEnd?'is-end':''}`;
        div.innerHTML = SVG_PIPES[tile.type];
        const svg = div.querySelector('svg');
        svg.style.transform = `rotate(${tile.rotation * 90}deg)`;
        div.onclick = () => {
            if(isFlowing || tile.isStart) return;
            AudioEngine.playClick();
            tile.rotation = (tile.rotation + 1) % 4;
            svg.style.transform = `rotate(${tile.rotation * 90}deg)`;
        };
        gridEl.appendChild(div);
    }

    function getConnectors(tile) {
        let base = (tile.type === 'start') ? [0, 1, 0, 0] : (tile.type === 'straight' ? [0, 1, 0, 1] : [1, 1, 0, 0]);
        for(let i=0; i<tile.rotation; i++) base.unshift(base.pop());
        return base;
    }

    async function startFlow() {
        if(isFlowing) return;
        isFlowing = true;
        
        let queue = [0]; let visited = new Set(); let won = false;
        while(queue.length > 0) {
            let currIdx = queue.shift();
            if(visited.has(currIdx)) continue;
            visited.add(currIdx);
            const tileEl = gridEl.children[currIdx];
            tileEl.classList.add('flow');
            AudioEngine.playBubble();
            await new Promise(r => setTimeout(r, 400));
            if(tiles[currIdx].isEnd) { won = true; break; }
            const conns = getConnectors(tiles[currIdx]);
            const r = Math.floor(currIdx/size), c = currIdx%size;
            const neighbors = [
                {idx: currIdx-size, dir: 0, opp: 2, ok: r > 0},
                {idx: currIdx+1, dir: 1, opp: 3, ok: c < size-1},
                {idx: currIdx+size, dir: 2, opp: 0, ok: r < size-1},
                {idx: currIdx-1, dir: 3, opp: 1, ok: c > 0}
            ];
            neighbors.forEach(n => {
                if(n.ok && conns[n.dir] === 1) {
                    const nextConns = getConnectors(tiles[n.idx]);
                    if(nextConns[n.opp] === 1) queue.push(n.idx);
                }
            });
        }
        if(won) { 
            AudioEngine.playWin(); 
            document.getElementById('celebration').classList.add('active'); 
        } else { 
            AudioEngine.playFail(); 
            isFlowing = false; 
            tiles.forEach((_, i) => gridEl.children[i].classList.remove('flow')); 
        }
    }

    function nextLevel() { if(size < 6) size++; initGame(); }
    initGame();
</script>
</body>
</html>
